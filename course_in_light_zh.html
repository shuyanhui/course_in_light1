ng, into the “Adam State” in which\nit is totally in the envelopment of the godhead. There are many\ndimensions of mind and many, many dimensions of activity of\nspirit. Blessings.\n\nMany relationships that have been disturbed in this life will seem\nto fade into a memory, out of which bitterness and pain no longer\nexist. Relationships binding to the now will be seen with new eyes\nand with new energy as familiar souls in a more equal pattern, with\nequal status and equal opportunity. Yes, let the heart guide...\n\nIf you could see the soul in its pattern of energy, you would see\nbeauty and many rays of light. You would also see certain\ninsignias of light.\n\nMany of your souls hold the pattern of the Star of David. This is\nthe soul path of the initiate that walks the path following the\nChrist. The House of David represents the initiation of becoming\nrealized into its cosmic vibration. The symbol of the Star of David\nis more than an insignia representing a certain religious sect. It is a\nsacred pattern of soul-infused energy. It is the insignia of the Great\nWhite Brotherhood. It is encircled in an insignia representing or\nmeaning the alpha and the omega. The endless cycle of being or\nsoul moves like a wheel and lives and becomes awakened to its\neternal path. The soul in transition of physical to light moves to\ndifferent stations or plateaus where it becomes acquainted with its\nopportunity. It goes from healing, then to recognition and on to\nstations of development, knowledge and to the stage of service.\n\nSouls evolve continuously, once the soul has experienced itself\nattuned to these spiritual pathways. Our purpose for presenting the\nlesson and this experience is for you to understand. Each and all\nare important. Those who have left are never truly gone. They are\nsimply experiencing in a different way that you have accepted. We\nare most pleased. Now in this intense vibration, the feelings will\ncome and be magnified in you and through you. For the next 36\nhours, you will require a sense of stabilization. Your body will\nrequire much water and thirst for physical, mental and emotional\nnurture. Now I release you, go in peace...\n\nSPIRITUAL LAW #6\n\nThou shalt not kill.\n\nTo KILL, to end a life is placing self as a god. It is the placing of\nself in judgment of that one's life expression, denying the soul its\ncreative resource. Again, the lessons of mass-mind have been slow\nin evolving. The warring forces that grow prevalent in life\nexperience are an abomination. However, what of those who kill\nwithout malice, killing in the line of “patriotic duty?”\n\nThis is being swept up into mass-mind thinking, into defense\nmechanisms. This is looked upon as a karmic lesson in courage, in\nmisconceived ideals. The soul who must war against an enemy\nunder the direction of a governmental agency is brought before the\nAkashic records. It perceives the attitudes, the motivation and the\nconcepts that brought this person into that action.\n\nIf one reaches out in total defense towards the loyalties of their\nown governmental agencies and has no personal vibration attached\nto the act, there is little karmic aspect in that situation.\nNevertheless, the taking of life from another is still breaking a\nkarmic law.\n\nQ: What about those who set out to murder others?\n\nA: One who maliciously sets out to end the life experience of\nanother must meet the same karmic lesson as well as those who\nmurder others to be put to death in execution? Again, it is best that\na life be held in absolute solitary confinement to search his inner\nspirit than for that life to be ended.\n\n                      Personal Journal\nAffirmations:\n\n        I am healing all my feelings from past pain.\n\n        I affirm that I am creating my relationships.\n\n        I accept the lessons that I learn from each relationship.\n\nWrite your own affirmations.\n\n\n\n\n\n\n\n\nWrite your experiences that are healing."}, {"id": "L3_29", "level": 3, "type": "lesson", "lesson_num": 29, "title": "LESSON 29", "subtitle": "ORANGE", "color": "orange", "content": "COLOR RAY: ORANGE\n              The Light of Perception and Sensitivity\n\nSpecific Level Function\n\nWithin the mental level, the Orange frequency of light will affect\nthe thoughts that are stirring around in your head. You may feel\nslightly off balance at times or, again, the pressure may be felt in\nthe head area. Your feelings may be intensified. The way you see\nyourself and others will become magnified.\n\nIf you are holding on to anger and feelings of resentment towards\nanother, images of that situation may arise or appear in the dream\nstate. You may feel as though you are riding a roller coaster of\nemotions and thoughts. This is all to help bring into the foreground\nheld in resistance and resentment for long periods.\n\nThis energy ray is to balance out the anxieties, fears and\nperceptions or false-to-fact images. It brings forth a revitalization\nand new energy flow. Working primarily on the nervous system, it\ncan result in a calmer nature where there have been extreme\nnervousness and anxiety syndromes.\n\nThis is also the energy of the psychic forces. So often, you may\nexperience a greater increase in your sensitivity or psychic\nconsciousness. This is a wonderful energy to work in concerning\nvisualization and perceptual consciousness.\n\nReleasing all the old patterns of being suppressed and held back\nthrough conditions outside of self gives a surge of new energy to\n\nyou. As you are lifted up, so are those who are in your life. The\nOrange Light brings expanded awareness within consciousness.\n\nMessage #1\n\nAzreal - Greetings, dear students of light, this is Azreal speaking.\nTonight we see amongst you various frequencies of light, various\ndegrees of vibrations. Each of you now magnifies this energy to\nunify and accept the inner spirit of all.\n\nWe wish to speak to you concerning the tremendous impact of this\nparticular frequency on the inner sense on the body that deals with\nthe sensory nature, with the perceptual consciousness and with the\nbrain-mind thinking patterns. You are creators and your images\nand thought forms are your creations. These creations give you\nlife's experiences. Therefore, what is undesirable in your\nimmediate experience is brought into the light that you may\nperceive these with greater clarity.\n\nIf you could see within your brain, within the memory aspect,\nwithin the motor system, you would see billions of tiny cells, each\ncell creating a thought image and picture, a visual pattern. These\nvisual patterns cause reactions within the lower bodies.\n\nThe purpose of these energies is to bring these images into a\nhigher, more expanded consciousness, to lift you out of the\nthinking patterns in which you perceive your world from a narrow\nconcept. For once, you have begun to perceive individuals in their\nlife experience as actors moving through their own production,\ntheir own creation; you release the judgments of their experience.\n\nThis energy will deal very strongly with your own ideas of self,\nideas of your fellow man, ideas of your associates and your\nrelationships. This frequency will activate within self the areas of\n\nyour own nature that cause feelings of separation, of mental\nconfusion and psychic disturbances.\n\nThis is the frequency, my dear students, that deals with your own\ninner awareness, your psychic sense, the clairvoyant\nconsciousness, the clairaudient, which deals with thought\nprojections and thought images of others. It is not unusual; it is a\ngift to be aware. It is an evolving process. It is simply using what\nhas been a part of you, not only in this life but also in many.\n\nWe see amongst you a strong desire for an ability to experience the\nphenomena of the sixth sense, to individually be shown a sign that\nwill excite the ego, which will confirm your own belief systems.\nKnow that you are each given according to your own concepts,\naccording to your own desire nature, according to what is\nnecessary for your own lesson learning experience.\n\nEach of you came into this world through consent of the higher self\nand through the will of the lower self. Each of you came into this\nwork to bring yourself into a consciousness free of the angers and\nrages, emotional imbalances and mental thought patterns keeping\nyou in states of limitation. Each of you were brought into this work\nas old souls who have walked a path of light and have come to\nserve humanity with love, with a sense of pioneering the New Age\nConsciousness.\n\nYou are all moving through many changes, through many releases,\nthrough many freedoms. You are all facing new thought processes.\nIt is a time that each of you, in your meditations, see yourselves as\na group, unified in purpose and ideals, for there is much work to be\ndone.\n\nWe see A Course of Light creating a tremendous growth pattern.\nMany students with a magnified energy are drawn to experience\npurification, upliftment, and knowing their own selves. We are\n\npleased with the conscientious efforts of each of you. We see the\ntremendous inner selves standing strong, experiencing the\nvibrations of light, and experiencing the impulses that ring true.\nEach of you are known and guided by your own counselors and\nteachers.\n\nMuch will be prepared in helping each of you to expand your own\ninner awareness, sixth sense and perceptions.\n\nWe have amongst you those who are channels to bring in messages\nfrom the Universal Consciousness. We have those who perceive\nthrough clairvoyance. We have those who perceive through\nclairaudience and others who are attuned to vibrations of a high\norder. The unity comes through the service, through the ideals,\nthrough the purpose. There are those of you whose psychic\nabilities are expanding. It is important to the inner self that the\nmotivations of the personality ego are to serve, to release all self-\naggrandizement, and to hold strong to the truth and teachings of\nthe masters under the directions of the Christed ones who have\nwalked the Earth through many ages.\n\nThe frequencies of Orange light disperse the lower frequencies\nfrom the emotional/perceptual negativities accumulated through\nmental thought processes, through projection from outside sources.\nEach of you has within your own inner awareness the inner truth.\nNow see, feel and perceive a radiance of energy moving\nthroughout each of you. Direct it to those loved ones who are in\nneed of that which lifts them from their mental anguish and their\nsensitive nature. Let the peace of the Christ magnify in and through\nyou.\n\nMessage #2\n\nMARCUS - The Light Rays -- The Atlantian Age\n\nMarcus - The light rays are the one distinguishing element of the\nAquarian Age. This was also the one element that was utilized in\nthe Atlantian Age, but in that time of earth evolution, the human\nconsciousness was so self-centered and objective and had not\nexperienced the awakening of love, that the spirit of man was not\nrecognized except by those who were called the Sons of Light.\n\nIn the Atlantian Age, there were very strong opposing forces, those\nwho were the sons of light and those who were the daughters of\ndarkness. These forces engaged in a battle of power, greed and\nself-annihilation.\n\nThe daughters of darkness were groups or clusters of people who\nwere using their power to manifest life forms of all kinds of\ndistortions. They were very involved with the sensuous nature and\nexperimenting with the sexual natures of animals and the same\nsexes and dwelling on holding other fellow creatures in slavery and\nexperimentation. They were a non-verbal race and were very\npowerful with the psychic forces. They created many idols and\ncreatures that they used to symbolize the sexual nature. There was\nno love within them, just a surface, ugly sense of being.\n\nThe Sons of Light were a race or cluster of people, souls who had\ncome into the earth realm from the angelic force. These were\nangelic soul consciousness “pure lighted consciousness” that\nhovered on the Earth level and witnessed the spiritually void\nconsciousness of the life forms. They chose to incarnate, to create\nhuman bodies to house their spirit, to balance and bring these un-\nawakened humans to the truth of their creative spirit. Therefore,\nthe earth experienced a great battle of force that was mostly the\nlight.\n\nIt was during this time of the earth that much of what is associated\nwith mythology took place. Later, centuries later, masters who had\nvisions of these battles told of them in legendary story form.\n\nAfter the destruction of much of the earth, the souls who returned\ninto the earth were blocked from the knowing of the power of the\nlight energy. So, life was experienced strictly through the\nbrainpower, the consciousness of the human brain. Nevertheless,\nthe Age of Aquarius is man's opportunity to again experience the\npower of the spirit. The key to these tools of light and this\nknowledge is LOVE, to not become so structured or so\ncomputerized and unfeeling that you become like robots.\n\nSPIRITUAL LAW # 7\n\nYou shall not commit adultery.\n\nThis is one of the most misunderstood commandments. To the\nliteralism, it means not to have sexual relations outside of\nmarriage. However, this commandment has little to do with the\nsexual acts of humanity. In those days of the Israelites and of\nmass-mind thinking, the sexual consciousness was biological and\nanimalistic. Therefore, this law was established in order to bring\nthinking into a more personal relationship, rather than as cattle of\nthe earth.\n\nADULTERY is a word, which describes using another for one's\nown purpose, using one's mind, body or soul to gain one's own\npower. Adultery is more than a sexual encounter. One adulterates\nwhen one uses another to become a self-appointed leader, self-\nappointed power structure or simply to usurp one's energies and to\nuse another's resources for one's own gain, without the\nunderstanding to the other's personal growth and expression.\n\nADULTERY is more than just a switching of martial partners or a\n\nsexual encounter outside a bond of marriage by law. Men commit\nadultery by enslaving the groups into misuse of mind, misuse of\nmaterials. The world is now adulterating the mind, the hearts, and\nthe bodies of the masses through enslavement. This has been an\nabomination of the earth for many generations.\n\nHuman nature's most predominant desire, as it now flows in mass-\nmind thinking, deals with the creative sexual nature. The greatest\nfalse-to-fact images lie within this consciousness and the\nunderstanding of its proper function. Again, it is not for a teacher\nto sit in judgment of any entity's biological or sexual function.\n\nHowever, the spiritual law is as such, “Do not be unequally yoked\nwith unbelievers.” It is important that each student realize that the\nexpression of their spiritual nature, which flows through every\nexpression of the physical, is enmeshed and a part of all those that\nare brought into their experience.\n\nTo be unequally bonded is to accept the karmic lessons, which may\nor may not be necessary for the student's enlightenment. The bond\nalso creates emotional traumas that may result in over-reactions in\nthose who are unaware of the subtlety of the light.\n\nAttraction of Personality The ones to whom we are most\nstrongly attracted are not necessarily the ones who are the most\nbeautiful physically, but are the ones from whom we receive that\nsubtle emanation, “that something.”\n\nWhat is that something?\nA: It is that which emanates from within. It is the inner recognition\nof Reality7\n\nScience of the Mind: Earnest Holms\n\n                      Personal Journal\nAffirmations:\n\n       I now see with a clear perspective.\n\n       I now accept without judgment.\n\n       I am opening to my inner self.\n\nWrite your own affirmations:\n\n\n\n\n\n\n\n\n\nWrite of any psychic experiences you have had recently.\n\nWrite of any psychic abilities that you would like to acquire.\n\nWrite of any relationships you would like to revitalize and\nwhy."}, {"id": "L3_30", "level": 3, "type": "lesson", "lesson_num": 30, "title": "LESSON 30", "subtitle": "PINK", "color": "pink", "content": "COLOR RAY: PINK\n                     The Light of Divine Love\n\nSpecific Level Function\n\nWithin the mental nature, the Radiant Pink energy works to clear\nthe thoughts and patterns of mental activity that would cloud your\nsense of balance. Many areas of pain may arise concerning your\nability to accept love. Areas of disorder within your home, career\nand relationships surface as you work within this energy ray.\n\nThe essence of this ray is to work intricately within the organs and\ncellular structure to release the heaviness of disorder and\nimbalances of relations. As the mental level is most important to be\ndealt with you may find extreme anger or pain as you confront\nthese areas of your life that are not in balance with your sense of\norder. This frequency releases confused and disorganized thought\nconcepts, patterns and processes that result in disharmonious\nconditions in the other lower bodies as well as what is resulted\nfrom mental thinking.\n\nIt deals with the thought processes not only from this life, but from\nalso relating to previous incarnations, which are carried in the soul\naspect.\n\nThe Pink Light brings attunement with the higher mind in order to\nactualize the perfections of the higher self in the physical\nexpression. It brings a rebirth of consciousness within all levels\nand aspects of ones’ being, through divine love. In the silence of\n\nyour own being, come to that point in awareness where you are\nfully uplifted into the consciousness of your whole being.\n\nThink on this:\n\nThough you speak with the tongues of angels and have not love,\nyou are as sounding brass and tinkling symbols.\n\nMessage #1\n\nAzreal - We are now concentrating within your thought vibrations\nthe total awakening of the vibration of perfection. Within each cell\nin the human body is a living consciousness. Each minute part of\nthe matter-body is enveloped in consciousness.\n\nPerceive now that the essence of Radiant Pink Light frequency is\nenveloping every cell and organ and every living aspect of your\nnature. Affirm within self that you are now an outward expression\nof the divinity of your inner being, that the consciousness of your\ntotal physical being is enveloped in the rays of light and that the\nlove that is beyond your human being is yet a part of your total\nexpression.\n\nLove sees no evil. Love knows no negation. Love senses no\nanimosity. Love expresses in totality its spirit of perfection. Love\ndenies not another's gift. Love shares from its own expression.\nLove is not bound by human conditions. Love emanates without\nlimitation. Love speaks no anger or fear. Love sees no separation.\nLove knows only of its own creation.\n\nPerceive the birth of your own being. From whence did you come?\nGo back in time beyond your physical body. Go back in time\nbeyond your first awareness of your human expression. Move\nwith your thoughts to the first spark of your divine consciousness.\n\nGo back to the center of the mind of your Creator, and there you\nknow the purity of your light. There you know that the force that\nbrought you into expression was love. You were born out of a\ncreation that knew no evil and no destruction. In addition, that\nforce, that eminent sense, dwells within the consciousness of the\nmind of your being. Feel that mind envelop all parts of what you\nknow of as self.\n\nMove with your mind, now, through the tunnel of time. As you\nenter the body of this incarnation, perceive your incarnating ego\naccepting this journey in fullness of knowledge of the encounters\nof the physical plane. Perceive your incarnating ego accepting the\nvibration of its personality self, fully in knowing the challenges\nthat would arise through this merging.\n\nNow perceive yourself conceived in the womb, expanding, coming\ninto fullness and feel the birth of your emerging into the matter\nworld. Now you are the soul incarnate, infantile, pure and free\nfrom all imageries. Yet, within the soul of your expression lies the\nmemory of all past experience. You are bound by your karmic\ncreation. You are metering this life, accepting the journey,\naccepting the challenge, and accepting the environment, accepting\nthe conditions.\n\nPerceive yourself enveloped in light, perceive yourself enveloped\nin the perfection ray and perceive love as the outpouring of your\nconsciousness. Release the fear of this traumatic journey and\nrelease the pain of those who are unawakened to your perfection.\n\nNow move forward through the tunnel of time, through your\nindividual consciousness. Forgive those who do not know you,\nwho have not recognized your spirit. Perceive them in love.\n\nRelease the animosities and know that birth was the chosen will of\nyour higher self. Know that within the memory all that you are lies\n\nas mysteries, yet to be unfolded. Know that you, a destined being,\nare walking a path to greater good to serve the work of the masters.\nYou are an important link to the evolution of the human race.\n\nPass now through the tunnel of time where you perceive your own\ngrowth experience and the beginnings of the imageries and the\nfalsehoods and the fears and the intimidation. Bring yourself once\nmore into the vibration of the Radiant Pink Light. Feel the wisdom\nof the inner spirit move throughout this unfolding being. Perceive\nyourself linked with the guiding self, that guiding force, that\nguiding spirit, hidden from your mind, hidden from your intellect,\nhidden from your awareness of the matter-self and yet linked both\nspiritually and with the astral.\n\nExperience your growth through its stages of childhood and\nrelease, again, all conditions within your past that harbor pain.\nLook not to the pain, but perceive the love. You are a creation, a\nloving creation.\n\nPerceive yourself moving through the tunnel of time, experiencing\nthe joys of the physical plane, experiencing the human egos, the\nbody ego rising in force, rising in passion. Perceive that you are\nstill an expression of the Creator. All ills that you have expressed,\nthat you have attracted, that you have accepted are the counter-\npathway. Perceive love bringing all things into balance.\n\nNow move through the tunnel of time, through all the stages of\nyour experience, through all the wars, through all the joys, through\nall the sufferings, through all the gladness, through the successes\nand through the failures, all is an image of one who chose to enter\nand experience.\n\nPerceive your vibration transmuting all the past conditions. Those\naround you would begin to see you as less than angelic, but release\nit. They have their own journey to experience.\n\nBring yourself into this moment of mind and perceive the\nyesterdays of your life as a projection of needed experience. Close\nthe door and stand enveloped in love, affirm that you are now the\nbirth of the new self, you are now an outward expression of this\nnew inner experience. Affirm your destiny will complete through\nthe joy of your higher self, which you are here not to be burdened\nor to create burdens, and you are here not to resist, but to live, to\nlove and to be in joy.\n\nThe work of the light is not the sort of thing where you experience\nthe trauma of change, but it is the work of gladness. It is the work\nof peace. Let the tears of joy flow and let the heart within speak.\n\nThis center of light is the child of the masters and the care of the\nchild lies in the hands of each of you. This child is to be raised in\nthe vibration of love. It was born to reflect the consciousness of its\nCreator. It can grow and be a mother to many, to be a father to\nmany, to be a teacher to many, to be the way-shower to all those\nsouls who are reaching out to experience this activity. It lies in\nyour hands. You have the blessings of all.\n\nMessage #2\n\nAzreal - Greetings, dear students of light, this is Azreal speaking.\nWe are very pleased for all the enthusiasm voiced within. We\nperceive at the soul level the joyous anticipation of that inner spirit\nin moving on, in conquering, in standing as leaders.\n\nMany desire to experience and project the dynamic aspect of their\nbeing, and to move with tremendous energy and tremendous force\ninto a new beginning. This is the prodding of the inner self.\nNevertheless, be aware that all things move in their own pace and\nin their own evolutionary process. Each of you who desire to serve,\nto uplift and to move in levels of perfection will be brought to\n\nstages in which you will be actively participating in many aspects\nof “A Course of Light.”\n\nThe teaching qualities are most important. This does require\nintellectual understanding, but the coming to a place in awareness\nof sensitivity, being able to perceive the vibrations of others, of\nuplifting, transmuting and using the tools of light.\n\nYou are unaware at this moment of the tremendous power being\ndirected to you from your own teachers and guides and masters, as\nwell as the teacher of light whose tools move out as lasers in and\nthrough all your energy fields.\n\nIt would be of a great pleasure to have you experience with the\ninner eye, what takes place in one particular session, but this in\nincomprehensible to the conscious mind. Most of you perceive\nsubtleties within the physical body. You begin to feel an increase\nof flow, of movement within your own system. You begin to feel\neither a greater heat or cooling; you begin to feel tingling. Some\nsense colors, some sense a feeling of floating in other dimensions.\nEach of you is individual in your own perceptions. What takes\nplace within self is correct for the moment.\n\nNow, flowing with the perfection energy, the questions arise in the\nmind: “Who decides what is perfection? What is perfection?” We\nsay to you, perfection is, perceiving life through the inner eye,\nthrough the Christed-Self. The Christed-Self is that part of your\nhigher self that is totally attuned to the oneness of the I AM\npresence, the Logos, the Word, the Universal Force.\n\nTo bring this Christed-Self into the lower natures through the soul\naspect and into the physical dimensions is most difficult, for the\nhuman elements are very strong. They are involved in the\nprogramming, the thought processes and the imagery of much\nexperience just through one physical life.\n\nThe soul aspect carries with it memories of many incarnations and\nthe consciousness of many diversities of ideas and understandings.\nTherefore, to bring all aspects into a state of Christ Awareness is\nnot a simple matter. It is a process of growth, unfoldment and\nopening up to greater enlightenment. It takes place in many forms.\n\nSome perceive with eyes of vision, of clairvoyance. Some perceive\nthis as coming to a state of inner calm, of inner peace, of\nperceiving in outer activity the true balance, the true Law of\nKarma, the true cause and effect. Be patient with self and yet, be\naware that as initiates into a path of higher consciousness, you\nencounter many challenges and many images, which appear as\ntruth.\n\nIt is for you to discern what this image stems from. Is it that which\ncomes from a human personality consciousness motivated through\nself-power, or is what you encounter a true face upon a lighted\nawareness, a teaching, a realization, your life experience, each of\nyou comes across many, many opportunities each day to discern\nwhat you are experiencing.\n\nThis energy is used to bring balance, the physical balance between\nall systems, the perceptual balance which dissipates the\nmisconceived ideas, the emotional balance which stems from\nmaturity, the ability to take upon self a challenge and see it through\nto its correct perfected completion. This energy brings about the\nbalancing at the mental thought level.\n\nNow you feel amongst you a tremendous lifting of consciousness.\nThe pressures within the head are lifting. Some of you, who have\nencountered anxieties within, feel stillness, a sense of balance, and\na sense of being in complete harmony. This is a gift to you, a\nglimpse of the greatest aspect of this particular frequency. When\nyou walk through your daily lives, do not be discouraged by the\nfluctuations by that which appears as negative.\n\nThe School of Light is moving through many changes, for\nevolution brings about changes. Out of one cell becomes another.\nOut of one level of consciousness begins another. This is the\nnatural process of all growth. We see many, many beautiful,\nexciting, expanding aspects of this School of Light. All who seek\nto be of service, to be light-bearers, are welcomed to be a part of\nthe on-going growth.\n\nNow, with the light of this Pink ray moving in and through all your\nlevels, we give the blessing that the Christ be in and through you.\nBe at peace and let the Christ move through you.\n\nYogananda - Love, Marriage and Spiritual Union\n\nMany students have asked the masters, “What of marriage? A\nmaster speaks unfavorable in terms of marriage. Why is this so?”\n\nMarriage is concepts, created from man's thoughts and needs, out\nof his weaknesses, and out of his sensory perceptions. It is a union\noften entered into under false pretensions and lacking in spiritual\nawareness. As a result, the union becomes a battleground instead\nof a process of spiritual enlightenment. Therefore, a master speaks\nto the student and says it is better to walk the path alone and to\nseek the truth of God and His awareness than unequally yoked.\n\nThe highest form of marriage is the union of one heart and soul\nand mind to the awareness and God-consciousness.\n\nHowever, you say, “What is love? What of feeling?”\n\nAgain, we say, marriage is a path by which many choose to walk\nto self-realization. If you have a soul partner who will agree to\nwalk this path to self-realization in a unified manner, knowing that\neach has chosen to walk this path together. This union is then\nblessed at the inner levels and this is good.\n\nThe student asks, “If one enters a marriage and then becomes\nawakened to the inner being and to seeking God, and the partner is\nnot ready for this path, is it better that one should go their separate\nway or should the union remain in order to lift the other soul?”\n\nI say, a soul seeking to be one with the God and comes to the\nrealization of union with God, with The Christ, and has the love of\nthe Creator within, then the countenance, the energy, the thoughts\nlift the soul of the partner, unless the partner's free will is resistant\nto the lift.\n\nThe student says, “Master, what of divorce? Is this a law that is in\nerror to the purpose of God?”\n\nWhat has been merged together by the inner souls and joined as\none with the full consent of the higher self cannot be separated\nunless the higher selves choose to move in separate directions. Yet,\nthe bond is always there.\n\nDivorce is a convenience of egos and with this convenience arises\nmuch negativity, hurt, pain and resentment. It is the ego of\npersonality that is dealt with at the inner levels of the soul to heal,\nto forgive, and bring right action to the heart and mind.\n\nThe student says, “Master, are you saying that it is better then that\na man walk alone to pursue his own evolvement than to set aside\nthe desires of the heart to be one with a partner?”\n\nWhen one's soul-self becomes completely unified at all levels of\nhis being and is centered completely in the consciousness of the\nChrist, then the need to be under contract of a marriage union is\nnull, for one needs not be bound by any man's thoughts or man's\ndeeds or man's concepts.\n\nHowever, the marriage is complete with the higher self and the\ncounterpart, the twin soul. This expression may take place at the\nearth level or at the inner levels, but is bound by a physical\ncontract is of no necessity. The desire to bind another's life, to\nentwine another's life through a marriage bond is to hold one in\nchains, unless there is a perfect consciousness of understanding of\nthe free will of each one's involvement.\n\nThe student says, “Master, was not woman created to serve man, to\nbe submissive to man?’’\n\nThe souls of the ethers were brought into the earth to express in\nphysical, manifest form, and their expressions took on either the\nmagnetic feminine or the dynamic masculine aspect. However, the\ncreation is in equality. Woman is the receiver and the giver as well\nas man being the receiver and giver. The woman takes from his\ncreative life force and gives back again through new life. Be not\nunequally yoked, for this will be a source of added obstacles and\nburdens in your life's journey. However, seek one who will balance\nyour spiritual self, your mental self and all aspects of your desires.\n\nThe student asks, “And what of celibacy?”\n\nWhen the soul's evolvement moves on the path to self-realization,\nit comes to a point where it reaches a level of purification, of\nrelease from all thought vibrations out of past relationships. During\nthis period of purification, the soul reaches a point where it lessens\nits physical desires and moves into the higher spiritual aspect until\nit can again meet that soul which can merge in complete unity with\nones own level of evolvement.\n\nThat which was set upon man as a discipline was a way-shower but\nbecame a chain around man's neck and caused much deviation and\nsuppression of free will. Therefore, the choice is to the soul, to the\nfree will and blessed by the higher self. Love in its purest form is\n\nthe highest expression of The Father and this love expresses\nthrough the completeness and balance of the unification of the twin\nsoul.\n\nThe student asks, “Master, would you share with us the\nsignificance of the terms TWIN FLAMES or SOUL'S\nCOUNTERPART? Are these the same and interchangeable terms\nas compared to the term soul-mate?”\n\nTwin flames and counterparts are aspects of one soul\nconsciousness, divided into individualized expressions. One aspect\nis in the form of the feminine or female nature and one is in the\nform of the male or masculine nature. The counterpart and the twin\nflame are balanced consciousnesses; total opposites and yet one\nwhen complete and unified in their expression at the inner levels.\n\nCounterparts and twin flames can be in the earth level at the same\ntime. However, this is not always so and counterparts can merge\nwith other soul mates for expression, for lesson learning. A\ncounterpart can evolve at a faster rate than the other can,\ndepending upon their earth experience, awareness and lessons\ntaken place.\n\nSoul mates are expressions, entities that have encountered life\nexperiences through many lifetimes. Their vibration may be in\nharmony and balanced. They may even be at the same level of\nevolvement and are attracted to each other out of the need to\nexpress through the same lesson experiences. They are not\nnecessarily counterparts.\n\nVery often, if a marriage takes place between counterparts, the\nmarriage can be one of much harmony and much peace and much\njoy. However, often the lessons are delayed, for there is a sense of\ncomplete merging and listlessness. Therefore, a soul may choose to\nexpress its life with a former soul-mate to work out certain karmic\n\nties of lesson experiences. Peace is with you through the love of\nyour Master Jesus, the Christ and Babaji.\n\nSPIRITUAL LAW #8\n\nYou shall not steal.\n\nThis is self-explanatory? Yes, but it involves more than just\nrobbing or taking something that does not belong to you. It\ninvolves anything that you have not earned for yourself, the taking\nof another's ideas for oneself. Imitating another is stealing from\ntheir personality. It is the taking of anything that is not yours in\nthought, word or deed.\n\nThe spiritual law is: '”You cannot take that which is not yours. You\ncannot hold onto that which is not yours.” This deals with mind,\nwith thoughts, with concepts, with ideas, as well as material\npossessions.\n\nSTEALING from another is to take upon self the vibrations,\nconcepts, motivations and goals along with potentials of another.\nIn addition, it is to imitate and use them for your own purpose.\n\nSTEALING is more than robbing one's home, possessions,\nmoneys, or treasures. It is the concept of stealing from one's own\nbeing. Do not take from another his creative resources to magnify\nyour own."}, {"id": "L3_31", "level": 3, "type": "lesson", "lesson_num": 31, "title": "LESSON 31", "subtitle": "AMETHYST", "color": "amethyst", "content": "COLOR RAY: AMETHYST\n                    The Energy of the Warrior\n\nSpecific Level Function\n\nWithin the mental nature, the Amethyst Ray is called upon to clear\nout of the mental patterns of the warring existing from time past to\nthe present. The frequency, as reviewed from your first lessons, is\nvery strong and can have a very irritating feel to it. However, it is\nworking to clear the dis-ease as dis-harmonies that have resulted in\nyour being in conflict with many areas of your life.\n\nAs these warring images pass before the thought of your conscious\nself, the Amethyst Ray helps to clear up these factions within self\nand bring a relief from the pain that conflict has brought upon self.\nIn addition, the energy works in a very healing manner within the\ncellular and organic system.\n\nPerceive yourself being freed from conflict and rage and moving in\na harmonious manner with your own personal consciousness. Let\ngo of those aspects that keep you enraged over unchangeable\nexperiences. As you move within this ray, you will begin to feel\nreleases and gains in your personal perspective of life and growth.\nThis energy stimulates positive personality desires and\nmotivations. It can bring mental clarity and a pure consciousness,\ncreated out of universal intelligence.\n\nMessage #1\n\nAzreal - Dear students of light, this is Azreal speaking. We are\npleased you are here. At this time, turmoil still activates within\nstudents with this particular frequency of light. Be at peace, for\nwhat is coming to the surface hides below the surface of the\nunconscious through ages and cycles of self-growth. It is most\ndesirous each of you read again what activation pertains to the\nfrequency of light for each particular lesson. As you review the\nmaterial, you will begin to see the clarity of what is taking place\nwithin self.\n\nAs you are aware, as you move into the frequency of the radiant\nAmethyst Energy, you are encountering a very powerful energy\nray. This is that energy which is to bring the dissipation of warring,\nconflicting images within self at all dimensions and levels of your\nbeing. This particular frequency deals with the conflicts of mental\nthought patterns, emotional, erratic behavior, or misconceived\nideas.\n\nAll through your life you have confronted the yin and the yang, the\npositive and the negative--that which causes upheavals within self,\nthat which causes you to “stand in self-defense.” Know that the\nwarring aspect is strong within each entity. There is not one of you\nwho desires to be cut off from your ideas, your own space or your\nown individual expression. It is not to dissipate or to slay anyone's\nindividuality, but it is to bring the warring and conflict to a place\nwhere you can release the need to defend your concepts and flow\nwith an enlightened consciousness of the divine love aspect.\n\nAgain, this is the frequency of light that moves throughout the\nphysical body to dissipate those lower frequencies which bring\nabout the physical disease, that which deals with the manifestations\nof various and sundry activations of disease. Many experience an\noncoming expression of pain within the throat area or congestion\n\nwithin the sinus area. This is due to upheavals brought to the\nsurface within one's emotional/perceptual nature, as well as the\nmental thought patterns.\n\nDear students, all things must move in a process of evolution rather\nthan an instantaneous, miraculous wholeness. No one is able to\nwithstand the vibrations of bringing about the complete, whole and\nperfected self.\n\nThere are many lessons to be learned. To take away these lessons\nis to interfere in your own evolvement and reason for incarnating.\nTherefore, those who experience the tremendous conflict in\ninterpersonal relationships are working to release the past-pattern\nthoughts and past-pattern emotional conflicts.\n\nPerceive yourself. Where are you coming from in your ideas?\nWhat are you defending? What is stirring up these negativities\nwithin self? What is causing the breakdown in the love aspect and\nthe upheaval of the inverted love consciousness? Look at your own\nthought processes. Stand in front of a mirror, look deep into your\neyes, into your own inner being, and perceive what faces come\nbefore you. The faces that show themselves within the mirror are\naspects of your being. They are creations in which you have\nindulged your senses and your mind and your activities.\n\nAll of you have been warriors in the battlefields. All of you have\nbeen victims of injustices. All of you have experienced the pain of\nthe sword and the spear of the heart in broken hurts and\ndisillusionment. And this, my beloved students, is to bring these to\nthe surface that you may erase and dissipate and use the swords of\nlight to sever these images from within self and free you from the\nchains of bondage that keep you in conflicting consciousness.\n\nThis is not to make you a weak individual or to walk as a target for\nthose who would prey upon innocents. In actuality, it is to use this\n\nlight to protect yourself from the daggers of minds that project\ntoward you.\n\nThe students look upon the warrior energy as something to be\nfeared, something to be walked in with caution. We tell you this is\nthe greatest blessing of all frequencies. It is this particular ray,\nalong with the radiant good will energy, that brings about the\nquickest severing of negativity within self. Though your outer\ncircumstances may seem caught in a whirlpool of confusion, this\nlight energy brings clearing releasing you from anxiety.\n\nWatch your actions. Make note of your emotions and keep a\njournal of your own particular thought vibrations that you may\nlook back on this tremendous upheaval and see the good that has\nresulted as you flow through your own evolvement with greater\nease and love and understanding.\n\nAs students of light, you also walked the path of higher awareness\nof spiritual consciousness. You have been the ministers of light\nand healing to those of unfortunate karmic paths in previous life\nexistences. You have actualized this light through the incarnations\nof the Atlantian Age.\n\nAgain, you are repeating that cycle, having incarnated through\nmany cycles of your own astrological charts. You have all passed\nthrough the twelve signs and passed through many karmic lessons-\n-learning experiences. Now you have come the full cycle and are\nreactivating the knowledge of the inner spirit to dissipate and clear\nthe path of your karma and move into a place of free expression of\nservice and love.\n\nThe greatest lesson of this incarnation is to manifest the divine\nlove aspect through every entity you acquaint yourself with and to\nperceive love with the heights of spiritual wisdom and truth. The\ngreatest love that man has is to release the imprisoned karmic ties\n\nthrough the divine Law of Grace and Forgiveness, to perceive that\nentity in his strongest radiance of his own higher self and to know\nthat individual has no hold on your incarnation.\n\nReview this and perceive its inner wisdom. Meditate on this\nrealization grasping the truth. For I tell you that when you have\ntruly come to the realization that you are free through divine love,\nyou will know the peace that passes all understanding. Let this ray\nbe the strongest sword of your particular expression.\n\n          Yogananda –Predestination, Love and Death\n\nMessage #2\n\nI greet you in the name of my Master Babaji and your Master,\nJesus, the Christ. Tonight we will speak to you on that which\nconcerns destiny. Many have been the questions in the mind with\nregard to the predestination of destiny of one's path. The question\nhas arisen: “Is one's life chart destined to such a point that choices\nmade in life are given no free will?”\n\nIn my country and in my time on earth, you came before a guru to\nhave one's soul chart analyzed determining the destiny of one's life.\nI speak with you to give you answers with regard to these\nquestions.\n\nThe soul of your lighted immortal self chooses to enter the earth at\na moment under predestined conditions of the stars and planets.\nThis aspect of life is a road map, so to speak, that the soul will\nmove along, such as a planet moves on a certain axis. The soul\nmoves on its own vibratory axis, determined and influenced by the\nconditions of the planets and stars. Each soul's path is unique and\neach soul is to experience the lessons and obstacles set before it\nthrough the influence of the stars.\n\nHowever, as soul housed within the physical and under the\nconditioning of the conscious mind, the free will aspect is very\nmuch in control. Therefore, each entity does have free will in\nmaking choices along the path. Stars or planets do not necessarily\ndetermine the choices. Destined by the soul is the certainty of the\npersonality regarding creativity, productivity and talented gifts.\nPlanetary influences can enhance the effectiveness of these talents.\nBut, the free will aspect determines the outcome of the actual\nproductivity, by the personality desire and motivation.\n\nThe question has arisen: “Does one have free choice or free will\nwith regards to soul encounters, interpersonal relationships and\nlife's work?”\n\nThis, my dear students, comes under that law of the spiritual\nuniverse, which is like attracts like. You draw into your experience\nsoul mates of past lives that experience lessons similar to those you\nare encountering. The love aspect or “chemistry,” is an influence\nof vibratory rates, the conscious thoughts, as well as lessons and\nobstacles. This is what draws the loves of your life. Destiny is the\nsynchronicity of time, energy and desire that connects soul mates.\n\nIt is the vibration you emanate that attracts the soul that best fits\nthe path you walk.\n\nThe question has arisen: “Is the point of transition from physical\nform into the eternal aspect predestined or does the soul choose\nthis at its own moment of decision?”\n\nThe soul, when it enters the earth, has a path to walk and the point\nof death or transition is set at the time of birth. This may cause\nother questions to arise, such as: “Can the soul leave a physical life\ndue to an accident or to a moment not set in time by destiny?” Yes,\nas free will enters into the picture, this is often the cause of taking\n\none's own life. This is often due to imbalance in the conscious\nmind, heart and soul.\n\nThe question arises: “What of those who are held imprisoned\nwithin the body through medical techniques that prolong the life\nthrough mechanical means?”\n\nThis is another form of free will. The human consciousness has\ndeveloped many scientific methods to either end a life or prolong\nit. A soul in a physical body that is functioning purely by a\ntechnical machine is often lying in a state of darkness or is aware\non other dimensions and disconnected from the conscious world.\nThe life force is being stimulated through mechanical means until\nthe higher self severs the silver cord.\n\nThe question arises: “What would cause the higher consciousness\nto cut the silver cord? What would be the conditions to cause the\ncord to be cut?”\n\nThis would be determined at the inner planes upon the viewing of\nthe soul record, the viewing of the light energy within the physical\nform. When the energies have become very dark in color through\nthe loss of contact with the consciousness of the entity then the\nguide, the higher master, steps in to break the cord and release the\nsoul\n\nThe question arises: “Master, I am confused by people who feel\nthat their relations or friends were taken before their time by an\naccident?”\n\nThis seems to be a common feeling. How can an accident like that\noccur if the soul has already determined when it is going to go?\nThe entity, the soul consciousness, when it views its past\nexperiences in the earth life, looks upon the record and sees that\nthe date of transition may have occurred later than the actual\n\noccurrence in an accidental form. However, it is very rare that an\naccident takes place that has not been set in motion either through\nthe influences of the energies and the planets or through the\nconsciousness of the individual.\n\nAn accident such as that of an automobile or an airplane, or any\nincident of that nature has been set in motion, and those souls who\nare in that position were to make their transition at that time. The\nonly time an accident can actually be set in motion is at the causal\nstate. If one is murdered, but has not previously encountered\nviolence or set up this particular cause in a previous existence, then\nthis is the beginning of a karmic situation.\n\nThe question arises: “To what extent are we guided and protected\nin this life?”\n\nTo a very great extent, when you have attuned your consciousness,\nyour personality ego to the spiritual aspect, to your God, then the\nvibrations, light and frequencies flow throughout your whole\nbeing, very much in connection with your own particular guides\nand counselors. The intuitive and perceptual natures of your own\nbeing are the receivers of the protection and guidance around you.\nYou, in particular, have chosen to walk this path to fulfill a destiny\nof worth and purpose. Your life is much protected from any\nviolence or anything that would obstruct your destiny. A very\nstrong protective shield of light surrounds you.\n\nThe question arises: “What of the 39,000 lives that were lost at\nNagasaki?”\n\nThis mass destructiveness seems to interfere in a destiny of life,\nhowever it was already predetermined long before the incident\noccurred. Those lives involved, those souls involved, already knew\nbefore their incarnation that their transition would be through an\n\nincident to awaken the human consciousness to the total negativity\nof destructive power.\n\nThe question arises: “How does all this correlate with the teachings\nand writing of such men as Neville Goddard, Joseph Murphy and\nEarnest Holmes, specifically in regard to the act of creation within\nthe human mind or imagination?”\n\nCreative thought, through conscious mind programming, adds\npower to the motivation and desire of what one wants to put into\nmotion. We spoke that the outcome of one's creativity is not\npredestined. Motivation is the determination along with the inner\ndesire and consciousness of creativity.\n\nDestiny is the aspect, function or direction of one's inner desire.\nTheir individual chart and planetary influences predestine one who\nenters the educational systems to enter a field of science. The\naspects of it add energy to that nature of their being. What they do\nwith that aspect is their free will. They add their power, creative\nthought, desire and set into motion what will be the outcome. Do\nyou understand?\n\nI speak with you with much love. Be steadfast in your goals and\nknow that all things will come to their truest, highest fulfillment.\n\nMessage #3\n\nAzreal - It is good to speak again to each and all of you. We are\nactivating swords of light. Each and all of you are being presented\nwith a spiritual tool of light to help protect the mental self from the\nbombardment of the illusion that is so creative within and without\nyou. It is so difficult to see clearly, for the illusion is entrapping the\nsenses. The illusions being that the pain of all the human\nconsciousness is far greater than the vibrations of the self, of the\nsoul, the battles between the lower planes and the essence of spirit.\n\nIt is not a matter of good and evil; it is a matter of places of\nexpression. Your tool is a direct spiritual link to the ancient tools\nused in other times. Many are aware that in the Atlantian days, the\nsoul in its beautiful angelic self was practicing the awakening of its\nbeing to a physical world and the joy and the empowerment of this\nfacet of your lives. As the human self became more empowered\nwith the actions of its creation, it began to become desensitized to\nits own angelic being and lost that core to access the spirit's own\nradiance.\n\nJourneys through the earth in many life experiences have kept you\nin denial and in the illusion and fear. As you work and awaken\nnow to this path of light, the assistance from the hierarchy and the\nguides and the tools of light are bringing you into a greater healing\nand awakening to your next step and into your commissioned path.\nTherefore, the tool is the sword perceived as an ancient tool of the\nAmethyst Rays. Many of you used it with crystals in other life\nexperiences and recognizing that crystals are facilitators of the\nhealing of consciousness. So hold in your hand this tool of light\nand know that what has been festering within, what has been deep\npain and sorrow and loss is being released. Begin to free your self\nthrough the experience of change. There are others within group\nexperiences that are here by spirit who are healing with the light.\nWe welcome each and all to this activity.\n\nThe greatest fear is the fear of death, dying, loss of energy, self-\nesteem, honor, grace and power. By the intervention of the\nCouncil, we ask each and all members of this particular group and\nall groups to follow to receive a state of honor. We ask you to be\nreceptive to a state of self-awareness of the beautiful beings that\nyou are, accept this empowered consciousness without thought of\nhumiliation, unworthiness or fear. Your warrior self must be strong\nin courage to move forward. You will feel more power of the light\ntouching your consciousness at all levels, emotionally and\nphysically, until it all comes together.\n\nGo into silence …\n\nAs you are ready to return, feel your bodies and all that you have\nbeen in a different vibration within the cells, mentally, physically\nand in all ways the changes are coming to affect you. You are\nmyriad selves attached to many incarnating journeys of lives. This\nvibration is transmitting to the deeper levels all that has been in\nyou to bring healing in light to all elements, and so it is. When you\nawaken, you will feel a different consciousness as grounding is\ntaking place. Simply note that, yes, you are of the earth, you are in\nthe earth.\n\nSPIRITUAL LAWS # 9\n\nYou shall not bear false witness against your neighbor To BEAR\nFALSE WITNESS is to falsely accuse another of actions\nwitnessed by self, to twist, to turn, to usurp one, to project false\nimages on another. To do this is to bring a karmic lesson unto self.\n\nTo BEAR FALSE WITNESS is to deceitfully spite another and\nthis shall also be experienced within self. In literal translation, this\nwould mean not to lie or gossip about your neighbor.\nNEIGHBORS are also a part of you.\n\nDo not kid yourself. Do not act in one way and think in another.\nDo NOT bear false witness against your own higher self. Be true to\nyourself!"}, {"id": "L3_32", "level": 3, "type": "lesson", "lesson_num": 32, "title": "LESSON 32", "subtitle": "MINT GREEN", "color": "mint", "content": "COLOR RAY: MINT GREEN\n                    The Energy of Rejuvenation\n\nSpecific Level Function\n\nWithin the mental nature, the Mint Green Light works to release\nthe negative thought concepts that keep one in a “rut.” It releases\none from the tired, worn-out, repetitive thought patterns that\nperpetuate needless lesson-learning experiences.\n\nThe Mint Green Light creates within mind the vision and\nacceptance of new beginnings, new structures in accordance with\nthe true divine purpose. It brings balance between the self-will and\nthe higher will.\n\nThis frequency is the fountain of youth. Therefore, many thoughts\nmay come to the surface that bring you back in time to the early\nstages of your life and refresh your mind on what may have\noccurred to cut off the flow of trust and faith that was a natural part\nof your early life.\n\nThis frequency is a joyous and freeing vibration.\n\nRebirth is one method of reacquainting you with your physical\nbirth and can be an important method of finding early programs\nthat you have accepted as your identity. Through rebirth often you\nget in touch with thought patterns that have been guiding your life.\nUnexplained fears that plague your unconscious may be traced to\nthe beginning of your birth experience. Influences that were\nsurrounding you in your pre birth state may also be affecting you.\n\nTherefore, during this energy lesson it can be exciting and\ninformative to go into a process that relates to your beginning.\nHowever, there are many ways to uncover these hidden agendas,\nyou will more than likely find yourself experiencing them. Just\nremember that new life begins with new concepts and new growth.\n\nMessage #1\n\nAzreal - Greetings, dear students of light, this is Azreal speaking.\nThe area around you fills with joy, with beauty, with much\nlightness. Know that what is taking place within you at this\nmoment is a shedding of shells within the dimensions of your\nlower self.\n\nIn physical existence, your materialized body and mind must pass\nthrough the path of light emanated, set as a pattern through the\nmasters and through the Christ, who expressed himself as Jesus of\nNazareth. His life, in its totality, is an example, an esoteric\nmeaning that each of you experience at different levels of your\nown experience.\n\nThis particular frequency is associated with five important\nconcepts, ideas, and experiences within your nature.\n\nPhysically, it is regenerative. It takes the cellular structure and the\norganic structure within your body and brings it into new life. It\nrebuilds what is broken down; it dissipates that which has been left\nas dead cells. Physically, you experience certain changes within\nthe body, a process of letting go much of what needs to be let go.\n\nPerceptually, you experience a new idea of concepts, new\nprocesses of understanding, new realizations, the shedding of the\nold and the putting on of the new.\n\nEmotionally, you must uplift self into stabilization. Let go of\nreactions out of fear and anxiety and experience the true nature of\nthis frequency. It totally frees you emotionally from that which\nputs you in states of paralysis, dead weight, and emotions that\nleave you feeling blocked and unable to cope with the everyday\nlife experiences.\n\nMentally, you shed off the mental thought patterns that keep you\nrepeating the same thought vibrations.\n\nEsoterically, this follows the path of the Passion Week. This\nparticular frequency takes you at the spiritual levels through the\njourney of the soul, through the releasing of the earth-bound\nconcepts and self-will which denies your spiritual, eternal\nexistence.\n\nThis energy relates to the resurrection and the continuity of your\nconsciousness. Beloved students, you are simply an existence of\nlight, of mind, of total awareness, which operates in this reality as\na materialized form. But once the lessons that are needed for the\nsoul's expression are overcome, are met, are planted in the soul's\nmemory, you shed the shell and simply step through the veils into\nthe dimensions of yet other life experiences.\n\nIn esoteric zymology, you note the serpent is portrayed as a symbol\nof wisdom. This is because the serpent is one who, when it has no\nneed of the old skin, sheds it and simply moves out into its new\nexperience.\n\nTake this following week to go deep within. Know that your life's\njourney is an on-going, progressive, evolving unfoldment in and\nthrough many journeys and dimensions of expression, on into\nrealization of spheres of light and planetary awareness beyond\nyour mental mind's ideas at this moment.\n\nWe see many things transpiring within each of you as your\nvibrations are all functioning in a different tone, in a different\nessence.\n\nThere are those who have experienced the true lightness of their\nown soul's vibration and there are those, yet earthed into the\nheavier material life style.\n\nAccept the reality that the beauty of the inner work is transpiring\nwithin each of you according to what is accepted by the lower\nnature.\n\nBe at peace and walk in the frequency with the spring of life\nflowing. Feel the fountain, the radiance of this energy outpouring\nin and through every part of your being.\n\nAnd now, may the light and the essence of the Christ be in and\nthrough you\n\nSPIRITUAL LAW # 10\n\nYou shall not covet your neighbor's house. You shall not covet\nyour neighbor's wife or his manservant or his maidservant or is ox\nor his ass or anything that is your neighbor's.\n\nEach soul looks upon his brother and says, “How I might be\nglorified if I could be as my brother?” Human consciousness\nconstantly desires to emanate the life experience of another. Be\nassured that you are you. Your individual life expression is your\nsoul's choice of path. It is your particular experience--unique,\nindividual, and most important. Do not look upon another's\nexperience and say, “If I were in that place, I would be able to\nachieve . . .so and so.” Be at ease with self for this is your life and\nit is the life chosen by the deepest part of your highest most being.\n\nWhere you are is the perfect place for your conceptions, your\nideas, your goals and your motivations.\n\nDo not look to another for your expression. You are to be true to\nyourself, living and accepting what you are, for you’re an\nindividual unlike anyone else!\n\nAffirmations\n\n       I am open to new beginnings\n\n       I accept changes within myself and my surroundings."}, {"id": "L3_33", "level": 3, "type": "lesson", "lesson_num": 33, "title": "LESSON 33", "subtitle": "SCARLET", "color": "scarlet", "content": "COLOR RAY: SCARLET\n                    The Light Energy of Passion\n\nSpecific Level Function\n\nWithin the mental nature, the Scarlet Ray dissipates thought\npatterns that deter right thought, right action and suppresses the\ndeepest creative urges within your nature. It sublimates the creative\nurges within all levels of your being. It promotes positive thinking\nin all areas of your consciousness.\n\nYou may experience some intense passion and moods of intensity\nthat seem to be strongly out of character. This is clearing the\nhidden suppressed emotions and actions of your nature.\n\nThis Scarlet Ray can create a tremendous power for the projection\nof one's true sense of destiny and being, allowing the desires and\nmotivations to rise in clear thought.\n\nAlso know, this frequency can bring out the rages of your nature.\nBe cautious in judging self and others in their activated state of\nexperience. Know that clearing is manifesting and coming into its\nwholeness.\n\nMessage #1\n\nAzreal - Greetings, dear students of light, this is Azreal speaking.\nAs we perceive each of you at this point in your evolution, we see\nmany changes having taken place within each of you.\n\nDo not think that you have reached the place where you have\nattained the ultimate level of your growth. You are yet beginning\nalong a path into even greater expectations, not only of your own\nself, but also for many opportunities to serve, to live and reach out\nto touch others. This processing, in which each of you have\npartaken, has been of many traumatic experiences. And yet, know\nthat each one was for a very particular lesson and for a very\nparticular purpose in bringing up to the surface those aspects of the\nnature that needed to be released or perceived with greater love\nand light.\n\nThis particular frequency of energy, which now envelops you, is\nthe light energy that sparks your desire, motivation and ideas. This\nlesson of light assists you in acting upon your goals. This particular\nfrequency is that which brings out the passionate nature of your\nbeing.\n\nIn its highest frequency level, it emanates tremendous aggressive\npowers and motivations attuned to the highest self. In its lowest\nfrequency level, it can erupt as rage as it comes against blockages\nof your will. This appears as a test for your intention and will.\n\nThis frequency is very intense and emanates much power. It can\naffect not only yourself, but also those who are around you\nincluding your environment. Each frequency of energy activated\nfor the lesson is not only lifting yourself, but is affecting the\nconsciousness of those you work with and walk with in life.\n\nThe purpose of all that is taking place is to bring you to a unified\nconsciousness where you flow in oneness with every aspect of\nyour being. You are walking along a path to a goal that can give\nyou opportunities to help, to reach out and touch hearts, minds and\nsouls with the light.\n\nIn no way are these tools of light used manipulatively, but rather to\nbring purification into the situations in and around you.\n\nThe greetings of all the teachers go with you through your life. We\nare pleased. Many blessings are with you.\n\nCONGRATULATIONS!\n\nYou have completed Level 3!\n\nYou now move on to Astral/Etheric Level 4\n\nLevel 4 is concentrated on the Astral/Etheric aspects of self. With\nthis continuation of your personal growth, you will learn even\nmore about your self and who you are.\n\nThe Astral/Etheric is the fourth dimension and embodies memory\nand imprints from past life experiences, or influences from the\npsychic elements. You will find it a must for your continuous\njourney through self-growth."}, {"id": "L4_intro", "level": 4, "type": "intro", "lesson_num": null, "title": "INTRODUCTION", "subtitle": "", "color": "intro", "content": "Many students are fascinated with the idea of working with the\nastral/etheric level of the light work. The concept of clearing the\nastral/etheric plane has an interesting attraction to it. Your focus in\nthis level of A Course in Light will be on the imprints within the\ncausal system of your astral/etheric self.\n\nThe meditations are guiding processes that connect to impressions\nof your past incarnations or subconscious beliefs. Many books are\nwritten about the astral/etheric self. For more information on this\nsubject, search your library or local bookstore. Graphics display\nthe aura surrounding the body and the thought forms that may be\nclinging to your consciousness. As you may note, the meditations,\nas guided by the masters, are very intricate as they move through\nyour system to unlock past life conditioning. Through many years\nof working with psychologist, Dr. W. G. Black, it has been\nastounding how past life impressions seem to connect to present\ntime. Through workshops and private sessions I have given, it is\napparent individuals hold many traumas directly related to their\nformer lives. These traumas often are acted out in present time.\nTherefore, in working with A Course in Light through the\nastral/etheric plane you have an opportunity to clear up these often-\ndifficult impressions within the self.\n\nAs we begin to work in this astral/etheric plane, we will move with\nawareness into the etheric body and begin to work with the original\ncauses of pain, illness and past patterns of behavior. The causes\nmay not seem conscious or voiced, but you may be aware of\ncertain images, feelings or insights that reveal patterns. This shows\nup as situations that keep repeating themselves.\n\nPerhaps through readings or other experiences, you find\nimpressions you can identify. It is very helpful to have readings or\nexperiences where you can discover your own past patterns that\nyou are healing in this life.\n\nThis is a very exciting level and you may find you have feelings,\nremembrances and renewed interest in discovering your own past\nlives. Past life regressions or life readings may be helpful in these\nmatters. In attending past life regression work or other forms of\n“remembering”, you may discover your own unique sensitivity.\n\nSensitivity to your own consciousness is unique to your own\nperception and growth. Trust your own insight into your being.\nHowever, if you do not find that you respond to past life imagery it\ndoes not mean that you are not getting it. You have your own\nguidance that is distinctly yours and your timing for all this to\ntranspire is very individual."}, {"id": "L4_med", "level": 4, "type": "meditation", "lesson_num": null, "title": "MEDITATION PROCEDURE", "subtitle": "", "color": "white", "content": "Gather your awareness into the center of the forebrain and call\nforth all egos, bringing all aspects of self into one consciousness.\n\nBring all the egos up through the lower bodies into the center of\nthe Radiant White Light. Activate and expand the White Light to 6\nfeet in diameter, moving it in a counter-clockwise direction,\nclearing and cleansing all of the lower bodies.\n\nActivate all centers of the soul body.\n\nVisualize a whirlpool of White Light moving in and around you.\n\nActivate all of the centers of light within the soul body, directing\nenergy into your physical self.\n\nMove into the astral/etheric body and begin the concentration on\nmoving through the mental body and the corresponding etheric\nmental plane. Experience the guidance of energy moving in and\nthrough your consciousness as you release the impressions within\nthe astral/etheric self. Activate all the energy centers until your\nenergy field is cleared. Within the silence, you will feel a merging\nwith guides and teachers to assist in the process of your healing.\n\nWhen you have completed your inner work and the meditation\nsession, direct your egos back into the forebrain and ground our\nawareness through the Black Power Ray."}, {"id": "L4_34", "level": 4, "type": "lesson", "lesson_num": 34, "title": "LESSON 34", "subtitle": "WHITE", "color": "white", "content": "COLOR RAY: WHITE\n                     The Light of Purification\n\nPurpose and Essence\n\nAs you begin this level of the light work, you will be concentrating\non clearing the negative memories that may lie in the deeper\naspects of your unconscious. The astral/etheric level is a parallel\nlevel of self, in other words a mirror of your own physical being.\nAt this dimension, you may hold remembrances of past life\nexperiences or the collective memory of mass mind thinking, what\nCarl Jung would interpret as the collective unconscious. We often\nfeel responsible for mass mind thinking and are affected by the\nconcepts of the human awareness at group levels. Therefore, this\nparticular level is to clear the impressions that may leave their\nsting on you.\n\nSometimes groups of people may recognize each other and\ndiscover they have had other lives together. This is a very\nextraordinary event. Through therapy work and other experiences,\nit has been revealed that friends or acquaintances have been in\nsome very difficult lives and may have been hurtful and\ntreacherous with each other. This can often result in negative\nfeelings or mistrust that show up in behavioral problems.\nSometimes relationships are working out some very negative\nstruggles that are impressions from the past. During this round of\nthe light work, you may heal those experiences.\n\nSpecific Level Function\n\nOnce again, we move into the Radiant White Light in the\nmeditation procedure. In this level, you will find the meditations\nare intricately guided through each level and body. The purpose for\nthis level is to clear the astral/etheric body from conditions held as\ndeep patterns of behavior that cause repetitions of karmic activity.\nAddictions, emotional behavior problems, border line personalities\nmay have their beginnings from some extremely offensive lives.\nTherefore, the purpose of this ray is to begin the clearing process\nthat is working through those astral/etheric impressions.\n\nReview the purpose and essence of the White Light from your\nprevious lessons to reacquaint yourself with the properties and\neffects on the different levels of consciousness.\n\nThink of your astral/etheric body as a duplicate of your physical\nself, but with a higher, finer vibration that cannot be seen by the\nhuman eye. Within this aspect of body are the energy patterns that\ncorrespond to your physical self. In meditation, perceive that the\nflow of light is moving through each corresponding impression\nthat has its duplicate in the physical body. Experience the light ray\nclearing and healing these aspects.\n\nAs an entity, individualized and humanized, you have a\ntremendous opportunity to explore all of God's kingdoms. You\nhave the opportunity to creatively participate in all of the wonders\nthat the earth reaps or that the universe holds. Your individual right\nis to come to a point of evolving into a spiritualized, cosmic being\nin which your mind becomes awakened to the universal truths that\nfunction as a manifestation of all wisdom.\n\nMessage #1\n\nAzreal - Greetings, beloved students this is Azreal and I come\nagain to present you with the opportunity for healing in all of your\nconsciousness. Healing is a form of release from patterns of\ndiseases held in absolute belief in their reality. Therefore, healing\ncomes by releasing the ancient patterns no longer a necessity with\nregard to lessons and needed experiences.\n\nWe, of the council, overshadow your being to draw you inward to\nthe plateau where your aspect of etheric activity can be released to\nthe law in which Grace occurs. We, of the council, have presented\nthis experience from which each and all who participate have the\nmeans to accelerate individually into their spiritual resources for\nthe accelerated self. This accelerates the becoming a true\nparticipant in the citizenship of life and is in relationship to the\nuniverse within all universes.\n\nSo, we begin the journey now. Be at peace and do not fear. This is\na pleasant journey, washing away much of the issues that you have\nbrought into motion from unconscious activities attached to past\nexpressions. Therefore, we begin.\n\nFirst, the soul center is magnified, intensified and activated. From\nthis center, the essence and light of the energy of the Christ\nConsciousness immerses in and through all that you express in\nastral/etheric consciousness. Remember that your mirror to\nyourself (your parallel self) is your astral connection.\n\nThe reasons for the astral/etheric activity is to predominately direct\nthe personality to create the means by which its karma is brought\ninto effect. However, with consciousness of guidance by way of\nthe light, much of the patterning reforms into a new experience and\n\nbetween a higher level of soul evolution and astral consciousness,\ndirected into physical personality expression.\n\nYou, as an initiate, are on a path walking through life to light. Your\nastral/etheric remembers its many journeys through time from its\nfirst birth into a consciousness in which it perceived itself\nseparated from the higher universes of its other creative endeavors.\nIt has awakened to an earthly existence. It is now a consciousness\nof a body. It is a human form. It is aware, it is an active participant\nin co-creation of life. Yet, in this distant planet from its first\nsource, it is a stranger and in much fear. It finds itself disconnected\nfrom its first cause. As the soul knows the karmic laws of the\nuniverse, the astral/etheric is unaware of these actualities of\nspiritual existence. It is taught and brought to an earthly expression\nso awareness of separation is now recognized.\n\nMany lives have been lived cloaked in illusion. You have lived as\nthe slave. You have been in bondage. You have known what it is to\nbe humiliated and degraded. Some of you have known stoning and\nthe rocks that were projected to your bodies. Some of you have\nknown what it is to be put to death under the flames of fire. Some\nof you have been crucified and hanged. Some of you have had\ndeath by the sword, some by the arrow and others by starvation.\nSome of you have walked without enough to block out the cold,\nthe rain and the pains of living in strife. These occurrences have\nbeen extraordinarily difficult; as a result, they are deeply imprinted\nin your being.\n\nWe ask at this point in consciousness that all memory held in the\nconsciousness of the etheric system, all memory to any form of\ntorture, suffering and denial be now released into the radiance of\nthe vibrant light of the inner Christ, that source of purity and\n\nCleansing, all mental thoughts of losing what you most desire to\nexpress, release to its consciousness of light.\n\nAny negative mental patterns in the etheric system of thought\nconsciousness release to the light. Any sources of influences\noutside of the will of the Creator-Father-Spirit and soul, release\ninto this essence of light.\n\nBy the will of the Creator and the Father of the highest most order\nof the individualized soul, we ask that all mental patterns prodded\nto create resistance release to the light. We ask that mental sadness,\nrelease sorrow and fear of being lost, unsure and without resources.\nWe ask that all karmic reflections based on conditions of another\ntime be brought to the light and are released of any hold on the\nphysical plane. Be at peace. You are in guidance. You are,\nprotected. All is in its rightful order.\n\nWe go into the aspect in the astral/etheric body that corresponds to\nthe deeper feelings and desires of individual consciousness.\nWhatever remains within this astral/etheric plane that is connected\nto abandonment, rejection, isolation, aloofness, resistance and fear\nbe now released into the energy of light.\n\nFrom this moment on, the emotional will that connects to the\nemotional plane at the physical level is restored to the truth of its\ndivinity of love and its oneness with the source and power. All\nmemories of all the many incarnating journeys of lives be now\nbrought to the altar of light and released of the holding,\nreconditioning and restructuring of itself. Let it go. Let it be in its\ninner most planes healed by light.\n\nAll guides and teachers in presence at this moment proceed into\nthe vibration of the perceptual levels, the sensory correspondence\n\nto the body. Whatever exists from the innermost instinctive aspect\nof its first cause that may be distorted from truth, release it to the\nlight. Any thought form, projection or pattern attached within the\nperceptual astral and physically, be now released.\n\nIn command of the Council of Light, of the Order of Melchizedek,\nmay these bodies be presented in total release from any past\njourneys that would harbor an imprint as karma. Release any event\nwithin the astral/etheric plane that would cause disease within the\nphysical system. Whether it is impairment within the muscles or\ntissues, whether it is lodged in the body within the skeletal system;\nwhether it is imprinted within the organic, glandular, lymphatic or\nany form of a physical action, now release these to the light. As the\nsurgery is proceeding in and through each and all of you accept the\ntouch, accept the presence and accept the
