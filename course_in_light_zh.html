in your life, a momentum for\nextraordinary opportunity, monetary growth, prosperity and\npersonal strength.\n\nQuestion: The other question I have is; there are so many good\nthings out there that could be helpful, such as solar energy, the\nlight work and other new age studies. What is the key that is\nmissing to make this come about?\n\nAnswer: The answer is the readiness of the human life to let go of\nthe fear of the new world and release the old regimes. Karmic\nrelease is not yet at that point where it is available on a total\ncollective human level. Remember the new always begins with a\npioneering few and then becomes acceptable when the majority\nbecomes aware. What is in motion, initiated through the planetary\nchanges and the Crystalline Energy of this millennium, a greater\nmajority of people awakens to the new possibilities.\n\nThrough the seventies and the years leading to this time, human\nthought focuses on the probability of resolving old wars that\nalways hold humanity in a subservient system. The missing link to\nthe healing process is the belief that humanity cannot be raised to\nlive in an angelic consciousness.\n\nHumanity has always been a perpetuated image of being less than\nwhat was meant to be and too comfortable in a diminished self and\nuncomfortable in being in greatness. Therefore, the human society\ncontinually perpetuates the weaknesses of the human element. It\nperpetuates that weakness through feeding it and nurturing it by its\nfears and its own negativity.\n\nThrough the Light, you are putting aside your smallness and\nbeginning to grasp the greatness of what you can be. The missing\nlink is the angelic self that must now come to the Earth within you\nand be a predominant guidance in your daily life.\n\nIt is prophesied that the days would come when each would walk\nand talk with those of an angelic system and the days are here.\nYou are now observing it in the moment and in the days that are\nlived in a short pass and carried on into the greater future. It is\ndifficult in your political systems. Because those who oversee the\nconditions of trade, monetary flow and those who have had the\npowers to make decisions have held fixed to the past and are\nfrightened of a new order as it may present a different way of\nliving.\n\nQuestion: There is a saying - \"The first will go last and the last\nwill go first”. In other words, are we on a schedule? What\nhappens if the people in power do not change as fast as the system\nhas to change? Obviously there has to be something that happens.\nIs this coming about?\n\nAnswer: The earth in its past has had to cleanse itself of those who\nwould not begin the process, so what cannot be brought forward\nmust be dissipated or ended. We have spoken that many will leave\nthe planet and will not return for the end of the millennium. There\nwill be many souls who will never be excused. They will not be\nable to return to the earth until on the inner planes they have been\nthrough the initiatory system and awakened as true beings of light.\n\nYou are in the process of the initiation in physical form in the\nspeeding of your accelerated activities of life.\n\nIt is a difficult experience, but rewarding. What your children will\nexperience, and what comes after you, is so beautiful. What we\nsee is the earth renewed, becoming a true vision that is seen in the\nancient thought of those perceiving these generations of time.\nWhat was held as a vision in the thought of Plato, what was held in\nconsciousness as an idea in the mind of Christ truly comes into\nreality. So, the pain of the old will be felt but the joy and\ncelebration of the new will also come into focus; beautiful new\nlands, quietness of living, not dead living, not apathetic living, not\nexistence by strife, but true forms of life enhancing the beauty of\nits godliness.\n\nThis is what was meant for earth to evolve, to become a school of\nwhich the soul was meant to evolve and a school of which the soul\ncan present its creativity in a much more positive way.\n\nEvolution is a process not quick, but through step-by-step\nunfoldment. And now, we have spoken; there will be many more\nsessions. It is very beautiful to perceive this in activity. Walk with\nwisdom and light. Walk with joy. Go in peace.\n\nThe White Brotherhood\n\nThe White Brotherhood is a cluster of ancient souls that broke\nthrough the barriers of negativity. They saw the falseness of the\npowers of darkness and are very much a part of the forming of the\nnew millennium Age of Light. The White Brotherhood is one of\nmany ascended masters. The Order of Melchizedek is recognized\nas the beings of light in charge of the transformational process for\nall humanity. It has many ascended masters as members. The\nleadership of these orders is those who have become Christed, as\nJesus the Christ and the enlightened Buddha.\n\nMessage #3\n\nMarcus - As ascended masters of the White Brotherhood, we are\nenlightened beings and have energy and consciousness to lift or\naccelerate your evolutionary path through the guidance of thought\nand light. Our messages reach all of the earth as it is passed on\nfrom one to another. Those students who feel very exclusive or\nseparated from their brothers are unawakened to the expansiveness\nof our clusters of angelic beings. Azreal is here. St. Germain is\n                                                        rd\namong us. Andrew, Jove as Lao-Tzu and Pope John 23 are a few\nof the members of The White Brotherhood. St. Francis of Assisi is\nalso of our soul light vibration. The lessons of his path provide a\nservice to many in the struggle through the vanity of the physical\nworld.\n\nOur messages come through different means. Some are given\nthrough the channel; others are given through the churches or\norders of especially dedicated souls. Messages arrive to your level\nthrough spoken words of others. A song can reflect the truth of\nlight. Inspiration of music and art transmit the light. The\ncommunications of cinema bring awakening for hearts to those\nwho have the ears to hear and the eyes to see.\n\nAt this time, our concentration is to free the world to preserve and\npromote the freedom of all individual souls in order to pursue the\nquest for enlightenment through whatever means this may be\nachieved. There are few mystery schools per se, for the age of\nenlightenment opens the doors to all who can find their way to the\nlight. With the entrance of the earth into the age of light, the\nseventh seal referred to in the book of Revelations is broken. This\nreleased an influx of high spiritual energy into the earth and its\nenergy field.\n\nThe seventh seal represents the opening of the sixth sense, the\nnatural sensitive aspect of man in relationship to his/her higher\nself.\n\nAffirmations\n\n       I affirm that I am letting go of all fears that keep me in\n       emotional and mental paralysis.\n\n       I affirm that I am letting the wisdom of light surround my\n       actions in life.\n\n       I affirm I am balance, harmony and peace in my mind,\n       body, soul and spirit.\n\n                    Personal Journal\nWrite in your Personal Journal your fears and what you wish\nto heal."}, {"id": "L1_4", "level": 1, "type": "lesson", "lesson_num": 4, "title": "LESSON 4", "subtitle": "EMERALD GREEN", "color": "emerald", "content": "COLOR RAY: EMERALD GREEN\n                       The Light of Creativity\n\n               LOCATION: Upper part of the throat\n\n             HARMONIC: TONE \"A\" above High \"C\"\n\n                         PLANET: Mercury\n\nPurpose and Essence\n\nThe radiant Emerald Green ray is the energy to stimulate the\ncreative aspects of your nature. It also has to do with your\ncommunication skills, the way you objectify your goals and your\nreceptivity to creative aspects. The energy affects the attitudes you\nhold about your environment, money, and your relationships with\nothers. The energy is used to balance your magnetic and dynamic\nself.\n\nThis is the energy frequency associated with the planet Mercury.\nLearning of the influences of this planetary energy on your\nindividual life may give you a greater insight into yourself. This\nfrequency opens up the creative, artistic self to bring out the writer,\nmusician, technician and all aspects that desire seeks express. Do\nnot be surprised if you should feel some discomfort in your throat\n\narea when you go through the lesson with this energy. Sometimes\na sore throat develops from the repression that has been taking\nplace. There seems to be a lot of activation that occurs with this\nlesson. A combination of fears about money or career can be felt.\nSometimes the difficulties regarding relations also come up. It is\nnot unusual to feel unsettled and disturbed.\n\nHowever, the light side of this experience is a feeling of creative\naction. Sometimes latent talents seem to come to the surface.\nThere have been incidents where projects that were stuck, open up\nand just fly. So know that whatever part of this experience is\ntaking place by you, it is the right action for your particular\ngrowth.\n\nThis energy ray affects your concepts about your material world.\nLacks, limitations and situations that seem to need movement and\na push may be your concerns. Often in the quest for spiritual\ndevelopment there are attitudes that develop about money and\nmateriality that create resistance about it. If God is love and spirit\nmanifesting itself in creative desire, then the material world is also\na result of this creative experience. The wealth and materiality\nshould not be seen as a negative part of human life, but as an\nexpression of the need to be creative. Therefore, reevaluating your\nimages about money, career, relationships and your life in general\nwill probably come up for you to look at again.\n\nSpecific Level Function\n\nThis specific function of the Emerald Green Light ray is to clear\nnegative thoughts, feelings, and physical discomforts that are\nresults of unexpressed creative urges and to release and heal the\nissues in the tissues of communication and objective goals that set\nup creative blocks.\n\nAs you meditate, perceive you are opening up this center and\nreleasing all pain, fear and rage that may have been created\nthrough resistance. Affirm you are accepting the challenge to fulfill\nyour creative urges.\n\nMessage #1\n\nAzreal - Greetings, We speak to the light of your soul and to each\nof you. Focus now on creating within self opportunities to rise\nabove the conditions of your past. Move forward into a new\nexperience that brings you more in line with the nature of your\nhigher being.\n\nEach frequency ray has an important effect on each aspect of your\nconsciousness. The vibration of this energy is an important\nfrequency to free the creative self and bring it more into line with\nwhat it desires to objectify as opportunities. If it is difficult to see\nhow you can break through the obstacles blocking you, focus on\nthe Emerald Green energy and release the thoughts into the light.\nOften conditions arise from the human system that would stand as\nan obstacle to the creative intent and suppress or subject you\nindividually to conflict. This has always been a denial of the\nhuman spirit and has come from the over-reaction to power of the\negos that are in conflict with spirit.\n\nAs you are meditating, the focus of this frequency of the radiant\nEmerald ray is moving in and through all of the mental body. It is\nworking directly with the process of thought that comes from the\nleft-brain and right brain thinking. Perceive this frequency\nuplifting all aspects of mental thought and processes of\nconstructive thinking.    Perceive this energy magnifying to\nactualize and objectify goals. Perceive this frequency releasing\nimageries of inadequacy to your own potential. Perceive your\nability to reach a higher percentage of your thought processes.\nMany who are undermined in mind and thought through their sense\n\nof inability, come forth and express or create in a way that would\nbe acceptable to others. It is difficult, but once you find means in\nwhich you can function creatively and still be at ease with the\nsenses and the opportunities that stem from mass-mind\nconsciousness, you will experience a greater freedom of self.\n\nYou are here to individualize your spirit and to function in line\nwith a cosmic understanding. You can rise above certain\nresistances that occur from those who cannot see the higher\nrealities. Think on these things.\n\nThe movement to be free through all history has stemmed from a\nfew who have the sight to know that each individual is a cosmic\nbeing, a child of light. Each individual consciousness is a creator\nof creation and must have the right to experience its activity in the\nearth. The denials of these freedoms have always come from\nsuppression, subservience and aspects of poverty, which bring pain\nand suffering. The human race has always been striving to\novercome the limitations that are imposed by systems that cannot\nsee the greater good in humanity.\n\nAll in all, know that there is a power beyond what you understand\nas self. That power stems from vibrations of light\n\nand love, beyond any human expression.              There is the\nfather/mother aspect that is a spiritual activity of thought that\ncreates. There is a power beyond all power, so to speak.\n\nAs you are enveloped in this light, let go now, as this vibration of\nlight flows through you and within every part of your being.\nPerceive yourself letting go of the chains of past conditions, letting\ngo of the boundaries or enslavement. Let go and let the light be\nthe source of healing.\n\nAs you close your meditation, think on these things:\n\n         You are light. You are love. You are a lighted self,\n         expressing its consciousness in this physical reality. See\n         yourself lighted and free. Go in peace.\n\nToni\n\nThe first time Browning channeled I felt as though I was in the\npresence of a very familiar spirit. I saw a man sitting by a\nfireplace with a pipe in his mouth. I could only think of the poet\nRobert Browning. Many years later a student/teacher of A Course\nin Light spoke of her experience with Robert Browning.\n\nMessage #2\n\nBrowning - We greet you, and it is of much love that I am able to\nbe present in this moment of your experience. You will find your\nlife experience, in the event of moving through the rays of light,\nbecomes very intense and accelerated. It can bring forth much\ngood according to your acceptance of your ability to manifest what\nyou came to put forth. Begin by resisting the sense of being\nwithout resources to complete your tasks.\n\nEach one has opportunities to look beyond the simplistic self and\nfind resources within that can bring their creativity into a greater\nexpression. It is most important, students, to release the sense of\njudgments on your abilities in the manner of creativity. Do not\ncompare yourself with others or with masters who have presented\ntheir works before you. Do not compare yourself with those re-\norganized, so to speak, as a masterful creative resourceful\nconsciousness, for this deters you from expressing your own outlet.\n\nIt is important, however minute your creativity may be, that you\nrecognize your creativity is a part of who you are. The more you\nallow this to come forth the more you will feel a sense of freedom\n\nin regard to your giving to the universe, and giving self the\nopportunity to function in alignment with your own artistic and\ncreative manner.\n\nYou ask what is it like to be discarnate?. It is much as you are in\nincarnate consciousness. A discarnate being is simply a new form\nof consciousness. This word used repeatedly, at times loses its\nimpact, but it is difficult to express what we are other than as\nconsciousness. For at moments we can become form and appear as\nform, or we can release form and simply be as mind, flowing\nthrough different systems of activity and different spheres of\nexpression.\n\nMany spiritual beings come through channels as the inspirational\nconsciousness of earth. We have spoken there are many sensitives\nwho are coming into that ability to receive transmitted energy. Do\nnot fear these brethren; do not fear the spirits for they have no hold\non you per se. Those of the light, desire simply to uplift and free\nyou from any aspect of fear and heaviness.\n\nAs I speak, the frequencies are moving through your body. I will\nnot direct the energies as brother Azreal does. His work is to\nintricately direct light organically and cellular with each physical\nbeing and raise the body into its vibration for cleansing and\nclearing and purification. In addition, Marcus' work is to uplift\nmentally and clarify thoughts to bring into action the mental\nfacility for being more in tune with your true rational and spiritual\nconsciousness.\n\nI am here tonight to magnify the frequency of the radiant Emerald\nray and to work with your creative consciousness and\ncommunicative skills. I am here to release any fears within the\nprocesses of self that would deny your creative conscious self.\nKnow \"all things are in their balance when you free consciousness\nto explore the avenue for your particular being”.\n\nEach of you now, I greet you in the name of the Father, the Son,\nand the Spirit of all of the Minds of Christ. As we have spoken, so\nhas the work been integrated. Perceive now the flow of light\nmoving through physical consciousness directing it through the\ncellular system and through the organic systems and all of your\nbodies. Be healed.\n\nI go now. It is time for all to see your inner potential. Do not let\nthe barriers cloud your vision or let the fears or turmoil of the day\novershadow your inner faith. Walk as the up lifters and\nstrongholds of wisdom.\n\nDivine Companionship\n\n        I have an inner friend who walks with me, who is not far\n        away,\n        but within me, a constant companion.\n\n        I never become lonely, for my Friend is always near.\n\n        I speak and he/she answers.\n\n        Oh my kind Friend, how dear to me is thy presence.\n\n        The spirit with me is my Friend. 2\n\n2 Science of Mind: Ernest Holmes\n\n                      Personal Journal\nWhat are my creative goals?\n\n\n\n\n\nWhat are my financial goals?\n\n\n\n\n\nWhat are some of my personal goals?\n\n\n\n\n\nAffirmations\n\n        I affirm that I am releasing all fears of communication.\n\n        I affirm that I am saying what I mean and meaning what I\n        say.\n\n        I affirm that I am releasing concepts of being limited to\n        the past.\n\n         I perceive that I am receiving new direction for growth\n         and prosperity.\n\n         I accept that my abundance is a result of an energy\n         exchange.\n\n         I create the opportunity to receive my abundance.\n\n         I am giving thanks for all the wealth that I now possess. I\n         surround my life in creative thought for the greater good\n         of all.\n\n         I desire to experience joy in my work, in my home and in\n         my relationships.\n\n\n\n\n\n\n\n\n\nDefinition of Affirmation\n\nTo affirm anything is to state that it is so, and to maintain this as\nbeing true in the face of all evidence to the contrary. Human\nthought can only affirm, for even at the moment of denial, it is\naffirming the presence of that which it denies! Repeating an\naffirmation is leading the mind to that state of consciousness where\nit accepts that which it wishes to believe."}, {"id": "L1_5", "level": 1, "type": "lesson", "lesson_num": 5, "title": "LESSON 5", "subtitle": "", "color": "violet", "content": "COLOR: VIOLET PURPLE\n                       The Light of the Will\n\n                    LOCATION: Lower Throat\n\n             HARMONIC TONE: \"E\" above High \"C\"\n\n                         PLANET: Jupiter\n\nPurpose and Essence\n\nThe Violet Purple energy is a very strong vibration and can\nactivate within you anger and frustration over situations you\ncannot control. It is associated with the respiratory system. When\nyou are feeling closed in, as though things are running against you\nand it seems hard to breathe, this is due to fear and anger that\nsuppress your natural instinct to breathe. The thoughts and feelings\nthat come up may be associated with your own stubbornness, self-\ncenteredness and desires to control others in the way you think\nthey should be.\n\nThis is a very interesting lesson in light. The high side is a feeling\nof \"going with the flow\" and sensing that things are going your\nway, a feeling of being in harmony with the universe and situations\nin your life. This energy expresses through you, as generosity,\n\nopenness and an overwhelming sense of goodwill. Through the\ninformation transmitted by the masters, this energy earthed during\nthe birth of Jesus the Christ. This can also mean that when you go\nthrough your own rebirth in consciousness, you.\n\nu are earthing the wonder of this ray. The spirit of the divine will\nmanifests in earth through a new birth in consciousness\nrepresented by The Christ.\n\nSpecific Level Function\n\nThe energy activates to break up stubbornness, willfulness,\nhostility and anger towards yourself and situations of suppression.\nYou experience this frequency as an intense vibration where you\nfeel quite uncomfortable as your rage may explode. It also is a\nwonderful ray for that great feeling of being open, joyful and filled\nwith goodwill.\n\nAs you meditate, think of this energy as moving throughout the\nplanet to bring the divine plan into action through the raising of the\nhuman egos into recognition of its oneness with the universal\nspirit.\n\nMessage #1\n\nJove - We speak with you that you may experience the vibration of\nlight and come into a greater recognition of your true purpose and\ndestiny. The frequency of this ray is that which brings forth the\nintentions that you came to fulfill. It can bring into action the\nkarmic activity to process the challenges that have come as your\ngift and movement through change and expansion. Think in terms\nthat you are now in a cycle of consciousness where you are\nclearing the effect that has been brought into motion by causes of\nprevious activities.\n\nPerceive that you are releasing yourself from bondage and are\nclearing any factions that hold you in states of pain. Perceive in\nthis present moment that the vibration of light is being drawn in\nand through every system of your expression. That which has been\nan injustice in your experience is being released to its own higher\ndestiny. Release the effects of those that have presented barriers to\nyour own sense of completeness. Perceive that you as an identity\nand ego are coming into full focus within the physical plane.\nPerceive that conditions you have moved through have presented\nthemselves as challenges to release and clear patterns of past\nvibrations.\n\nYou are all that you have created yourself to become, and yet you\nare growing into beings of a higher potential.\n\nSee yourself as you truly are, as spirit, soul and body with Higher\nMind and consciousness. Do not judge yourself by outer sources,\nbut go within and release the need to attach to any form of activity\nthat denies you your sense of balance, harmony and peace.\nPerceive all appointed to you in your life is a connection relative to\nthe energy of the Violet Purple ray.\n\nExperience the release of pain, resistance and hostilities. Release\nthem to the light and affirm that the nature and spirit of their intent\nis manifested in balance and love. To fight rage with rage increases\nthe rage. To over-shadow with love dissipates the power of rage\nand brings the vibration of love into its greater effect.\n\nVisualize the ray of light enveloping the nature of the emotional\nconsciousness that exists within your own being. The emotions are\nlike the ocean, sometimes still, sometimes stormy. See these\nemotional activations in light and perceive the emotions of\nsuppressed, regressed, denied, rejected imageries brought into the\nfrequency of this ray.\n\nPerceive the fear of the “love that is the source of your\nconsciousness eased out of the emotional plane.” Perceive the total\nemotional self enveloped in the rays of this energy. Perceive the\nperceptual system, the sensory aspect of your nature is letting go of\nthe imageries of denial, of anxiety, releasing effects of others on\nyour consciousness. Perceive the light enveloping all that you are.\nBe in silence and let the light be the source of your healing.\n\nMeditate …\n\nIn the closing of your meditation, see yourself surrounded by the\nlight moving in a clockwise motion sealing off your magnetic\nfield. This will activate the light shield against negative\nimpositions. Feel the peace surround you.\n\nMessage #2\n\nAndrew - I give to you the blessings of the energy to instill the\nlevel of love and joy in the heart. To bring about the fullness of the\njoy of this energy there must be the releasing of the idea that you\nare held against your own destiny.\n\nYou must release the concept that you are unavailable to explore\nthe growth and the expression of your own purpose. So, let go of\nthoughts “that there is nothing you can see beyond what is now\nthat has any good in your life.” Let go of the fear that rampant\nwithin the earth from mass mind consciousness. There have been\ncatalytic events that are soaring and searing through the minds and\nhearts of all humanity. Out of the catalytic events a change in the\nconsciousness in the human heart and mind occurs. War, starvation\nand crises present difficulties from which life itself falls into the\ndeath syndrome. Nevertheless, it is a conscious imprint on all souls\nready to see a need to change warring against nations. You have\nwitnessed change of the European nations to a more democratic\nsystem.\n\nThe light is working.\n\nThe wave of energy radiates throughout all nations. Perceive this\nbringing about peaceful transitions. You are workers of light and\ncan present healing through your inner and outer self.\n\n       Know Mind (higher mind) directs light and light follows\n       (Mind) and directed to a point where it can dissipate\n       negative effects.\n\nQ: How can we become masters in the world that opposes our\ninner sense of rightness?\n\nA: You move step by step through the different stages of your own\npersonal evolution. Acknowledge you are one of a great conclave\n(light group). You are one of many in a networking of thought.\nYou are one of many seeing a probable course to unify the earth\nand bring nations into a new agreement of exchanging the purpose\nof higher realities into the now. Begin to visualize the voice of the\nhierarchy heard, felt and seen by the leaders, bringing these events\ninto action.\n\nWe sense the impending fear precedes overriding peace. The\nimpending negativity is the beginning of a new form of self-\nexpression within the total earth plane. All is in motion for the\ngreater good. What appears as the pain is but a symptom of the\nkarmic aspect of past relations through individuals and nations. As\nworkers of light, you are the warriors standing on the threshold to\nbring about a change within you and around you. Using the swords\nand lasers of light you cut through the imagery of fear and stand in\nthat element where you truly emanate the peace. There is no\ngreater gift either to self or soul or to the universe as a whole, than\nto be a warrior of light.\n\nQ: Will there be intervention? Will there be those who come from\nother planes to create a change in the vibrations activated?\n\nA: At this point, we sense that there is concern over this act of\nconsciousness transferred into the ethers. Yes, we do see\nintervention from the higher planes to the physical.\n\nYou notice more people are speaking with deep wisdom. You\nnotice increasingly as you turn around, that you are hearing the\nactual messages of hierarchical thought that flows from pure truth.\nA new consciousness is entering into all of life expression.\nIndividually you are in a plateau of beginning a new journey\nthrough yourself and realization of soul consciousness. You are all\nimportant to this event of life. Yet, when you leave, your\nimportance becomes a minute particle of expression registered in\nthe soul of your internal self.\n\nYou must walk the line between the seriousness of who you are\nand the lightness of what you truly can be. When you are heavy\ninto the rage, fear and pain, you are giving yourself a mirror of\nwhat your fears represent. However, when you walk in lightness\nand understand the joy that comes from the euphoric nature you\nare truly entering into higher plateaus of spiritual understanding.\nLet the peace that truly exists in the heart and core of yourself be\nuplifting to the nature you have created.\n\nLet the peace overshadow; give your energy to what you know is\nthe higher good, let go of the pain, fear, doubt and all resistance to\npeace. During the next 36 hours, the intensity of this light will be\nactivated within you in a very important way. Walk in peace. Go in\nlight and may the inner Christ be in and through you.\n\n                     Personal Journal\nWrite in your own Personal Journal your dreams, hopes and\nwishes\n\n\n\n\n\n\n\n\nAffirmations\n\n        I affirm that I release the pain of suppression occurring\n        outside my control.\n\n        I affirm that I am being balanced in my expression\n        dynamically and magnetically.\n\n        I release envy, ill will, rage and hostility from my\n        physical, emotional and perceptual self.\n\n        I merge with the will of the Creator to bring the greater\n        good into action.\n\nWrite your own affirmation."}, {"id": "L1_6", "level": 1, "type": "lesson", "lesson_num": 6, "title": "LESSON 6", "subtitle": "RUBY RED", "color": "ruby", "content": "COLOR RAY: RUBY RED\n                 The Left Hand of the Physician\n\n                         Location – Heart\n\n                    Within the Emotional Body\n\n            HARMONIC TONE: \"B” above High \"C\"\n\n                       PLANET: Mercury\n\nPurpose and Essence\n\nThis frequency called the \"left hand of the physician,” is a very\nwarm energy. You feel its warmth almost as a burning sensation. It\nis the healing ray directed to mend broken systems, emotionally,\nmentally and physically. It is often activated unconsciously\nthrough those who seek to heal in some manner. When consciously\naware of its properties it is magnified and utilized in a very\npractical way. This frequency is used to heal all aspects of one's\nself in a personal manner.\n\nI had rheumatoid arthritis and was under the care of a physician\nwho could offer no solution to the discomfort. However, through\nmeditation and working with this frequency I now am free from\nthe symptoms of this disease. It took a year of meditation before I\n\nnoticed the change. This frequency when activated may produce\nseveral different symptoms.\n\nYou may find you are very thirsty and it is recommended that you\ndrink a lot of water during the process with this light ray. You may\nalso feel you need more rest. In fact, as you are going through\nthese processes with the energies, there is a need for more rest due\nto the inner work. As you call on your guides or teachers, you will\nbegin to feel their presence in and around you and many beautiful\nsurprises can come in subtle ways.\n\nAs you are meditating daily a new flow of energy is moving in and\nthrough you. The body is awakening to a new aliveness. It is a time\nof reevaluating your own physical fitness. With emphasis on\nphysical fitness programs, it is not necessary to detail a program\nwithin this course, but there are several excellent means for\ndeveloping greater balance. Many practice yoga, Tai Chi, Qigong,\nSufi dance or Jazzercise. You will more than likely find your own\nparticular program.\n\nAs you experience this frequency, you may notice your body has\nunusual aches and pains. Some old injury may start to act up.\nBecause the body absorbs so much from thought, feelings, and\nactions it is normal that the body will retain certain amounts of\nnegative energy. These aches are from thought forms.\n\nDue to the fact, impacts of energy appear at times to have a mind\nof their own; they can be felt as pains in the body in the muscles,\ntendons and bones. These can come from any number of reasons,\nsuch as fear projected to you or experienced within yourself.\nTraumas of any nature can become a creative thought form and\ncause difficulties.\n\nCertain holistic health practices can release these from the body.\nReflexology, body massage, chiropractic treatments, Rolfing and\n\nlight bodywork are all methods of healing from tired aching\nmuscles and bones.\n\nSpecific Level Function\n\nThis frequency works in and through all parts of the physical body,\nspecifically directing it through all of the organic and cellular\nsystems. It also moves in and through the nervous, digestive,\nskeletal, respiratory, excretory, and muscular systems as well as\nthe circulatory and reproductive systems. All are in need of light\nfor healing. The frequency of the Ruby Red Ray centers in the soul\nbody and aligns with the heart. Therefore, matters of the heart are\npresents with opportunities for healing and mending relationships\nand desires of the heart.\n\nThis frequency is associated with the planet Mercury ruler of the\nsun sign Virgo. Those who are born in this sun sign may have\nstronger affects of this energy. Learning of its influence can\nincrease your understanding of your own personal lessons. Along\nwith physical fitness, the diet is an important part of being well. As\nyou work with light, you will notice you have different tastes and\nstart to eliminate food that is unhealthy for you.\n\nMessage #1\n\nAzreal - Greetings, dear students of light, this is Azreal. It is of\ngreat joy that we experience your consciousness. The energy of the\nRuby Ray brings upliftment to all systems within your physical\nbody as well as the emotional and mental consciousness.\n\nAt this moment, direct into your consciousness energy to uplift\nyour everyday experience regarding your relationships. The energy\nclears your thoughts holding you in a state of pain, resistance, fear,\nanxiety and unfulfilled consciousness. Emotionally and mentally,\nyou may be attached to everyone who is a part of your everyday\n\nexperience as well as those who have moved out of your\nexperience. The intent is to be cleared of patterns that are repeating\nnegative behavior in your life. At this moment, perceive the\nwarmth of this energy moving in and throughout all of the mental\nself.\n\nIn meditation, you experience a connection with another aspect of\nyour consciousness. From this aspect, energy is activated to change\nthe difficulties that have persisted. Therefore, we are going to call\nforth the souls that are a part of your experience, such as your\nfather, mother and the family members of this incarnation. Include\nyour associations, friends and perceive that all are coming into\nfocus. Perceive yourselves holding each member of your soul\ngroup in the radiant energy of light.\n\nRecognize each one at their level of consciousness struggling\nthrough their own fears, stresses and seeking resolutions. Observe\nthey are struggling for their own recognition, seeking to be loved,\nloving, and perhaps feeling isolated and alone.\n\nPerceive each one in their human ego and in the soul, blending as\none consciousness in light. Release your anger, pain and the\nsorrows into the light. Let the light be the source of healing.\n\nThis week in meditation, you may experience thoughts or\nimageries of those who have been a part of your lives. When these\ncome to the forefront, simply direct the energy and see their\nexperiences in your life as a necessary part of your growth.\n\nAnd now, we are going to direct the frequency in and through the\ntotal physical body, working from the muscle system and the\ntendons. Each of you, now perceive the muscular aspect of your\nbody receiving the flame of light. Direct the energy of the radiant\nRuby Ray and perceive the muscles releasing anxieties and fears,\nresistances and stresses from past to present consciousness. You\n\nwill feel the intense work through the body. If there is pain, focus\nthe energy into that area of discomfort and direct it to the light. See\nclearly a release as the light travels through the total physical\nnature.\n\nWe will concentrate on each area of the body. This meditation\nprocess can be repeated often as you move through your healing\neffects. Return to this experience often to renew the process of\nhealing. Now move into the skeletal system of the body. Visualize\nthe skeletal system of your body enveloped in the energy of the\nlight. Move with your awareness along the spine directing light\ninto the vertebrae. The spine is electromagnetic and therefore\nattracts to itself much of the heaviness of the ground and the\nenergy fields you walk through.\n\nPerceive you are letting go and releasing angers, resentments,\nprojections, stresses and fears. Let go and let the light be the source\nof healing.\n\nDirect the light through the nervous system. Let the brain signal to\nthe nervous system the vibration of light healing and releasing any\nsense of being without direction. Let there be ease and release.\n\nDirect now the frequency of this energy into the respiratory system\nand into the lung area. Let go of the suppressions and resistance.\nLet the breath of life flow in and through the body s you breathe in\nand out. Let the lungs fill with the healing ray.\n\nPerceive your consciousness moving into your emotional body and\ninto the heart center concentrating on the heart organ and through\nthe circulatory system. Those of you who feel pressure, heaviness\nor fear of difficulties surrounding the heart itself focus and direct\nthe light of Ruby Red. Let it flow in and around this part of your\nphysical self.\n\nDirect the light in, through the circulatory system and into the\nblood stream and perceive a clearing of impurities within this\naspect of self. Direct the light into the cells of the body to release\nfears and angers that have stagnated within this aspect of self. As\nyou release the fears, hostility, and sorrow, direct it to the higher\nself and into the light. Do not carry the effects that others have\nprojected. Let go.\n\nPerceive now the nature of your inner self and the love aspect of\nconsciousness enveloping all of the emotions of your being. Many\nof you are concerned with stress. When love magnifies it releases\nthe fears and anxieties.\n\nNow, beloved students, feel the organic nature of your body\nenveloped in this light. Think of the organs as accepting the light\nand releasing the impurities and waste held through suppressed\nemotions. Perceive the energy moving through the elimination\nsystem, through the spleen, the spleen plexus, the liver, the liver\nplexus, gallbladder and through the kidneys. Perceive the total\norganic system of the body enveloped in the radiant ruby ray.\n\nMany of you are very sensitive and highly anxiety-prone,\nhypersensitive from chemical imbalance and allergies. Work\nwithin the organic nature to free this part of you from \\\\negativity\nand pain. Perceive the organic nature enveloped in light and being\nhealed, releasing its resistance.\n\nNow we move into the reproductive system. There is much\nheaviness here. Perceive organically that there is acceptance of the\npower of your being of the creative aspect, of the sexuality of your\nconsciousness as in balance. Release possessiveness and energy,\nthe pains of fear that stem from greed. Acknowledge yourself as\nlove, loving, and loved as you are. Let go of all negativity attached\nto your consciousness. Perceive the light of this energy ray\nenveloping all systems.\n\nBe in silence and let the healing be received. …\n\n                 As your meditation is completed and you are\n               closing this part of your exercise in light, perceive\n               the light flowing down through the body, down\n               through the legs, and see it flow out the feet and into\nthe earth. See the light surrounding all that you are and moving in a\nclockwise motion sealing the energy field of your being. Know\nthat you will be experiencing this process throughout the week and\nas often as you direct the light for your personal healing. And now,\nbeloved students go in peace and may the light of the Christ be in\nand through you.\n\n                    Law of Correspondence\nMassage #2\n\nAzreal - Every thought, every experience and every action of\nyourselves brings to its experience a like frequency or like\nconscious.. Therefore, it is important for you to understand the\nbasic law of correspondence so that you may draw to you those\nrelationships and experiences that will complement your own\nhigher self. In the past each of you have brought into your\nexperience certain hate, rage and resentment which correspond to\ncertain unconscious thoughts within yourself. To move past these\nactivations, perceive the energy of light repairing the relationships\nbetween your families, friends and associates. It is important you\nbring these personalities into your awareness and let the radiant\nflame of the light move through their being so that there may come\nthe total release of any anxieties and angers, which have been\nprevalent.\n\nThe heart is the organ that is responsible for the life force flowing\nthrough the body. The heart is the organ that holds within it all of\nthe emotions and all of the experience of your life. We wish to see\n\neach of you with a strong, radiant, enlightened, happy and free\nheart. This energy of light, as it is activated, will stem from that\ncenter and move to bring about the lifting of the heart. This may\nbring reactions of emotions into an elevated state where it may be\nreceiving the light of pure understanding and love.\n\n1 Corinthians: 13. The Holy Bible\n\nI speak in the tongues of men and of angels, but have not love; I\nam a noisy gong or a clanging cymbal. And if I have prophetic\npowers, and understand all mysteries and all knowledge and if I\nhave all faith, so as to remove mountains but have not love, I am\nnothing. If I give away all I have, and if I deliver my body to be\nburned but have not love, I gain nothing.\n\nLove is patient and kind; love is not jealous or boastful, it is not\narrogant or rude. Love does not insist on its own way; it is not\nirritable or resentful; it does not rejoice in wrong, but rejoices in\nthe right.\n\nLove bears all things, believes all things, hopes all things, and\nendures all things. Love never ends. As for prophecies, they will\npass away.\n\nAs for tongues, they will cease. As for knowledge, it will pass\naway. For our knowledge is imperfect and our prophecy is\nimperfect, but when the perfect comes, the imperfect will pass\naway.\n\n When I was a child, I spoke like a child, when I became a man I\ngave up childish ways. For now we see in a mirror dimly, but then\nface to face. Now I know in part; then I shall understand fully,\neven as I have been fully understood. So faith, hope, love abide,\nthese three; but the greatest of these is love. (I Corinthians: 13\nRevised Standard Version)\n\nThis message of love brings you closer to understand the power of\nlove in its purist state. Many of you are seeking with your\nconscious minds to reach out and bring in the higher teachings and\nthe mysteries of the universe and the planets. You are searching to\nunderstand the evolving of consciousness on many planes of being.\nIt is important, however that each of you first know and activate\nwithin self that pure divine love by reaffirming and reacquainting\nyour understanding of love as presented through the scriptures of\nthis chapter. By doing this and using the light of the radiant Ruby\nRay energy, you will begin to feel a strong healing within your\nwhole nature. It will bring a new concept of this beautiful inspired\nchapter within The Holy Bible.\n\nIt is very difficult for your conscious minds to conceive of the\nabsolute joy and the absolute thankfulness that stems from the\nhierarchy in being able to move into your consciousness to work\nwith each of you individually. Be assured that you are all part of a\nmovement and are each being guided in your everyday\nexperiences. When feelings of aloneness or separation overwhelm\nyou, be still and move with your consciousness to light and feel the\npresence of your higher self. Your own guides and teachers are\ndrawn to you as you emanate the higher frequencies of light and\nthe radiance of your own being is emanating throughout your\nmagnetic field. This draws into your presence the consciousness of\nyour very own guides and teachers.\n\nAnd now students walk with love, walk with peace and know that\nall things come into their fullness to those who walk the path of\nlight through the Christ Spirit.\n\n                      Personal Journal\nWrite about healing for your relationships\n\n\n\n\n\n\n\n\nAffirmations\n\n        I am accepting the healing of my mind, body and spirit.\n\n        I am releasing all negatives from my body.\n\n        I love my physic self.\n\n        I am forgiving all anger towards others.\n\n        I see my relationships becoming healthy and wonderful.\n\nWrite your experiences of the light work."}, {"id": "L1_7", "level": 1, "type": "lesson", "lesson_num": 7, "title": "LESSON 7", "subtitle": "ORANGE", "color": "orange", "content": "COLOR RAY: ORANGE\n                 The Right Hand of the Physician\n\n         LOCATION: SOLAR PLEXUS below the heart\n\n            HARMONIC TONE: \"G\" above High \"C\"\n\n                        PLANET: Neptune\n\nPurpose and Essence\n\nThis frequency is an energy ray that works in direct relationship to\nthe nervous system. It is felt as a very intense energy that may\ncreate within you a feeling of restlessness and hypertension. It can\nat times make you feel off balance. The Orange ray is associated\nwith perception and connected to the center of the solar plexus. It\naffects the part of the body that deals with the elimination and\ndigestion of food. It is the center connected to your gut feelings\nand often perceived as your radar center. The old gut feelings stem\nfrom the psychic sense or sixth sense.\n\nThis part of your body can be subjected to onslaught of negative\nprojections. You know the feeling when you think you are being\ntalked about in a negative way. You know the feeling when you\nthink you cannot please anyone or whatever you do is different\n\nfrom what is expected. You know how you can get sick to the\nstomach when things are disharmonious. The perceptions of your\nlife are reflections of your thought, words and deeds.\n\nThe purpose of this lesson is to free the nervous system from being\ntoo sensitive and reactive to negative situations. However, in the\nprocess of being cleared there often is the feeling of losing your\nbalance and high-strung.\n\nThe purpose of the Orange Light ray is to free up the psychic\ndebris collected over the years and clear up your perceptions of\nyourself and your responsibilities. Often if you can have a different\nview on situations, you will have different experiences. Judgments\nabout others and yourself release as you meditate with the lesson\nof the Orange ray.\n\nThe perceptual nature can develop high sensitivity as a psychic and\ndream states may increase or latent gifts regarding the psychic\nnature may occur.\n\nThe Radiant Orange brings enlightened awareness to the physical\nand perceptual bodies. A clear perspective on life should develop\nas you move through the illusions. The ability to be clairvoyant or\nclairaudient often result in meditating with the Orange Light and\nconcentration of this energy can increase those experiences.\n\nSpecific Level Function\n\nThe radiant Orange ray works within the perceptual body in\nconnection with the functions as in the nervous system and the\nelimination system. The energy revitalizes. However, you may first\nexperience extreme tiredness as you are working through the pain\nand rage within these systems. The frequency is also beneficial to\nmental depression or heightened anxiety as it clears the fears\n\nwithin the nervous system. There are many forms of physic gifts;\nperhaps there is a latent gift in you.\n\nMessage #1\n\nJove - I grant you the right to experience within yourself the\nexpansion of your consciousness. I perceive at this present moment\na change in your direction and understanding. Know that the\npresence of your own guides and teachers are here as you move\ninto your own meditative state.\n\nAgain, we cannot interfere in the necessities for your learning. We\ncannot interfere in the choices you desire to experience. We cannot\neven change the way you sense and know what you see as reality.\nWe can perpetuate the image of love and light through you by\nadding and magnifying vibrations of your own inner\nconsciousness. We can present you with spirituality and teachings\nthat stem from the inner planes of soul.\n\nHowever, there are other planes of expression of energies not be\nseen by the eye. But the sensory aspects of your own perceptual\nnature can feel it. As you move into meditative states, light and\nenergy, the presence of those who are your guides and teachers\nsurround you. As you meditate in this frequency of light there are\nreleases taking place within the perceptual level that would\nordinarily blind you to your own experiences.\n\nSo once again, dear students perceive your body in this meditative\nstate rising above and outside of its physical structure. Feel\nyourselves lifting outside of the body and feel yourselves flowing-\nnot bound limited or structured and feel the light of self and the joy\nof release. Feel the Beingness of unbounded consciousness. Now\nperceive that the body is receiving energy, being revitalized, being\ncleared of its depression. Visualize release of chains (symbolic)\n\nthat bind your consciousness to resistance and pain, rejection and\nabuses of injustice.\n\nThe rays of this energy have strong healing effects on one who\nbecomes irrational in thought, emotionally disoriented, imbalanced\nin the coordination of its physical nature. When one seems\ndisoriented, perceive the rays of light directed to the nervous\nsystem and the body come into a new vitality.\n\n             In this state of being, you are able to flow with energy\nand light into the network of light. There you enter into group\nconsciousness to uplift the vibrations of your individual selves as\nwell as the earth's system.\n\nThink on these things.\n\n         Who am I?\n\n         Where am I going?\n\n         What can I do to bring the message of wisdom into earth?\n\n         What must I shed to be free?\n\n         What must I gain or acknowledge being strong?\n\n         What must I see to have vision?\n\nAs you feel yourself disconnected from the body, feel conscious to\nwhat is truly transpiring. Know this is a form of allowing intellect\nto be put aside and experience the intense healing coming into\nfocus within your own physical nature. Visualize you are releasing\nthe body and yourself from the chains connected to those who are\n\nno longer in need of your experiences, but who must move through\ntheir own course of activity. Release them to the light, love and the\naction that they have created.\n\nPerceive yourself drawing to your own experience, those who are\nto walk a correspondence to the challenges of your life. It is very\nbeautiful to see the auras changing in and around your\nconsciousness and to observe the eminence of light manifesting\nfrom the bodies in the magnetic fields.\n\nWhen you are ready, call your egos and your awareness back to\nyour body. You will feel lighter as the egos and conscious selves\nbecome once again aware of the physical. You will feel the\ndeepness as you move into the body. As you come into the\nawakened state, you will find self in joy, revitalized and refreshed.\nBring self back and see the energies flow through you and down\nthrough the feet grounding your consciousness.\n\nEach of you now, go in peace with wisdom and knowledge that\nyou are one with those that bring the light into your awakening.\n\nMessage #2\n\nAndrew - It is good to speak again through the channel's vibration.\nTrusting is the key to receiving insightfulness from the source of\nyour own soul. Each of you has the ability to respond to that\ninstinct and to the perception of your inner being. The key lies in\ndiscerning from what plateau you are receiving the direction and\ninsightful motion. Be at peace for each and all have abilities to\ncreate the openness of the eye that can see beyond the physical and\nlook into the other planes of expression.\n\nIn this moment, as we are presenting the work of light, you are\nbeing prepared for heightened sensitivity and for the path in which\nyou walk in co-creation and co-understanding with other systems\n\nof expression. As I speak, so you will hear those who walk with\nyou in your own person and Beingness. It is not that we are so far\nfrom you that you cannot touch who we are concerning your life,\nbut you have been trained to think only of the emotional and\nphysical as your full reality. You have been trained to think that to\nmove beyond the senses that feel, touch, smell and hold a reality of\na substance that you then become an entity residing in unbalanced\nthought.\n\nLet it be known that those who enter into the age that is now in\nmotion will have within themselves many abilities to receive the\nspiritual awareness and direction that was a natural part of their\nexistence in another age of time.\n\nSo yes, in this energy of the Radiant Orange Light you are being\ngiven an opportunity to open the perceptual self to respond to more\nheightened activity of the sensory nature. Discomfort may be\neffective and felt in your bodies but this will pass as you become\nmore familiar with your own vibration and the sensory nature of\nyour physical self. At this moment, beloved student, think:\n\n         I am experiencing release of all attachments that delude\n         my mind, that delude my emotions and that distort what I\n         perceive.\n\n         I release within the body and all the cells any barriers to\n         perceiving with a clear vision.\n\n         I release all fears of my intuitive and perceptual\n         expression.\n\n         I release now all fear of experiencing the empowering of\n         this intensity of light.\n\n         I release all fear of being in resistance and pain.\n\nAs you look into the outer world, you see the distortions of the\nhuman ego that created the de-escalation of spiritual evolution.\nYet, you are working toward the development of inner peace and\nphysical consciousness existing in peaceful terms. You must teach\nthe way, as you become the way. You must prepare the path as\nothers walk following your perspective. No one will be turned\naway who is able to facilitate and demonstrate the commitment of\nlight and love in the source of their being. Now, in this moment,\nreceive your mentor, teacher and guide. Joyfully accept this\nconnection. Trust.\n\nAs your awareness moves back to the senses of your body, you\nwill feel an ultimate shift in vibration. Perceive the light moving in\nclockwise motion sealing your magnetic field.\n\n                      Personal Journal\nWrite your own psychic experience.\n\n\n\n\n\n\n\n\n\n\n\n\n\nWrite out any dreams you remember."}, {"id": "L1_8", "level": 1, "type": "lesson", "lesson_num": 8, "title": "LESSON 8", "subtitle": "PINK", "color": "pink", "content": "COLOR RAY: PINK\n                The Ray of Balance and Perfection\n\n                 HARMONIC TONE: - \"F\" Sharp\n\n                          PLANET: Venus\n\nPurpose and Essence\n\nThe energy of the Pink ray is noted as the light of divine love and\nperfection. It is felt as a light of joyous energy, one in which you\ncan feel a balance in all aspects of your nature. On the higher level\nof this vibration, it is one of bliss and completeness. It can bring a\nsense of harmony and balance as you feel yourself one with all of\nlife.\n\nThe process of moving into this state of consciousness may first\nbring about feelings just opposite of love. It can activate within\nyou those areas of your life that seem to be \"out of order.\" It works\nwith your concepts of love and how you view your purpose in the\nscheme of life. It can create reactions as though you are out of step\nwith life, feeling alone, empty and isolated. These reactions may\nstem from disappointments in the affairs of your life.\n\nIt may stimulate you to create more order in your surroundings,\nyour career and relationships. This frequency was brought to earth\nat the time of the crucifixion. It was at that moment of spirit\nmoving out of the body of the Christ that it was felt and\nexperienced in all parts of the earth. The message received from\nthe Christ Spirit is a moving and healing experience. It came\nthrough with such love and power that each one who experienced\nthe message was filled with awe.\n\nThis energy ray brings to the surface all the hidden negatives\nwithin all the bodies. Be patient with yourself for these healings\nare very strong and wonderful but can seem to be difficult. This\nenergy is associated with the planet Venus. Libra and Taurus have\nthis energy as the natural ruler of their soul vibration.\n\nComments from Toni: When the Spirit of Christ came through it\nwas a most sacred moment. All day long, I had an expectation of\nsomething very special. I felt as though everything within me was\nin perfect order and balance. During the meditation, the group\nexperienced a haze of pink light all around the room. Everyone felt\nthe presence of something special. Tears streamed down their face\nas the impact of this message was received. May it be as wonderful\nfor you!\n\n                     THE CHRIST SPIRIT\n\nMessage #1\n\nI am that I am. I am the alpha and omega and the light of the\nworld. I am that which is the light of your life. I am the beginning\nand the end and no man cometh unto the father except by Me. I\nhave walked with you in silence and am ever present in your every\nthought and in your every deed. I have walked and spoken to you\nthrough the Buddha and I have spoken through Mohammed and I\nhave spoken through Jesus the Christ. I am the perfection of all\n\nthings. I am that which brings all things into its divine beginning. I\nam your teacher. I am the I AM and the all. Yet, you are everything\nthat I am. I am the Shepherd and you are My sheep and yet you are\nthe shepherd of yet other sheep. You are the students and I am the\nteacher and yet you're the teacher and I become the student. My\nlife is complete as you live your life and yet your life is incomplete\nwithout mine. You are the love divine that lives through Me. I am\nthe expression of every loving thought that you are. You are now in\nthe presence of love and perfection and this will be of much\nimpact.\n\nI come through all ages and through all men. You are known to Me\nas that one known to you as Jesus Christ. You are My disciples,\nyou are My apostles, you are My followers and we walked the\nearth to form a mission and you are once again bringing this\nmission into its fruition. Some of you sat at My feet, others came\nbefore.\n\nI was born, and some were there after I left. You all are My people\nand I am your elder brother. I was the first to be in the earth and\nshall be the last to leave. All of My work will not be complete until\neach of you have completed your work. I give you love, you give\nMe joy. I feed your thoughts you give back to Me your hearts.\n\nI am your life and you are My expression. Where there is pain I\nbring you healing, where there is hate, I send you love, where\nthere is aloneness I am ever present. I am your guide, your teacher\nyour brother and master and as you express your life, you do it in\nMy name, the Spirit of the Christ.\n\nMessage #2\n\nAndrew - disciple of Jesus the Christ - Challenges come from the\ndeepest level of your soul to bring you forward in your initiatory\nstages to become victorious over all forms of death. Death is a\n\nsymbol of separation, denial, ending and void. So, the challenge of\nyour soul is to allow your spirit and yourself as you know yourself\nto be, to become integrated and focused totally on the immortality\nof your mind.\n\nYou never die, you are a living being; you are never lost, you are\nin the search of becoming. You are never without resources. You\nare always of the ability to attach to a strengthening aspect of\nspirit, which are your knowledge and your oneness with all that is.\nYour challenge is to reinforce and to reaffirm your purpose as a\ngrowing being, so you may demonstrate creative urges to manifest\nyour own idea of yourself.\n\nAll the projects of each and all have distinct qualities to be\nmagnified, intensified and developed. You have all known the pain\nof being misunderstood and of not being seen, of being glossed\nover by situations without depth and wisdom. Your challenge is to\nmove beyond that micro-perspective of yourself into the macro-\nbeauty, which is accepting your potentiality as true giants in light\nconsciousness.\n\nYou are Atlantians returned to Earth; you are beings of spirit\nreturned in the journey of life. Teach the way with wholeness and\nlove. A Course in Light is the path presented for all who are\nwilling to experience the adventurous journey into self-wholeness.\nMasters, give light to those who are in search of truth. But, the\nlight they present is a perspective of the oneness of all minds. inner\nresources of your own being. Do not fail yourself by allowing your\ndoubts to overshadow your own consciousness. Be in strength, in\nwisdom and be with the divinity of love.\n\nThe presence of Christ exists both as a living entity and as a living\nsource, as an elder brother, as a teacher and a radiant spirit\noverseeing the evolution of the human race. You are connected to\nthat source. We perceive the disciplines of light guides you into\n\nthat recognition. There is much work to be done and much yet to\ngrow towards. In this energy, see your- selves radiant beings of\nlight.\n\nThrough this next cycle, you will each encounter the true depth of\nfeeling of the joy of love. You will experience the joy of life, plus\nyou will experience the pain of separation. You will choose what\nbecomes more magnified. You are the choice and you are to\nexperience choosing. Go with God in Peace.\n\n                      Personal Journal\nWrite your thoughts or feelings after this lesson:\n\n\n\n\n\n\n\n\n\n\n\n\nAffirmations\n\n        I affirm that I am allowing balance and order to be my\n        experience in all that I say, do, and think.\n\nWrite your affirmations:"}, {"id": "L1_9", "level": 1, "type": "lesson", "lesson_num": 9, "title": "LESSON 9", "subtitle": "AMETHYST -Warrior", "color": "amethyst", "content": "COLOR RAY: AMETHYST -Warrior\n               LOCATION: Lower Abdominal Area\n\n                    HARMONIC TONE: \"B\" Flat\n\n                          PLANET: Mars\n\nPurpose and Essence\n\nThis is the energy ray that brings to the surface deep-seated\nconflicts that lie within the subconscious self. The conflicts arrive\nlike a bolt of lightning at times. Out of the blue, you seem to feel\nanxiety and frustration. These energies within are being unseated\nfrom their position within you. The ray is a very healing light\nenergy and it is activated to heal the warring issues in your tissues.\n\nWithout conflict, there is stagnation and lethargy. Through\nconflict, we are able to seek resolution through discernment and\ncreating new realities. Revolution brings change and a new order.\n\nHow we deal with conflict can give us a measure of our growth\nand understanding. Within the cells and organs of the body lie the\nconflicts in your life, impressions and experiences that have\nregistered themselves within our physical and emotional selves as\nwell as within the mental and perceptual levels of consciousness.\n\nSpecific Level Function\n\nThe Amethyst Energy surfaces the inner and outer conflicts in\norder to bring the lessons into a clearer focus. It also is a very\nhealing energy because it attacks the negative cells and diseases\nwithin. It feels itchy, irritating and possibly like a rash to the skin\nor a burning sensation. This frequency is associated with military\nconsciousness and can be activated during disputes to resolve areas\nof conflict.\n\nIn meditation, perceive unresolved conditions of your thought\nresolved and surround this energy around the pictures in your mind\nthat relate to conflict. With this energy perceive yourself releasing\nthe negatives to the light.\n\nOn the physical level, this energy activates for healing situations\nstill in conflict, confusion and mental warring. It can clear the\nphysical level by fighting off infection and diseases at the cellular\nlevel.\n\nOn the emotional level, the energy helps to ward off feelings of\nbeing at war with situations that have been festering within.\n\nOn the mental level, the energy clears the thought processes and\nfights off obstacles or situations that question your concepts,\npurpose and ideals. It moves within the brain mind to lift away\ndoubts and confusion in order to bring you into clear things.\n\nThis energy is beneficial when you are having a bout with the flu\nor chronic sinus headaches. It can be beneficial to counteract\nagainst diseases of the cells and organs of the body.\n\nThrough visualization, you can clear many things that are warring\nwithin your body. The planet Mars is associated with this\n\nfrequency band of light. Aries and Scorpio have this as a ruling\nplanet of their soul path.\n\nMessage #1\n\nJove - Students of light, this is Jove speaking. We are very pleased\nagain to merge with your energy and to allow you to have the\nexperience of being synthesized to this frequency. It is a joy to\nperceive the clearing transpiring through your individual natures. It\nis also a difficulty for you as an individual to evaluate what is truly\ntranspiring. It is difficult for you to see the releases and intensities\nof change transpiring through the physical natures and mental and\nemotional levels of self. Be assured that step by step there is the\nelement of light magnified by you, creating opportunity to move\nout of resistance into states of higher expressions.\n\nWe desire to talk in this particular moment about the conditions\nthat are existent in the earth plane as a whole. Each of you is aware\nof the destructive forces that would override the positive\nexpression. It is a battle of wills, of power and of karmic\nentanglements that arise within the nations. The conflicts arising\nfrom the fears of economic disaster and political overriding have\nbrought great concerns to the consciousness of humanity. The\nsystems of the nations are very much in a state of tremendous\nconflict and fear of how to resolve the basics of supply and\ndemand. Yet, through this indebtedness there is protectiveness\nagainst an outburst of nuclear war. The economic changes shall\nbring about a new order of consciousness within the planet itself.\n\n                  As you move into your meditative state,\n               perceive this Amethyst Energy ray activated and\n               magnified in and through all the emotional, mental,\n               perceptual and physical selves. Direct this light out\ninto the ethers around you. Perceive yourself as a director of light,\na bearer of the torch, directing light out into the planet through the\n\nmental systems and the collective consciousness of the human\nrace. Perceive the\n\nlight directed out into the consciousness of those decision-makers\nand governing leaders. Perceive the energy clearing hostilities and\npain, fears and karmic bonds from past ages of time.\n\nPerceive yourself united with many initiates who are working to\nuplift the earth and humanity and help them through the process of\ntransitional evolving. Remember, dear students, that peace lies\nwith you first as you become open and receptive to a positive\nexpression of life.\n\nAccept that you are in line and in balance with your own being.\nYou emanate that which uplifts others when they enter into your\nenergy systems and they feel the light. This is a gift of self to self,\na process of moving through these intense meditations and light\nvibration sessions.\n\nNow, focus on the energy of light overshadowing the earth and\naffirm that there is peace, peace within your individual\nconsciousness and peace within the earth plane and that the Spirit\nof the Christ descends like a dove to enter into the minds and\nconsciousness of all in the Earth. Go in peace and may the light of\nthe Christ be in and through you.\n\nMessage #2\n\nJove - In this session we wish to speak concerning the ideas,\nmotivations of thoughts and images. Your conscious mind as you\nare aware of, is a very beautiful and powerful instrument of your\nphysical being. Within this conscious mind, you have many\ncontrolling factors that emanate the thought images from your past\nexperiences, your programming and all of your conceptions. It is\nthis conscious mind that is your greatest tool and yet at the same\n\ntime can be the source of your greatest conflict. The purposes of\nmoving with the light energies are to uplift the thought patterns\nand to transmute the thought patterns into alignment with a more\npurified consciousness.\n\nAs you perceive your fellow beings, you receive vibrations, which\nactivate certain thoughts and feelings along with instincts within\nyour own nature. All this is according to your past experience.\nOftentimes what you see and what you perceive is creating a\nthought-form, which can be a true aspect of person or reality.\nHowever, it can be a reflection of your own thoughts, which may\nbe totally unrelated to the one person or reality you are receiving\nideas. It is important to look beyond what appears at the outer\npersonality or manifestation and to see the spirit of the idea or\nperson. See the Christ as the source of all that is.\n\nIn recognizing the highest form of thought or purpose, you\nperceive the greatest amount of possibility with the experience. As\nyou magnify that aspect of the individual or manifestation, you are\ncreating energy to lift and clear negativities and illusions. We bring\nthese thoughts to you at this time, for as you magnify this\nparticular energy ray it brings up the mental thoughts and conflicts\nwithin you pertaining to your everyday experience.\n\nOnce again, be patient with self. Know that as feelings arise that\ncause mental warring or cause perceptions that would deviate you\nfrom the truth, it is but bringing to the surface what you are\nreleasing and letting go. All things move in their own evolutionary\nmanner and your soul is proceeding along its path into its greatest\nperfection. But all of these are step-by-step procedures taking you\nthrough many experiences, obstacles and challenges. The greater\nthe challenge the greater the lesson to be gained, the greater the\nstrength to be added and the greater the understanding will\nbecome. So, as you stand amidst a day of mental warring, be firm\nin knowing that you are a pure consciousness created out of\n\nuniversal intelligence as God. You are moving towards your own\nparticular potential.\n\nThe Amethyst ray may lead you into many opportunities. Know\nthat each one is a blessing, not a curse. It is a tremendous service to\ngive of your mind and heart to the light for clearing, cleansing,\nlifting and transmuting all aspects of your being. This is a great\nmission, a quest, a dream that will manifest in the earth bringing\nhumanity the awareness of peace and unity. This is given to you\nthrough Master Jove. And now, let peace move in and through\nyour heart.\n\nMessage #3\n\nAndrew - It is good to speak. As you are responding to the power\nof the light bringing into action clarity within the cellular systems\nof your bodies, it is truly a remarkable experience to see yourselves\nmove from one phase of intense resistance into a phase of\nopenness and acceptance. Bridging the gap between the unknown\nto the expectant is a most interesting journey, for you walk through\nthe activities of your own creation and see yourself in a different\nlight.\n\nYou are becoming more aware of your responsibility for the\nactions you initiate. You are growing like beautiful flowers,\nopening to the effect of seeing your inner consciousness radiating\nfrom a most powerful activity. And so it is.\n\nAs warriors in the light, you are in direct acceptance of a\ncommission in which you must implement a purpose, a destiny\nfrom which you will create links of communication to others who\nare growing into higher evolved states of human expression. It is\nbeautiful for the time in the now. It is coming when more and more\nthe awareness of individuals is awakening to subtle change in the\nperspective. Increasingly there are those needs to reach out and\n\ntouch those in lesser focus and bring them into a more awakened\nacknowledgment of their spirit and soul. You will see many walk\ndifferent pathways and you will see some who change directions of\ntheir total perspective, walking further into a cosmic reality of\noneness with the universe.\n\nOthers you will also see retreat from the processor evolution and\nbecome more imbued with the negativity and de-escalation of the\nhuman experience. As you observe this division in consciousness,\nalways recognize the duality has been set into motion according to\nthe law of free will. You cannot interfere in the individual's need to\nexplore the choices of their given thought. You can teach the way\nto the path of a more spiritual integration of soul, mind and body as\nyou experience the Course in Light. As this ray of Amethyst light\nis in effect, think in these terms:\n\n       I see myself responding to active impulses that deep\n       inside, impulses of knowing my truth is coming into\n       revelation.\n\nThe gifts I came to share with the earth will come into focus and\nthrough a collective and group experience, we join in the hands of\nour own selves and join in the hands of others to bring this\nmessage outward into greater expression.\n\nThink in terms of the world, as we perceive it now responding to a\nhigher calm. Think of the patterns of the old, shifting out of the\nexpression and opening to new alternatives. And so, you are each\nbeing pulled into new directions of your individual lives, journeys\nyet to be seen, and adventures yet to be expressed.\n\nFrom all of this come an inward acceptance, a commitment and a\nconfirmation of reaching for higher activity. For now, think in\nterms of the following:\n\n       I release all the resistance of the past.\n\n       I see the past as the school from which I have gained\n       much understanding.\n\n       I close the door on the conflicts that festered in my\n       unconscious.\n\n       I open the door to a new experience, to a body more\n       fulfilled with balance, love, truth and peace.\n\nWe see now that the physical form is enveloped with light and the\nbody that you live in is radiating the energies of your inner soul.\nRadiating is responding to the vibrancy of light within your inner\nconsciousness. A radiant being is a clear consciousness from which\nthe aura is expressed without negativity. Trust your teachers as\nthey stand beside you. (Inner guides).\n\nTrust your instinct as you receive the touch and confirmation.\n\n                      Personal Journal\nWrite out your conflicts and what you wish to resolve in your\nown life.\n\n\n\n\n\n\n\nAffirmations\n\n        I affirm that I am being freed from all warring factors\n        within myself.\n\n        I affirm that I am at peace with all aspects of my life.\n\n        I perceive peace within my being and within the earth\n        planet.\n\n        I release all resistance to my being in state of peace.\n\nWrite out your own affirmation"}, {"id": "L1_10", "level": 1, "type": "lesson", "lesson_num": 10, "title": "LESSON 10", "subtitle": "MINT GREEN", "color": "mint", "content": "COLOR RAY: MINT GREEN\n                       The Light of Renewal\n\n                     HARMONIC TONE: \"A\"\n\n                          PLANET: Earth\n\nPurpose and Essence\nThis frequency ray is associated with our own planet earth, living\nvegetation and plant life. It is the energy of rejuvenation, rebirth\nand the building of a new consciousness within all aspects of your\nbeing.\nIts essence feels cool to the skin and has a refreshing aura. Its\naroma is menthol and affects your sense with newness, like a\nbeautiful spring morning. It is associated with the nature spirits and\nthe divas that are in charge of the plant and vegetable kingdom.\nWe can actually receive energy from the plant kingdom and they in\nturn are affected by our energy.\nThis energy has a direct bearing on the reproductive center and can\nbe effective in building new consciousness within the cellular\nsystem. This energy was earthen by the master Jesus and relates to\nhis resurrection, representing the rebirth into new consciousness\novercoming the path of old concepts.\nThis Radiant Mint Ray is a combination of light Green and Gold\nand associated with spring. This represents the unfolding of all that\n\nhas been lying dormant. So this energy acts upon the physical to\nbuild and rejuvenate the cellular and organic system helping to\nintegrate the new concepts that are unfolding within your\nawareness. This light ray is the frequency that uplifts your spirit\nand gives off an aura of joy and youthful enthusiasm.\n\nSpecific Level Function\nTo recreate consciousness within you, this frequency when\nactivated is used to break up old stagnant patterns and prepare you\nfor new opportunities with new beginnings. It is an active energy\nused to build new cellular consciousness in all aspects of the\nphysical body. It relates to the physical body by renewing,\nrejuvenating hope, joy, and love.\nThe energy is experienced when you are walking in the woods,\nconnecting with nature and finding your source of refreshment\nfrom the plant kingdom. In healing, this energy is effective for\ndiseases associated with emotional and mental stagnation and fixed\nideas that are immovable. This energy is used to open the mind,\nheart and consciousness for new starts and new beginnings.\nThe negative activation from this energy can be listlessness,\nextreme tiredness, thoughts and fear of death. You may have\nfeelings of being on the edge, not knowing what the future may\nbring. These emotions and thoughts stem from the fear of change\nand the fear of the unknown. To pass through these fears and stand\non the other side of fear is to find the openness and renewal of life\nfrom a beautiful perspective. This is the last energy center that is\nopened during this level of this path. However, you are just\nbeginning your journey and the next level brings you once again\nthrough each chakra center and through the growth adventures of\nyour own self.\n\nMessage #1\nAzreal - This is Azreal and I speak
