<head>
<meta charset="UTF-8">

<title>光的课程 第一系列 · A Course in Light Series 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#07080F;--bg-main:#0D0F1A;--bg-card:#131525;--bg-hover:#1A1D30;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.15);
  --txt:#E2E4F0;--txt2:#8892AA;--txt3:#4A5268;
  --accent:#7B9EFF;--sw:280px;
  --serif:'Noto Serif SC','STKaiti',serif;
  --sans:'Noto Sans SC','PingFang SC',sans-serif;
  --disp:'ZCOOL XiaoWei','STKaiti',serif;
  --ray:#94A3B8;--glow:rgba(148,163,184,0.3);--rbg:rgba(148,163,184,0.05);
  --fs:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg-deep);color:var(--txt);font-family:var(--sans);font-size:var(--fs);line-height:1.8;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}

/* SIDEBAR */
#sb{position:fixed;top:0;left:0;width:var(--sw);height:100vh;background:var(--bg-main);
  border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;
  transition:transform .3s ease;overflow:hidden}
#sb-logo{padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
#sb-logo h1{font-family:var(--disp);font-size:17px;font-weight:400;color:#C8D8FF;letter-spacing:.05em;line-height:1.3}
#sb-logo p{font-size:10px;color:var(--txt3);margin-top:3px;letter-spacing:.12em}
#sb-nav{flex:1;overflow-y:auto;padding:6px 0;scrollbar-width:thin;scrollbar-color:var(--bg-hover) transparent}
#sb-nav::-webkit-scrollbar{width:3px}
#sb-nav::-webkit-scrollbar-thumb{background:var(--bg-hover);border-radius:2px}

.lvg{margin-bottom:2px}
.lvh{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:11px;
  font-weight:500;letter-spacing:.1em;color:var(--txt3);cursor:pointer;user-select:none;
  transition:color .2s}
.lvh:hover{color:var(--txt2)}
.lvh .lb{width:19px;height:19px;background:var(--bg-card);border-radius:4px;display:flex;
  align-items:center;justify-content:center;font-size:10px;color:var(--accent);flex-shrink:0}
.lvh .cv{margin-left:auto;transition:transform .2s;font-size:9px}
.lvh.col .cv{transform:rotate(-90deg)}
.lvl{padding:0 8px 6px}
.lvl.hid{display:none}

.ni{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:6px;cursor:pointer;
  transition:background .15s;border-left:2px solid transparent;font-size:12.5px;
  color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni:hover{background:var(--bg-card);color:var(--txt)}
.ni.act{background:var(--rbg);border-left-color:var(--ray);color:var(--txt)}
.ni .nd{width:7px;height:7px;border-radius:50%;background:var(--ray);flex-shrink:0;
  box-shadow:0 0 5px var(--glow)}
.ni .nl{flex:1;overflow:hidden;text-overflow:ellipsis}
.ni .nc{font-size:9px;color:#4ADE80;opacity:0;flex-shrink:0}
.ni.tr .nc{opacity:1}

#sb-ft{padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0}
.pbw{background:var(--bg-card);border-radius:3px;height:3px;overflow:hidden;margin-bottom:5px}
.pbf{height:100%;background:linear-gradient(90deg,#4A7CFF,#9B5FFF);border-radius:3px;transition:width .3s ease;width:0%}
.pl{font-size:10px;color:var(--txt3);display:flex;justify-content:space-between}

/* MAIN */
#main{margin-left:var(--sw);min-height:100vh;position:relative}
#tb{position:fixed;top:0;left:var(--sw);right:0;height:50px;background:rgba(13,15,26,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:10px;z-index:90}
#tb .bc{font-size:12px;color:var(--txt3);flex:1}
#tb .bc span{color:var(--txt2)}
.tb{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);
  color:var(--txt2);font-size:11.5px;cursor:pointer;transition:all .15s;font-family:var(--sans);
  display:flex;align-items:center;gap:5px}
.tb:hover{border-color:var(--border-hi);color:var(--txt)}
.tb.pri{background:var(--accent);border-color:transparent;color:#0D0F1A;font-weight:500}
.tb.pri:hover{background:#8AABFF}

#ca{padding:70px 32px 80px;max-width:820px;margin:0 auto}

/* LESSON */
.lh{padding:44px 0 28px;border-bottom:1px solid var(--border);margin-bottom:32px}
.lbadge{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ray);margin-bottom:12px;
  background:var(--rbg);padding:3px 9px;border-radius:20px;border:1px solid var(--glow)}
.lorb{width:10px;height:10px;border-radius:50%;background:var(--ray);
  box-shadow:0 0 10px var(--glow),0 0 20px var(--glow);
  animation:porb 3s ease-in-out infinite;display:inline-block}
@keyframes porb{0%,100%{transform:scale(1);box-shadow:0 0 10px var(--glow),0 0 20px var(--glow)}
  50%{transform:scale(1.2);box-shadow:0 0 16px var(--glow),0 0 32px var(--glow)}}
.lt{font-family:var(--disp);font-size:30px;font-weight:400;color:var(--txt);line-height:1.3;margin-bottom:7px}
.ls{font-size:13px;color:var(--txt2);letter-spacing:.04em}
.lm{display:flex;gap:18px;margin-top:18px;flex-wrap:wrap}
.mi{font-size:11.5px;color:var(--txt3)}
.mi strong{color:var(--ray)}

/* CONTENT BODY */
.cb{font-family:var(--serif);font-size:var(--fs);line-height:2;color:var(--txt)}
.cb.zh{font-size:calc(var(--fs) + 1px)}
.cb p{margin-bottom:1.15em}
.cb h3{font-family:var(--disp);font-size:15px;font-weight:400;color:var(--ray);
  letter-spacing:.08em;margin:1.8em 0 .7em;padding-bottom:5px;border-bottom:1px solid var(--border)}
.cb blockquote{margin:1.4em 0;padding:12px 18px;border-left:3px solid var(--ray);
  background:var(--rbg);border-radius:0 7px 7px 0;font-style:italic;color:var(--txt2);font-size:.94em}
.cb .af{padding:9px 15px;border-left:2px solid var(--ray);color:var(--ray);font-style:italic;
  background:var(--rbg);border-radius:0 5px 5px 0;margin:.9em 0}
.cb .qp{color:var(--txt2);font-style:italic}
.cb .jl{height:1px;background:var(--border);margin:6px 0;border-radius:1px}
.cb .sh{font-family:var(--disp);font-size:14px;font-weight:400;color:var(--txt2);
  letter-spacing:.1em;margin:1.8em 0 .6em;text-transform:uppercase}

/* TRANSLATE PANEL */
.tp{background:var(--bg-card);border:1px solid var(--border);border-radius:9px;
  padding:18px;margin-bottom:24px;display:flex;align-items:center;gap:14px}
.tp .ti{font-size:22px;flex-shrink:0}
.tp .tm{flex:1}
.tp .tm strong{display:block;color:var(--txt);margin-bottom:3px;font-size:13.5px}
.tp .tm span{font-size:11.5px;color:var(--txt3)}

/* BUTTONS */
.btn{padding:8px 15px;border-radius:7px;border:none;font-family:var(--sans);
  font-size:12.5px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,#4A7CFF,#7B4FFF);color:#fff;font-weight:500}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-s{background:var(--bg-hover);color:var(--txt2);border:1px solid var(--border)}
.btn-s:hover{color:var(--txt)}

/* NAV ARROWS */
.lnav{display:flex;justify-content:space-between;align-items:center;
  padding:24px 0;border-top:1px solid var(--border);margin-top:44px}
.lnb{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;
  border:1px solid var(--border);background:var(--bg-card);color:var(--txt2);
  cursor:pointer;transition:all .2s;font-size:12.5px;font-family:var(--sans)}
.lnb:hover{border-color:var(--border-hi);color:var(--txt);background:var(--bg-hover)}
.lnb.dis{opacity:.3;cursor:default}
.lnb.dis:hover{border-color:var(--border);color:var(--txt2);background:var(--bg-card)}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);
  z-index:200;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s}
.ov.vis{opacity:1;pointer-events:all}
.mo{background:var(--bg-main);border:1px solid var(--border-hi);border-radius:14px;
  padding:32px;max-width:500px;width:92%;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.ml{text-align:center;margin-bottom:24px}
.ml h2{font-family:var(--disp);font-size:24px;font-weight:400;color:var(--txt);margin-bottom:5px}
.ml p{font-size:12.5px;color:var(--txt3)}
.ms{margin-bottom:18px}
.ms label{display:block;font-size:11px;color:var(--txt2);letter-spacing:.06em;margin-bottom:7px;text-transform:uppercase}
.ms input{width:100%;padding:9px 13px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:7px;color:var(--txt);font-size:13px;font-family:monospace;transition:border-color .2s}
.ms input:focus{outline:none;border-color:var(--accent)}
.mh{font-size:11px;color:var(--txt3);margin-top:5px;line-height:1.55}
.ma{display:flex;gap:10px;margin-top:22px}
.ma .btn{flex:1;padding:11px;font-size:13px;text-align:center}

/* PROGRESS MODAL */
.tp2{text-align:center;padding:16px 0}
.tp2 .sp{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.tp2 h3{font-family:var(--disp);font-size:19px;font-weight:400;color:var(--txt);margin-bottom:7px}
.tp2 .ci{font-size:12.5px;color:var(--txt3);margin-bottom:14px}
.tp2 .pb{height:5px;background:var(--bg-card);border-radius:3px;overflow:hidden;margin-bottom:7px}
.tp2 .pf{height:100%;background:linear-gradient(90deg,#4A7CFF,#9B5FFF);border-radius:3px;transition:width .4s ease}
.tp2 .pt{font-size:11.5px;color:var(--txt3)}

/* NOTES */
#np{position:fixed;right:0;top:0;bottom:0;width:290px;background:var(--bg-main);
  border-left:1px solid var(--border);transform:translateX(100%);transition:transform .3s;
  z-index:150;display:flex;flex-direction:column;padding:58px 0 0}
#np.op{transform:translateX(0)}
.nh{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;
  color:var(--txt);display:flex;justify-content:space-between;align-items:center}
#nta{flex:1;padding:14px 18px;background:transparent;border:none;color:var(--txt);
  font-family:var(--serif);font-size:13.5px;line-height:1.85;resize:none}
#nta:focus{outline:none}
.ns{font-size:10px;color:var(--txt3);padding:6px 18px}

/* FONT SIZES */
.fs0{--fs:14px}.fs1{--fs:16px}.fs2{--fs:18px}.fs3{--fs:20px}

/* EN VIEW */
.env{white-space:pre-wrap;font-family:Georgia,serif;font-size:14.5px;line-height:1.85;
  color:var(--txt2);padding:18px;background:var(--bg-card);border-radius:7px;border:1px solid var(--border)}

/* MOBILE */
#mt{display:none;position:fixed;top:10px;left:10px;z-index:110;width:36px;height:36px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:7px;cursor:pointer;
  align-items:center;justify-content:center;font-size:15px;color:var(--txt2)}
@media(max-width:768px){
  #sb{transform:translateX(-100%)}
  #sb.op{transform:translateX(0)}
  #main{margin-left:0}
  #tb{left:0}
  #mt{display:flex}
  #ca{padding:68px 14px 80px}
  .lt{font-size:24px}
  #np{width:100%}
  .welcome-grid{grid-template-columns:1fr}
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg-main)}
::-webkit-scrollbar-thumb{background:var(--bg-hover);border-radius:2px}
</style>
</head>

<script>
const BD=[{"id": "L1_intro", "level": 1, "type": "intro", "lesson_num": null, "title": "INTRODUCTION", "subtitle": "", "color": "intro", "content": "A Course in Light is the study of the 12 chakra centers of your own\nsoul body of light. Through the meditations and lessons, light\nmagnifies and is directed throughout the physical for\ntransformation and change.\n\nA Course in Light is a systematic procedure working with light as\ncolor using meditation techniques that activate energy within your\nown consciousness. You will experience in meditation the\nvibrations; feel the energy and its effect on your subtle bodies. It is\nan experimental journey through the past, present and future of\nyour life. It is the study of light energy rays and their activation to\nclear your mental, emotional and perceptual awareness. This\ncourse as channeled by masters is designed for transformation\nthrough spiritual awakening and responsibility.\n\nThe light referred to is not a symbolic term but the actual light\nenergy which makes up the soul body of light. In simplistic terms,\n                                                                      2\nyou are light. Einstein refers to this when explaining E=mc\nenergy and light whose vibration is slowed down enough to take\nform. More mystically than this, intelligence around us is creating\nan aura, a magnetic field.\n\nAscended masters transmitted this course. The ascended masters\nare light beings who are not in a physical body. They are spiritual\nbeings as Minds that transmit teachings of cosmic law helping to\ndirect souls into and through a more expanded awareness. These\nloving beings have guided many throughout the history of\nhumanity.\n\nThe ascended masters presenting this particular work are under the\nOrder of Melchizedek. This is an ancient order of enlightened\nteachers guiding avatars and spiritual leaders in their search of a\n\npath to wholeness. They are a part of many hierarchical beings,\nsuch as the Elohim, Archangels, the Seraphim and Cherubim.\n\nThe group of masters who brought this course into being is Azreal,\nMarcus, Ananias, Jove, Browning, Andrew, unknown masters and\nJesus as the Christ Spirit. They teach the principles of truth based\non the simple Law of Love as lived by Jesus.\n\nThe essence of light has no consciousness of its own. However,\nyour thoughts and motivations affect the direction of light.\nSurrounding your consciousness physically, mentally, and\nemotionally is a magnetic field of light which signals and receives\nthe vibrations composed of light energy. Through an increased\nawareness of your own self-motivation and consciousness, you\nwill find you become a more open and loving person.\n\nA Course of Light consist s of a series of lessons along with\nmeditation CD’s or mp3 disk. Each lesson will activate a new\ncenter of light and bring you through certain processes. As a home\nstudy student, you will work through each lesson at your own\nindividual pace. Many students, however, will be in study groups\nand find that the lessons move at a regular weekly pace. Series 1\nof this Course contains the lessons of the first 4 levels of the light\nwork. The first level focuses on the physical body and your\nmaterial surroundings. Level 2 will activate the light lessons\naffecting the emotional and perceptual nature. Level 3 is the\nmental work where you find wonderful changes in your thoughts\nand beliefs. The final stage of Series 1 is the Astral/etheric level\nand must be experienced to have a clear understanding of this part\nof the course.\n\nThrough meditation and readings from the transmitted messages,\nyou will begin to notice subtle changes in your body. These\nchanges may affect the emotional, perceptual and mental levels.\nWhile the work of the first level is directed mainly to the physical\n\naspects, you will be experiencing subtle changes to all levels of\nyour being.\n\nMeditation CD’s or mp3 disk will guide you through the process.\nThese meditations can initiate healing in many areas of your life.\nThere might be words that are not familiar but as you move\nthrough the course, an understanding will develop and it will\nbecome easier to follow. In preparing for your meditation, it will\nhelp you to find quiet time and a place in which you feel\ncomfortable and safe.\n\nThe following information acquaints you with the different egos\nand bodies that are aspects of yourself. Your personality ego, body\nego, organic and cellular egos are individual and collective\nintelligences that have been impressed with your mental and\nemotional experiences. These egos are acknowledged during\nmeditation to help bring unity within. In acknowledging the egos\nand different bodies, a merging occurs. Almost everyone can feel\nscattered and disoriented at times due to so many choices in life.\nThe goal is to feel all together and connected, rather than separated\nand fragmented.\n\n                    THE EGOS AND BODIES\n\nThe incarnating ego is a part of your soul system. It is the\nconsciousness of I AM within your soul's being or body which is\nthe vehicle of light. The incarnating ego is a term associated with\nyour soul’s consciousness. As you experience the processes in\nmeditation, you will find this a reality for you.\n\nThe personality ego is that which you know as your own\nconscious self. It is comprised of your child, adult and parents\nself. This part is the chosen one your soul accepted for its\ndevelopment and growth. The personality can be hurt and\nwounded through all the many challenges of life and in need of\n\nhealing. Through the light work, the process of healing the\nwounded self is reached through understanding and forgiving\nmuch of the pain that this self has experienced.\n\nThe personality ego has received instructions, knowledge and\nexperience according to its needed experiences. Discernment,\ndecisiveness and total expression in life is a reflection of all of the\nexperiences it has observed and absorbed through instinct, thought\nand reason. It has learned through feelings and life’s experiences\nwhat it accepts as truth. It is a composite of inherited beliefs as\nwell as its own conscious acceptance of truth.\n\nThe body ego functions as an overseer of the organic and\nbiological levels within the human instrument. The purpose of the\nbody ego is to create assimilation within the body, bringing it into\ncooperation with the physical material world. The body ego is\nencouraged to cooperate with the personality ego in order to\nfunction internally and externally with vitality and healthy\nconsciousness. The body ego may hold within hurt and pain from\npast conditions. In addition, there can be body reactions to\npollution in the environment resulting in allergic reactions to\nchemicals, unclean air and water. Through the meditations, often\nthese symptoms disappear.\n\n           THE ORGANIC AND CELLULAR EGOS\n\nThe organic system and the consciousness of the cellular system\nare also subject to fears and emotional situations that cause\nanxiety. Through the light meditations there is a conscious\ndirection of light to these areas of the body for release of impressed\nnegativity stemming from concerns and abuses in life. You will\nbecome acquainted with these aspects as you move into a\nmeditative state. The bodies are recognized as follows:\n\n                     THE PHYSICAL BODY\n\nThe physical Body is your biological instrument. The physical\nbody consists of the following subtle bodies.\n\n                    THE EMOTIONAL BODY\n\nThe emotional body consists of energy made up of your feelings.\nThe emotional body can affect your health, wealth and happiness if\nyour emotions harbor unresolved issues. When the emotional self\nis not nurtured and loved, weakness and disease can develop in the\nbody. As you practice the meditations, you will find a\nstrengthening of your emotional self and releases from past pain\nand fear.\n\n                     THE MENTAL BODY\n\nThe mental body is a primary governor of your whole state of\nbeing. Thoughts and concepts have a direct effect on your physical\nand emotional self. The mental consciousness, when released of\nunconditional fears and negative thoughts, can bring well being to\nthe whole self. It is the purpose of the lightwork to bring one into\na healthy state of consciousness, open, enlightened, yet strong in\nreason and clarity of thought.\n\n                    THE PERCEPTUAL BODY\n\nThe perceptual body is an energy system relative to your\nintuition. This subtle body is associated with the sixth sense and\nwith the nervous system and perceived as instinctive. Through the\npractice of the light work, you discover yourself becoming\nintuitive and perceptually expanded.\n\n               THE ASTRAL/ETHERIC BODY\n\nThe astral/etheric body is of a substance we cannot see. Often\nimprints leave their mark on this subtle body, which can cause\ndisease. How often have you heard of someone who has lost a\nlimb that still has sensations and feelings in the missing limb?\nThis could be vibration stemming from this astral/etheric body.\nWhen this body clears from these impressions, there is a renewed\nfreedom from these aches and pains.\n\n                       THE SOUL BODY\n\nThe soul body is your body of light. It is this light body that is\nactivated directing the light and energy. The light energy and the\ncenters of light magnetize for healing and release. It is from this\nsource that you feel a difference occurring in you and in your\nconsciousness. When vibrations of all the bodies are in harmony,\nyou experience a wonderful new wellness and strength. This is the\npurpose of A Course in Light, to bring you lightness, love and\nlightwork to bring one into a healthy state of consciousness, open,\nenlightened, yet strong in reason and clarity of thought and joy.\n\nA Course in Light assists you in becoming free from pain,\nmentally, emotionally and perceptually.\n\nThrough your own self-study process or with the assistance of\nteachers you are taking a journey into new consciousness. The\nCDs assist you or mp3s with the light energy meditation and\nmessages from the masters.\n\nTo acquaint yourself with the physical attributes of your body a\nbreakdown of your physical self follows:\n\n                    Roger Hsieh & Niki Gu\n\n                    Artists Roger Hsieh & Niki Gu\n\n                           THE BRAIN\n\nThe Brain is the Computer of your body. The brain is the largest\nand most complex mass of nervous tissue in the body. It consists\nof the following: Cerebrum, disencephalon, mesence, phalon, met\nencephalon,     myelencephalon, meninges, ventricles and\ncerebrospinal fluid.\n\nThe brain stores all information it receives through the nervous\ntissue. It contains all the impressions and images you have\nobserved in this life. From the moment of your birth, you have\nbeen receiving information through your five senses. The images\nare contained within the cellular consciousness of your brain.\n\nThe right brain hemisphere stores the intuitive and creative\nprocesses. It is the more subjective, magnetic and receptive aspect\nof your brain\n\nThe left hemisphere stores the information for active and dynamic\nprocesses. It is the more masculine or dynamic facet of your brain.\n\nTo clear the imagery that has caused negative patterns in your life,\nmeditate and activate the light energies that are associated with the\nmental body.\n\nThe White Light, Gold, Blue and Emerald Green energies are\nthe predominant energies of the mental self. Visualize one of\nthe mental rays activated within the brain to clear negative\nthoughts.\nStart with the White Light\n\n                    THE SKELETAL SYSTEM\n\nThe skeletal system forms the basic framework of the body to\nwhich tissues and organs are attached. The skeletal system\nprovides support and protection for vital organs and is responsible\nfor the production of blood cells. It is important for its ability to\nstore minerals at birth. The Skeletal System is the Foundation of\nthe body.\n\nVisualize the Radiant Ruby Red energy ray to heal your skeleton\nsystem.\n\n                    THE MUSCULAR SYSTEM\n\nThe human body contains more than 650 individual muscles\nanchored to the skeleton, which provides pulling power so that you\ncan move around. These muscles constitute about 40% of your\ntotal body weight.\n\nGenerally, the muscles are attached by tough fibrous structures\ncalled tendons. These attachments bridge one or more joints and\nthe result of muscle contractions are movement of these joints. The\nRadiant Ruby Red energy activates to heal and soothe the\nmuscular system. Aches and pains accumulate in the muscular\nsystem and can be a result of negative emotional or mental stress\nas well as physical exertion.\n\nYou may notice that, as you are meditating with the radiant Ruby\nRed energy unusual aching or soreness exits. This may be a result\nof clearing taking place within this system.\n\n                THE RESPIRATORY SYSTEM\n\nThe respiratory system is responsible for supplying oxygen to the\nblood and expelling waste gases of which carbon dioxide is the\nprimary constituent from the body. The upper structures of the\nrespiratory system are combined with the sensory organs of smell\nand taste (in the nasal cavity and the mouth) and the digestive\nsystem (from the oral cavity to the pharynx). At the pharynx, the\nspecialized respiratory organs diverge into the airway. The larynx,\nor voice box, is located at the head of the trachea, or windpipe.\n\n The Violet Purple energy is the main frequency associated with\nthis aspect of your body. This is also associated with the Will\ncenter. You may notice how you become short of breath when you\nfeel that you cannot say, think or do what you feel is right. You\nmay notice now you have symptoms of tightness in your chest\nwhen you get angry and feel loss of power.\n\n              THE INTEGUMENTARY SYSTEM\n\nThe integumentary system is the name given for the skin, hair,\nnails and glands of the body. It also includes the eyes, the ears, the\nnose and the mouth; all of which are parts of the body’s sensory\nsystem. The world is perceived by means of coded messages\n(electrical impulses) sent to the brain by sensory organs. Our\nperception is predominately developed by means of the pattern of\nsound pressure entering the ears and the eyes. The senses of touch,\ntaste and smell, however, are also important to our perception of\nthe world around us.\n\nAs you meditate with the procedures of A Course in Light, the\nactivation of gathering all the egos is so important. The Organic\nego is the overseer of the Organs of your body. The Body ego is\nthe “general in charge” of all the body consciousness. Therefore,\nto assist the Sensory Organs you would use the Orange energy to\n\nprocess and eliminate any negative perceptions that affect the\nwellness of this part of your body.\n\nIf you have specific needs, such as skin irritations or challenges\nwith your eyes or ears, you would activate the healing energies\nsuch as Ruby Red for release of emotions attached to these areas\nof the body. Visualize that you are directing the energies into\nspecific needs within your own body consciousness.\n\nAs a sensitive, you may at times notice your eyes are blurring or\nyour nose will run or buzzing in the ears may occur during\nintensive energy work. Perhaps you are attending a workshop and\nnotice certain unusual reactions. This can stem from your sensory\nnature absorbing certain negative energies and processing these\nfrequencies. As you clear your magnetic field and aura, moving\nthrough meditative process will clear these negative energies.\nMeditate with the affirmation that you are turning your self-will\nover to your higher self, or the God of your being. Ask that the\nwill of the Divine Consciousness be in you. Release the rage of\npast thinking and feeling. Trust is the law of love to heal you.\n\n                THE CIRCULATORY SYSTEM\n\nIn order for the body to stay alive, each of its cells must receive a\ncontinuous supply of food and oxygen. At the same time carbon\ndioxide and other materials produced by the cells must be picked\nup for removal from the body. This process is continually\nmaintained by the body’s circulatory system. The primary\ncirculatory system consists of the heart and blood vessels, which\ntogether maintain a continuous flow of blood through the body\ndelivering oxygen and nutrients to and removing carbon dioxide\nand waste products from peripheral tissues. The heart pump’s\noxygen-rich blood from the lungs to all parts of the body through a\nnetwork of arteries, and smaller branches called arterioles.\n\nThis system is associated with both the Violet Purple energy Will\nCenter ruling the lungs and the Radiant Ruby Red energy of the\nHeart Chakra Center. Since this system is directly connected to the\ncellular consciousness as well as the other levels of your physical\nbody, using the Violet Purple energy to release anger and rage\nassociated with feeling stuck, stifled and manipulated will release\nthe negative energies of the will center. Use the Radiant Ruby\nRed energy for feelings of being unloved, hurt from past\nrelationships and broken systems of family or lovers.\n\n         Prepare a special place for your meditation sessions.\n\n   You may desire to lite some candles and play soothing\n   meditation music. Read the lesson of the week and grasp the\n   energy of the masters. Then play the cd and experience the\n   process guided by the procedure and message. Do not be\n   alarmed if you find yourself becoming very sleepy and miss the\n   information. This is quite normal for many students. You will\n   however be receiving the light and the information is accepted\n   by your own consciousness. If you have unforgiving thoughts,\n   feelings or perceptions within your body and cellular\n   consciousness you can meditate in these light rays to renew,\n   reconstruct and heal. Use affirmations to instill new thoughts,\n   hopes and love.\n\nActivate the Ruby Red energy."}, {"id": "L1_med", "level": 1, "type": "meditation", "lesson_num": null, "title": "MEDITATION PROCEDURE", "subtitle": "", "color": "intro", "content": "Relax the physical body focus on breathing deeply.\n\nRelease all thoughts.\n\nGather all of your awareness into the center of the forebrain.\n\nCall forth all of your egos: incarnating ego, personality ego,\nphysical body ego and organic and cellular egos. Perceive your\negos uniting as one consciousness.\n\nIt is important to think or say the “calling forth of the egos to the\nforebrain” as this connects your egos with the pituitary and pineal\nglands associated with the brain governing your sensitive and\npsychic nature.\n\nAffirm:\n\nI am of one mind, one thought and one consciousness\n\nI ask that the mind be in me that was also in Christ Jesus\n\nDirect the awareness of these egos to rise up through the lower\nbodies, such as the physical, perceptual, emotional, mental,\nastral/etheric upward into the center of the soul body, activate the\nWhite Light. Your egos flow up through the center of your body\nas a wave of consciousness. It seems like you are moving up\nthrough an elevator.\n\nThe soul center is located 6 inches above your head. This is the\ncenter of the radiant White Light. As you activate the White Light\nfrom the soul center, you merge with your guides and masters. As\nyou bring your awareness into this center, consciously activate the\nfrequency of the White Light, visualizing a brilliant White Light as\n\na sun, expanding and radiating billions of tiny light beams in and\nround you.\n\nDirect the White Light through all of your lower bodies,\nconcentrating the energies heavily in the physical body.\nConsciously direct the light throughout all your organic and\ncellular parts of your physical body.\n\nDirect the light to move in a counter-clockwise motion (as if you\nare standing on a clock and the hands are moving backwards).\nFeel the White Light clearing, cleansing and dissipating all debris,\nnegative energies within the organs, tissues and cells.\n\n              .      Move from the silence\n\n              With the intense work of the light in and through the\n              lower bodies, you are now prepared to experience\n              the energy as it clears your consciousness.\n\nAs you listen to the recorded sessions, you will experience the\nactivation of the energy as the process magnifies.\n\nYou may discover that you cannot stay awake during the playing\nof the cd. This is quite normal, as you are moving with your\nconsciousness into a different level. In the beginning of each\nsession, it may seem difficult to hear the message. However, by the\nend of the week it will become easier to hear the entire cd. As you\nfeel a completion with your meditation, direct the light to those\nyou love.\n\nGround the energy through your bodies. Hold still for a few\nminutes until you feel all of your senses awake and take time to\ncome back so you will not feel lightheaded or off balance."}, {"id": "L1_1", "level": 1, "type": "lesson", "lesson_num": 1, "title": "LESSON 1", "subtitle": "WHITE", "color": "white", "content": "COLOR RAY: WHITE\n        LOCATION: 6 \" Above the Head in the Soul Body\n\n                HARMONIC TONE: Middle \"C\"\n\nPurpose and Essence\n\nThe radiant White Light is the energy of purification and\ncleansing. It releases negative consciousness from thoughts and\nold conditions within the cells and organs in your body. It is a\nsynthesis of all color rays. It is called the Christ light. This\nfrequency is associated with the spirit of Christ Consciousness.\nThe White Light is the purifier of mind, body and spirit.\n\nThe White Light affects your physical body by speeding up the\nprocess of elimination. It prepares the body for the higher\nfrequencies activated in the following lessons. This light ray is\nmost familiar. Using it daily as protection assists you by clearing\nnegative thoughts, feelings or physical experiences from your day.\nMany students surround their homes, family members and loved\nones in the radiant White Light. The light is as a familiar friend\nhelping clear up mental overloads and emotions.\n\nFocus on the affirmations for lessons of the week. It is through the\naffirmations that your thoughts change your consciousness from\n\nfear to trust and inner peace. The first week of your meditation\nwith the White Light focus on what you want to see clearly. What\nyou perceive as reality may be the illusion of your fear, or the fears\nthat others have created. What you observe around you may\nrepresent an illusion of pain and fear as a result of yours and belief\nof friends and family.\n\nI ask to see clearly my reality and truth.\n\nIn forming this agreement with your higher self, you experience\ninsight into situations with a new perspective. As you meditate and\nactivate the White Light, use this affirmation and observe how a\nprocess of cleaning up occurs. Urges to let go of physical things,\nrelationships or situations are quite normal in this lesson of light.\n\nAlso you may become angry for no apparent reason. This also is a\nprocess of letting go or becoming aware of some uncomfortable\nsituations brought to your awareness in order to heal.\n\nToni‘s Comment:\n\nAzreal is the Angel master teacher of the Order of Melchizedek.\nHe first appeared to the channel in a Radiant Golden Light. While\nwriting one morning, Antoinette was overcome with a powerful\nenergy. In turning toward the door, she saw a beautiful Golden\nLight that was Azreal. His first message began in that special\nmoment. Since that particular moment in time, His messages and\nhealing is a source of comfort and wisdom for students and\npersonal readings. Throughout the lessons of light, you will\nreceive messages of this teacher. In addition, he is recognized as\nthe Keeper of the Soul Records. He continues to bless many\nthrough personal sessions as well as through A Course in Light.\n\nMessage from Azreal\n\nAzreal - Greetings, this is Azreal and we are very pleased you are\nready for this experience. You are called into the lessons of light\nin order to release within yourself the heaviness occurred through\nyour life experience.\n\nThrough movement and connection to the light, you begin to\nexperience releases of certain factors within all dimensions of your\nconsciousness. As you enter into this particular level of the\nacceleration of your spiritual path, you work with your physical\nconsciousness to bring all of yourself into balance, harmony and\npeace.\n\nAt this moment, beloved students, call forth the incarnating ego\ninto the forebrain. This is the aspect of your own soul vibration.\nThis is a part of you that has lived and moved and had its being\nthrough many life experiences. As this ego is called into the\nforebrain, it begins to earth its vibration into the physical plane.\n\nNow we call forth the personality ego, that part you know as your\nown identity, connected to the earth and seeks to fulfill its desires.\nAs you bring the egos into alignment, perceive a release of\nnegativity. Ask the presence of your higher self to uplift, unify\nthese egos into one vibration and oversee the consciousness of the\nbody.\n\nThe body has its desires, its hungers, its thirsts, its needs and as\nyou bring the egos into the forebrain, a loving light envelopes your\negos releasing all dissension, discord and resistance to living in\nbalance, harmony and peace.\n\nWith the egos gathered into the forebrain, call forth the body ego,\nthe governor of your physical dimension. Now move from the\nphysical body through the perceptual, emotional, mental and astral\n\netheric bodies into the center of the White Light six inches above\nyour head. This is your soul body of light, the star center of your\nbeing as the communication center of your soul body of light.\n\nWith your awareness in the center of White Light, you activate the\nChrist Light. The purifier, cleanser brings everything into a clearer\nperspective. Experiencing this energy as a cleansing process is a\nbaptism of consciousness. This is the energy light that brings\nrelease from impure thoughts or consciousness of negativity.\n\nPerceive now, the center of light is expanding into a sphere 18\ninches in diameter and this sphere of light moves through the\nphysical body. It moves through the mental, emotional and\nperceptual selves as well as within all of the body. You will feel\nits intensity clearing the torso area and moving down through the\nlegs and out the feet. The process now is in effect cleansing all\nareas of the physical self.\n\n             Visualize also the energy of light is focused on the\nbrain-mind consciousness and the frequency of White Light is\ndirected into the thought patterns of your own consciousness.\nPerceive a White Light directed into the left side of your brain.\nThis is the director of your actions and constructive thinking.\n\nPerceive you are letting go of all thoughts or feelings that deny you\ngreater wholeness. Release patterns of thinking that are obstacles\nto your higher knowing. Continue to hold the light as you release\nimageries, patterns, and memories acting as an inhibitor, denier\nand negative to your consciousness. Let go of all thoughts that you\nare imprisoned in emotional and mental bondage.\n\n       Energy follows thought, thought directs energy and\n       thought magnifies energy. As you think, so you are.\n\nYou are the reality of your thoughts and the mind of your higher\nself. Therefore, connect the conscious thoughts with the vibration\nof the inner plane of spirit for upliftment and clearing of the\nphysical self from heaviness.\n\nContinue to focus and release all fear of being incomplete or\nunwholesome. Release the fears of what others perceive as your\nreality. Release fears of inferiority regarding your constructive\nthoughts, your directive thoughts, the thoughts of structure and\nrational thinking. Release any blocks to accepting your own-\nguided constructive thoughts.\n\nBe transformed by renewing your mind. The birth of new\nconsciousness is coming to you for new understanding, new\nvibrations, new mental patterns and with new holograms within\nyourself. Think on these things.\n\nNow direct the light into right brain thinking. Many are fearful of\nthe intuitive, instinctive and creative self. This is a block to\nreceiving your own inspired understanding by resisting the\nimpulses of your imagination and inspired consciousness. As you\nactivate the frequency of the White Light, perceive this energy\nreleasing the fear of instinctive, perceptual and magnetic\nconsciousness. Release any fears projected from early stages of\ndevelopment.\n\nThe memory of punishment for psychic or sensitive abilities may\nreside within this part of your brain. Let go of the memories of\nbeing inhibited, in pain, in punishment and action against your own\nunderstanding. Often as a sensitive child, you may have been quite\ninsightful, but blocked or refuted by those who could not\nunderstand this sensitive gift.\n\nPerceive the radiant White Light moving from brain mind\nconsciousness into the throat center. This is the creative center of\nyour communications. Perceive the total throat area releasing fears\nof communication and stumbling blocks to your own harmony\nwith your physical world. Feel the light moving through your\nconsciousness releasing heaviness from thoughts regarding your\nrelationships with personalities and release fear of things around\nyou, your environment and your connection to your material\nworld.\n\nThe radiant White Light is the essence that purifies and cleanses.\nYou experience a shower-like effect in and through all of your\nconsciousness, as you receive the light moving in and through all\nyour physical body. Let the tension of your consciousness be\nbathed in this light. Perceive the muscular system releasing\ntightness and heaviness stemming from resistance.\n\nFrom the throat area of your body, direct the light into the lung\narea and the energy will move in and through the respiratory area.\nIf you have difficulty breathing, if the lungs seem to be without\nstrength, if there is cloudiness in this area, bathe it in the White\nLight. Perceive you are releasing fear of imposition.\n\nWhen you experience resistance against your own will, you\nexperience anger of powerlessness. Let go of the fear you cannot\nbe free. Let yourself come into your full expression to be the\nhigher self's own true expression. Perceive yourself breathing out\nall impurities within the body and breathing in new life, new\nenergy. Perceive the essence of White Light directed fully into the\nlung area. This is associated with feelings and your emotional\nnature.\n\nNow, energy of this light moves into the heart center. Perceive this\nlight energy directed into the heart organ. The physical heart and\nthe emotional aspect carry the feelings of what matters to your\n\nheart. Perceive this energy clearing the pain of emotional rage and\nfear. Release the rage and repression from loss of love and fear of\nhurt from others. Perceive this energy clearing the debris in the\norgan of the heart, moving the energy in and through the\ncirculatory system, clearing out the impurities of the blood. Let go\nof all fear attached to the pain of anger and separation.\n\nPerceive yourself forgiving all who failed to meet your\nexpectations. Forgive yourself for ignorance to the lessons of love.\nRelease their projections from your consciousness. You can\nforgive and release all that has attached to you emotionally,\ncausing pain and disillusionment. Human beings act upon their\nown individual consciousness, often out of aggressiveness and\nnegative power.\n\nFeel the light healing the consciousness of all that is, was and is to\nbe. Perceive now the body is in a complete essence of White\nLight. Perceive all energy ingested through nutrients and emotions\ncleared of impurities. Energized with the White Light, you require\nfoods of higher energy from live food. You will find you have\nlittle tolerance for foods that cause negative reactions in your\nphysical body, for your body will become more balanced.\n\nThe perceptual body is a composite of energies absorbed and\nobserved from the instinctive aspect of self. The perceptual self\nmay become heavy with the emotional states others create, as well\nas the emotional energies of your own. Therefore, direct the light\ninto this aspect of your nature to clear and cleanse the\nconsciousness from all negativities imposed and composed by lack\nof knowledge, love and light. Perceive you are clear of all\nnegative illusions.\n\nAffirm:\n\n       I now see clearly the truth of who I am and the truth of\n       myself in this plan of life.\n\nAs you experience the energy flowing in and throughout all these\naspects of self accept you are one with the light and the light is\nyou. This process will continue as you focus on your healing. Go\nnow into a silence and let the light be the source of your healing.\n\nWhen you have completed the process for this experience of light,\nreturn with your awareness to your own forebrain and ground\nyourself. Go in peace.\n\n                       Personal Journal\nHere is a place to keep a personal journal. You will be amazed\nwhen you look back through your own records and see how much\nyou have changed.\n\nWrite out your goals for yourself.\n\n\n\n\n\nWrite out any dreams that may occur.\n\n\n\n\n\nWrite out the areas in your life you want to clear up.\n\n\n\n\nAffirmations\n\n        I release all negative thoughts to the light.\n\n        I accept the process of my spiritual growth.\n\n        I now release all resistance to my healing.\n\n        I accept my clarity and vision.\n\n        I affirm that I am letting go of all fears that keep me in\n        emotional and mental paralysis.\n\n        I affirm that I am letting the wisdom of light surround my\n        actions in life.\n\n        I affirm that I release control of forcing my will and\n        projecting my fear on others.\n\n        I affirm that I am surrounding my being in the light of\n        truth and nothing will shake my faith.\n\n        I affirm that I can do all things through the Christ\n        consciousness that enlightens me.\n\n        I now feel the peace that passes understanding moving in\n        and through me.\n\n        I release all fears that separate me from my knowledge\n        that all is in order according to a divine plan.\n\n        I free myself from the fears that are projected upon me by\n        unseen forces of thought and action outside of my control.\n\nWrite your own affirmations."}, {"id": "L1_2", "level": 1, "type": "lesson", "lesson_num": 2, "title": "LESSON 2", "subtitle": "GOLD", "color": "gold", "content": "COLOR RAY: GOLD\n          CROWN CHAKRA - A band around the head\n\n                     HARMONIC TONE \"D\"\n\n                     PLANETS: Saturn & Sun\n\nPurpose and Essence\n\nThe Cosmic Father is the name of the Gold Ray. It is the\nfrequency associated with the masculine self. This is the energy\nthat acts as a creative and dynamic force and often is seen in and\naround the head and shoulder areas. However, the chakra center is\nat the top of the head. This frequency is a light energy activated to\nlift up negative thought patterns. It is an energy used to transmute\nand transform consciousness.\n\n       Be transformed by the renewing of your mind\n\nThe Gold light ray clears up mental depression and thought\npatterns in need of change. So often there are times when the air\nseems to be heavy with negativity and you seem to feel heaviness\nin and around you. Seeing the room or situation in a vibrant\nGolden light may suddenly change the energy to a more positive\nforce and things seem to feel better.\n\n      Gold is a symbol of the Mind (Mind when capitalized\n       refers to the Higher Mind) and transmutes the negative;\n       therefore, this energy changes conditions. To master your\n       mind you need to master your thought processes. Your\n       thoughts are the creator of your reality. The Gold light is\n       the crown that rules the mental self. So when you think of\n       a King wearing a Golden Crown, it is a symbol of having\n       dominion over his kingdom, anointed as governor of his\n       subjects.\n\nYou are meant to take charge of your mental kingdom. The Golden\nenergy when activated uplifts mental thinking to assist you to have\ncontrol or dominion over your mental kingdom (consciousness).\n\nThis wonderful light is a frequency assisting in healing depression\nand disease of mental pain. When you are in the healing process of\nthis lesson in light clearing may appear as headaches or pressures\nin the head.\n\nTo assist yourself during mental pressure, headaches, confusion,\ndepression and/or rage, perceive you are in a Gold light that fills\nyour body and consciousness with this frequency of energy. As\nthe Gold energy penetrates the thought waves the negative false-to-\nfact images can be dissipated and lose their impact.\n\nRemember in the Star Trek series when the captain or others were\nbeing transported to another place, they entered a transporter,\nwhich beamed them up to their destination. This process occurred\nby raising their vibrations. The energy they entered into was a\nGolden light. The Gold energy is associated with transformation\nand upliftment.\n\nIt also relates to the dynamic aspect of your nature. We are all\nmasculine and feminine as in right brain and left-brain. The right\nbrain is more subjective than the feminine side; the left-brain is the\n\nobjective and dynamic than the masculine side. This energy when\nactivated uplifts the consciousness of pain in these areas of the\nhead. The process of your thinking directs your experience as well\nas feelings, senses and body functions. To clear up imbalances in\nthe body or emotions, direct the light into the head area and release\nthe old patterns of negative thoughts. As the brain receives\npositive energy, new images of thought transform consciousness.\n\nSpecific Level Function\n\nAnger, rage and fear affect your body causing many symptoms\nsuch as headaches, pressure and aches. These occur from harbored\nthoughts of anger, rage and fear. The Gold ray of light is the\ntransformational energy for these symptoms. The Gold energy\naffects the nervous system by releasing the traumas and fears\nregistered by difficulties in life.\n\nCommentary: This is a reading given to Vicki, translator of the\nChinese Version of A Course in Light. 1\n\nAndrew - Yes, this is Andrew and we are pleased to speak with\nyou each. We hear what you are asking to receive. Open to Light\nis a book that is recognized as a message of hope from one who\nwalked with Christ. It has been asked that I identify myself as\ngiven to true understanding of my identity; I walked with Jesus the\nChrist, I am the disciple Andrew. First to be chosen, walking in his\nfootsteps, first to serve all that were a part of what His mission was\nto be.\n\nI was young in that physical life and my means were very little. I\nworked with my brother Peter and we each were fishermen and\nbuilt crafts for others. We worked with our hands and had a home\nthat was simple, other brothers came in the family too but we were\n\n1 Open to Light\n\nthe first to leave and follow the Lord, Christ Jesus. I was more\nphysical and desired to be so. It was a privilege as you call it today\nothers, to make comforts, to provide the supplies and the\nnecessities.\n\nOur lives were very full with many experiences unspoken. There\nis little written in the scriptures as you have them of what our lives\nwere like in a daily manner. Of course everything was centered\naround this magnificent soul our Lord. Words cannot even begin\nto describe what it was like to just stand next to him or just be a\npart of what he was to do. The lessons that came to us were much\nlike the lessons of the work of the Light. It was learning of the\ninner self, and listening to silence, trusting in what Jesus spoke of\nas His Father and the kingdom that was meant to be. We heard\nstories, very few of them ever written. Jesus spoke to us always in\nterms of our familiar lives. He taught the lessons with the stories\nof children and with the stories of people we identified with in that\nday and it was very extraordinary.\n\nThe years were short, not nearly enough, and when it was time for\nour Lord to leave, none of us could believe that it would come.\nWe were not prepared to endure such grief and the fears of what\nhad come through us were so intense it was hard to overcome but\neach of us had our own needs to fulfill and the mission that was\ngiven to us personally. I, Andrew, went and traveled about and\nworked with many young ones, those who just opened to the life\nthat Jesus lived and tried to carry the message of love.\n\nBut as you know in the political arenas there were so many\nchallenges. And so because we were turning people’s heads away\nfrom their former experiences and opening them to freedom, we\nwere perceived to be challenges to the government. So death came\nto the disciples and my life and the crucifixion was the way I chose\nand was happy too and similar to the Christ.\n\nSo our student here, Vicki, asked how can I be so free from such a\nterrible shame that came upon the personality. And what I know is\nthis, in the moment of such a physical choice there is a remarkable\nconsciousness that comes to take away the presence. The body is\nput to its own trauma and terror and to the pain, but the essence of\nwho I am was not a part of that. I could see from overview that\nthis was just a physical demonstration of trying to block the Light\nand love and gifts that were given and forgiveness seemed just a\nsmall part of my intention, for I knew it had nothing to do with\nanything that was true.\n\nSo I tell you that regardless of how your lives are put to the test, no\none can put to death your spirit and no one can take away your\ntruth. No one can take away the very divine spark of your Light\nand that part of you when it is strong sees through everything that\nis wrong. So the messages of this book are to bring everyone to\nthis realization that you walk a path by choice, both by your heart,\nyour soul and spirit and you walk with an awareness that you will\nmeet all the challenges needed. But through the path of your\nhighest self you rise above it all and into a higher consciousness.\n\nWalk with love and be at peace and so it is.\n\nMessage #1\n\nAndrew- I speak through the light, I speak through the channel\nand I speak through your soul mind. It is beautiful to see the\nopenness of your mind to receive the experience of your personal\n\nevolution and acceleration into a more whole state of being. How\nbeautiful to absorb the consciousness that you are projecting in\nresponse to the healing taking place within you. There are many\nwho stand or appear as presences in and about you, giving you the\nvibration of light to magnify the process.\n\nThe goals you seek are the goals for freeing yourself from\nwhatever denials have challenged you. However, even the\nchallenges are necessities and blessings of life. Think in terms that\neach time you meet the obstacles appearing to resist the harmony\nyou desire, they are gifts teaching you the act of willful patience.\nThey teach you the act of being in a constant state of acceptance\nand faith. They teach you and test your inner consciousness to\ncreate a positive way to move through the apparent walls that\nchallenge your desire. So even in the most difficult place of your\nemotional and mental observation, think in terms:\n\n       This is a positive challenge and blessing in my life, for I am\n       attuning to an option for strength, tenacity and\n       understanding of divine love.\n\nSo let go of your fear that you are foolish and that you are\nchoosing without wisdom. Let go. As you find your life changing,\nyour perspective of yourself will change. As you let go of the\njudgment of your own being as inadequate, you begin to reinstate\nacceptance in a more positive effect. The blessings of this\nparticular time are brought to you for your development of\nwisdom, intensity of consciousness and as a source of strength.\n\nAs light workers you are not weak, you are the strong. You are\nresourceful; you are tuned to a destiny out of which you receive a\nmore positive intent. The work you share in this earth journey is a\npart of your service to life. It is a part of your observation of\nyourself living through each opportunity, finding a key that will\nbring a change in the environment and vibration that you exist in.\n\n       You are healers learning to heal.\n\n       You are teachers learning to teach.\n\n       You are up-lifters processing through pain.\n\n       You achieve a time of love and wholeness.\n\nSo perceive in the moment, the essence of this Gold Light observes\nand is absorbed in the bodies and consciousness at all levels. You\nare now ready for assimilation. The assimilating is what transpires\nthrough the week. Perceive the Golden Light energy activated in a\nclockwise motion sealing the door in the aura of your own\nmagnetic field. Perceive yourself ready to absorb and assimilate\nthe journey, the adventure, the opportunities for creative growth\nand positive intent.\n\nTo you who write, to you who sing, to you who are gifted in other\nareas of living, to mentors, healers, interpreters and all\nlightworkers, be aware you are given a more intense experience of\nyour personal achievements.\n\nNow, this lesson is implanted and as you awake you will feel\nrefreshed so you will walk on a lighter note. Go in peace.\n\n               The Nature of the Light Energy\n\nMessage #2\n\nWere you to perceive the actual happening of coming into the light\nenergy classes, you would be aware that there are dimensions of\nyourself not previously experienced. The conscious mind moves\nwith awareness in and through other levels and dimensions not\npreviously experienced.\n\nAs the soul center of the White Light activates it is as if an\nessence, a substance of grayish matter is broken through and swept\naside. The center becomes an open channel and the energies\nwithin the center begin to flow freely through the body, the mind,\nthe emotions and the soul. These tiny essences of light beams\nmove very quickly and minutely. The existence of one tiny light\n\nbeam is of such minuteness, it is there and then it is gone, but the\npower is of greater good.\n\nAs you open the center of the White Light, the radiant star center\nbursts with light. All these tiny light beams begin to flow in and\nthrough the body, the conscious mind, and through the energy\nfield. As this light is directed by thought it travels through space at\nthe speed of light moving throughout the universe to attach\nthemselves to the consciousness of those the light is directed to.\nAs you magnify the light, awakening and opening of the inner\ncenters of light, colors radiate in such brilliance that your physical\neyes would be in awe to experience this sight.\n\nAs these light beams flow through the body, the low frequencies of\ndense matter and thought forms are broken up. Thought forms that\nlingered through lifetimes as well as present life experience\nbecome exploded and released. As they are released often mental\nor emotional reactions occur that are associated with these mental\nor emotional imprints in self. As this comes about, there are\npsychological and emotional changes. A healing is experienced as\na clearing of past fears.\n\nAt one moment, you may be very highly enthusiastic, experience\ngreat joy and ecstasy as you experience your life flowing in\nharmony. You may see your life in beauty and a sense of oneness\nwith all that is, accepting that nothing can separate your life\nexperience from its purpose, goals and unity with your Creator.\nThen a slightest image of fear can bring your emotions and\nthoughts into a lower consciousness where you feel the uncertainty\nof your direction. When you are in that particular level of\nconsciousness, then every aspect of your being seems swept away\nin moments of extreme turmoil.\n\nBe assured, this is a needed occurrence in your life, however, you\nwill become stronger and your faith in the higher reality will be\n\nunshakable. The work that is changing your consciousness is of\ntremendous impact. Daily meditation will increase your sense of\nrelease, joy and balance.\n\n Each lesson of the light is helping you through the pain, disease of\npresent and past negativity. In classes of meditation, groups add\nsupport and the experience of the light is felt through the\nmagnification of group energy.\n\nHowever, those who are in this study for themselves use the cd’s\nor mp3 as a guideline for meditation. Each disk is a guided\nmeditation process directing energy through your body and\nconsciousness. The messages will bring you inspiration and\ninsight.\n\nPlan your daily schedule to include time for yourself and your\nmeditations. At first you may feel very reluctant and perhaps a\nlittle resistant. These are natural reactions to the unknown.\nHowever, as you insist on becoming well and you seek to love\nyourself and your body, you will begin to respond to this\nmeditation with openness and anticipation. In the beginning of the\nweek, use the Cd or mp3 as you become ready for your own\nmeditation and seek to experience your own guidance.\n\nI recommend you keep a personal journal. There are certain pages\nadded to the book for this purpose, but perhaps you would rather\nkeep your personal record. A personal journal can reveal your\nthoughts, emotions and guided thoughts. Within this journal write\nof your dreams, hopes, wishes and desires for change. Become\npersonally acquainted with yourself by writing out your needs. A\npersonal journal can reveal to you what is bothering you and what\npatterns begin to show up in your life. Often through writing, you\nfind a deeper part of yourself coming through. This writing can\nalso develop into a communication with guides and teachers.\n\nYou may wish to keep a tape recorder next to your bed so that you\ncan talk into the recorder about your dreams or thoughts. This is\nyour experience for growth. The lessons in light will assist you In\nyour evolution. Along with your personal journal, we included\nsome affirmations. These affirmations are thoughts that coincide\nwith spiritual principles. A principle is a spiritual idea that relates\nto the law of cause and effect. The basic premise is;\n\n                     Thought directs energy; energy\n\n               follows thought; thought magnifies energy.\n\n                         As you think, so you are.\n\nAffirmations are setting principles of spiritual laws into motion.\nPrayer and affirmations are similar.        Prayer is asking for\nunderstanding and reaching for answers. Affirmations are spiritual\nprinciples spoken for manifestation.\n\n                      Personal Journal\nWrite thoughts in need of change: such as\n\n\n\n\n\n\n\n\n\n\n\n\n\nAffirmations\n\n       I affirm that I am releasing all anger and rage from\n       conditions outside of my control.\n\n       I affirm that I release the resistance to knowing that I am\n       one with the higher self and spirit.\n\n       I affirm that my environment fills with Golden Light and\n       all who enter are raised in consciousness.\n\n       I affirm that suppression, subjection and denial of my\n       oneness with the Creator releases into the light.\n\n       I give up worrying about things I cannot change."}, {"id": "L1_3", "level": 1, "type": "lesson", "lesson_num": 3, "title": "LESSON 3", "subtitle": "BLUE", "color": "blue", "content": "COLOR RAY: BLUE\n                       The Light of Wisdom\n\n            LOCATION: Center of Mental Soul Body\n\n                    HARMONIC TONE: \"B\" Flat\n\n                         PLANET: Uranus\n\nPurpose and Essence\n\nThe radiant wisdom Blue ray is the energy that moves to unlock\nfear hidden in the recesses of the body and brain. It is effective in\nbreaking up the anxieties imprinted within the cellular and organic\nnature, as well as all aspects of self. This energy brings to the\nsurface what hides in the unconscious and conscious levels.\n\nMany fears hide in the recesses of your subconscious mind. Early\nchildhood memories or experiences cause trauma in these hidden\nfacets of self. The environment of conflict and rage can affect the\nenergy systems within you and create unexplained deep-seated\nfears. The frequency of this energy therefore, moves to the cellular\nconsciousness and the body systems to bring these aspects to the\nsurface.\n\nBlue ray is an energy that is uncomfortable to work with for some\nstudents. The symptoms experienced because of the fear are\ncoldness and anxiety. Feelings of aloneness and separated from\nlove are also in process. You might experience a sense of distance\nand aloofness with your relationships. These are activations of\nunconscious fears. However, as they are brought up to the surface,\nthey are released into the light. The positive aspect of this energy\nis the clearing that takes place and a peaceful feeling that comes\nfrom being in your truth.\n\nThis energy is the Wisdom Ray. When you are not in fear, you are\nliving with understanding, peace and tranquility. The Wisdom\nBlue Ray energy is associated with knowledge, which is your tool\nfor decisions; however, wisdom comes from an inner knowing\nwhich may overrule the knowledge we depend on.\n\nThis frequency is associated with Uranus, the planet that rules the\nAquarius soul path. As you may have noticed, the Aquarius\ntemperament is at times aloof yet very much for seeing things in an\nexpanded way. Those with spiritual awareness desire to live for all\nand all for one. They seek to understand the working of the\nuniverse and all that is hidden in the sciences of mind and cosmic\nactivity. When you are experiencing this frequency you are\ndiscovering hidden fears and revealing the truth within.\n\nThe frequency can bring enlightenment to the mental and\nemotional self and unlock the hidden fears at the deeper levels of\nconsciousness.     Wisdom brings the peace that passes\nunderstanding.\n\nSpecific Level Function\n\nThis energy ray works within the physical body at all levels to\nbring balance into the cellular and organic systems. You may\nexperience cold chills or an uncomfortable feeling of intense\n\nanxiety as this frequency moves through the body to uplift and\nclear the negative aspects. Think of how the body reacts under\nfear/stress syndromes. Also, remember the wonderful feeling you\nhave when you are functioning in control and peace.\n\nMessage #1\n\nAzreal - It is with great pleasure that I, Azreal, move into the\nawareness and consciousness of each one. We see by your\nvibrations that there are changes on the inner levels of each of you\nas you move in and through the lessons of light. We ask that you\nbe patient with yourself as you experience the higher, finer\nvibrations affecting your physical selves.\n\nYou are today a result of your past thoughts, emotions and those\nyou have been in contact with. So, your experiences have\nmanifested those energies within yourself that need to be\ntransmuted. During the past week, you have worked in the\nradiance of the Gold ray. You have experienced a consciousness\nwhere you met your lessons with new thought and new vibrations.\nAs you move into this particular energy, your aura becomes like\nradiant Blue lights. This is the energy earthed through a master\nsoul many ages ago, portrayed in the Bible under the name of\nSolomon. He was the first master in earth of this radiance and\nconsciousness of wisdom.\n\nThis following week you will see challenges to your intellectual\nminds. Situations may arise where you are tested. Do not be\ndiscouraged if you find yourself in the midst of your day, suddenly\nfeeling you are confused or there is no sane reality to what you are\nexperiencing. The intellect, the conscious mind, loves to play\nmany games with you. Your intellect accepts what it sees, feels\nand knows at the conscious level. However, the challenge comes\nas the conscious thoughts become aware of inner truth and\nknowledge.\n\nThe physical body, when it is responding to fear, reacts in extreme\ncoldness. If this should happen, be aware healing is taking place\nand attuning yourselves to the guidance and teachers of your soul.\nWe are aware of the many questions in your brain. Since we bring\nforth the messages, we endeavor to clarify confusion activated\nthrough your process of growth.\n\nIt seems incomprehensible to the human mind to understand how a\nthought from a consciousness beyond the earth level can be\nchanneled through to the physical material level. Therefore, let us\nexplain how this takes place. Thoughts are as radio waves and the\nascended masters and teachers of the brotherhoods are merged\nwith the thoughts that stem from the earth planet. Each of you has\nyour own unique vibrations. You are a combination of sounds and\nvibrations moving in many different frequencies.\n\nThere are those who operate out of the consciousness of depression\nand struggle. They are learning through negative lessons and often\nhave very dark, hazy auras that are dense in vibration. Their\nconscious minds are in many instances shut off from the finer, pure\ninner self. These personalities would be very difficult to\ncommunicate with from a lighted point of view. However, as one\nconnects with the inner being, the vibration changes and this is\nwhat you have felt transpiring within you.\n\nYour own energies and auras take on a new glow. You can see\nyour own skin becoming much finer and brighter. As you send out\npositive thoughts of love and emanate a Christ-like Consciousness,\nthe vibrations enter into the other. These vibrations are easily\naccessible to communicate with on the level of spiritual\nconsciousness.\n\nQuestion: Why is it that we have not heard in previous places in\nhistory where masters have channeled through others?\n\nAnswer: There have always been those who were able to receive\nthe thoughts from the masters. Often those who received these\nvibrations were shut off from society. They spent their lives in\nseclusion, not willing to share their thoughts at mass levels.\n\nTherefore, the only masters considered are those written of in\nhistory through the Holy Bible or spiritual bibles of other races.\nJesus, the known teacher of the Piscean age and the Christian era,\nis the only one recognized as the Son of God and Master of this\nage. Within the nations of Christianity, He is the only Son of God.\nHowever, through the change coming within the new age, more\nrevelations of enlightened beings will be acknowledged.\n\nAt this time in history, the earth is a very small place in terms of\ncommunications with other nations and belief systems. Revealing\nthe consciousness of Divine Spirit among many disciplines of\nthought, this channel of this work is one of many who can directly\nuplift others through the light and the teachings.\n\nKnow you are all embarking upon a beautiful new life experience.\nThis life experience will affect all those you love and come in\ncontact with. They will notice the changes within your personality\nand the beauty that radiates from your own self.\n\nYou are all pacesetters for the final step of the human\nconsciousness into that level of the cosmic awareness. The line is\nvery fine. You may have thoughts that flow through your mind\nquestioning what you are participating in. Be still and know \"that\nmind which is in Christ Consciousness is becoming awakened in\nyou”.\n\nThe truth will set you free. The ray of radiant Blue Energy of\nWisdom brings you to the clarity of truth. This truth will release\nyou from doubts.\n\nSend the light to all you know who need peace, tranquility and\nbalance in their life. See each in the energy of wisdom to heal the\nfear within.\n\nGo in peace.\n\nMessage #2\n\nAndrew - It is good to experience with you the vibration of your\nconsciousness moving forward and into release. Therefore, the\nprocess has come into effect. It shall be with you through the cycle\nwhere this energy overshadows your consciousness to bring you\ninto a more tranquil state of self-knowing.\n\nComments\n\nDuring the meditation, Andrew asked each one to open their eyes and\nhave open questions.\n\nI ask that each and all of you now come to wakefulness, open up\nyour eyes and let us come to a meeting where we can exchange\ninformation. You have an open floor to ask any question that may\nbe pertinent to your development, your personal journey or simply\nsome unknown mystery that might prey upon your consciousness.\n\nThe Wisdom Ray is active; you are open to experience the learning\nprocess from your development of higher understanding. Be at\npeace.\n\nQuestion: A question came up this past week. I was on jury panel\nand asked whether I could sit in judgment of another human. The\nquestion had been asked of me before as I have sat on other panels.\nThis time it raised a doubt in me, as I am becoming more aware\nthat each person has his or her own place to be. The question was\nsomewhat easier in that we only had to decide whether he had done\nwhat he was accused of. We were not to judge the amount of\n\npunishment he should have for doing that. I would like your\ncomments on the judgment process.\n\nAnswer: The human laws are created for a collective group of\npersons who must live with each other's energies. Because the\nhuman consciousness has not developed its alignment to the higher\nspiritual law or able to experience the centering it needs to live by\nthat law, there must be orders or rules for guidance to assist all\nlives.\n\nThe human nature creates boundaries that are acceptable for\ncollective agreement. Therefore, the law of the human nature is set\nin motion and the citizenry or a collective agreement binds all to\nstandards and principles creating boundaries. When one is in\nopposition to that agreed upon perspective, it is then under the\ncondition of human judgment. When you are asked to sit in and\nobserve these actions, you are not a judge; you are simply an\nobserver ofthe behavioral patterns that are set before you. Your\njudgment can only be in discerning the facts presented, but a\ndifferent law judges the soul of the accused.\n\nThe law of spirit is absolute and that soul is under a total different\nprinciple of cause and effect. Through the eternal journey of that\nsoul's experience, it will find its ultimate judgment and its effect.\nTherefore, you are right, you observed at this point that you could\nnot be a judge, but you had to participate as an observer and\ndiscerning the experience.\n\nQuestion: Today, there is widespread use of modern conveniences\nlike microwaves and tanning booths. Can those things adversely\naffect your vibration level?\n\nAnswer: There are these waves that move through the magnetic\nfields. Let us state that we do not perceive any particular damage\nin these microwave aspects. But, when your body is under these\n\nparticular radiated violet lights, it does affect you personally as\nyour magnetic field and your own molecular structure is in direct\ncontact with these particular frequencies, causing certain changes\nin your vibration.\n\nQuestion: Will the microwaves change the energy life force within\nthe food particles?\n\nAnswer: To a degree, it increases the electrons, protons and the\nmolecular structure with the food itself. Continuous use of this can\nblock the natural energy of live food. Yes, it is recommended, live\nfood is taken in stronger amounts but moderation within the use of\nthese conveniences will not alter your health.\n\nQuestion: Is the change in the magnetic field caused by the violet\nrays of the tanning bed detrimental in nature?\n\nAnswer: Again, it is all in the individual state of being.\nUnconscious personalities that have no focus subjected only to the\nenvironment may have stronger reaction in a negative form. Those\nwith the awareness of their responsibility to work with energy and\nto constantly meditate will have less adverse effects. Many can\nincrease healing, for the essence of the violet ray has vibration\nrates that can induce and create a positive healing.\n\nQuestion: There are three, four, five volumes of a book out called\n\"The Law of One”. Are you familiar with the writings?\n\nAnswer: All transmitted from those particular levels come from a\nhigh order and in essence are a correspondence with all that we\npresent. Many transmitters are transmitting information through\nthose who channel the consciousness of spirit and given the\nvibration to present to humanity. The Law of One is an absolute.\nThe Law of One is this:\n\n       Out of one creative force came all and each is a part of\n       the same creative expression.\n\nYet, even in the creative process, there is individuality and an\nimprint of free will choosing a course of consciousness that brings\none into the adventures of life. In this choosing, some align with\nwhat you call the detrimental or de-evolutionary systems. They\nbecome attached to those who fight and war against the evolution\nand the raising up of consciousness to its spiritual reality. So yes,\nthe information that you have been observing, integrating and\nreading has its rightness in its own resource.\n\nRA is recognized as the entity that came to the earth during the\ntime when the Egyptian aspect was recognized. He was a cultural\nleader and religious element in the evolution of man and a link to\nthat of the Atlantis consciousness.\n\nRA is the one who first brought awareness of the One God of One\nSon into reality. The One God is that which is associated with the\nCreator/Father. The sun represents the light. The sun of your own\nplanet is a symbol of that light. The light force re-energizes the\nconditions of all the living aspects of your planet beings. This year\nis a very interesting year for the planet. Last year began the\nrecognition of the time frame where there was a break in the\nfrequencies (1988 harmonic convergence).             That meant a\ntremendous change was in motion. Each and all were aware of the\nimpact of the energy sources that came to the earth and touched the\nhuman evolvement through the harmonic convergence. We\nperceive it as a cosmic event beginning the implant of the cosmic\nsense.\n\nQuestion: Is there something coming up?\n\nAnswer: You are in the process of a 30-year cycle that is the\npreparation for the total awakening of the Christ within. It is not\n\nso much the return of Jesus in form, as it is humanity responding to\nthe vibration of Christ, who came as the Lord of the earth in the\nevolvement of the human soul. So, you are all preparing for the\nextraordinary vibration that brings the reality of peace into action.\n\nYou have been watching the tremendous desire to settle the old\nand create the new. You are seeing that the old orders are\ncrumbling and that there is a true struggle and striving to create\nnew empires and new aspects of being, both inward and outward.\nThe event you are seeing and hearing is the true message coming\nsilently and yet very verbally to a great group of congregated souls.\nWhat is the event? It is to be seen yet, in its full reality. You are\nin personality feeling change
