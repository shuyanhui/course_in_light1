 light.\n\nYour bodies will feel intensely activated by these extraordinary\nvibrations. These activated energies will continue for a period of\ntime. You will feel as though you have stepped through a door to\nyet another plateau of a freer part of self.\n\nYou are beginning an incredible journey into releases. You have\naccepted internally commitments to move forward and to\naccelerate into its highest most potential of creativity and physical\nmanifestation. So be it.\n\nYour dream states may present you with images of many periods\nof earth. You may attune to collective vibrations of the mind of all\nthat the human self has sought to express. Through these vibrations\nof light, be at peace, knowing you are forgiving, observing and\nhealing. This will come to a personal expression of peace.\n\nAnd now to close, this most magnificent activity of the energy of\nWhite Light is moving through the central vertical axis and like a\ncross extends from the top of the head to the bottom of the feet,\nfrom the center of the heart outward. This energy pattern will be\nwith you. Think on these things:\n\n       I am crossing out of my consciousness all that inhibits,\n       denies, imprisons and blocks my conscious self from being\n       free.\n\n       I am now in the light magnified.\n\nGo, beloved students, beautiful initiates, brothers and sisters\nascending the ladder of spiritual expression.\n\nWalk. Run. Be at peace."}, {"id": "L4_35", "level": 4, "type": "lesson", "lesson_num": 35, "title": "LESSON 35", "subtitle": "GOLD", "color": "gold", "content": "COLOR RAY: GOLD\n                    The Light of Transmutation\n\nPurpose and Essence\n\nIn preparing for this meditation, perceive yourself releasing from\nentanglements that have been part of your karmic patterns through\nthe astral/etheric body.\n\nAs you experience the meditation, as intricately given through the\ntaped sessions, relax all of your body senses, letting the words flow\nthrough your consciousness. In these mediating sessions, images\nmay appear before you or you may experience sensations of being\nlifted away from strong feelings or pains lodged in your muscles\nand physical body. Trust the process.\n\nSpecific Level Function\n\nAs spoken many times by the masters, your life is a series of\nexperiences that take you through the memory lane that may have\npreceded this particular experience of life. Working within this\nlevel, you may flash back to certain life incarnations or feel that\nsituations you are encountering have happened before.\n\nHow often have you seen a familiar face and yet know you have\nnot met that face in this life? How often have you experienced a\nrapport with someone in a short conversation and felt like you have\nbeen friends for a long time. Familiar faces, familiar places, senses\n\nand aromas, all strongly familiar, may become episodes within this\nlevel of your processing the lessons of A Course in Light.\n\nWorking with the Gold frequency, you are creating opportunity to\ntransmute the negative with information to reassess your belief\nsystems and consciousness.\n\n       Be ye transformed by the renewing of the mind.\n\nMessage #1\n\nAndrew - It is good to speak. I come through the channel once\nmore to present you with a deeper understanding of the process\nthat you, as individuals, are experiencing. You are the initiates, the\nsoul initiated through degrees of self-beingness. Most of you are\nsecond-degree initiates. Many others are in the third degree of\ninitiation.\n\nThe meaning of this is through the travels that your soul has\nexperienced in and through the earth. You have performed,\npresented and co-created certain opportunities. One who has\npassed through the second degree of initiatory consciousness has\nfulfilled many desires of the physical realm, performed and\nexperienced the desires of the flesh, desires of physical activities in\nall forms of human consciousness.\n\nThose who have stepped into the threshold of the third degree are\nremoving their personal attachment to earth journeys. They prepare\nthemselves for other activities, often withdrawing from the\nmaterial world and focus on spiritual development.\n\nThey are the ones who return to teach the way and prepare others\nfor the integration of spirit to soul and soul to physical reality.\n\nThese are often difficult lives. The ego personality seeks to\nfunction under the law of the human activity and follow suit with\nthe normalcy of the human consciousness, yet the desires are not\nthe same as others.\n\nYou appear not to function in correspondence with others. It is\ndifficult, for you desire to please and function as others, but you\nsee life in a different perspective. You are prodded by others to\nthink and act as they do. .\n\nHowever, your soul is setting you in motion to withdraw from the\nactivities of demonstrating physical prosperity and becoming\nenhanced with spiritual consciousness. You know who you are. It\nis difficult, but it shall be resolved. You become the teachers. You\nbecome those who act as the higher priesthood in the activities of\nlight.\n\nFor now, the meditation has begun.\n\nIn this frequency of the Golden Ray, as collective lightworkers you\nwill be manifesting new mental processes of your physical vision\nand your spiritual understanding. The material world is not to be\nseen as illusion, but is to be the fulfillment of all that one desires.\nSee your physical world is an arena in which you have\ndemonstrated and played in the theater of many of its passions of\nlife.\n\nYou have been the writer, the creator, and the players within the\ndramas of many of your incarnating experiences. You have been\nthe slave; you have been the king, the queen. You have been the\npriest and you have been the magician. You have been many things\nin the historical linkage of human drama. The astral self holds in\nrecord many of these dramatic activities of life.\n\nWith the energy of the Golden Ray, by consent of the council of\nthe hierarchy, we now bring forth into the astral plane the\nconsciousness of transformation and transmutation into a higher\nform of spiritualized being. Think in these terms:\n\n       Whatever I have created that may karmically cause pain in\n       another, pain in my own being, disease in another or\n       disharmony in my own being, I now, under the Law of the\n       Hierarchy and Grace, release this to the total source.\n\n       I ask that the law of love, forgiveness be manifested in my\n       whole beingness.\n\n       I reduce, release, forgive and totally free the entanglements\n       of karmic impressions from the essence of my inner being.\n\n       My body, which holds impressions in the muscles, in the\n       tendons and in all of its many forms has now filled with\n       light.\n\n       I am being released of any intensity, pain, denial and rage.\n\nThe inner plane between the astral and the body transpires as the\nelectrical patterns in the astral self begin to receive the\nconsciousness of the spirit. It cannot intellectualize and it cannot\nscientifically perceive this as an absolute. The process is taking\nplace with the ancient mysteries, ancient schools and ancient ways.\n\nYour body, and who you are, cannot fulfill or demonstrate this\ninterplay until thought and self have blended, harmonized, and\naccepted it as so. Belief within your thinking may cloud and veil\nthe cause of all your resistance to still transpire. However,\nunderstand, the imprint, the surgery and the effect is now in\n\nmotion. Under the Law of the Christ, I perceive that each and all of\nyou will walk with a freer step, with a clearer mind and with less\nintensity -- physical, mental, emotional and perceptual -- within\nyour bodies.\n\nIt is important that you understand you are pacesetting the process\nwithin the group, which becomes groups of many groups, which\nbecomes the rays of light touching in and through the\nconsciousness of planetary and human thought. If there is a\nthought in your mind and a thought in your brain that you are\ninadequate, that you are denied, that you are repressed, that you are\npersecuted, that you are in any form of victim action, know it to be\nan impression of long ago experiences and realities. At this\nmoment, these impressions in you are severed in the light. There is\nthought in the soul and in the astral plane that you are bonded and\nbound into a karmic condition unresolved. Ask that resolution and\nbalance come into effect.\n\nThe effect of this intervening into your path of evolution will take\na process of time before you see the result. Understand and know it\nis in effect. If there is a thought, an impression, a hologram within\nthe brain which carried impressions within the astral self of abuse,\nof punishment, of fear of authority, unjust action toward you and\nobserved by you that is costing any form of your creativity, ask for\nforgiveness, resolution and release.\n\nIf there are thought images, holograms, and patterns stored in the\nmemory of your brain receiving impressions at the astral level of\nstarvation, abandonment, rejection or homelessness, see them\ntouched by the light. Whenever the event may have presented itself\nin lives of your own past, release it to itself, knowing that you are\nsheltered, clothed, and met at every level of your soul’s needs. If\nthere is any stored memory impressions from the astral plane in the\n\nbrain of slaying another, of being slain, of taking the sword to\nanother, of receiving the sword from another, be it released by the\nunconscious from the astral and from the level affecting the\nphysical plane. The process from which this energy will transpire\nwill again take time for its completion.\n\nAsk that the Mind, soul and thought waves of the conscious brain\nbe released of any barriers, blockage and addictive or erratic\nbehavior affected from astral karmic difficulties. As the essence of\nthe Radiant Golden Ray fuses within all the bodies, see it bring\nabsolute balance into consciousness.\n\nAsk that reason, rational, intuitive and subjective consciousness\nbecome one, interrelated and whole. Accept that the right-\nbrain/left-brain be fully integrated and balanced.\n\nWe direct the energy of this essence of the Golden Ray in and\nthrough all the levels of consciousness that is emotionally filled\nwith insecurity, fear, abandonment and pain. Accept\ntransformation in the process of this lesson of light.\n\nWhatever is affected from the astral plane throughout the physical\nand psychic selves clears and transforms by the light. The energy\ninfused within the perception interrelates within all the systems.\nYou will experience clearing for some time from this encounter.\n\nThe Golden Ray now surrounds you as it is directed in and through\nthe magnetic field moving into a clockwise motion sealing your\nauras. This is most intense, yet you are responding beautifully as\nwe observe the bodies of all that are within the circle. Much\nhealing is taking place.\n\nBring into your personal circle of light all attached to you\npersonally and within your life. Visually see that in all of your\nexperiences the lessons are transforming all negative effects into\nlove. Ask the sharing of these bonds be for the greater good.\n\nWhen you complete your personal meditation, be in peace.\n\nMessage #2\n\nAzreal - Your soul is an individual entity. The Creator of all life\nexpressions created it. Every life form has its beginning source in\nthe Mind of the Creator. The Mind of the Creator cannot be looked\nupon as an individual entity, but perceived as a source of\nconsciousness. Think on these things:\n\n       God/Creator, which exists as the overseer of all Universal\n       Consciousness, is Mind and Spirit, Energy, Light and\n       Intellect. It is a composite of every living expression. God\n       is a composite of all organisms, a composite of all universal\n       planets, a composite of every star, every meteorite, every\n       comet and all that exists in the total universe of universes.\n       It is a composite of One Mind, of One Spirit and of One\n       Being. Out of this Being is born the Cosmic Sense that is\n       the total knowing of all activities. This Cosmic Sense is\n       then a divided force that individualized into many particles.\n\nEvery situation, every living cell had its beginning through the\nMind of God. It is beyond comprehension of the conscious ego,\nbut the evolutionary process of the individualized soul does not\ncome from vegetation, mineral or cell structure from a planet\nsystem or an animal kingdom.\n\nThe soul is an individual image of a composite of the Mind of the\nCreator.\n\nThe animal kingdom is a soul of it's own. It is individualized in the\ndifferent species that are a result of the cells and organisms\ndeveloped in an evolutionary process.\n\nAn animal, such as a dog, is a vibration that existed in other animal\nforms, not out of its individual species, but as an animal in a form\nof a dog. It will never evolve outside of its evolutionary cycle. It\nwill never be another species. It will always exist in consciousness\nas a very important part of God's creation. It is on an evolutionary\npath of its own which will take it through many stages of self\ndevelopment from one ego into another, but never becoming a part\nof another species.\n\nTheories projected are incorrect with regard to humans evolving\nout of an animalistic consciousness. There was a moment in time\nwhen the souls of animalistic species gathered to be given the free\nwill to become a humanistic form. All of the species chose to be a\npart of their own system. The human, was the species given that\ninner right to evolve back to the source in a creative form like and\nunto the image of the Creator. The human being can develop into a\nspiritualistic cosmic self. No other entity, species or living\norganism can ever become a cosmic self-evolved being, an\nintellect of light, an intellect of thought and mind.\n\nThe process of evolution of other forms of life stems from the\nconsciousness within the cellular system, but can never be\nindividual through processes. It is an emerging of life and force\nand energy.\n\nAs an entity, individualized and humanized, you have a\ntremendous opportunity to explore all of God's kingdoms. You\nhave the opportunity to creatively participate in all of the wonders\nthe earth reaps or the universe holds. Your individual right is to\ncome to a point of evolving as a spiritualized cosmic being in\nwhich your mind becomes awakened to the universal truths that\nfunction as a manifestation of all wisdom.\n\nI, Azreal, am an entity of Mind and Consciousness of Spirit. I too\nam an evolving, moving being who chooses to mediate between\nschools of knowledge and wisdom to the planet earth. I move with\nMind, by thought and integrate with those whose consciousness is\nopen to receive the healing of the body, the soul and merge with\nthe spirit of one who is ready to evolve out of the darkened state of\nsleep into the awakened state of knowing."}, {"id": "L4_36", "level": 4, "type": "lesson", "lesson_num": 36, "title": "LESSON 36", "subtitle": "BLUE", "color": "blue", "content": "COLOR RAY: BLUE\n                       The Light of Wisdom\n\nPurpose and Essence\n\nThe purpose of the Blue Light Ray is to break through the fears\nand anxieties that lie within the deep recesses of the unconscious\nand conscious levels of mind. By now, you are becoming very\nfamiliar with these frequencies and their effect on you as an\nindividual. As you experience the intensities, once again affirm\nyou are free from the syndromes and pain that overcome your\nsense of reason.\n\nSpecific Level Function\n\nIn these times of your life, where you are exposed in daily activity\nto stress and fear, your meditations are an important way of\novercoming these stresses and anxieties.\n\nWithin the practice of meditation in accordance with A Course in\nLight, it is recommended you follow a physical discipline such as\nexercise, running, yoga or other modalities to bring balance and\nclearing into the body.\n\nThis level helps you with the Wisdom to function more effectively\nin your world. You are really going through changes, so practice\nphysical wellness to enhance your spiritual being.\n\nDo Not Fear Love -- Be Love. Do Not Fear Joy -- Express Joy.\n\nMessage #1\n\nWhite Eagle - Gentle brothers and sisters on the path, greetings to\nyou from the council, greetings to each and all the brothers and\nsisters who are exploring the great link from present time to the\nancient and ancestral past of your own being. I, White Eagle, come\nthrough to speak to you of your initiatory experience.\n\nHow beautiful to watch the surrender of your will, to acknowledge\nthe need for strength and courage, the need for understanding to\nbecome the wise men of your own consciousness. In the ancient\nway of which many of my gentle brothers and sisters set ceremony,\nwe recognize the sacredness of the link from the present spirit to\nall the grandfathers and grandmothers of the selves.\n\nYou are the ancient beings presented in life at this moment to open\nthe doorway to the understanding of the soul’s eternal journey, to\nthe ultimate place in which you receive and become the Great\nChiefs or the Christ of your own expression. You come into this\nparticular ceremony to receive the energy that touches the core of\nyour own self and unlocks that which you have feared to face.\nWhen we lived in the physical body, our ceremonies would\nprepare our men and women for the challenges of the earth and the\nchallenges of the wind and the challenges of the water and the\nchallenges of the fire. Each challenge had to be met with stillness\nand strength, purity of spirit and with acknowledgment of the\nprotection of the ancient ways.\n\nTherefore, in this meditation, you are given the essence of those\nchallenges in a most subtle way. Beginning with this experience,\nperceive now that all you have been, that lies in the Great Spirit of\nyour own consciousness, is in ceremony to find and discover the\nway of its own peaceful warrior. It becomes the peaceful mentor\nand peaceful wanderer in the earth journey of life in this way. All\nyou have been collectively is brought into the fire of the light\nenergy. The energy is to dissipate that which has held you prisoner\nto fear, weakness, resistance and death.\n\nSo, beloved gentle ones, perceive the light now infused within all\nthat the astral holds in consciousness, as a thought, as a symbol, as\na design or as an ancient mantra. Perceive all this brought to the\naltar (circle) in which the pipe of peace is passed, in which the\nconflicts of rages are no longer in the battlefield of the mind.\nPerceive this beautiful symbol shared with each other and all that\nenter into your life. As you partake of this most sacred symbol,\nperceive all broken treaties between yourself and others, all broken\nagreements between self and others, released from the hold that is\ncontained in your own being. Bring it to the fire of purification and\nlight.\n\nThis is much different from Brother Andrew, Azreal and others,\nbut we all work from the understandings of our individuality. We\nwork from the Minds that have prepared our own consciousness to\nshare in the wisdom passed on to you for your development,\nunderstanding and love. As I speak, I command that all negativity\nwithin the conscious brain associated with falseness, illusion,\ndenial and death, dissipate and release.\n\nYou hold in the heart of who you are, the feelings of the ancient\nways, the ancient travels of the past of all yourselves to the now.\nWithin the deep level of your heart, within the astral/etheric plane\n\nof your being, perceive the release of the bitter root that burns,\ncausing your body to be toxic and poisoning your system. May the\ncool waters of this energy release the fires of pain in you to bring\nyou forward to upliftment and light. How beautiful to see.\n\nThe centers that connect you to your own soul are etheric in self.\nThat which you perceive as your connecting cord, the silver thread\nis the umbilical cord of your life’s dreams. Bring the Wisdom Ray\ninto effect to unlock any past conditions that have severed you\nfrom your own life force.\n\nWhatever has brought death to your bodies, to your lives, whether\nit be in persecution, whether it be in crucifixion, whether it be in\nstoning, whether it be in the battlefields, whether it be in disease,\nwhether it be in any form of limiting expression, be it now brought\nto the light. Let the peace of higher consciousness merge within\nyou and through all the levels of lives of your consciousness.\n\nIn the vibration of this Blue Ray associated with the cool waters of\nlife, merge with your body bathing it in the essence of love, wash\nthat which has been in pain, abuse, punishment and denial.\n\nThe bowels of the earth are spewing forth all the inhumanities\ncreated by human separation from its own God and spirit of love.\nThe earth begins its trembling in its preparation for its birth into its\nevolution and in its millennium of life and to its full peaceful\nintent.\n\nYou are the warriors of peace. You are those who came on the\nwings of light, descending like doves into this earth plane to bring\nthe message to all who open to receive. Do not be concerned that\nthere are ears that cannot hear or eyes dimmed to the vision you\nexpress. Do not become discouraged by those who cannot swallow\n\nthe meat of your own truth. Those ready to walk forward and plant\nthe seeds from which the harvest emerges, have a great feel of new\nlife with open arms, they will receive you with open minds and\nwill absorb the light.\n\nSo it is from the ancient ways to the present time, a blending\noccurs, a movement forward to unite that which is of its more pure\nform of living, into the heart of all who are ready to reach that\nexpression.\n\nI, White Eagle, have come forward within this council to share, to\nunite the redskin tribal activities and to bring the medicine of the\nShaman. To bring the ways of the physician, to blend the\ntechnologies gained and the ancient ways of the earth, to bring\nabout a wholeness of understanding and to integrate the lives into\nits future expression. I believe and relieve you of the burdens of\nyour past. You walk with new understanding, as though your feet\nare fitted with new moccasins, helping you touch the earth and yet\nrun like the wind.\n\nI leave you with this beautiful prayer being a sound and thought of\nfather / mother spirit of all that is.\n\nLive and flow in the heart of which I am and nurture the earth with\nthe tranquility of peace."}, {"id": "L4_37", "level": 4, "type": "lesson", "lesson_num": 37, "title": "LESSON 37", "subtitle": "EMERALD GREEN", "color": "emerald", "content": "COLOR RAY: EMERALD GREEN\n                      The Light of Creativity\n\nPurpose and Essence\n\nAs you review the essence of this Emerald Green Ray, recognize\nthat this energy is used to magnify your creative urges which stem\nfrom achievements of the hidden desires of your past life activity\nas well as your present life experiences. If there are blockages\nwithin this center, you may experience discomfort within the\nthroat. Soreness or tightness in the throat can erupt during the\nactivations of this particular frequency. As you keep your journal,\nreview your thoughts and feelings about your desires in regards to\nyour creative sense.\n\nSpecific Level Function\n\nWithin this level, you may experience flashes of lives experienced\nwhere you used latent creative talents. In meditation, concentrate\non releasing the limiting factors that stem from ideas, thoughts, and\nconcepts that block your ability to manifest your desires.\nRepeatedly, we need to be patient with ourselves in overcoming\nconditions that are difficult in this path.\n\nInnovators, inventors, musicians, artisans, writers, poets, dancers,\nactors, scientists, astronomers, healers, all these exist as\npossibilities within you. Ask that your true desire reveal itself to\nyou.\n\nMessage #1\n\nAndrew - The joy emanating in this moment is not be fully\ncomprehended. However, know in the center of your\nconsciousness, many are with you vibrating and releasing many\nbeautiful energies of light.\n\nAs we look about you and see the auras of each of you in an\nindividual way, we perceive tremendous expansion. There is a\nreaching out to touch those desires necessary to complete your\njourney through this earth activity. You all have been moving\nquickly through the evolving process of experiencing the\nuncovering of many hidden factions of your own self. Through\neach method and technique, you have come to realize the shells,\nthe coverings of your consciousness can be put aside. This is so\nyou may emerge with the purity of your first knowing of light.\n\nYou are now in a plane where the activity of your etheric/ astral\nself is manifesting in a predominant action. Through this activity,\nyou are touched at the inner patterns corresponding to the frequent\njourneys of your soul.\n\nWe clarify one faction. The higher self, the overself or over soul, is\nthe cosmic effort of all that you are. The over soul understands and\nknows itself as a universal being. The communicator receives\ndirection from its own source corresponding to its first birth. The\nover soul and overself can be perceived as the cosmic reality of\nyour own consciousness.\n\nYour soul attunes itself to the plane where there is communication,\na bridge to that level of experience. Our presence works within the\netheric plane, connecting between your physical and conscious\nself.\n\nYou work through the attachment to incarnating experiences that\nstand as obstacles to your being in present focus, for you all carry\ndeep within the recesses of the unknown, the patterns of your many\nmyriad lives. Therefore, the predominant ray that you perceive and\nvision as the Emerald Light magnifies and directed into the essence\nof your own astral/etheric plane. Within this system, the energy\npatterns that correspond to the thoughts of your conscious self is\nalso touched by the light.\n\nIn the past lesson the arch type was presented such as the king/the\nqueen, the slave/the priest, the impoverished/the wealthy imprints\nof your soul.\n\nIn this lesson, we touch The Teacher of your own conscious-ness.\nYou teach those who walk beside you as well as receiving the\nteaching from the guidance of your own soul. Yet, often you still\nfeel blind to this inner guidance.\n\nPerceive all fears of what you must learn, all fears of the lessons\npresented, fears of the tests that the soul releases into the light.\nJudge self not by another's abilities, for great teachers are those\nwho in silence exist and emanate as light.\n\nTo be a teacher of all teachers you must know the wisdom of the\nsilent tongue. You reveal not all what you have gained, for to spew\nforth all the wisdom to one who cannot comprehend is to be a\ndetriment to the learning process.\n\nTherefore, even I, Andrew, relate only to each of you, as you are\nready to accept, integrate, and digest. In silence, experience the\nfear at being the walking teacher and release this fear into the\nessence of light. Experience the flow of energy moving into the\n\nconscious plane into brain/mind thinking, and feel the vibration\ndirected in through the mental process of your individual thought.\n\nIn the past, your lessons came in the form of certain tasks, such as\nto sell and give all that you have to another, be stripped of all your\nresources in order to understand your total acceptance of the earth\nas your abundance. To another, the task is to gather all the children\nto shelter, clothe, and feed, to be patient, to nurture and to heal. To\nanother, the sword in the battlefield is the lesson or the discipline\nof total silence and gaining awareness of the senses. All these\npatterns have been a part of your experiences. To another, gifts of\ncommunicating with spirits in the beyond, the opening of the ears\nto hear the wind, and in the sea, in the earth, a movement of Spirit\nand Creator of the presence of light. Affirm in each of these tasks,\nthe tests are completing.\n\nReceive the brilliant light corresponding to the astral plane within\nthe centers of the creative and communicative self. Obstructions\nwithin the voice box ethereally affect that of the outer and\nphysical. Receive the vibration of the Emerald Green Ray, honing\nand toning the vibration from which sound occurs, healing the\nwords spoken in anger and foolishness.\n\nAs you unleash vibrations from these past memories, perceive a\nfreedom to speak and communicate without fear.\n\nVibrations of the Radiant Emerald Green Ray move in and\nthroughout the corresponding frequencies of the respiratory\nsystem, where the breath of life moves throughout your\nconsciousness. Again, feel, expand, grow and free your\nconsciousness. Bound by pain, rage and disharmony, begin to\naffirm that oppression, enslavement, separation and rejection, of\nyour destiny, be released.\n\nIn the astral/etheric level the correspondences to your individual\nself resides many common patterns of the races and nations of the\nearth. Perceive clear karmic development. Many of you will\nexperience flashes of the past. As these flashes occur, bless each\nexperience for as you disconnect the injustice and rage you\ndisconnect the power of that vibration.\n\nRegarding matters of the heart, experience love accepted, and\nunrestricted. This is most difficult. Experience the rays of light\nmoving intricately through the entire astral plane into the source of\nthe feelings of your present being. This is a most beautiful\nexperience as the inner healing takes form. As vibrations manifest\nthroughout the sensory nature in the astral plane, the deep root of\nall of your knowing flows together.\n\nThe healing of the heart is the most important key to the healing of\nall the physical senses. The healing of the heart comes through the\nacceptance of in all that is a part of your experience. To limit your\nsense of acceptance, either by yourself or by another, is to hold you\nprisoner to a state of limiting energy blocking the flow of healing\nlight.\n\nAs this motion is in effect, all the fears so prevalent within you\nsweeps into the vibrations of energy. You need not focus on the\nevents of your pain, just know the impressions causing the pain, is\nhealing. The vibration within the astral body is in an explosive\nhealing process.\n\nCall forth those in your life who also need these ways to heal the\nunconscious and conscious self. The power of this process cannot\nbe assimilated by your thought, but is recognized by the changes in\nyourself and your experiences. At this moment, light flows. All\nthat corresponds to past energies in which you abandoned self,\n\nyour soul's memory of loss, of fear, your soul's memory of death,\nyour soul's memory of violence, your soul's memory of being held\nin judgment for speaking the word--all of this is in the light.\n\nProcesses have always been in effect, but there is little reference\nabout going through the transformational experience. However, the\nlight touches those ready for the shift in vibration to their higher\nself. The preparation for you to receive this opportunity is very\nintense because it is too difficult to just walk into the light without\nfirst understanding the many shadows of your own consciousness.\nYou cannot subtly be enlightened without understanding the\ndarkness of your own being.\n\nSo now walk hand-in-hand with your challenges and your sense of\ndirection to its ultimate state of peace. In these processes, the astral\nself receives what is spoken. The imagery in the astral\nconsciousness confronts choices. You as the bystander, observe the\nmaking of choices in this moment of time. Receive the gifts. Let\nthe energy and power be absorbed and love fulfilled.\n\nWhen the body has responded with severe pain, when the body has\nregistered tremendous intensity of vibration of disharmony, this is\nthe releasing of much within. So the pain will pass, the intensity of\ndiscomfort will release and your conscious self will know a\nfreedom within your being.\n\nThe gift of consciousness to teach, to be communicators, to be\nresourceful in your life; it is stated “you will achieve.”\n\n       In my completion of this experience I awaken to my body\n       with joy, healing and love.\n\nGround\n\nWhen you come back ground your energies holding the message\nwithin your heart. Let the light of Emerald Green flow through you\nand fulfill your consciousness with new thought and creative\nintentions.\n\nAffirmations\n\n       I release all barriers to my creative desires.\n\n       I see a freeing-up of my resistance to express myself\n       emotionally and perceptually.\n\n       I can express myself verbally without fear of conflict and\n       resolve to balance personal relations"}, {"id": "L4_38", "level": 4, "type": "lesson", "lesson_num": 38, "title": "LESSON 38", "subtitle": "VIOLET-PURPLE", "color": "violet", "content": "COLOR RAY: VIOLET-PURPLE\n                     The Light of Divine Will\n\nPurpose and Essence\n\nThe purpose of this energy is to release from within self the ill-\nwill rages that exist as a barrier to the desires of the higher will.\nEach one encounters situations that may block the individual’s\ndesire to manifest his/her own individual purpose. Patterns of the\nconscious self may set up resistance to the greater good.\n\nYou may have a history in which something seems to block the\nvery intent of your need and design. Your history may be wrapped\nup in some negative pattern of another time. You will bring the\nenergy of this ray into your unconscious and conscious selves to\nhelp release and heal these patterns.\n\nSpecific Level Function\n\nThe meditation of this particular ray is to work intricately with the\nastral/etheric self to release the patterns that may be holding you\nback in karmic wheels of repetition. In your daily meditations\nbegin to visualize what you perceive as your particular purpose in\nthis life. Release the thoughts and perceptions that keep you bound\nto unfulfilled consciousness.\n\nVisualization is a tool of the conscious self, as well as the\nunconscious self, to bring clarity of desire and purpose into your\nlife. Remember:\n\nYou are the creator of your own reality. You must begin to work\nthrough the situations that keep you from your sense of joy and\nlove.\n\nIntensities arise with this particular ray that may create extreme\ndiscomfort. Aggressive behavior may rise to the surface. There\nmay be feelings of rage against conditions of the past that held you\nin a state of suppression. Many students seek means to release\nthese rages through therapy, or rebirthing, regressions or past life\nreadings. Discussions with a close friend can also be a way of\nalleviating the repressed hostilities.\n\nThis frequency also brings joy, expansion and lightness as the\npersonality feels clearing taking place from the wounds and scars\nof the past.\n\nMessage #1\n\nMarcus - It is good to speak. In this moment of light joy is the\ncenter of consciousness. As you center, joy lifts the conditions of\nyour life into perspective where you see all situations in right\naction.\n\nLife is opportunity and challenges meant to enhance your strength.\nAs peaceful warriors of the path of light, you are challenged to find\nyour strength. While conditions cause you to feel insignificant,\ndenied, in pain, blocked or in fear of death, these cycles of emotion\nassist you to develop as peaceful warriors of light.\n\nIn this lesson, you experience the honing and toning of all things\ncreating separation from your inner and outer will. In the\nastral/etheric lessons, you face karmic patterns of just and unjust\nactions. Think in these terms:\n\n       You have opportunities to enter into the perspective where\n       the Law of Grace becomes your experience, understanding\n       and life.\n\nTo walk in the Law of Grace you develop understanding and faith\nthat “every aspect of living has its own just order. In the cycles of\nlife, there is a perfected pattern.” You face each experience\nquestioning the battle of egos against the divine will.\n\nThese challenges are difficult. The answers for understanding all\nthis comes from the depth of your own being. When the tears and\npain shed from fears, guilt and rage the purification becomes more\ncomplete. As the body responds to the energy of light, the mind\ngives up the limitations, resistances and pain. Then it attunes to the\ndepth of love.\n\nMeditation\n\nLet this journey begin in the path to peace through the divine will.\nVisualize you are in a room glowing in a Violet Purple Energy. In\nthis room, you are inviting all those who are teachers and way\nshowers of your path. You also invite all who have participated\nwith you in your many lives and experiences. Perceive each one\nwho exists in the astral level infused in the energy of light.\n\nYour purpose is to release ill will and rage concerning negative\nconditions of historical events involving your participation and\nimposed upon you. Release all persecutions placed in your lives\n\nthrough limitations of ideals. Release all blocked desires hopes and\ndreams. Perceive in this moment that the flame of light moves in\nand through these dimensions of your astral self. The flame of light\nfrees you, purifies the effect of all the persecuted intent upon your\nsoul, upon your consciousness as an entity, upon the human race as\na whole, and upon the ideals you have held as sacred activity. Be it\nfree from within to without.\n\nThe light, the astral plane and the astral self are free to release the\nmental wars. Let truth and peace come into consciousness from the\ndivine will.\n\nThe essence of the light energy is as a flame touching each and all\nwithin the astral system to the physical, interrelating, and\nunlocking any correspondences from the inner to the outer.\nIntellect may not comprehend or follow the process. Put your\nIntellect aside and allow the experience to fulfill itself.\n\nEach time we stand by the order of the hierarchy to intervene with\nthe conditions of your life accelerating your process we are given\ncertain instructions to work with group consciousness and\nindividuality. As we speak to you within a group, you nevertheless\nexperience this process individually.\n\nWe activate the flame of light corresponding to the respiratory\nsystem. The breath of life flows within you and through you. The\nbreath of life is the source of your living consciousness and\nphysically is the source that brings all actions of physical\nconsciousness into being. The demand and command of the Order\nof Melchizedek is to release any karmic resistances to allowing the\nfullness of the breath of life to exist in you, through you at all\nlevels.\n\nPerceive the cycle of your breath coming into a deeper rhythmic\nactivity. Breathe in, breathe out, and release all pain, all fear, all\ndenial and all resistance.\n\nThe process of this particular experience is simple realizations,\nreleases, forgiveness with openness to love, the connection to the\nsource of your being.\n\nA teacher/master takes a student through the path setting the\nfoundation for understanding and guiding the way, allowing the\nstudent to discover strength, power, and direction through its\ninnermost guiding expression.\n\nThe Order of Melchizedek becomes the sources of your inner and\nouter direction and yet, frees you to rediscover your own wisdom,\ntruth and love.\n\nThe process is in completion, closing visualization.\n\nPerceive your body and all the physical chakras in the flame of the\nViolet-Purple Ray bringing grace into your consciousness,\nbreaking the mode of rage, denial, resistance, limitation and fear.\n\nThe closing mantra affirmation is:\n\n       I am the will of light, living through the expression of love.\n\n       I walk peacefully, with strength and joy.\n\nEmbrace the light; perceive it as a brute, a strong substance. I,\nMarcus, release you and may your mind, your heart, and your soul\nbe free."}, {"id": "L4_39", "level": 4, "type": "lesson", "lesson_num": 39, "title": "LESSON 39", "subtitle": "RUBY RED", "color": "ruby", "content": "COLOR RAY: RUBY RED\n           The Light of the Left Hand of the Physician\n\nPurpose and Essence\n\nThis frequency is an intense energy for the healing process. The\nRuby Red energy activates for physical healing and most effective\nfor emotional release.\n\nWithin the astral/etheric level, you are working to alleviate old\npatterns deeply seated within the unconscious, as well as working\nwith the conscious self to alleviate the pains of the heart\n(emotional) or physical pains that create discomfort in the body.\nAs you meditate within this energy ray, perceive you are clearing\nup old relationships and conditions of the mind that keep yourself\nfrom truly experiencing the loving whole person that you know\nexists as you.\n\nSpecific Level Function\n\nThere are many methods one can use to better understand your\nown personal self and what creates the behavior patterns of your\nlife. As you work with this Ruby Red energy, it is a good time to\nreview your habits of nutrition, exercise and physical awareness. It\nis also a good time for searching to know your inner self.\n\nAs you meditate, perceive that the body and the etheric self are\nblending in a harmonious vibration of light. Perceive that all the\n\nills of mind, body and spirit release into the energy of the radiant\nRuby Red Light.\n\nToni\n\nThe lesson today is Ruby Red and it is in the astral level of A\nCourse in Light. We are discussing the healing of this ray and how\nto apply it in practical ways. We have talked about how Ruby Red\nis used to heal relationships and relationships are a part of\neverything you do, think or say. You are relating to your body.\nYou relate to your thoughts, to your emotions, to your perceptions\nand to your belief systems. There is a relationship between you and\nyour belief systems. The focus for this particular session has been\nabout our relationship with money and the history of our\nconsciousness in relationship to money. In addition, the focus is for\nhealing any conscious belief, which is a negative judgment about\nmoney or a negative judgment about yourself or a negative concept\nwith your status with life energy, life purpose and your life\nposition.\n\nSo our meditation today will be on healing our consciousness\nabout the most important tool of our life, which is our tool of\nservice and our tool of healing which all are enhanced with\nprosperity and abundance.\n\nSo let us begin. Focus your thought, your awareness and all of the\negos to the center of the forebrain.\n\nPerceive the consciousness of the personality ego centered in this\nplace and the consciousness with your body and all within it. To\nthis place, this center of your physical self, we draw the ego and\nhigher self-ego into this center of human thought. Moreover, with\n\nall egos connected, just think, you are together with one mind, one\nthought and one consciousness, unified.\n\nNow direct this consciousness and egos to the star center, moving\nthrough the astral etheric into the fifth dimension of your soul body\nof light. Within this center of the Radiant White Light, perceive its\nfrequency magnified. Think of this White Light or know this\nWhite Light is expanding and clearing your magnetic field. It\nclears the magnetic field around you mentally, emotionally,\npsychically and physically. Just accept you are clearing away\nwhatever has been picked up through the week or from other times.\nYou are doing a clean sweep of White Light, moving counter\nclockwise through your magnetic field.\n\nNow as you activate the Golden Ray and the frequency of this\nlight, it just automatically raises the frequency rate of your\nphysical body and all that is within it. And to raise the\nconsciousness of your mental self, we are going to focus on this\nthought, I create my reality. I create it abundantly and with\nprosperity.\n\nAnd as we move into the frequency of the wisdom ray, perceive\nthis light clearing fear, doubt, confusion, conflict and especially\nany doubt, confusion, conflicts regarding your abundance, your\nwealth, your monetary relationship. You are letting go of fear of\nhaving money. You are letting go of fear of managing money and\nyou are letting go of fear of receiving money, earning money and\ngaining money. You are receiving consciousness of wisdom and\ntruth to assist you in this healing.\n\nNow into the center of the Emerald Green, this center is your\ncreative and communication center and is very related or relative\ntoo how you create your abundance, how you express your\n\nabundance and how you are balancing your state of consciousness\nabout money. We are going to magnify the Radiant Emerald\nGreen, moving it counter clockwise to balance the polarity of your\nmasculine and feminine self. Let go of all fear, conflict, resistance\nand pain surrounding your relationship to money.\n\nNow move into the will center and focus to bring unity and\noneness from your higher self, your divine consciousness, with\nyour human nature and your conscious ego. Here we unify these\naspects and we affirm: We are surrendering all fear, conflict,\nresistance and pain to the higher self and the Light. We are open,\nreceptive and empowered with Divine Love guiding ourself with\nabundance, prosperity and our relationship to money.\n\nNow into the center of the Ruby Red, perceive its vibration\nintensified. This Light brings you a healing within, on levels you\nneed for your wellness. We are going to activate all the other\ncenters, Orange, Pink, Amethyst, Mint Green and Scarlet and bring\nawareness to the heart chakra and into the energy of the Radiant\nRuby Red. Feel your heart chakra open like a rose. It just opens all\nits energy and the frequency moves throughout all of your bodies\nand with it you are healing yourself from anger, from rage and pain\nconnected to fear about yourself, your relationship with others and\nyour connection to your wealth and abundance.\n\nNow go deep, deep into your inner place so healing comes through\nand the guidance of the masters leads us through our individual\nhealing.\n\nMessage #1\n\nAzreal – Greetings, this is Azreal we are most pleased to observe\neach of you in your evolving elevating growth. We observe the\n\nquestions, we observe the process, we observe your records of your\nsoul’s journey and in this moment there is an experience for you in\nwhich the flow of Light moving through you is healing the deepest\nfears, traumatized by past events, inherited conditions and past life\nexperience. Though you cannot see and may not know vibrations\nthrough this opportunity to you, it is connecting with your soul and\nethereal/astral self along with your physical nature. The flow of\nlight moving through these levels of your individual self is\nbringing you to a place of healing in your heart, the core center of\nsoul and spirit. Energy of light moves to those patterns, images,\nimprints, impressions of which you have been left without your\nneeds met, in which you have felt the lack of shelter, clothes, food\nnecessities for life. When these experiences are part of the\njourneys, these imprints remain as the conditions, but with light,\nlove and divine thought, with the power of grace, the essence of\nyou is brought to a new cycle of your life.\n\nSo, I ask each of you to see and to be in the radiance of this healing\nray and whatever is deep within yourself that creates fear or loss,\nemptiness, resistance, a barrier to your good, place this in the light.\nSome of you may see an angel in front of you. Others may see the\nbeloved Lord Jesus and some of you may see others of the Light. It\nis a sacred moment of your spirit and it is good.\n\nTo each of you is given reminders of your state of relationship to\nthe Source, to the God/Father of who you are. In this moment,\nunderstand you are blessed and you are meant to be alive and well\nand joyfully able to share whom you are. Whatever the barriers and\npains from relationships of you past, accept as I speak a shift, a\nchange, an opening to new growth and opportunity.\n\nAccept as I speak, you have a sign, a sign that is your symbol for\nyour prosperity, abundance and its relationship to your heart. The\n\nwords cannot speak of what now is in motion. You are in an\nexperience you asked to explore and be a part of in this event. We\nhave spoken that the shift of time and the shift of human awareness\nis in motion, it affects all parts of life and you are a part of those,\nstepping into a new phase of your opportunities and it is good.\n\nWealth is freedom. It is the freedom to choose. It is the freedom to\nbecome what you visually see in your reality. Wealth is abundance\nof time, abundance of love, abundance of spirit, abundance of\nintent. Accept as I speak that you are abundant, that you have time;\nopportunity, intention and you are guided in all your actions.\nAccept all is in motion now. There is a new power coming through\nto assist and the children are called to step to the Light and its\nopportunities. Therefore, as we speak with each of you, all of you\nwill have much to celebrate.\n\nNow the flow of Light moves internally with you intricately with\nthe soul and the astral/etheric self too. In addition, whatever\nobstacles and patterns, impressions of inherited conditions be\nreleased and let, it is that you are free from negativity. In this\nmoment, intricately the light flows in between all the selves,\nmentally, emotionally, psychically and physically. Now this\nprocess of its integration in you will be very clear for you. Do not\nworry, just be and know that you are one with Divine Love and it\nis good.\n\nLet the growth be expressed in confidence and humbleness and\nservice and healing and know you to be apart of this reality. Now,\ngo in peace."}, {"id": "L4_40", "level": 4, "type": "lesson", "lesson_num": 40, "title": "LESSON 40", "subtitle": "ORANGE", "color": "orange", "content": "COLOR RAY: ORANGE\n              The Light of Perception and Sensitivity\n\nPurpose and Essence\n\nYou may recall from your previous lessons that this frequency\nfocuses mainly on the perceptual self and the clearing of psychic\ndebris that comes from the overload of negativity arising from\noutside sources. The environment, negative mental energy of\nothers and negative mental thoughts you create can all produce\nnegative psychic energy which can appear as hypertension,\nnervousness, frustrations and fear. All of these can contribute to an\nupset system, which results in loss of energy, stress, physical or\nemotional imbalances.\n\nThe frequency of the Orange Ray clears up the energy of low\nnegative input and processes away these imprints on your psyche.\nThe magnetic energy field around you becomes clearer as you\nmove into this frequency of light.\n\nSpecific Level Function\n\nWithin the etheric level, this ray is more intensely directed to the\nperceptual self and the etheric/astral self. So, within this ray,\nperceive yourself letting go of attachments that create negative\nresults in your life and experiences. Let go of the thoughts and\nfeelings that arise from the intensity of negative patterns. See\n\nprojections that have come from others also disentangled from\nyour energy field and consciousness.\n\nBy now, in this light work, you may be experiencing quite an\nexpansion in your sensitivity, such as insight, increased dream\nstates or feelings of things that are about to take place. You may\nalso experience sensitivity to light, sound and color. You may have\nthoughts or impressions that actually come from your friends or\nsituations from work or other conditions. These can be exciting\nexperiences for you.\n\nYou may find yourself wanting to try out coquina boards,\nautomatic writing, tarot cards, numerology, astrology and other\nforms of psychic tools. These can be fun methods of seeking out\nphysic impressions, but they are not the way to discover your own\ntrue spiritual self. They are psychic tools. Use them wisely.\nCaution should always be a part of delving into these matters.\n\nIf you are personally feeling extrasensory abilities opening up\nwithin you, research these areas. Always surround yourself in the\nRadiant White Light and ask for guidance from sources that are\ntruly of higher intelligence.\n\nAs we have spoken repeatedly, you live in a sea of energy that is\nthe effect of all collective consciousness. These fields of energy\ncan influence you.\n\nToni\n\nWe are going into our meditation and the lesson is in the frequency\nof Orange. This is the astral level which is a healing process\nconnected to past life experiences we carry to heal in this life. It\nalso relates to healing mental, emotional and perceptual patterns\n\nthat are uniquely individual. It is about giving up the fear of being\nunique, different, and sensitive.\n\nOrange is a difficult vibration to assimilate. It can feel\nuncomfortable. It can affect your nervous system and the way you\nsee yourself or the way you see other situations and other people in\nyour life. Orange helps you break through perceptions you had in\nwhich you felt inadequate, not accepted, unrecognized, separated\nfrom other people, not understood, feeling victim in the interaction\nwith your goals, with your visions or your expectations. But on the\nhigh side Orange brings you release and relief from what holds you\nback, from your thoughts and feelings of inadequacy or being\nwithout joy and happiness and love.\n\nTherefore, in the meditation our goal is to break through the barrier\nthat separates the consciousness of true acceptance of love and to\nbreak through that barrier to open to all the wonderful expectations\nand possibilities that are your creative desires. In addition, in a\nhealing way, when you are in harmony and synchronicity with\nyour visions your hopes and your dreams, you find you are flowing\nwith the energy of everything. Your life then becomes a reflection\nof this synchronicity and harmony and balance.\n\nSo we focus on bringing all awareness of all egos into the center of\nthe forebrain. …\n\nMessage #1\n\nJove - This is Jove, walk with me down the path in which you can\nsee and envision the beauty of nature and all of its creation. Walk\nwith me to a special place that represents your quiet connection to\nspirit, to the silence of the mind, to the reflection of who you are.\nYou may see a pool of clear water, rolling over many stones, this\n\nrushing water consciousness rushing through you right now, and it\nis good. It is clear. It is cleansing.\n\nFeel yourself letting go of all of the pain inside of you. Let the\ntears flow like the river inside and outside of you. Let the tears be\nthe release of all that has been deep within you. For I tell you as we\nare in this moment of Light, a magnificent process is affecting the\nmany parts of you in the body. Past lives have not been journeys of\ngreat joy. Past lives have always been or often been sorrowful\nunhappy, enraged without justice, without love.\n\nSo in the activity of your astral nature these wounded ness, these\nwounds have come with you but I am standing here and much is in\nmotion to heal and all of you have guides standing with you as we\nconnect to the process. Do not worry about anything for it all is in\nits rightful place and you will see, sense and know great relief as\nwe process with you all that is in effect.\n\nIt is not necessary to know when you struggled so. It is not\nnecessary to see what was before but the radiance of this light is\nflowing in you now and the inner activeness is processing much,\ndeep energies within your astral nature, your etheric self and the\nrecords of your souls memory. In this safe circle of light you are\nfreeing yourself from the past for the barriers to be broken down\nand for the suffering to end.\n\nYou asked for dignity, for recognition to be whole and complete.\nYou are being touched as I speak. Our council is here and Azreal\ntoo and Andrew and Joshua, he is with you. This is a circle most\neffective in breaking through the ancient egos that would cause\nuncertainty and duplication. So again in this quite beautiful\nspiritual place and the water rushing by see yourself letting go into\nthis river what you need no longer what is apart of you. Be open to\n\nthe messages and to what is ahead. You have many things in which\nto do and many things to accomplish, yet.\n\nTell yourself whatever dramas were a part of your past experience,\nthose who harmed you severely, traumatized you, have the lessons\nof their own and you forgive. You are not a part of their reality.\nYou are not stuck in the etheric system, in battles of the history.\nYou are no longer; enraged by things you cannot understand. You\nare no longer, a part of what others demand of you that you cannot\ncomplete. The vibration of you, the essence of you, the soul of you\nis being touched by these frequencies and you are entering a new\nstage of your opportunities.\n\nLet go of all of the pain which has been mentally, emotionally and\npsychically affecting you. Let go of all that has been a grief inside\nof you, a wound or discontent. And let go of all those who have\ntouched you in ways you did not want and let go of all things that\ntook away your sense of dignity; let it go and be free.\n\nWalk with me across a bridge and know it is symbolic too, for as\nyou cross this bridge of thought, you are stepping to a new phase\nfor you, a new activity of Light that embraces you.\n\nAs masters, we come just to be the teacher of your soul but we\nbring great love for all. Many people of this spiritual source meet\nyou, by those who walk with you in this life, for others too. As you\nsee, sense, or feel you are communicating with beings of Light it is\ngood but know that all you wish to express, you have abilities to do\nso.\n\nBring back your awareness to your conscious self and ground your\nenergies through the Black Power Ray. Go in peace."}, {"id": "L4_41", "level": 4, "type": "lesson", "lesson_num": 41, "title": "LESSON 41", "subtitle": "PINK", "color": "pink", "content": "COLOR RAY: PINK\n                     Divine Love and Balance\n\nPurpose and Essence\n\nHere you are again in the beautiful light of the Radiant Pink Ray,\nthe energy of balance, harmony and perfection. You may be\nlooking around you and saying, \"I don't believe this, everything\naround me is in confusion, disorder and imbalance.\" Remember\nthat you are creating for your tomorrow’s and you are also reaping\nwhat has been in the past. Therefore, know that certain time must\npass before you can fully experience the benefits of these lessons.\nYou are re-constructing your consciousness and you build what\nyou are and experience in life over a period.\n\nNevertheless, this frequency has a beautiful effect on your\nconsciousness and does bring the feeling of balance and harmony\ninto your emotional, mental and physical self. Within the\nastral/etheric self, it should break up conditioning that is embedded\nthrough long lives of past imbalance.\n\nToni\n\nWhen channeling this lesson and message I was remembering the\nfeeling of the Christ's Spirit speaking in the readings of the first\nlevels. There is such a noticeable difference in the vibration, the\nbeauty and the harmony. The sensation is indescribable. The\n\nrealization now is that this is what we are seeking to experience\nwithin ourselves in a normal everyday activity.\n\nHowever, we all have our lessons to process and grow through, but\nthe joy that wells up from within surpasses all the turmoil that may\nexist on the outer levels of your life. In this energy ray of the\nRadiant Pink Light, truly seek to put aside your personal anxieties\nand experience the calming and the love of this lesson of love.\n\nMessage #1\n\nAndrew - It is so. The Creator is created in you. The seed of divine\nlove is that which grows each and all times that you accept it as a\nbio-living form within you. Though you have experienced duality\nof consciousness, though you have walked in earth observing the\nbroken law of love, you are still resourceful. You have within you\nthe resources to restore your consciousness to a place from which\nbalance and love can be fulfilling and completed in all things.\n\nThe lesson, beloved students, is to acknowledge your worthiness to\nexperience the power from which the law of love integrates with\nall that you are. Though you judge yourself by your experiences,\nyour experiences are but the stepping-stones to discover the\nhighest point of your evolution, which is to receive the degree of\ndivine love. You cannot be in full enlightenment without knowing\nand experiencing the power of the divinity of love. So you search\nto respond and feel love through all the myriad activities of your\nlife.\n\nYou look at beauty, cultural, artistic and imaginative images of\nman's intellect and you see these as loves. Therefore, they are, for\nthey are created from a vibration of productivity out of love.\n\nHowever, nothing of the outer can truly connect to the source of\nwhat love is within you.\n\nI ask each and all of you, beloved students, initiate in this pathway\nto God's graceful activity of light, perceive you like a lotus\nblossom with many petals. Each petal reflects living lives of your\nconsciousness. Each petal reflects many of the lessons of your\njourneys. Each petal responds to the essence of love. Each opens\nwide to explore the true beauty of this whole, symmetrical,\nperfected consciousness.\n\nThink that you, as a being, are more beautiful and brilliant than the\nzymology of this most sacred form of creative consciousness. The\nlotus blossom reflects a zymology of you opening to the innermost\nheart of self and to the astral consciousness, which has held in\nmemory all the many ways you have experienced your own path of\nservice to earth and desire of fulfillment in earth.\n\nAt this moment, this lotus blossom is felt in the third eye, felt in\nthe chakra of the throat, to the heart chakra, to the solar plexus, to\nthe source of all your creativity. Perceive that each and all\nmemories of the astral systems are infused into this vibrant\nvibration of light. Truly, let go of your fears of being denied, of not\nbeing accepted to higher initiation. Let go of your fear of not being\nready to experience love, fulfilled humanly and divinely. Truly, let\ngo of your fear that you fail yourself and you fail others through\nyour struggle to discover the inner-most truth.\n\nRelease beloved students, your pain and your resistance. Release\nyour denying consciousness of being in truth and love. Let it go.\n\nYes, you fear change. Yes, you fear the corner that you must turn\nin order to see the next phase of your own evolution. Yes, you fear\n\nopening the door to step into the greater perspective of your life.\nHowever, we would not lead you into destruction, only that which\nbrings you the lightness of love and truth and grace.\n\nAs the astral self is experiencing empowered energy from this form\nof essence of light, think: Whatever disease has disrupted any\nformer patterns of my existence, I release now the root cause, the\nroot entanglement and the root of the pain.\n\nI acknowledge a healing by the touch of my soul’s spirit into my\ninnermost consciousness. The lesson for this particular experience\ncannot be fully understood, but your heart and yourself will know\nan ultimate change, a step into a next plateau never to return to the\nformer confusion and to move intricately into the next expression.\nYour gratitude is seen and felt. Our rejoicing in the gratitude is a\ncelebration.\n\nBy the Order of Melchizedek, by the order of the Christ\nConsciousness, all who are in Earth, in the circle of light,\nexperiencing this particular expression of evolution, be free from\npain, and be free from anger. Be free. Perceive yourself embraced\nby the master of your own soul, by the teacher of your path.\n\nWhen you awaken, and all that you are has reconnected to the\nphysical, accept your consciousness and your body as beautiful\nforms, beautiful vehicles of your personal being clothed in light,\nadorned by your own desires and responding to the opportunity of\nyour own expression.\n\nNow I release you. Go in peace. May the living light, the flame of\ndivine love, be in and through you."}, {"id": "L4_42", "level": 4, "type": "lesson", "lesson_num": 42, "title": "LESSON 42", "subtitle": "AMETHYST", "color": "amethyst", "content": "COLOR RAY: AMETHYST\n                             Warrior\n\nPurpose and Essence\n\nThe purpose of this energy is to uplift and clear the diseases that\narise from the conflicts, which are stored in your physical and\nemotional/perceptual selves in correspondence to the astral/etheric\nlevel. In the etheric plane, this energy unlocks the negatives,\nimprinted in your unconscious selves.\n\nThe Warrior Ray is so named because of its intensity that can\ncreate irritation and impatience. Realize, however, that the warrior\nis one who confronts an enemy to protect the concepts and ideals\nthat call for battle. Therefore, this energy goes to battle against\nsituations within you and surrounding you that need to be dealt\nwith.\n\nSpecific Level Function\n\nThis frequency is used to ward off all the infectious diseases that\ncreate havoc to your body and mind. Each of you experience\nconditions that cause a warring factor to arise, unless you have\ncompleted much of your personal conflicts. The surprise comes in\nhow often you have felt you already cleared up certain issues only\nto have them show up repeatedly. This can generate\ndiscouragement. If you look around though and observe certain\n\nprograms dealing with self-improvement, you will notice that they\nare not quick roads to recovery either.\n\nYour reactions to this energy may surprise you, as you may seem\nto get out of hand with your temper or confrontations. You are not\nto be expected to be doormats to injustice, nor are you expected to\nbe afraid to stand up for the beliefs that you accept as truth.\n\nTherefore, situations may arise where you are put in a position of a\nwarring activity. Perceive yourself armed with this frequency of\nlight and ask for guidance in your understanding and approach to\nconditions that are in need of clearing. Also, perceive that any\ndiseases within the body are healing and surrounded in the light.\n\nFrom the astral/etheric self, there may be patterns of energy that\nreflect past lives in the battlefield of history or experiences of\nbattles of many activities. Perceive these patterns are released from\nkarmic imbalance. Perceive that you are moving through the\nimbalances of karmic activity into freedom of spiritual\nenlightenment.\n\nMessage #1\n\nEach of you are being brought to a place where your conscious self\nand all that you are, is in the flow of radiant light. However, you\nare being brought to a dimension of records of your past. There is a\ntotal energy surrounding you and what you will sense or what you\nwill feel will be individual for you.\n\nAzreal is in this place with you along with Andrew and Jove. They\nstand assisting in this moment of healing for you. The records of\nyour conscious self and the records of your soul are impressed with\nevents that are often affecting your thoughts, your feelings and\n\nyour actions in this time in this place. But from the Lessons of\nLight you are coming to places where you are releasing its\nintensity. The more you change your personal understanding of all\nthat was, the more you are elevating your personal consciousness\nand being able to lift clearly and without intensity of pain.\n\nYour records are most interesting for lives are never dull. You\nhave been through many events, some of them quite difficult. In\nthis life you have chosen to heal yourself from wounds, to heal\nyourself from the battlefield, to heal yourself from persecution, to\nheal yourself from what was, events outside your creation and\nthese are never simple and cannot be fully explained. But, in this\ntime, in the unconsciousness you are more receptive to letting go\nand being touched with the Light to heal.\n\nSo visualize and sense and see you are in this beautiful energy and\nwhere the conflict has been so intense, answers will come,\nassisting you, for what is right for you and for what is meant for\nyou to create. There are many confusing choices, we can tell you\nthis. Whatever you choose, lessons come with it and the\ndevelopment of you is in response to your opportunities. Whatever\nyou have been asked to explore or endure, all of it is a benefit to\nyou. It is initiating you through conditions in need of change.\n\nTherefore, you have been in times, lived with danger, pain, and\ntraumatized in fear. You have seen the cruelty, the injustice and the\ninsanity of human action. However, in this moment of time, you\nare in a much different place and less inhibited by your wish, you\nare dreams or your intentions. As I am speaking the Amethyst\nLight integrates with your self. Think of yourself infused with\nenergy and what was so challenging seems to dissipate. There will\nbe resolution.\n\nTo understand is to accept. Not all lessons you are part of were put\nthere by your thoughts or your actions. Often you are in the role\nwhere the lesson is not yours but others and they are difficult to\nunderstand when it seems so unusual in reference to yourself and\nwhat you would choose to do.\n\nSo when you feel you are not understood and do not see the right\noutcome, look at the lesson as not your own but something you are\na part of, observing.\n\nNow the Light is flowing through and in you and has no bearing\nnow, for the energy is so intense you will notice the shift in your\nconsciousness. I am Annanius. And it is of great honor that I come\nto just assist in this moment with you and all that is in effect with\nyou. I will tell you, you are under the overseeing presence of\nbeings that love you very much and you are always in their\npresence, even though it seems there is distance.\n\nSo as the process is in effect, think of your bodies and you being\ncleared of ancient times and ancient ways and you are cutting clean\nand clear from what was and presenting yourself in the now, in a\ntotal new and positive way.\n\nTo be a mother is to find yourself in such ordinary and positive\nactivity and yet out of the ordinariness of the event there are\nextraordinary moments. You see and know and it is good.\n\nAnd now when you are ready, bring yourself back and as you enter\ninto your body and flow with your consciousness with your\nsystem, just know Amethyst is clearing away much residue inside\nof you.\n\nGo in peace."}, {"id": "L4_43", "level": 4, "type": "lesson", "lesson_num": 43, "title": "LESSON 43", "subtitle": "MINT GREEN", "color": "mint", "content": "COLOR RAY: MINT GREEN\n                    The Light of Rejuvenation\n\nPurpose/Essence\n\nThe Radiant Mint Green Ray brings into consciousness a rebirth in\nyour total nature. You may not be fully aware of the subtleties of\nyour personal change, but time will reveal the inner and outer\nchanges that come into your life. It may come first as strong urges\nto bring about certain changes in your career, relationships, goals\nor the way you express yourself. Whatever it brings into mind has\na purpose and you perceive yourself becoming free to express\nthese new expressions.\n\nSpecific Level Function\n\nIf there is still difficulty in your fully experiencing these energy\nrays, be patient. The impact will be felt in its own time. Others\naround you may notice changes before you do. During this energy\nyou can either experience a tremendous lift in your spirit, feeling\nvital, alive with enthusiasm, a sense of looking forward to\nsomething new, or the opposite can occur as you are breaking\nthrough resistances from your past consciousness.\n\nA desire to go out and camp to be with the animals and nature\noften comes up during the energy of the Radiant Mint Ray. Buying\nplants seems also to be an unconscious reaction during this energy.\n\nYou may experience fear or disappointment. A part of you may be\nanxious to move on with your life and truly experience change.\nYet, so many things may seem to be the same. So you feel like you\nhave not done well, or that you in some way are not getting it.\n\nYou are getting it. You simply are experiencing growth at your\nown rate. Each of you is different and has your very own time to\nevolve. Some changes come very abruptly, others in a gradual\nway. So let God and higher self be the director of your own\nexperiences. See yourself being just as you need to be.\n\nThe Mint Green Energy acts like a rejuvenating ray and it is\nassociated with the resurrection of Christ. Therefore, you may wish\nto review the story as written in the Gospels. The resurrection is\nthe key symbolizing new life beginning through transformation.\n\nWhatever you present to life, present it in joy and you will find\nyour body and mind responding.\n\nMessage #1\n\nAndrew - It is good to speak. I come through consciousness to\nhear your soul's response to the activity. What we observe is that\nthis is an event of great impression upon you. The impression is\nthat of it being the step into the door of the unknown, into the\nexperience of accepting that all is in its rightful place in your own\nindividual pattern of life.\n\nThe celebration of this particular event comes as you experience\nthe gifts brought to you from the spirit teachers. These gifts are the\ngifts you have sought to have for the long journey in this life. The\ngifts are individual. They are the gifts your heart has desired to\nexperience and fulfill in this life experience.\n\nYou will recognize the gift in your time and in your individual\nconsciousness. Each gift is precisely what your soul’s record seeks\nto control and know as a positive effect in life. Your gift may be\nmany things and you will discover this gift in your own time.\n\nBeloved students, beautiful teachers, messengers and pioneers of\nlight in the earth, receive at this moment the gift, the gift of your\nconsciousness symbolized by your own soul’s need. Accept this\nfrom your teacher and from the guide that stands with you through\nthis unfolding activity.\n\nThe rays of light that are so predominant fill your body and all that\nyou are to imprint in cellular thought that you can rise up out of the\ndarkness into the explorative adventure of your new life\nexperience. Whether an adventure materially comes forth, share\nthe experience in joy and celebration. Whether it is the written\nword that comes from the depth of your own self or responded to\nby others , recognize this with acceptance and love. Whether it is\nbringing into activity deepest fulfillment of the heart, it will be\nremarkable. Whether it is fulfilling a dream of your home and\nrelationships, each of you has a gift to be received.\n\nPerceive the gift you give is the gift of your love to all that will\nreceive the experience from you. This event is most wonderful for\neach and all of you. I observed each and all of you taking the step\nto remember your precious time coming into a new consciousness.\n\nThis session will begin to close, so to speak. Each of you will\nbegin your journey back into consciousness of the body, back into\nthe physical vibration and back into the state in which you function\nwith your own awakened self.\n\n       Affirm:\n\n       I am the light earthed.\n\n       I am grounding the awareness of my spirit and my soul.\n\n       I am grounding all that is necessary to heal negativity and\n       to free myself from my resistance to the good in my life.\n\nAs you awaken, there will be a peaceful sense within you, a new\nopenness to a brighter and lighter activity within your work, within\nyour home, within your total expression. Go in peace.\n\nMessage #1\n\nAndrew - Yes, this is Andrew speaking. I will speak first; others\nwill come through as their insights are presented to you.\n\nWe see within you, be progressive of your inner heart and spirit\nand soul and your link and connections to that which speaks from\nthe sources of light.\n\nEach of you individually is linked to many, both in present life and\npast life energies.\n\nEach of you has a call, which is to demonstrate and to serve the\nLaw of One, the Law of Love, the consciousness of the Cosmic\nSelf.\n\nEach of you has returned to this time for purposes of being\ntransformers, mentors, and links to that which brings evolution to a\ngreater activity.\n\nEach of you has your lives intertwined with both third dimensional\nwork as well as higher systems of consciousness.\n\nWhen we speak to you now -- you are multi-dimensionally\nresponding. You are receiving on many different levels of your\nbeing. The words consciously understood in the language you are\nfamiliar with are assisting your thought processes, but the greater\ninformation is the process of being lifted once again to a cosmic\nlight, which allows your universal self to explore in the inner\nplanes. For the physical system and for your conscious thinking,\nthe projection for the following year will take on a deeper meaning\nin the soul of all of you.\n\nThis is Melchizedek: and I am in the moment focused on the sights\nseen in the days that lie ahead. The earth will shake and rumble, so\nto speak, as the waters are felt deep within uncertainty, shifts in\nvibration, nearing Japan, Alaska and the coast along the shores of\nOregon and California.\n\nThere will also be continuous changes in the pattern of the\nweather, strange storms coming in, harsher than before, records\nbeing broken, causing havoc. There will also be changes in the\neconomic system. This process of change is in motion, even as we\nspeak. Resolution is not simple and cannot come quickly, not by\nthe force of will or by manipulating, so to speak. The economic\nsystem will shift and man finally finds release from the burden he\ncarries of debts, taxes and conditions that keep him enslaved\n\nFor man was not made to be a slave to a governing few, but the\nhuman heart and the human spirit was made to live as Gods\ncreating freely and living through with peace and harmony, and\nopenness and joyfulness, as spirit. The monetary aspect is a great\nburden on all minds. It has become the beast, perceived to be the\n\nenemy of the heart, the soul and the spirit of Liberty. Therefore,\nthere will be a new wave, not soon in its completion. But, steps\nleading to tremendous changes are coming, more than what you\neven suspect.\n\nThe groundwork is laid through different movements, but again,\nman cannot solve this situation; it must come through\ntransformation and raising of consciousness. Therefore, your work\nis focused on the Law of One, the Law of Love and Liberty. You\nmust focus on what brings freedom to individual selves responding\nto the call of the Lord, the Light and the inner self’s own pattern\nfor its life’s journey.\n\nReligion will also face many changing perspectives, as records\ncome to the forefront and reveal depths of wisdom known to the\nancient ones. Records held deep in the ground buried under ages,\nso to speak, revealing man’s first link with other systems and other\nbeings,
