coming with understanding of the rhythms of the earth and\nits harmony with many planets that evolve and surround the\nuniverses.\n\nAlready much is known, yet not revealed to those who would be\nangered with truth. Just know you are given information because\nyour heart is open and you are ready to see beyond the limitations.\n\nThe following cycles will bring about many struggles, individually,\ncollectively as a whole. This begins a stage of almost losing a\nsense of hope, but you, as light workers consistently know this is\nbut a shift, a phase that must be endured and yet victory occurs.\nMany places of the earth will find their ground shifting and the\nsands of time shutting doors to ancient history.\n\nYou are also viewing as we speak, changes in the spots on planet\nearth. Sacred wars, ancient in the troubles, are coming to a place of\nresolution and changing perspective. There has been a Great War\non the inner planes. Many different species have been in conflict\nover the rule as what is perceived as “souls trapped in earth and\nhidden from the ancient wisdom of their own places in history.”\nBut, information has been given through different sources,\nrevealing that you have been in guardianship with others who have\nwatched and observed your struggles. Those who come from the\nSons of Light are associated with familiar places. The Pleiadians,\nso to speak, are conscious beings that have lived with the Laws\ngiven by the Days of the Ancient Ones.\n\nYou are concerned over what shift and a darkness comes through\nthe earth. It has been prophesied many ages ago that time will\nstand still and it will appear to be that the sun is dark and the light\ngoes out for just a time. Coldness creeps in, but it is but a\nbeginning of something new, different, remarkable and joyful too.\n\nStay centered, use your light, use the tools of the body of your\nsoul, and recognize that it is small in the moment in the eternity of\nthe journey of your soul. That whatever the change may be, it will\nnot take your life away, it will simply bring you to a point of being\ncentered in the Christ and bring you forward to the next step.\n\nThe message we wish for the earth to know is that:\n\nAll of the wars, the struggles, the hunger, the sickness and disease\nare unnecessary patterns that have evolved from the lack of being\naware of spiritual freedom. It is time for the Truth to be fully\ndemonstrated that the body is the vehicle of which the soul is the\ninstrument. Fine tune your instrument, fine tune your soul, fine\n\ntune your body of light and your physical will serve you well and\nhelp you to maintain a sense of wellness.\n\nWhen the body trembles and weakens and feels out of sorts with\nitself, meditate -- attune to the body, use the tools and the helpers\nthat alleviate your resistance. Let the body be massaged, anointed,\nand cared for. See that the aura, the magnetic field that is a part of\nyou be honed and tuned with sound, light and color. These are the\ntools; they will surpass the need for medical dependency.\n\nThough the medical factors have served your lives, it has become\ndetrimental in many ways. So heal, by physicians, be in charge of\nyourself. Love your body, love your essence and care for yourself.\nNurture your own being. Stay centered with your light.\n\nNO! We cannot predict the exact time of the darkness. We can\nonly sense that shifts have occurred, but mostly the shifts have\noccurred inside. More people will be asking for “what they need to\nknow,” for they find that things are changing, are different and\nthey need instruction and guidance, and let it be.\n\nBring the work of Light to the forefront and let it come to a greater\nperspective, and now, all the questions are so insignificant to the\ngreater view. We believe we have answered from your heart, your\nsoul and what you did not hear you would know. Each of you will\ngo within yourself, and in the next 48 hour period you will be\nconnected to the Councils of Light guiding you.\n\nIf you have a personal question that you need guidance, write it on\na piece of paper, sleep with it, the answer will come to you.\nNothing will be held that you need to know. However, do not\nworry of your financial picture. You will live through the struggle.\nIt is not a matter of how much you have, it is a matter of what you\n\ngive of yourself for the opportunities you live. Money will be seen\nin a total different light, like exchanges of love, exchanges of\nexpressions, rather than burdens unmet.\n\nTherefore, at this moment, we are connecting to the core belief in\nyou, based upon thoughts of security, needs, prosperity. Ask for\ntransformation to raise all of your thinking to respond to the\nabundance that God brings.\n\nWe ask that whatever is kept in lack, limitation and denial be\nreleased, whatever Karma has been in motion, that it no longer\nrules the ego system and whatever has been as foresighted, limited\nby the past, be released. Focus on responding to the treasures that\ncome to release and free you for your service in greater prosperity.\nBy this Order, I, of Melchizedek, anoint the mind, heart and soul\nand you are all called to wear and be fully revealed as Priest in the\nPriesthood of this ancient order that you have been called for.\n\n       And now, Shalom, Shalom\n\nBe one. Be ever infused with light, walk the way strong clear and\nin peace. And so it is"}, {"id": "L4_44", "level": 4, "type": "lesson", "lesson_num": 44, "title": "LESSON 44", "subtitle": "SCARLET", "color": "scarlet", "content": "COLOR RAY: SCARLET\n                       The Light of Passion\n\nPurpose and Essence\n\nThis is the energy of passion. We interpret passion in relation to\nmany aspects of ourselves, physically, mentally, perceptually and\nspiritually. Without passion, we become listless without action. We\nwere not meant to be lukewarm or listless robots; therefore, our\nnature provides us with energy to move mountains. As we enter\ninto the frequency of the Scarlet Ray, its effect on you can be felt\non many different levels.\n\nThe first reactions we have as human beings is our sexuality and\nthe passions of our bodies as it experiences itself as a sexual self.\nThe Scarlet Ray may increase the intensity of your sexual feelings.\nHowever, more than the sexuality is the mental passions of thought\nwhich desires to reach out and achieve the goals it perceives itself\nmanifesting in human consciousness.\n\nSpecific Level Function\n\nAs you experience this ray moving through the consciousness of\nthe obstacles brought into the light, perceive conditions of\nresistance consumed by this fiery ray. Scarlet is always such an\ninteresting vibration. As you observe your reactions to your daily\nexperiences, think of what you are trying to put into motion and\nwhat fires you are trying to put out or start. In completing this\n\nlevel, you have passed through a very intense process of working\nwithin the astral/etheric level. You are now preparing for the\nplanetary work those bridges the gap between your soul's vibration\nand the center of your own higher self. The planetary work brings\nyou into contact with your greater dimensions of consciousness.\nYou are encouraged to pursue the next step with planetary work so\nyou can really begin to find yourself connected to the light network\nfor planetary healing.\n\nMessage #1\n\nAndrew - It is good to speak again. Bringing you through this\nactivity of light has been most joyous, for we have observed the\nextraordinary acceptance of your will to respond to the power of\nthis intensity of evolution and growth.\n\nYes, we understand how consciously you can evaluate and re-\nevaluate, repeatedly. We understand you are seeking to fully\ncomprehend the progress that you have made, feeling yourselves\nless than you desire to be. However, trust that all is in its rightful\nplace and each and all are ready for the next phase of your personal\nconsciousness, growing into the planetary systems for your\nparticipation in the healing of the planet earth.\n\nThe commission of the earth is to respond to the commission of the\nhierarchy to prepare the vibrations of the earth to respond to the\nhigher octave of evolution. You, as planetary workers, will\nparticipate in the myriad vibrations that are translated from\nhierarchical thought into the essence from which the earth can\nrespond for its process of healing.\n\nThe progressive steps are taken, one by one, through the chakras,\nand building the Rainbow Bridge to your higher vibrational self.\n\nSo you, in essence, accept the commission to openly participate in\na much more beautiful experience of connecting to the healing of\nearth vibration. Nevertheless, from this point within this lesson, we\nare presenting you with the consciousness where the Scarlet Ray\nintensifies bringing the passions of your nature into the forefront.\nEach of you has many passions that you desire to present and\nparticipate, complete and fulfill. The promise is: your passion will\nnot turn to ashes but will go through its phases of expression. Your\nfulfillment must be complete before your enlightenment can come\ninto actuality.\n\nThe passions of you are to feel and know the connection of love\nand the experience of bonding that comes from a more tranquil\nstate of human contact. You are working through the denials and\naversions of passions to love into a more positive effect of\nopenhearted communicative intensities.\n\nKnow you are unlocking the karmic entanglements inverting your\nlove vibration into uprightness in which love is fulfilled, inwardly\nto outwardly to a demonstration of extraordinary joy.\n\nYou will not pass through this week without feeling the ecstasy of\nthat fulfillment into new consciousness. The aspect of this is to rise\nup out of the darker focus of self-denial, which seems like a death\nor void,\n\nYou each live through a stage of unlocking your karmic\nentanglements into a more positive effect of open joy, extensions\nof your ecstasy and a movement into a spring-like awareness\nwhere your whole self comes into effect.\n\nHow can we see you become a part of this drama and the passion\nof this soul experience? We can see you connecting to the intensity\n\nof the symbolism of this stage, of your human drama in the journey\nof earth. We perceive the effect of your drama coming into that\nfear of loss, the ending and the death and the dying to love. We\nalso perceive the receiving of the joy that comes in the renewal of\nfinding that your love is more complete than ending.\n\nAs the vibration of the Scarlet Ray is intensified throughout your\nbodies, perceive mentally that the astral self has held mental\npatterns karmically entangled in lost and denied passions. They\nare being released by the vibration of this energy. Where the\nradiance of this energy activates, perceive it dissipating all\nimpressions in the astral self that would hold you in prison to\nnegativity and fear.\n\nPerceive the power of love and the passions of love from the divine\nself fully infused within all levels of your being, directed into the\nastral body emotionally. Where the illusion of separation has\noccurred, perceive there is fulfillment, bonding and light. Where\nanger and rage have overshadowed your sense of being, let it go.\n\nWithin the power of this light energy exists. Vibrations to uplift\nand heal perceptual entanglements, whatever the astral self\nimpressed upon the egos of the lower self, be now released to the\nlight. Ask for clarity.\n\nYou are beautiful. You are the disciples and the students, the\nseekers and the pathfinders to a truer state of Divine Self. Accept\nthis, the flame of the light moves into the physical senses\ncorresponding to the astral body bringing healing.\n\n Perceive you are reinstated in this physical world with a new\nconsciousness for the impressions of fear no longer harbor\nnegativity through unconditional rage and fear. Let it go.\n\nAffirm:\n\n       I am healed.\n\n       I am walking free of karmic resistance, past memory and\n       former causal systems.\n\n       I am free from the loss of divine love and physical\n       expression of love.\n\nOnce again, experience the presence of the teachers for they stand\nbefore you. Words are unnecessary to reinforce your experience of\nthis communication. Let the silence in the presence acknowledge\nthis truth.\n\nWhen you are ready bring awareness back into the forebrain and\nground your consciousness.\n\nMessage #2\n\nBrowning - The Physical Effects of Initiation\n\nBrowning states, “To those who desire to manifest, at the earth\nlevel, wholeness that stems from the unification of spirit, mind and\nbody, this lesson deals with the esoteric rebirth and the effects on\nthe body, brain and inner-self.”\n\nFirst, you are preparing for an initiation into the esoteric Halls of\nLearning for Lessons of the Mind. There, tools are given to the\nteachers of light but practiced at multitudinous levels. Previous to\nthe initiation, comes the rebirth of the soul consciousness to its\npurpose and its true self. Also the battle between the inner soul\nconsciousness and the physical images of the brain-mind are in a\n\nhealing process. Hence, you may experience some physical or\nemotional effects.\n\nSome of you may experience the appearances of physical\ndisorders, such as pain in the body, head or back, depending on\nwhich area is in the most conflict. If you are one who is on a strong\nmental, intellectual level you may more than likely experience\ndisorders in the head level such as, symptoms of colds or head\npains. To those who are strong in the emotional nature there may\nbe the respiratory disorders as in a shortness of breath, a fainting\nfeeling or light-headedness. To those who are magnetic and tend to\ninvolve themselves in the feeling nature of others with strong\nsympathetic correspondences, there may be the pain in the back.\n\nT function renderZH(text){
  const lines=text.split('\n');let html='';
  for(let line of lines){
    const s=line.trim();if(!s)continue;
    if(s.length<22&&!s.endsWith('。')&&!s.endsWith('，')&&!s.endsWith('…')&&/^[\u4e00-\u9fff·、\s\u3000]+$/.test(s)){
      html+=`<h3 class="sh">${s}</h3>`;continue;}
    if((s.startsWith('我')&&s.length<90)||s.startsWith('我肯定')||s.startsWith('我确认')){
      html+=`<p class="af">${s}</p>`;continue;}
    if(/^[＿_\s]+$/.test(s)){html+='<div class="jl"></div>';continue;}
    if(line.match(/^\s{4,}/)&&s.length<180){html+=`<blockquote>${s}</blockquote>`;continue;}
    html+=`<p>${s}</p>`;
  }
  return html;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function tNP(){document.getElementById('np').classList.toggle('op');}

function updProg(){
  const tot=ND.length,done=ND.filter(n=>TRS[n.id]).length;
  const pct=Math.round(done/tot*100);
  document.getElementById('op').style.width=pct+'%';
  document.getElementById('pt').textContent=`${done} / ${tot} 已翻译`;
  document.getElementById('pp').textContent=pct+'%';
  ND.forEach(n=>{const el=document.getElementById('n'+n.id);
    if(el)el.classList.toggle('tr',!!TRS[n.id]);});
  if(done===tot&&tot>0){
    const b=document.getElementById('btn-tr');
    b.textContent='✓ 翻译完成';b.style.background='#16A34A';}
}

function showSM(){if(apiKey)document.getElementById('ak').value=apiKey;document.getElementById('sm').classList.add('vis');}
function closeSM(){document.getElementById('sm').classList.remove('vis');}

async function trSingle(id){
  if(!apiKey){showSM();return;}
  const item=getItem(id);if(!item)return;
  const btn=document.querySelector(`button[onclick="trSingle('${id}')"]`);
  if(btn){btn.disabled=true;btn.textContent='翻译中…';}
  try{
    const r=await callAPI(item.content,item.type,item.level);
    TRS[id]=r;localStorage.setItem('cil_tr',JSON.stringify(TRS));
    updProg();render(id);
  }catch(e){
    alert('翻译失败：'+e.message);
    if(btn){btn.disabled=false;btn.textContent='翻译此章节';}
  }
}

async function startTA(){
  const k=document.getElementById('ak').value.trim();
  if(!k){alert('请输入 API 密钥');return;}
  apiKey=k;localStorage.setItem('cil_ak',apiKey);
  closeSM();document.getElementById('pm').classList.add('vis');
  isTA=true;
  const toTr=ND.filter(n=>!TRS[n.id]);
  const tot=ND.length;let done=ND.filter(n=>TRS[n.id]).length;
  for(let nav of toTr){
    if(!isTA)break;
    const item=getItem(nav.id);if(!item)continue;
    document.getElementById('tc').textContent=`正在翻译：${nav.short_zh}`;
    const pct=Math.round(done/tot*100);
    document.getElementById('pf').style.width=pct+'%';
    document.getElementById('ptext').textContent=`${done} / ${tot}`;
    try{
      const r=await callAPI(item.content,item.type,item.level);
      TRS[nav.id]=r;localStorage.setItem('cil_tr',JSON.stringify(TRS));
      done++;
    }catch(e){console.error('翻译失败',nav.id,e);await sleep(3000);}
  }
  document.getElementById('pm').classList.remove('vis');
  updProg();render(cId);
  if(done===tot){alert('🎉 全部 '+tot+' 个章节已翻译为中文！\n\n现在可离线使用。');}
}

async function callAPI(content,type,level){
  const sys=`你是专业灵性翻译，精通身心灵领域。请将《光的课程》(A Course in Light) 第${level}级英文内容精准翻译为中文。
规范：①保留脉轮/灵魂体/扬升大师/高我/基督意识等标准术语 ②冥想引导保持"你…感知…"第二人称 ③Affirmations译为"我…"格式肯定语 ④专有名词：Azreal→阿兹瑞尔，Melchizedek→麦基洗德，Order of Melchizedek→麦基洗德秩序 ⑤保留所有段落和练习步骤，不省略 ⑥只输出译文，不加前言解释`;
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
  const resp=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      system_instruction:{parts:[{text:sys}]},
      contents:[{parts:[{text:`翻译以下内容为中文：\n\n${content}`}]}],
      generationConfig:{maxOutputTokens:8192,temperature:0.1}
    })
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||e.error?.status||'HTTP '+resp.status);}
  const d=await resp.json();
  const t=d.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!t)throw new Error('Gemini API 返回空内容');
  return t;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  const all=ND.map(n=>n.id),idx=all.indexOf(cId);
  if(e.key==='ArrowRight'&&idx<all.length-1)navTo(all[idx+1]);
  else if(e.key==='ArrowLeft'&&idx>0)navTo(all[idx-1]);
});

init();

</script>
