 out\nof situations that close off your sense of expression.\n\nWithin the perceptual self, you may experience sensations or\npsychic impressions of being put upon, impressions that may be\nharbored from childhood through adult consciousness. Check out\nyour impressions of your true self and of others. Meditate in this\nfrequency to let go of false impressions on your true self and on\nothers.\n\nMeditate in this frequency to let go of false impressions about old\nbelief systems that do not apply to your life and conditions in and\naround you, and ask for clarity of insight. Activations within this\nfrequency may be very acute according to your personal need of\nrelease. Always affirm that you are experiencing the highest will in\nand through you and that you are clearing the negatives from your\nexperiences.\n\nMessage #1\n\nAzreal - In the name of the Father, and of the Son, and of the Holy\nSpirit, be at peace. It is given to each of you to reflect upon\nsystems of mind, thought, and consciousness that are in relation to\nyour desires. The causes that have brought you into effect are a\n\nkarmic expression. It is for you to experience an inner silence\nwhere you can receive a sense of knowing your particular purpose\nand destiny within the earth plane, and to release the anxieties and\nsyndromes of pain that have overshadowed the intensity to bring\nwill into effect.\n\nAll of you have experienced suppression, denials and resistances to\nthe desires of all of the selves. The purpose is to experience the\nunifying of all aspects into a desire that is focused on creating the\nhighest destiny in your life experience. No one can present this\ndestiny to you; it must be a revelation that comes from within.\n\nYes, as you move into the silence, you experience your abilities to\nlisten to the inner voice and to the activities of thought moving\nthrough your own particular mental consciousness. You experience\nintuitive and relevant thoughts regarding your particular pathway\nto full expression.\n\nIn additions all of the egos united as one frequency, there is a\nlessening of the embattlement and conflict of the ego systems.\nAlways remember that you are not within the earth as a biological\naccident, but entered with a choice to work through karmic\nactivities presented through past life expressions. To dissipate the\nentanglements that have bound you to patterns of repetition that\nkeeps you in your states of undeveloped spiritual and mental\nconsciousness. As you work within the frequencies of light, it\nbrings to the surface those facets of self that should be perceived\nand integrated to discern their importance and validity in your life\npath. The key phrase is to know that you are experiencing what\nwas given as probable courses of action for soul expression and\nhuman creativity.\n\nAgain, you are not here to deny the human self, but to uplift and\nraise its consciousness into a state of mind where it becomes co-\ncreator with the individual soul activity. Mind and matter within\n\nthe earth system can be united and brought into focus for positive\naction. Think on these things. The will center in the emotional\nplane is a very intense level. Emotional debris from ill-will rages\nfrom the past overshadows the sense of being in peace with one's\nown life activity. To bring the rages, aggressions, and power\nsystems into motion allows you to envision an image that is\nnecessary to break these activities from denying your true inner\nbalance.\n\nWe perceive that through this particular pathway to enlightened\nthought, there are many challenges that are brought before your\nindividual life. It is difficult to be in high perspective when you are\nexperiencing the rages, and turmoil and emotions that arise as a\nstormy sea through all of your expressions.\n\nWhen you are amid the storms, so to speak, it is difficult to see the\ncalm, the beauty and stillness of ones higher knowing. Yet, as the\nrages of emotion arise, it is important to know that you must ride\nthrough the stormy activities until you experience a breakthrough\nand release. As this ray is intensified in and through your\nconsciousness, it begins to uplift and free you from the chains and\npatterns that can envelop you in pain.\n\nAnd now, beloved students, in your inner silence and meditation\nperceive the rays of this light moving in and through all of the\nphysical plane, into the cells and organs of the body, and relaxing\nany intensities. You have heard the command to be still and silent\nand to know the Christ within. For what purpose do you receive\nthe command to be silent?\n\nKnow that the inner spaces of your being are much like the outer\nspaces and the knowledge you gain in the silence is every bit as\nmagnified as knowledge is in the outer spaces of the universe. As\nyou sit in the silence, you become aware of every sound of your\nbeing, of the flow of the life force through your physical body.\n\nYou are stilled in this beautiful inner space, you open the door of\nyour own consciousness to receive the wisdom of the higher will.\n\nBe patient with yourself. If you do not perceive visions of light, do\nnot be concerned for that is not a measure of your evolution. It is\nthrough being and emanating that your measurement of effect is\nknown.\n\nAffirmations\n\n         I surrender all of my fear and pain to the higher self.\n\n         I am now surrounded by divine guidance and love.\n\n         I accept the will of my higher self in all parts of my life.\n\n         I give to all others the love I wish to receive.\n\n                    Visualize\n\nYou are entering a hot air balloon, which is colorful and brilliant in\nshades of purple. You are rising in this air balloon and feeling\nyourself releasing all the anger, rage and pain that has been heavy\nin the will center. You imagine these feelings are wrapped up in\nlittle packages that you have carried with you into this hot air\nballoon, and now you see these packages of all of your feelings\nbeing thrown out into the air. You are letting go of all these\npackages of your feelings.\n\nLet it go into the space of light.\n\nSee yourself getting lighter and freer as you let go of this stuff.\n\nLet your visualization take you where you need to go …\n\nWhen you come back you will find yourself grounded, feeling\nwonderful and cleared.\n\n                    Personal Journal\n\nWrite your soul purpose"}, {"id": "L2_16", "level": 2, "type": "lesson", "lesson_num": 16, "title": "LESSON 16", "subtitle": "RUBY RED", "color": "ruby", "content": "COLOR RAY: RUBY RED\n                 The Light of the Healer/Physician\n\nPurpose and Essence\n\nThe purpose of this energy is to release the hurt feelings from\nwithin the emotional/perceptual bodies the hurt feelings, the\nrejected feelings, and psychic debris that stems from the angers\nfrom broken relations. Within this level, you may experience\nextreme reactions from your emotional self, dealing with the past\nrelations from parents and family, to friends and lovers of the past\nas well as that which is unresolved in the present.\n\nAgain, this energy can affect all areas of the body. You may\ntherefore have many reactions physically. Feelings of tiredness and\naching can occur if there are harbored feelings within the organic\nand cellular activities. Visually perceive that every cell and organ\nwithin your body has its own intelligence and has absorbed as well\nas observed painful conditions of life. These impressions can bring\ndisease within the deeper levels. As you work with the Ruby Red\nenergy, visualize you are taking a journey in and through your\nbody. As you image yourself, traveling through your body, the\nlight magnifies activating changes.\n\nAs you review the lessons from the first level, perceive it applying\nto this particular level also. Healing is not instantaneous but comes\nover a period of time when you feel the easing up of the\nconstrictions regarding matters of the heart. In your personal\nmeditations, call forth all those who are in your life that have\n\nunresolved situations and begin the process of forgiving them and\nself from the hurts and angers that have occurred in your life.\n\nYou may have memories that arise from early stages of this life.\nYou may have flashes of childhood attitudes, feelings and pains\nthat come to the surface through dreams or imagery. Remember\nyou are experiencing a disentangling and healing of these long held\nresistances in your life.\n\nSpecific Level Function\n\nWithin the emotional body, the radiant Ruby Red light helps to\nheal the feelings held through long time spans of pain. It raises the\nfrequency levels of the emotional self to help unite with the\nvibrations of the soul system. It uplifts the emotions of rejection,\nloss, and pain and can bring renewal to the true love that exists in\ninterpersonal relations.\n\nWithin the perceptual body, this light helps to heal the hurts that\nhave been projected upon self through the thoughts and\nperceptions of others as well as self. It uplifts the psychic senses\nfrom heaviness within the nervous system. It frees one from the\nconcerns of misconceived ideas and concepts of one's relation to\nothers and self. Lack and limiting experiences stem from the\nkarmic imbalances of the past.\n\nSee yourself anew, present yourself transformed and uplifted, and\nthe outer becomes a new vibration.\n\nMessage #1\n\nAzreal - Greetings we speak again to the light of each of you. It is\nin great joy that we approach you in this present moment and see\nthe radiance of your inner beings as the inner work transforms and\n\ntransmutes that which has been as heavy burdens in your\nconsciousness.\n\nThe intensity of the flame of this light cannot be fully\ncomprehended by the mind of your human ego. Nevertheless, its\nimpact will be felt through your entire physical and emotional\nselves. This particular ray is a vibration that allows self to uplift\nand clear that which has been clinging to the emotional system as\nincomplete areas or vibrations from actions out of past or present.\nPerceive that you are the releaser of that which is held in bondage\nwithin your consciousness. The more you focus on the freedom of\nself, the more you arrive at that potential of being the free-spirited\nconsciousness you choose to express.\n\nThe lessons in this vibration are to see yourself as individual,\ncomplete, whole, as an entity of light. There is a choice given to\nyou to enter into this expression to bring healing to life, to bring\nthe healing of self to life. If you are healed and whole, perceive\nhow you become effective in healing that which is in need of the\nhealing activity.\n\nThe masters have spoken, \"Physician, heal thyself.\" Know that one\nis healed through awakening. To know thyself is to know and be\nand recognize your divine consciousness in the present time. All of\nyou have chosen to come into an accelerated activity of growth to\nprocess in completeness, to balance the scales, so to speak, in order\nto move forward with new awakening, new intensity, and spiritual\njoy.\n\nLack and limiting experiences stem from the karmic imbalances\nout of the past. Present yourself anew, present yourself\ntransformed and uplifted and the outer becomes a new vibration.\nYes, again study the words of love that are given through the\nmaster Yogananda. The conceptual idea of love is that all exist\nfrom its core and vibration. That love is the core, center, and\n\nenergy point of all creative activity. The inversion or the opposing\nfrequency is that which brings about a sense of denial of love and\nbecomes the counter activity. As you release your energy of love,\nyou uplift and heal that which lies along your pathway.\n\nAnd now, go in peace. Be the healing and the healer, and May the\nlight of the Christ be in and through you.\n\nToni teaches\n\nAt this point in your personal evolution, you are arriving at a place\nfor an opportunity to bring karma into balance. This is the time to\ntake the necessary steps to clear out the psychic debris and the\nthought images within your physical, emotional, perceptual and\nmental bodies.\n\nJesus spoke that \"one must not pour new wine into old vessels\" and\neach person must be born again. The new birth is the new\nconsciousness, the new awareness, and the new life energy force\nflowing through an uplifted body, a spiritualized form. You are\ndirected to open up your own heart center, to move with the light\nenergies, to heal many thought images of yourself, as well as\ncertain interpersonal relationships.\n\nWithin yourself there must be the total release of all bottled-up\nconsciousness suppressed within the emotional body. The release\nof all negative vibrations, images from past conditions, patterns of\nguilt, failure, inadequacy, insecurity, fear, rejection, judgment and\nloss are processed through change of consciousness. Release of the\nimperfections within yourself such as: self-denial, self-rejection,\nself-fear, self-anger, and frustration gently dissipate as the light\ninfuses your nature. Release of pain and separation from your own\ngreater good transpires as you meditate.\n\nHealing takes place through the presence of the physician aspect of\nyour own being, and from direction of the higher self and spirit\nteachers. The heart must be opened and learn to come from the\nGod-Consciousness, but realistic as to what takes place within the\nphysical plane.\n\nInterpersonal relationships based on unrealistic ideals can lead to\ndisappointment. In other words, an interpersonal relationship\nwhere one requires more than what can be provided concerning\npersonal needs, security, desires, romantic ideals, societal\npressures, parental programming and more, can become unhappy.\nIt also becomes a challenge for the spiritual opportunity. For the\nsoul draws the situation and as lightworkers or self-awakening\npeople, see them as karmic patterns or conditions. These situations\nprovide an opportunity to process imbalances from other\nincarnating experiences as well as your present life. Therefore, you\nhave the opportunity to clear up conditional thoughts that bind you\nto past negativity.\n\nAs you embark upon new relationships, seek to see the inner spark,\nthe divinity of the individual. Perceive their personality as a soul\non a path of experiences, working through conditions in need of\nbalancing. Relationships are the way you experience many facets\nof love and understanding. To love without possession is the key to\nunconditional love. To love from a pure sense of loving for the\nsake of loving is to experience a total new process of feeling and\nemotion.\n\nAs sparks of light moving from mind into form as matter, you\nbecome imprinted with many patterns. You seek through\nrelationships a connection to your own inner divine consciousness.\nIt is through the conditions of limitation or unrealistic expectations\nyou set up boundaries that cloud your sense of true love.\n\nIn your meditations bring forth each one whom you have\nexperienced a love relationship. Release all emotions, thoughts and\nfeelings that block the truth of love. Forgive and clear, as you\nperceive the total experience from a new awareness.\n\nAs each of you know, when you are caught in the throes of an\nemotional storm, it is difficult to center yourself in the light and to\naffirm that all is peace. Yet, the example comes to us as a lesson\nwhen Jesus stood amidst the terrible storm and the fears of loss of\nlife were enveloping the disciples. Jesus became very still and very\ncentered and at the height of the worst fear, stood as a calming\nwind, commanding that calm and peace be manifested upon the\nsea. This is an example or symbolic act to show that man has the\npower within to calm the raging sea of his/her consciousness and\nthrough the light brings a movement of peace to his total\nexperience.\n\nMessage #2\n\nAndrew - We are seeing that your vibrations are opening to the\neffect of healing consciousness and you are all responding\nbeautifully to the level where spirit connects to the soul of who you\nare. Therefore, I, Andrew, am overshadowing the channel at this\nmoment so that each of you can hear and know that your individual\nlife is in its own perfect divine order in accordance to the\nconditions that you are creating for your own perfect evolution.\n\nWe have much to say to you for there are developments within the\nearth that are beginning to expand and open up to what is called\nthe new record or new effect of spirituality. You all have imprinted\nwithin your hearts the desire to serve in a way where you help\nothers who are open to a new experience in life.\n\nLife and love are the essence of your individual experience. More\nand more, you are finding yourself responding to others who are in\n\ntheir pain and darkness of their soul's regret. You are opening up\nyour mind to help others find the way spiritually so they physically\ncan live a more peacefully\n\nRemember, in your initiation you are discovering yourself and\nawakening to your physical and spiritual potential. You are\nawakening to what you can be fulfilling a desire to initiate and\nmanifest new consciousness. The world is in an evolving state too;\nmoving toward a great effect where there is a movement to under\nride the vibrations brings upliftment into all nations. Yet know, it\nis not where all things will become a total state of peace. It is\nthrough the individual heart that brings a state that peace within the\nworld.\n\nThousands, however, find themselves in resistance and self-\nnegation, as the knowledge, practice or teachings of light have not\nyet come to their lives. They have not yet found a way out of the\ndarkness and pain into the greater effect of love.\n\nAll this cannot continue to be hidden; it is on the peripheral of\nbeing the grand experience all can connect in unity. We are seeing\nthe work of light now directed outward into greater arenas of\nexperience where it can be facilitated in a perfect way. You are\ninnovating this concept of becoming healers, visionaries and\ndreamers of your own life for the greater good.\n\nProcess\nPerceive through the vibration of this energy is directed into all\nyour physical body as it is responding to the heightened state of\nthis healing effect. Think of your body, as the physical vehicle in\nwhich the inner self lives. Know the body is touched by the soul\nconsciousness creating a harmonious intent. The body, mind and\nsoul become a field of harmonic activity responding to a state of\nwholeness. Change is in effect throughout all the earth.\n\nWhat does this mean?\n\nIt means that as the human self you enter into a total new\nexperience of consciousness. It is a grand effect. It will not have\ndemonstrations on the outer to such an extent that you could waken\none morning and say all is anew, but you will find within yourself\nmotions and movements perpetuating internal and external\nchanges. You are all part of the extraordinary event that is brought\nforward into earth consciousness.\n\nYet, as you see outwardly the darkness in many different\nsituations, give it no thought and send only the light.\n\nGive no energy to what you know is the syndrome of fear.\nRecognize there is change and change is an effort to open to the\nnew state of life.\n\nThe energy of light is a part of you and moves in and through you\nwith each step into your next life.\n\nToday you are living with a new sense of inner tranquility and an\nopen mind to a spiritual vision. You will each experience dreams\nthat will have significant activity in your individual growth.\n\nGo in peace.\n\n                       Personal Journal\nAffirmations\n\n        I affirm I am releasing all anger toward others from my\n        past and present experience.\n\n        I send light and love to all relationships.\n\n        I understand all relationships are serving in the lessons of\n        life.\n\n        I give thanks for all of these opportunities.\n\n        I see myself in wholeness and peace.\n\nWrite your own affirmations\n\n\n\n\n\n\n\nWrite out your feelings about relationships you desire to be\nhealed."}, {"id": "L2_17", "level": 2, "type": "lesson", "lesson_num": 17, "title": "LESSON 17", "subtitle": "ORANGE", "color": "orange", "content": "COLOR RAY: ORANGE\n                      The Light of Perception\n\nPurpose and Essence\n\nThe purpose of this energy is to clear in the emotional and\nperceptual levels, the heaviness occurring from psychic\nimpressions absorbed from conditions around you. To discern\nfalse-to-fact impressions accepted as your own consciousness.\n\nEveryone experiences impressions that come from the energy\nfields of others. We are also affected by the patterns of thought\nfrom our own experiences. We often feel sick to the stomach from\nanxiety attacks and pressures of society that affect our daily lives.\nWe may also become vulnerable to the psychic abilities of others\nwho may not have a clear ability to transmit right information.\n\nThere are also constant feelings aroused by our sensory\ncapabilities. The Orange frequency helps to clear out the overload\nof impressions absorbed or created. Perception can be a wonderful\ngift that allows you to feel out situations, but be careful to clarify\nthese perceptions before you come to conclusions that may be in\nerror.\n\nPsychic vision is always an exciting experience and these often are\nclues to lessons to be learned or conditions that may arrive in your\nlife. Insight is a gift of wonder and curiosity, but reason is also a\nwonderful tool, so keep a balance in these matters.\n\nThese lessons of light are designed to make you psychic; however,\nsensitivity is increased and often results in certain ESP activities.\nBe amazed, be amused but also always ask for clear guidance and\nlight to bring in the truth.\n\nSpecific Level Function\n\nThe frequency of the Orange Ray is directed in and through the\nemotional and perceptual bodies to ease and clear away\nconsciousness resulting from feelings of not being loved or false-\nto-fact imagery that affects the psychic senses. It also effects on the\nglandular and organic systems relating to your digestive and\neliminative processes.\n\nThe purpose of this frequency is to clear up your negative fears\ndeveloped through your sixth sense. It renews, revitalizes your\nsolar plexus releasing the tension and pressure accumulated in this\narea of your body. The Orange energy is activated to bring a clear\nperspective about yourself and others. As you alleviate the issues\nof fear of “what others think about you,” and the exhaustion or\ntiredness coming from hyperactivity, you feel lighter and at ease.\nBe patient as you move through this lesson as your emotions may\nbecome erratic. It will pass and a new sense of vitality and\naliveness can develop.\n\nMessage #1\n\nAndrew - Trusting is the key to receiving insightfulness from the\nsource of your own soul. Each of you has the ability to respond to\nthat instinct and to the perception of your inner being. The key lies\nin discerning what plateau you are receiving the direction and\ninsight.\n\nBe at peace, for each and all have abilities to create the openness of\nthe eye that can see beyond the physical and look into the other\n\nplanes of expression. In this moment as we are presenting the work\nof light activating in you a different perspective of self, you are\nbeing prepared for heightened sensitivity and for a path which you\nwalk as co-creators and co-understanding with other planes of\nexpressions.\n\nAs in the allegory of Jonathan Livingston Seagull4 , you are able\nto be where you desire to express. You are more than you know;\nthe physical is only a small aspect of your total being. Let your\nbeing arrive at that point of contact, if you desire to explore.\n\nAs I speak, you will hear those who walk with you in your own\npersona and being. It is not that we are so far from you that you\ncannot touch who we are in reference to your life quests, but you\nhave been trained to think only in the third dimension as your\nreality. You have been trained to think that to move beyond the\nsenses of feel touch and smell and hold reality as substance, that\nyou then become an entity residing in unbalanced thought.\n\nLet it be known, those who enter into the age now in motion will\nhave within many abilities to receive spiritual awareness and\ndirection that was a natural part of their existence in another time.\n\nIn this energy of the Radiant Orange ray an opportunity to open the\nperceptual self and respond to more heightened activity of your\nsensory nature may be effective and felt in your bodies. Accept\nthese thoughts: Affirm:\n\n        \"I am experiencing release of all attachments that\n        delude my mind and emotions and distort what I\n        perceive.\n\n4 Author Richard Bach\n\n       I release within the body and within all the cells of my\n       consciousness all barriers to perceiving with clear\n       vision.\n\n       I release now, all fear of experiencing the empowering\n       of this intensity of light.\n\n       I release all fear, resistance and pain.\"\n\nAs your awareness moves back to your body feel the shift in\nvibration. Go in peace.\n\nMessage #2\n\nJove - The Akashic records are vibrations of your soul. They are\nthe imprints of what you have accomplished through your lives\nbefore. There is a part of you which you chose to walk through\nthis life to explore the healing from pain encountered in your past.\nYou are each extremely connected to a high order of spiritual\ndeveloped Lighted Ones.           Your choice to incarnate was\nvolunteered by your spirit. Your experience in this particular life\nis in accordance to what is right in your lesson and growth for your\nown purpose. You are not a mistake and you did not fall into a\npath destroying yourself, but many of the lessons of human life\nhave been difficult for you and for others who are a part of you.\n\nIn this moment beloved students you are in an intense experience\nfor healing your own psychic sense, your own karmic conditions of\nyour past. You are here to restore your sense of personal balance,\npersonal acceptance and personal joy at who you are and what you\ndo. You walked with me before, in other times and you are\nreviewing and I tell you not to be discouraged. Though we are not\ntogether in the Orient, in a secluded and separate place from\nhumanity, you are protected with consciousness to assist you in\nfinding the courage and strength that is you.\n\nSo yes I am Jove, I am here and you are exploring a new process\nfor you. In your personal time there may come to you, your\nindividual guide and the master Christ or the one familiar to you\nfrom another life. This is not to be seen as unusual but the natural\nconnection to that state of Light that is your truest place of peace.\nAll of you are being touched as I speak in the levels of your own\nsoul and body and mind. And so yes, you can be free from your\nanxiety. You can truly be free from judging yourself and closing\noff your own experiences with others.\n\nYou will be strong enough to walk through this process. There\nwill be a shift in you; you will notice it. Think of that center of\nyour solar plexus totally infused with Radiance of Orange Light\nand from this part of you, all the energy that has come from others\nharming you is released. You are detaching, you are disconnecting\nyou are releasing energies that would harm your ego causing you\nto be in difficulty. You are letting go of your fathers, your\nbrothers, your sisters, all the energies impacted in you from times\nbefore. You are letting go of hurt and emptiness, abandonment\nand pain. You are letting go of being without resources and you\nare abundantly being freed.\n\nAs I speak the body may find resistance or pain and my shoot\nthrough your spine or through your shoulder or in the back of the\nhead where there remain old conditions. Trust the light is\nmagnified, healing is in effect and you are clearing consciousness.\n\nLet go of thinking you must rescue others all the time, their time\nwill come and you will know what is right to say and what is right\nto be the wayshower.\n\nAccept: All is in its rightful state, whom you see and what you see\nis perceptions of the dimensions of Light and it is good.\n\nNow experience this Orange energy filling up your body as though\nthe rays of your Lighted self is coming into you and balancing the\nnature of you. It is flowing through your nervous system, flowing\nthrough all brain wave activity of your past thinking and moving\ninto and through the organic system of you. Each of you are\nreceiving and embracing the Light.\n\nAnd there is an agreement and contract you each have connected\nwith, it is in effect, it will be surprising, it will be joyful, it will\nhave its playfulness in your life.\n\nAnd just feel you are filling up with energy that helps you accept\nin total trust. You are trusting yourself, you are trusting your\nguidance, you are trusting your feelings and you are trusting who\nyou are.\n\nWhen you are ready, the consciousness of who you are moves back\nto the physical body and the physical aspect is grounding,\nconnecting you to all you need to do, materially, physically,\nconsciously and so it is.\n\nGo in peace.\n\n                      Personal Journal\nAffirmations\n\n        I release all fear of what others think of me.\n\n        I am accepting myself lovingly, joyfully and with peace.\n\n        I am now releasing all my doubts and fears of my life, and\n        my image to the light.\n\n        I feel grateful for all my opportunities to see myself\n        clearly.\n\n        I am open to my inner guidance and follow my path with\n        faith.\n\nWrite your own affirmations\n\n\n\n\n\n\n\nWrite out your feelings about relationships you wish to heal."}, {"id": "L2_18", "level": 2, "type": "lesson", "lesson_num": 18, "title": "LESSON 18", "subtitle": "PINK", "color": "pink", "content": "COLOR RAY: PINK\n             The Light of Perfection and Divine Love\n\nPurpose and Essence\n\nThe purpose of this energy brings a balance and harmony into your\nlife. It is of course, the energy frequency of divine love. Without\nlove, you will not know the deeper essence of yourself. Without\nlove, yo318u are an empty shell that has no sound.\n\nAs you review the lesson from the first level, you once again\nperceive this energy earthed by Jesus Christ who brings the divine\nessence of love into the human mind and heart.\n\nThe inversion of love, the opposite of love runs rampant all around\nand you experience the lack of love in communication with other.\nIt is difficult to maintain faith of love when the conditions of your\neveryday life reflect the opposition to this harmony in the human\nmind and action.\n\nAs lightworkers, you are to expand your perception and outlook to\nsee the greater good, to bring a new sense of joy that comes from\nthe depths of yourself.\n\nAs you reflect the essence of light from within, you contribute to\nthe conditions around you, and to those in your life who are in\nneed of light and love. This energy brings to the surface the\nwonderful recognition of the divine love of your inner self.\nHowever, you may also experience imperfections, rejected\nemotions and perceptions that are still in the patterns of your own\n\nconsciousness. Activations may occur that create reactions such as\nfeeling unloved and disharmony in your actions.\n\nSpecific Level Function\n\nWithin the emotional body, the radiant Pink ray brings to the\nsurface emotional patterns associated with love and balance. It\nuplifts the negative patterns to create new feelings of love that\nstem from the inner self or soul vibration.\n\nWithin the perceptual body, it relates to your instinctive reactions\nto love or lack of love, to the imprints of conditions of\ndisappointment from illusions or expectations not met. The higher\nvibration clears your perceptual self from pain and heaviness,\nbringing a clearer perception of knowing and expectation of\nreceiving and being loved. It frees you from repetition to reactions\nof old patterns in relationships.\n\nTo love the unlovable is truly the goal to be set for each soul.\n\nMessage #1\n\nJove - There is much to be said about the emotion of love. It is the\nmost misunderstood emotion of all. Love has many definitions and\nit has no definition. It emanates from the heart, but it affects the\nwhole being. Love for another can cause as much pain as it does\nhappiness. Love should never be painful although painful\nexperiences are shared with those you love. There is one love that\ndoes not cause pain and always brings happiness to the giver and to\nthe receiver. That is divine love.\n\nDivine love is the love that God has for each of all of His children.\nNo child receives more than another.\n\n Some will question this statement just made ‘ that all receive the\nsame love from God.” It will be pointed out, one child has more\n\nmaterial wealth than another, so God must love him more. One\nchild has been given more talent than another, enabling their\nability to achieve a higher status, so to speak. None of that has\nanything to do with the way God loves, nor the amount of love He\nbestows on each one.\n\nGod is the divine Father of all. He is not very different from a\nloving earthly father except that He is a Supreme Being, or maybe\nI should say, a supreme energy.\n\nA truly loving earthly father may have a very talented child of\nwhom he will become quite proud and another child of average or\neven below average intellect whom he loves and cares for as much\nas he does the other. So it is with God. His divine love is bestowed\non all and every creation from the lowest to the highest\nunconditionally.\n\nThis brings us to the point that Azreal wants to discuss and\ncommunicate to you. Many of you realize that each soul is on a\npath back to the beginning of his travels through time. The aim of\neach is to return \"home\" to the Creator of all life and become a part\nof the Universal Energy that has been given the name God. There\nare many paths that leads to this point, but none exclude the\nrequirement that the traveler loves all creation as he is loved by\nGod. How may one be one with God unless he possesses the\nqualities of God?\n\nTo love the unlovable is truly the goal to be set for each soul. It\nmay appear to some an easy task, but as you go deeper into the\nsubject, it is most difficult. However, with determination and with\ndesire to be one with the great Over Soul, the goal will be reached.\n\nThe thought must be held in the conscious mind that it is not\nrequired that you like the personality of any individual, nor must\nyou like anything about any individual. What is desired of you is\n\nthat you love the soul of all individuals. It must be remembered\nthat not only are you a soul first and then a body, but also all are\nsouls living in a shell called the body. This is an important lesson\nto be learned. Look beyond the physical into soul and love the\nsoul. God does! You must also. Not only does God love\nunconditionally each soul, He sends and nurtures that soul. He\nsupplies all that particular soul needs to become loving and God-\nlike. It remains for each soul to become aware of the love and\nnurturing available to him/her and to accept it with joy and\ngladness.\n\n       By sharing love with others you discover love multiplies.\n       If it is not shared, it dies. It must be given away to be\n       kept.\n\nThose who practice unconditional, divine love will find that life is\na fulfilling, rewarding experience, both on the physical plane and\nin the world of spirit. After having become aware that\nunconditional divine love is, required by the creator of all his\nchildren, the next step is to begin the practice. To love\nunconditionally is to love as God loves and requires accepting each\nsoul exactly as it is, without any changes. This is probably the most\ndifficult requirement one must meet to reach at-one-ment with his\nmaker. So let us discuss with you a routine to be followed to\naccomplish this task.\n\nBegin each day with a prayer asking that God be with you through\nthe happenings of the day to keep your heart open for giving and\nreceiving His love. As you give, so shall you receive. As you come\ninto contact with other souls during the day, do not see them as\nmere men or women, but rather as souls filled with beauty and\nlove.\n\nDo not let the personality irritate you, no matter how difficult that\nmay be. Simply look at the soul and say silently, \"I love you as\n\nGod loves me, and as I desire you to love me.\" If you are a student\nof light, you may activate the Ruby Red ray, which emanates from\nthe heart and is the ray of divine love. But whether you use the\nlight or whether you just pray to God, it really does not take a very\nlong time of practicing the above exercise before it becomes\nnatural for you to look beyond the outer into the soul of all you\nmeet.\n\nWhether or not you consciously activate a light, you do emanate a\nlight from your soul body just by your actions so that as you\npractice unconditional love, a beautiful Ruby Red light glows and\nis seen from this side of life and you are blessed.\n\nMessage #2 – Jesus, The Christ Spirit\n\nI AM THAT I AM. I am here to accept your vibrations and your\nlife. You are here to receive the life and the energy of the power of\nLOVE. My work is yet to be fully understood. The consciousness to\nreceive this work is yet to be fully felt. And the way to experience\nthe readiness to serve is to LOVE, to LOVE all that is. To\nunderstand the power of LOVE is to initiate LOVE, to know LOVE,\nto become LOVE. And LOVE is not the experience of a limited\nemotion, but LOVE is being GOD, seeing GOD, and feeling GOD.\nWhen you and the Father are one, when you and the mother are\none, when you and the Holy Spirit are one you are LOVED. When\nyou are LOVED you are the father, the mother and the spirit.\nWhen you are LOVED you are joy. When you are LOVED you are\nunderstanding, when you are LOVED you are feeling. When you\nare LOVED you are LOVE. To teach this is to become it; to\nbecome it is to emanate it in all ways; to find it you must go\nthrough all that LOVE is not; to express it you must find the pain\nof being without it. So you must LOVE you as you are and you\nmust LOVE others as they are and what they are becoming and\nwhat the planet is becoming. If you teach LOVE and are LOVE\nand have LOVE and express LOVE then the planet's vibration\n\nbecomes a demonstration of LOVE. When it is demonstrating the\nfullness of LOVE it has no need for war, it has no need for\ndisorder and it has no need for lack. All this is LOVE without\nunderstanding, without development and without manifestation. It\nis LOVE in the inverted state. It is the lack and pain of striving to\ndiscover the fullness and the wholeness of LOVE.\n\nThe channel is a beautiful instrument from which wisdom and light\ncan be received, expressed and felt. And all of my servants are\nchannels. And all that are in desire to change the planet's lessons\nof lack and pain and disease are souls in the path of their own full\ninitiation.\n\nComments from Antoinette (Toni)\n\nI received these messages at different times, as classes were given to\ndifferent groups. Sometimes it was years between these classes. The first\ntime we received a message from the Christ, this was my reaction.\n\nAs a channel I was feeling all day long that something very special\nwas to happen. The group that had been meeting each week was\nvery touched by each and all of the messages. Therefore, as we\nprepared for this Pink ray we each were very open to the Love and\nlight. All daylong I had been feeling extremely balanced. I had no\naches and pains, which was unusual for me. I just felt the strongest\nsense of total peace. It was awesome. As we began our meditation\nthe room became quite still, more than what seemed to be the usual\ncalm.\n\nThen the Christ Spirit spoke (or Jesus if you can accept this). His\nwords came so clearly and authoritatively yet with total love. Each\none in the room experienced tears pouring out of their eyes. At the\nclose of this message when each of us began to open our eyes, the\nroom was filled with a pink haze. Everyone felt a presence so\nstrong.\n\nThen suddenly on the Grand Piano in the dining room a chord\nplayed. Just one chord harmoniously and clear. No one was at the\npiano. It was a moment in which we all felt this blessing.\n\nMessage #3 - The Christ Spirit as Jesus\n\nI AM one and I AM many. To those who have seen and experienced\nthe powers imaged in the form of Jesus as my alter-self in the past,\nhave their inspiration and miracle of life. To those who have not\nperceived the image in that form, yet feel the power of LOVE also\nknow my presence.\n\nI have always been, will always be, and LOVE each and all\nwithout judgment. How can we judge those who have yet to\ndiscover their own magnificence? And so, it is for the will of the\nhierarchy that the magnificent planet, the beloved world of earth,\ncontinues to be a place to glorify the creation and the creator and\nthe spirit of light.\n\nAnd you who are in need of the healing of the body accept this\nhealing now. You are feeling your body but a perfect instrument;\nyou are feeling your consciousness as a total heightened sense of\nvibration of LOVE. And so it is.\n\nThough suffering and lack, though hunger and pain are still a part\nof the human demonstration of karma and lives in need of balance,\ncycles are changing. You are leading the way. We are bringing the\nway to you, the opportunity.\n\nI will never leave you but you will always feel a sense of the need\nto reaffirm this truth. And so, I leave you with this demonstration --\nto reaffirm my presence.\n\nYou are each seeing an energy of light, to all focused on a thought.\nThis you will share. Neither of you are greater than the other; all\n\nof you are in your greatness. Teach LOVE, live LOVE, explore\nLOVE, become LOVE -- and you will heal, laugh, sing, dance, and\ncelebrate. Let joy and ecstasy fill your being and know it replaces\nall fears. I honor you. I honor your courage. I accept your LOVE.\n\n                       Personal Journal\n\nAffirmations\n\n        I am love. I am loving. I am loved.\n\n        I accept with openness the love that is surrounding me.\n\n        I release all fear of accepting love.\n\n        I am grateful for the opportunity to learn about love.\n\n        I surround all that I am, feel, know and experience with\n        love.\n\nWrite your own affirmations.\n\n\n\n\n\n\n\n\n\nWrite of your concepts of love."}, {"id": "L2_19", "level": 2, "type": "lesson", "lesson_num": 19, "title": "LESSON 19", "subtitle": "AMETHYST", "color": "amethyst", "content": "COLOR RAY: AMETHYST\n                    The Light of the Warrior\n\nPurpose and Essence\n\nThe purpose of this frequency is to break up within yourself the\nconflicts that have recreated patterns that stand as a denial of your\nown true potential. Each one has experienced confrontations silent\nor verbal that creates the stress and hostilities of your emotional\nmakeup. Many create strong defense mechanisms that hide their\nemotions and prevent the flow of love and joy from really being\nexpressed. It is difficult to relate with open feelings if there is\nrepressed.\n\nConflicts are a part of life, and you cannot exist in life without\nfacing conflicts or differences in interests and beliefs. However,\nwe can utilize the light and release those conflicts that hang on as\ndifficulties in our lives. Perceive conflicting matters being uplifted\nthrough the consciousness of higher understanding and enlightened\nawareness. As your reactions to conflict change, so does the impact\nthey have on you change.\n\nWithin this frequency, you may experience the conflicts rising to\nthe surface as emotional outbursts and arguments. Old conflicts of\nthe past may take on a new drama. As you perceive your reactions,\nyou can observe and reconstruct your reactions through change of\nthoughts, new behavior, and by utilizing the light.\n\nSpecific Level Function\n\nWithin the emotional self, all conflicts within your emotional\nmakeup may become quite intense.\n\nAgain as you work within your meditations, perceive these\nconflicts directed into the light and clear through the spirit of love.\nWithin the perceptual self, anxiety attacks may arise, nervous\ntension may be felt. Perceive the light directed through the nervous\nsystem releasing old conflicts that have their imprint on your\nconsciousness.\n\nThe Amethyst Ray, like a warrior, goes to battle against the issues\nin the tissues stagnant in your emotional/perceptual self. The\nenergy is a vibration in which you feel the healing taking place\nthroughout all of your emotional and perceptual make up.\n\nMessage #1\n\nAzreal - Greetings, this is Azreal, and we speak to you with the\nlight of your higher self. Trust and know what is transpiring in and\nthrough your individual nature is bringing you out of the\nimprisonment of your past conditioning into states of freer\nexpression. What appear as difficulties and activations, that\noverride your sense of balance, are the activities from within\nfreeing you from the resistances of the past.\n\nEach of you are enveloped in the rays of the Amethyst energy. You\nare as spectrums of color, experiencing a clearing in all levels of\nyour expression and each of you are moving very distinctly\nthrough the process of your own soul's accelerated activity.\n\nAs you work within the emotional level, it is intensifying the\nreality of how you hide the feelings that have been a part of your\nexperiences and how you have denied the freedom to express what\n\nyour desire to express. The Amethyst activates feelings that have\nbeen suppressed under conditions that create situations in which\nyou feel you are being held against your will.\n\nAgain, no feelings can be judged as good or evil, feelings are\nregistered in your sensory nature of how you are experiencing and\nexpressing your life. You feelings represent how you project, how\nyou envision and how you relate to your experiences. The feeling\naspect can be brought more into a state of tranquility as there is an\neasing of intensity of feeling that which is a false-to-fact\nexpression.\n\nOften resistance and rejection are vibrations that come from mass-\nmind experience. Where there is an overriding depressiveness\nemanating in and through the ethers, you begin to experience the\nfeelings of separation from your creator. This is the deepest pain\ncausing confusion and fear. It is then you are in stages of feeling\nlost from your security. These become challenges. To alter these\nfeelings and painful fears, activate the Amethyst and in silence\naffirm you are releasing all thoughts, feelings and pain to the light.\n\nRelease at this moment all the conflicts and perceive the emotional\nbody like an ocean moving filled with many forces. Feel the\nemotions rise. Now, perceive that the radiant Amethyst light is\nuplifting and clearing any dis-ease, any conflicting storms,\ndissolving issues through reason, through knowledge and spiritual\nwisdom.\n\nRelease the light into the mental bodies touching all who are part\nof your every day experience. Perceive there is an element of\nenergy directed to clear any factions that stand as resistance and\npain. Observe the light radiating like a hue of energy easing the\nwarring conflicts of mental consciousness. Perceive you are as\npeaceful warriors, directing energy to dissipate the factions of\nanger, resistance and guilt. Perceive your light directed outwardly\n\nreceived by others to clear issues and pain. Now perceive the light\nmoving through the feeling aspect; perceive all those close to you\ncleared of the feelings of hostility and pain.\n\nAnd now dear students draw the awareness back into the forebrain\nand feel self-coming full into consciousness. May the energy of\nthis light increase your awareness of balancing out disease and\ndiscomforts within yourself freeing you from the bonds of\nsuppression and pain. Go in peace and may the Light of the Christ\nbe in and through you.\n\nAffirm;\n\nI release emotional fears that keep me in anger and fear.\n\nI release these emotions through healthy outlets that clear the\nmind, body and spirit.\n\nI affirm that warring actions are released to the light and love\nsurrounds all that I am and do."}, {"id": "L2_20", "level": 2, "type": "lesson", "lesson_num": 20, "title": "LESSON 20", "subtitle": "MINT GREEN", "color": "mint", "content": "COLOR RAY: MINT GREEN\n                    The Light of Rejuvenation\n\nPurpose and Essence\n\nThis light energy ray of Mint Green is one of the most beautiful of\nall the energies. Its highest aspect brings within an acceptance of\nnew life, a new outlook, and change in awareness and\nconsciousness. It inspires new ideas and goals. In the lower\nfrequency aspect, feelings of fear of change can be acute. Fear of\ndeath, trauma from the past involving abandonment or loss can\nleave one feeling numb or lethargic. All of this is a healing\nprocess. Breathe deeply and affirm you are clearing your fears and\naccepting new consciousness.\n\nAs you are processing the old, oftentimes the cells and organs\nwithin the body can send signals of fear of the changes about to\ncome. The subconscious or even the conscious self may rebel\nagainst new beginnings due to fears of the unknown.\n\nAs you work through the fear aspect and see things from a new\nperspective, there is the joy that arises from the enthusiasm of new\nstarts and new consciousness.\n\nThis energy is associated with the resurrection of Christ and the\n\"born again\" feeling. It can arouse a more youthful feeling and\nappearance. Whatever your experience is, know you are moving\nthrough mountains of fear, pain and grief. Everything is in a\n\nhealing process5 All in all, this is a wonderful energy ray and the\nmessages of the masters in this frequency give us beautiful\nexperiences. As you move through your personal journey into self-\nwholeness, be assured you are on a path to greater balance. You\nare walking a path to eternal life and love.\n\nThe love that you will manifest is the divine aspect of the Christed\nself, the marriage and union of your lower and higher nature.\n\nSpecific Level Function\n\nAs you experience the energy of the Mint Green Ray, you\nemotionally look at conditions with a new perspective. The process\nwith this energy is to let go of the old patterns that create\ndestructive actions within and around you. Affirm that you are\nopen to new action in your life, new love for yourself as well as\nothers, as this is the key to activating the energy of rejuvenation.\n\nMessage #1\n\nGreetings, this is Azreal. Once more, we speak that you may\nunderstand with greater clarity what is transpiring in and through\nyou. Movement through the cycles and levels of consciousness is\naffecting every aspect of your being. We perceive that at this\nparticular point in your evolution, there is a clear element around\nyou. The essence and aura that is a part of your consciousness is\nchanging, yet there still are areas that need new perspectives.\n\nIn this ray of light, you will begin to feel intensity and vibration\nmoving through the bodies. In this moment, know that each cell\nwithin the body is experiencing the vibration of this frequency,\ncreating new cellular consciousness for new actions.\n\n6 O.O.M. There is a greater reality. By Antoinette Moltzan\n\nThe earth is moving through an accelerated pace too. It is\npreparing for changes in the environment. It will not appear in\nstrangeness as another planet; it will always be recognized as the\nearth, but the atmosphere will change as humanity’s awareness and\nconsciousness changes.\n\nThe past twenty-year cycle became a movement to produce the\nmeans for self-pleasure and comforts producing excessive usage of\nnatural resources of earth. A more simplistic approach, a cleaner\ndesign will come. The earth is in the activity of it renewal. It is\nrumbling, it is bursting at the seams in certain areas as humanity is\nalso experiencing intense pressure.\n\nAs light bearers, you are here to present the alternatives to past-\nthinking and to enlighten yourself and others to spiritual principles.\nAs lightworkers, you are the bringers of divine love as a healing\nfactor and practice spiritual law in a conscious way.\n\nProcess\n\nIn this moment, perceive the rays of light radiating within your\nbody and out the top of the head. Perceive the mental plane lifted\nout of all resistance to new thought, new direction and spiritual\nintegration. Perceive your light radiating and flowing into the\nearth.\n\nYou are being prepared to enter into another phase of self-\nunfoldment, moving you further into the higher levels of your\nconsciousness. You are being prepared to enter into the activity\nwhere you are directing light for the planet earth.\n\nIn this moment, perceive the selves of your consciousness being\nreborn into new awakening. Perceive the cells of the skin\nenveloped in this light. Put on the new robes of consciousness\nrepresenting the birth of the Christ into the mind of Man.\n\nPlanetary activity increases the actions within the individual\nconsciousness and the planetary systems are creating forces to\nbring the earth through a transitional period. Do not be lost in the\nfear or perceive destructiveness as the only alternative. We\nperceive an awakened humanity to spiritual awareness guiding the\nevolutionary process.\n\nAt this moment, we desire each of you to see yourselves walking\nthrough this corridor of consciousness. Look straight ahead and see\nthe light, see the rays of energy, see the brilliant radiant Mint\nGreen Ray and walk through this corridor, which represents a\nsymbol of one stage to another. Let go of all old patterns. Perceive\nthe astral body releasing all that clings to it. Perceive the guides\nand teachers guiding you in and through this level of\nconsciousness.\n\nAnd as you enter into the light, perceive your spirit, soul, and body\nas one enveloped by the beauty of the vegetation of the earth.\nPerceive yourself as one with the nature spirits. They are harmless\nto you, unseen to your vision, and yet evolving and participating in\ntheir own particular experiences. As you have life, so has all living\nform have life. You are all as one, a creative energy expressing the\ndifferent life forms.\n\nGo into a deep silence …\n\nVisualization\n\nPerceive you are in a place where you become rejuvenated and\nrefreshed. Perceive you are receiving from the earth and its plants,\nits vegetation, its growth, its natural beauty new insights for a new\nbeginning. Bask in this.\n\nPerceive you are closing a door to conditions that hold you\nprisoner to the past. Perceive the Christ, the spirit within you, and\ngo in peace.\n\nA Student’s Visualization\n\nI saw two white comets crossing each other. From these White\ncomets, I saw the Mint Green Laser reaching toward the Golden\nsun. Around the Golden sun were the Divine Ruby Red Rays.\nFrom the Ruby Rays were two Blue lasers coming up and on each\nside; connected to those Blue lasers were White lasers and I saw\nthe Master Jesus the Christ with sheep around him. He said: “Be\nstill” and “know that I Am.”: Above Him written in Red, were the\nwords: “Love, Peace and Beauty:”\n\nInterpretation\n\nComets represent the force, the flow of Light and Energy, the\nimpact of the lightwork. The Mint Green laser light is activated\nfrom the centers of the students moving towards the sun.\n\nThe sun represents the center of a pure lighted Being (Christ). It is\nthe source of your every breathing moment of life. The Blue laser\nlights are the wisdom rays moving in harmony with the creative\nMint Green. The Christ Jesus represents that Christed\nConsciousness—the masters and teachers.\n\nThe sheep are the many students that will gather at your studies.\nThere will be many sheep come into this Course in Light and the\npurpose of all of this is to bring the manifestation of the true\nAquarian Age (Millennium) which is the Age of Peace and\nBrotherhood and Divine Love.\n\nThe Ruby Red Rays surrounding the sun are of course, the healing\nof the repairing of interpersonal relationships and that which stems\nfrom the Divine Love aspect.\n\n                      Personal Journal\nAffirmations\n\n       I ask to be shown my patterns of negativity that are\n       repetitious of old ideas.\n\n       I ask to be cleared of fear of my past and my future.\n\n       I affirm that my body is reflecting my sense of wholeness.\n\n       I accept my new beginnings with joy and ease.\n\n       I accept change without fear.\n\n       I accept my realization of being one with God and love.\n\nWrite what you would like to see take place for new starts, new\ngrowth experiences."}, {"id": "L2_21", "level": 2, "type": "lesson", "lesson_num": 21, "title": "LESSON 21", "subtitle": "SCARLET", "color": "scarlet", "content": "COLOR RAY: SCARLET\n                       The Light of Passion\n\nPurpose and Essence\n\nThis energy called the passion ray is associated with the sexual\nnature and the physical desires ruled by Pluto. Pluto represents the\nenergy that unearths the hidden factors. It also is associated with\nthe healing ability of transformation. It is felt as hot burning fire-\nlike energy. Its purpose is to clear the negative debris, in the\nemotional and perceptual nature, that bears scars and illusions\nwithin the sexual nature. The higher, finer essence of this energy\nbrings into motion the deep desires and passions you seek to put\ninto action. You may feel intensity for accomplishing goals and\ndirecting your energies for a greater purpose. It increases the\nsexual urges and can bring you into a passionate exuberance. It can\nalso bring the conflicts and aggressiveness within you to the\nsurface, as you may find yourself defending your position with\npassion and emotional outbursts.\n\nIf you find yourself aggressively caught in intense arguments,\npassionately defending your point of view, you are experiencing\nthe intensity of this ray of light. Perceive the situation from all\npoints of reference to clarify the disagreements, and perceive that\nright action will resolve the conflicts.\n\nYour sexual urges also are activated within this energy and\nunresolved issues may confront you from emotional and perceptual\nscars.\n\nSpecific Level Functions\n\nWithin the emotional self, you may find increased energy flow, a\nnew intensity to get the job done, reactions of conflict or\naggressiveness. You may break through the lethargy or passiveness\nof fear or conflict. The higher frequency rate of this Scarlet Ray\nclears the air and brings new vitality.\n\nWithin the perceptual self, concepts and instincts regarding your\nown sexual nature may manifest intensity and desire to resolve\nmatters of sexuality.\n\nPerceive yourself releasing guilt, shame and blame, towards\nyourself and others. Perceive the light is uplifting old patterns\nwithin you, releasing any conditions that creates dis-ease within\nyourself and others.\n\nThe Scarlet Light creates a tremendous power for the positive\nprojection of one's true purpose, allowing the deepest desires and\nmotivations to surface.\n\nMessage #1\n\nAzreal - Yes, greetings, this is Azreal. We speak that you may\nunderstand with a greater clarity once again what is transpiring in\nand through you. The cycle of this particular lesson envelops you\nin attitudes and consciousness, perpetuated either through the\ndenial of yourself inhibited by the fears and anxieties, or it will\nwork within to bring you into a greater recognition of imbalances\nof aggression and power systems that create hostilities on a\nconscious level.\n\nTo bring you into balance is the key; to be neither one who is\nintensely aggressive to a point of creating pain in others or one\nwho is so passive to the point where there is no action. There must\nbe the inner and outer balance on all levels. This ray works to clear\nmuch of the distortions of thought regarding the nature of your\nbiological sexual manner.\n\nYou are physical, mental, emotional, spiritual, and totally activated\nby a higher intent. Your purpose is to bring self into vibrations\nwhere you are balanced on all levels, within and without in your\ntotal life experience.\n\nIt takes much time to reach these levels of harmonious internal and\nexternal activity. It takes an initiate a long time to break through\npatterns of karmic activity of past conditions. The vibration of the\nScarlet Light is to help the initiate clear within barriers and\nhostilities regarding personal power. It is to develop personal\nunderstanding and release habits of overstepping boundaries\ncreating pain in someone else. It also helps clear issues\nconsciously.\n\nYou are man, you are woman, you are spirit, you are soul and you\nare a composite of a higher vibration subjected to the lower aspect\nof consciousness. You are in constant decisiveness between a\nspiritual clearing within, and creating bondages that bring you into\nyet further lessons. Seek through self what you desire to unfold, to\nexpress and to create.\n\nThe body is what you chose to express. To deny the body is to\ndeny your own existence. The body is not an illusion; it is matter,\nit is vibration of a denser nature. You exist beyond the body, and\nyet, you and the body are one. Your body is your place of\nexpression. To deny it, to bring it into disease is to deny self of a\nrealization of your sense of wholeness at the spiritual plane.\n\nProcess\n\nAll is cause and effect. And now, beloved students, as this\nfrequency is magnified, perceive you are letting go of all fears and\ntraumas regarding how you relate to the sensual, sexual\nconsciousness, through the biological physical expression and\nthrough motivation and attitude.\n\nThink about who you are, what you express, what you desire to be,\nand what you perceive as the higher good.\n\nGo in peace, and may the light of the Christ be in and through you.\n\n                     Personal Journal\nWrite your own affirmations.\n\n\n\n\n\n\n\n\n\n\n\nWrite of your passions for life, and your desires to accomplish\nthem.\n\n\n\n\n\n\n\n\n\n\n\nAffirmations\n\n      I release all negative angers that keep me in turmoil and\n      rage.\n\n      I accept the power for good in my life regarding all matters\n      of my life."}, {"id": "L2_22", "level": 2, "type": "lesson", "lesson_num": 22, "title": "LESSON 22", "subtitle": "BLACK", "color": "black", "content": "COLOR RAY: BLACK\n                The Power Center for Grounding\n\nPurpose and Essence\n\nThis Black Power ray symbolizes the graduation or transition from\none state of mind into another level of consciousness. It also\nbalances your nature and is the grounding too. It holds you firmly\nto the earth. It is the polarity of the radiant White Light and\ngrounds your awareness into the practical matter world.\n\nUp until now, you have been working to attune your consciousness\nto the higher, finer vibrations of the soul system. The meditation\nprocedures raise up your awareness out of the physical plane into\nthe consciousness of your inner spirit and soul. The inner work is\nfor the purpose of letting the energy itself work with you without\nthe interference of the intellect or the brain-mind creating\nobstacles. Therefore, during the sessions you may not have been\nable to fully hear the cds or comprehend what was actually being\nspoken.\n\nNow you are to experience these finer energies and ground them so\nthat you can feel both lightness and solidity grounding the inner\nwork into your practical consciousness. As you experience this\nsession, you may feel yourself being very aware of your body,\n\nyour surroundings and physical stronger. You may or may not\nexperience the lightness felt in the previous sessions.\n\nThe intensity of the Black Power center is to bring you into full\nconsciousness with your physical body and to help keep your feet\non the ground. This energy consumes the negatives that are\nprocessed. All of this may seem elusive and yet, through your\nexperiences comes the validity.\n\nActivation of the Black Power Ray\n\nThe meditation procedure will differ slightly from this point on;\ntherefore read the following instructions.\n\nDuring the meditation when you are in the silence, you are\nexperiencing the inner work of the light. Often you may have\nimages of your guides, teachers, Azreal or other masters. You may\nalso experience yourself in an out of body experience. You could\nsense lightness within your body or frequencies moving throughout\nyour physical self. These are all valid activities when you are in\nanother level or dimension of consciousness. As you are in the\nsilence, it is your time to hear, feel and know.\n\nAs you return from the silence, the procedure now is to bring your\nawareness back into the forebrain and direct your consciousness\nthrough the central vertical axis and down through the bottom of\nthe feet. Activate the Black Power ray just as you activate the\nWhite light. Feel the energy move through you into this center.\nThis grounds your consciousness and assists you in bringing\nyourself back to third dimension reality.\n\nMany may feel uncertain about using this energy for fear that it is\nevil, as the color black is often associated with evil. However, this\nis a center of your soul body, which is associated with the earth\n\nand is a tool of the soul for stabilizing its frequency within the\nearth system.\n\nPerceive yourself polarized and balanced with the radiant White\nlight at the head and the radiant Black Power center at the feet.\n\nMessage #1\n\nGreetings, this is Azreal, and we do speak that you may understand\nwith clarity the transitional states that you are now moving\nthrough. You have processed much within the past cycles; you\nhave cleared much within your essence and the aura of your inner\nbeing. You have activated each focal point within the soul plane\nand all frequencies to integrate within the physical body in order to\nraise up your overall vibration.\n\nFrom this point on, you will perceive that the energies activated are\ndrawn in and through this particular center of light. Perceive the\nBlack Power Ray a center of light and a polarity center with the\nradiant White light. This particular focal point is the connection to\nthe earth plane and the center through which you direct all energies\nand processes. It is a force, an energy vortex experienced as\nopposition to the radiance of the vibration of the Christ light. Do\nnot perceive it as an anti force, it is simply the aspect of self-being\nin earthly consciousness. Again, as spoken through the channel,\none brings the inner into the outer and connects them in order to\nexperience complete manifestation.\n\nAs we oversee each entity through these procedures and systems of\nconsciousness, it is a pleasure to experience the lightening of the\nphysical plane and the emergence of auras radiating with lighter\nvibrations.\n\nYET, understand you are not in perfection and the auras are still in\nneed of much clearing. Creating who you now are came forth from\nlong periods of consciousness yet unawakened to the truth.\n\nYou are entering these phases, as an initiate awakening to first\nknowing of yourself as a being of spirit and light, much has\ntranspired to accelerate your personal transformed consciousness.\n\nIn this following week and through cycles into the future,\nremember that the feet represent the foundation upon which you\nstand and the understanding of that foundation. As it is planted\nfirmly within the earth expression, you will feel fewer tendencies\nto extract yourself from the earth, and yet be able to maintain the\nawareness of light and the spiritual forces that are part of your\npersonal makeup.\n\nGo in peace, this is a very important phase of personal expression.\nWalk with strength of self as human, as man representing his\ncreative self within the earth to bring the message of his higher self\ninto actuality. Go, may the light of the Christ be in and through\nyou.\n\nPlay the cd or mp3 for the process\n\n   CONGRATULATIONS!\n  You have completed Level 2\nNow you are moving into Level 3"}, {"id": "L3_intro", "level": 3, "type": "intro", "lesson_num": null, "title": "INTRODUCTION", "subtitle": "", "color": "intro", "content": "You are now entering a new phase of your spiritual development.\nHaving completed the previous lessons of the light work, you will\nbe focusing your attention and concentration on the mental level of\nconsciousness. In Level 2, the Scarlet Center and the Black Power\nCenters were activated, bringing the total number of centers to\ntwelve.\n\nUsing these centers as focal points of releasing energy in and\nthroughout your bodies and consciousness has made you aware of\ntheir intensity. Yet, you may still be wondering if these are truly\neffects are benefiting you in a practical way. Mind and matter must\nbecome one. During this level of consciousness, you will\nexperience the opening of your thoughts and how you allow your\nthoughts to express them in your life. Through the opening of your\nconsciousness to the receiving of the light and by taking\nresponsibility for your own thought patterns, you can discover the\npower of love that brings forth the good in your life.\n\nWithin the level of the mental realm you will be experiencing light\nenergy concentrating in and around your mental energy field. At\ntimes, there may be unusual pressures felt in the head area, similar\nto a headache. At other times you may experience a very clear\nconsciousness, a release and lightness all about the head.\n\nThis occurs when a clearing that has taken place and pressures are\nrelieved from your mental thought processes.\n\nThe primary light rays within the mental plane are the White,\nGold, Blue and Emerald Green. The Ruby Red and Orange\nfrequencies are associated with the emotional body, while the Pink,\nAmethyst, Mint Green and Scarlet are primarily color rays of the\n\nphysical body. In working with these energies simply, call them\ninto your consciousness by thought, the effortless effort of thought.\n\n         Remember: Thought directs energy; energy follows\n         thought, and thought adds to and magnifies energy.\n         Where you concentrate, that is where the energy is\n         focused.\n\nMental Nature\n\nEverything you think about contributes to the aura of your mental\nbody. The thoughts you receive from others also contribute to your\nmental aura. Many headaches occur because of the pressure of low\nfrequency thought vibrations that is created by self or received\nfrom others. When in a crowded room, where there are conflict or\nstress factors present, you may often feel pain in the head or the\nback of the neck area. The tightness in the back of the head or neck\narea many times can be attributed to experiencing collective\nthoughts that are of intense low vibrations.\n\nPerhaps while shopping you might suddenly feel a loss of energy,\nextreme tiredness or aching in the legs, lower back or head areas.\nThis can occur from your magnetic field experiencing collective\nthought. In these instances, when you have time to be quiet or\nalone, activate the energies of the Radiant White and Gold to uplift\nand clear your own energy field.\n\nStress, anxiety and fear can activate tension and pain in the\nshoulders as well as the head area. To clear these discomforts\nactivate the Radiant Golden Ray and concentrate within the head\narea. This will help release the conditional thoughts that press\nagainst your consciousness. Affirm that you are surrounded in the\nlight and protective love moves in and through you. Love\nmaintains a steady thought flow of acceptance of conditions that\n\ncannot be changed by you. Now perceive that divine order will\nclear that which must be brought into balance.\n\nOnce clearing has taken place within your mental nature, you will\nbegin to feel released from these discomforts. The important aspect\nto remember is that the brain is the seat of the conscious mind. It\nworks like a computer, storing experiences and collecting\ninformation, directing the body functions and motor system. The\nbrain is the sorter of information and directs the functions of all the\nsystems. When the body and the emotions become involved in\ncertain activities that caused past emotional explosions, the brain\nautomatically reacts and produces situations according to the past\nimagery.\n\nMental images stemming from past programming block the\nactualization of one's full potential, which is why the light work is\nso important. It moves to transmute images within the memory\nbank, releasing thoughts and emotions from past experiences. It\nactually consumes and erases these holograms, allowing one to\nestablish new positive and constructive thought patterns.\n\nYou are in a process of initiation that uplifts your thinking into\nnew levels of vision, perception and rational thinking.\n“Objectification” is the act of the mind, to affirm positive\nmotivation and acceptance of goals, ideas and desires. To\nobjectify, you must firmly accept, know and believe that the\nprinciples of divine order manifest in accordance with right action.\nBecome familiar with an affirmation that strengthens your thought\nprocesses and aligns you with the power of manifestation of your\ninner most consciousness.\n\nYou have the thoughts to direct positive energy into the levels of\nyour existence. The procedures of meditation are given for you to\nexperience the light and its flow in and through you. This is to\nrelease from within the unconscious, as well as the conscious\n\nthoughts, which create opposition to your sense of joy, love and\nharmony.\n\nResults of Mental Level\n\nResults of the light work can bring you into states of awareness\nwith a renewed feeling of joy, release and enthusiasm for living\nalong with a renewed closeness to your Creator and the Christ\nSpirit.\n\nAs you begin to release the false-to-fact imagery that holds you\nprisoner to past negative actions, your senses become alive to a\nrenewed love of life and of self. Experiences of increased\nsensitivity can also be the result of working through the barriers\nand blockages of your individual consciousness.\n\nWithin the light work, the brain-mind consciousness is being\ntrained to tune in to the workings of the inner self. Discipline is\nimportant and required in order to allow the consciousness to go\ndeep within your inner thoughts and into the brain-mind thought\npatterns. With affirmations as a building block to new positive\nconsciousness, you begin the process of developing a positive\nbrain wave activity that draws into its experiences the\nmanifestation of mind and matter becoming one.\n\nLook within self to your own personal thought processes. How\noften do you react with a negative or judgmental attitude toward\nconditions or persons of which you have little knowledge? Often\njudgments are placed upon situations and persons that you fear\nbecause of previous negative feedback. Rethink the situations,\nasking to be cleared of false-to-fact patterns that hold you in\nabeyance to unification with your true spiritual self.\n\nYes, there are those experiences and persons who are acting out\nnegatively with motives that are destructive and in conflict with the\n\ngreater good. You are not to be blind to these conditions, but to\nrelease their hold on you by disentangling their effect on your\nconsciousness.\n\nAs a student within the light work, it is most important that you\nrealize that this work is not just a pursuit towards intellectual\nknowledge or psychic phenomenon. This is a process of coming\ninto a clearer understanding of you as a person, as a spiritual soul\ngrounding itself into a physical reality and to balance your karmic\nentanglements through love, release and forgiveness. It is your\npursuit of a state of being where you find yourself in wholeness\nmentally, physically and spiritually.\n\nWhen you entered Level I of “A Course in Light,” the meditations\nwere centered on the physical body, as this is the heaviest and\ndensest of bodies. In Level II, you focused and received the\nconcentration on the emotional and perceptual bodies. As a\nreminder, the five bodies we concentrate on in the light work are:\n\n     Physical, Emotional/Perceptual, Mental and Astral/\n     Etheric\n\nAs a student enters Level 3, it is most important to have at least a\nbasic understanding of the logic in the sequential activation of the\ncenters as well as the reason for sequential work through the lower\nbodies. It should be apparent that each of the frequencies of light\ncorresponds most heavily to one of the lower bodies.\n\nThe White, Gold, Blue and Emerald Green are very much centered\nand focused within the mental plane and therefore have a\ncorrespondence to the mental nature. If you are experiencing\ndifficulty in discerning or seeking answers to perplexing situations\nthat must have a clearing, perceive these energies being directed to\nyour consciousness in the mental plane. Ask for guidance and\ndirection in knowing what direction to move.\n\nIf you are experiencing emotional and physical disharmonies,\nperceive that the energies of the Radiant Purple and Ruby Red are\nflowing in and through you and you are being healed of emotional\ndebris that clouds your sense of joy and love. Also, direct these\nenergies into the perceptual body to uplift confusion in situations\nthat need a clearer view of conditions. They will break up illusions,\nwhich may play a part in your behavior patterns that continue to\ncause negative actions in your life.\n\nAsk that your higher self or soul utilize that energy to bring\nupliftment to your consciousness and action to release the heavy\neffects and experiences of pain that lingers, causing negative\nreactions. Once you accept and know that a higher law will apply\nto these conditions, you release it to its effect and experience the\njoys of the miracles that come into your experiences.\n\nDuring Level 3, you may find that you are changing your attitudes\nand understandings about many conditions in your life. It is an\nexciting level as you move through the limitations that have\noccurred in your life.\n\nAffirmation\n\n         We are of one mind, we are of one thought, and we are of\n         one consciousness. We ask that the mind be in us, which\n         was also in Christ Jesus.\n\nThis level's key phrase is “TRANSMUTATION AND\nOBJECTIFICATION!” Transmutation is the act of opening the\nconscious mind to receive the light and allowing the energy to act\nupon hidden concepts which may act as barriers to your sense of\nwhole thinking and to release from the memory bank those mental\nimages which lurk as fear to your sense of peace. “Be ye\ntransformed by the renewing of your mind!”\n\nDreams in This Level\n\nMany students find that their dreams become quite confusing as\nthey continue along the path. Becoming more conscious of dream\nstates does not imply that the meaning becomes clearer. Often the\nconscious mind is blocked from experiencing the meaning that is\nreflecting the activity at the inner levels, for the conscious mind\nmight be so overwhelmed over all the episodes
