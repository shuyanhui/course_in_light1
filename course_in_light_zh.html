to you that you may understand\nagain the nature of who you are and where you are moving toward\ninto greater stages of self-expression. You have walked through\nthis particular path highly accelerated and have been brought face\nto face with that which has been created out of past conditions. The\nsoul is acting upon the nature of its past creativity and moving into\nnew phases of its self-expression. The light essence has permeated\nin and through your body and consciousness and we perceive\nupliftment on all planes. Some of you have come into a place\nwhere you are flowing with much higher understanding and\neasiness, assimilating daily activity with new depth and wisdom.\nSome of you are clearing the difficulties of the human experiences\nout of the past. You are processing your fears and separation from\nthe acceptance of love. You are beginning to sense your body and\nthe emotions and direct your thinking into new areas of\ndevelopment. You cannot pass through this phase of inner work\nwithout internally or externally having been transformed. Yet, you\nmay now be able to evaluate your own progress. Do not judge\nyourself by others. Do not evaluate your experiences with another.\nYou are walking through your own life experiences. In your\nmeditation, begin to visualize that you are walking through a\ncorridor, a long corridor in which you perceive a great light at the\nend of this tunnel. Perceive that you are leaving behind the pain,\nthe denials, rejections and the conditions of your existence.\nYou are walking out of a void moving towards a new plateau of\nconsciousness. Perceive as you walk through this corridor ahead is\na radiant light, the energy of which is the Radiant Mint Green ray.\nNow you are experiencing releases in the body. Perceive the\nguides and teachers walking with you. Know that you cannot see\nwhat is at the end but affirm that light and the spirit of truth, the\nawareness of Christ, awaits your presence and your consciousness.\n\nAs you move into this plateau of awareness, you find yourself\namong the vegetation of the earth. The life forces of the earth\nplanet envelop you and you become one with this energy. Perceive\nrays of light moving through all of the body. Where there has been\nrage, let there be peace. Where there has been death, let there be\nlife. Where there has been sorrow, let there be joy. Where there has\nbeen denial, let there be acceptance. As the Christ has spoken, I\ncome not to deny life, but to give life to fulfill the law that you\nmay experience eternality and immortality.\n            Now close the door to the past.\n           Only that which is love remains.\n           You begin anew.\n         Perceive the earth planet receiving light of the Radiant\nMint Green Ray, and all humanity enveloped in the awareness of\nnew consciousness and new growth.\nGo in peace and may the light of the Christ be in and through you.\nMessage #2\nAndrew – It is joyous to see you emerge out of the shadows into\nthis stage of expectations for new growth and options. This is an\nevent in consciousness when you are to meet an opportunity\ncrossing the line into another phase of personal integration and\ngrowth experiences.\nIt is so difficult to present to you the actuality what is in motion\nhere. In essence, the transference of what we observe to what you\nare experiencing is based upon vibrations and light infusing soul\nwith the awakening to a positive direction for your growth and\nyour connection to the earth.\nIn truth, you have been separated from this beloved planet. You\nhave been infused with many distractions in which you cannot feel\nyour oneness with the planet and with her beauty and with her\nnurturing qualities. This energy is to reacquaint you with your part\n\nof sharing in this extraordinary planet that is the school of your\nheart and soul's learning.\nThe earth always replenishes the destruction of humanity or by the\nforces of nature. It brings renewal through recreation. As light\nbeings, you have a need to open to the responses that mother earth\ncan give you. That is learning her secrets for your wellness, your\nwholeness and your spiritual connections.\nStudy the ancient ways of the Shaman where they listened to the\nheart of the movement through earth’s own beat. Take time to\nlisten to the beauty and wonder that planet earth has harbored\nthrough all the generations of life. Learn once again to find\nstillness in your heart and in your soul, as you commune with all of\nthe beauty that is ready for you to express, and become an intricate\npart of earth's vibrations.\nYour awakening to this higher vibration will assist you to feel\nsensitivity to all of the ways that nature respects and responds to\nspirit. You will be able to find that you are suddenly aware of the\nlives in the minutest way that the earth is a living example of a\ncontinuous pattern of life consciousness.\nYour fear of death is a fear of endings to darkness and nothingness.\nBut, nature brings to you the story of the ever- awakening, out of\nsleep into its bloom of new consciousness. This vibration of light\nactivated in you is with you. It is your tool to recreate, rejuvenate\nand reassemble old acts of love and light.\nAt this moment, the soul, which has no need for physical but\nchooses to express itself in you as physical, can be separated from\nthe physical and experience communication outside of the body. It\nis from this experience we call you into the awareness of your\nsoul's presence.\nIn this presence of one where you are all together, perceive\nyourself entering into a transitional plane. It may appear to you as\nthough you are walking through a tunnel, a corridor or walking\n\nthrough a place in which there are long stretches of darkness. Walk\nthrough the corridor, walk through the hall, walk through this\ntunnel and as you walk in and through it, perceive the presence of\nyour teacher and guide as he brings you into the next cycle of your\naspirations. Do not be afraid. Many have walked this symbolic\nstage to summits rising up to an elevator. It matters not -- the\nvibration is one and the same.\nWhen you step through the corridor, close the door behind you.\nWhat you leave behind are certain memories no longer needed to\nbring you through your evolution. What you leave behind is\npainful connections that can free themselves from you as you\nemerge into a more positive path.\nWhen you step into the next phase, you will perceive you are in a\ngarden of light with many hues of radiant colors. It appears to you\nas a lush and green place where you come often to talk to the\nmasters or with your higher self or with your soul’s own being.\nThis beautiful place is a true plane of consciousness. It is not an\nimaginary thought, but it becomes a plane that has reality and\nsubstance from light. Many have seen this place in consciousness\nand have spoken or written of their experiences and their visions of\nthings unknown and unseen by the naked eye. And so it is.\nThis place is your expression and acknowledgment of living life\nfully. You are now able to come to this place at any time you are in\nneed of new hope, new thought and of new opportunity. Perceive\nthat the body you are in, soul-wise, is being healed, rejuvenated,\nand regenerated. What it absorbs in this plane, it creates and\ntransmits into your own physical form until the healing vibrations\ncan be fully realized within and without. You will remain within\nthis particular plane until you have completed your\ncommunications.\nSome of you will experience the act of sharing. Some of you will\nbe planting seeds of ideas, of visions, and when you have\ncompleted, you will return to the body.\n\nWhen you awaken, you will perceive yourself clear. Go in peace.\n\n               THE CHRIST SPIRIT - Jesus\nMessage #3\n\nI am that I am. I am the Alpha and the Omega. I come to you in\nlight. I bring to you joy of your inner spirit. You are here to\nexperience the totality of your being. You are the centers of light\nand the animators of love. You are all that you created to express.\nI speak that you may understand the truth. Life is all\nencompassing. Living is the process of creating. You are spirit\nembodied in human form. You are disciples, meaning souls in\npathways of service and seekers of light.\nLook to each other, not divided but as love. You are the mothers\nand fathers of new thought. You are the rays bringing the birth of\ngreater good into focus, judge not lest you be reckoned with your\njudgments. As you experience the presence of spirit amongst you,\nlet the bodies be healed. Let all forms within you be the light. Let\nall disease be released. The words of love bring the greater reality\ninto creation. Be perfect in spirit. You are seeking to bring this into\nyour life. As you meet the selves of the past before you also walk\ninto the selves of tomorrow. Take no thought for the tomorrows but\naccept your completeness in the now. The miracles of life are\nalways unfolding and are specialized in the past. They are\nrecreated through the faith acceptance and knowing of your spirit.\nGo and walk with a strengthened mind.\nLove\nLove is the central flame of the universe, the very fire itself. It is\nwritten that God is Love and that we are His expressed likeness,\nthe image of the Eternal Being. Love is self-giving through\ncreation, the impartation of the Divine through the human.\n\nLove is an essence, an atmosphere that defies analysis, as does\nLife Itself. It is that which IS and cannot be explained: it is\ncommon to all people, to all animal life, and evident in the\nresponse of plants to those who love them. Love reigns supreme\nover all.\nThe essence of love, while elusive, pervades everything, fires the\nheart, stimulates the emotions, renews the soul and proclaims the\nSpirit. Only love knows love, and love knows only love. Words\ncannot express its depths or meaning. A universal sense alone\nbears witness to the divine fact: God is Love and Love is God. 3\n\n                         Personal Journal\nWrite in your own Personal Journal what you would like to create\nfor this new beginning.\n\n\n\n\n\n\n\n\nAffirmations\n\n    I let go of the fear of NEW BEGINNINGS\n    I am ready for NEW AWARENESS.\n\n3 Science of Mind: Ernest Holmes\n\nCongratulations!\n\nYou have completed the first Level of A Course in Light\nLevel 2 is a concentration of the energy on the\nemotional/perceptual nature and can be beneficial in\nclearing up these aspects of self.\n\nYou are now ready to focus on a new cycle of your life.\n\nLevel 2 is another step in the process of self-\ndevelopment."}, {"id": "L2_intro", "level": 2, "type": "intro", "lesson_num": null, "title": "INTRODUCTION", "subtitle": "", "color": "intro", "content": "As students and initiates in A Course of Light, you have completed\nthe first phase of alleviating the heaviness and disease of your\nphysical and mental consciousness. You may wish to review once\nagain the meaning and purpose of each of the color rays.\n\nYou are now entering into a new phase in which concentration of\nthis intense work focuses on the emotional and perceptual nature.\n\nThis level consists of twelve lessons, to which two additional\ncenters are added. These centers are important for grounding. The\npurpose of this level is to help alleviate emotional and perceptual\nmemories of pain from challenges you experienced in your life.\n\nEach student carries within unresolved emotions and concepts\ncausing patterns of negativity. Emotions and feelings are an\nimportant part of your total nature and recognized as a beautiful\npart of being human. However, they can also erupt with rampant\nbehavior and distorted by disillusionment, abandonment and\nrejection. This can cause hostilities and fears creating distortion in\nyour thoughts and feelings.\n\nThe perceptual body is the essence of sensitivity centered within\nthe solar plexus. Your perceptual nature has that gut feeling or\npsychic energy and aura of your sixth sense. Often anxiety and\nnervous tension is felt in this area of your body. If chronic anxiety\nexists, it can result in physical problems affecting the organs of the\ndigestive and elimination systems.\n\nYour perceptual nature is your radar. It can absorb thoughts and\nfeelings from others. It signals the brain through the nervous\nsystem reacting to conditions at hand. If there are definite patterns\nof reacting to new situations and conditions with intense anxiety\n\nand fear, you may have deep seated memories or experiences that\ncause this reaction.\n\nThrough the meditation with the light, you work within this\nconsciousness clearing thought-forms and psychic imageries\ndistorting your perceptions. When you are directing your thought\nthrough this part of you in meditation, release of these impressions\nare cleared, lifted and healed. Soon you feel stronger and less\nbothered by the former reactions.\n\nThe forebrain is the seat of your human consciousness and as you\ngather your egos into this center, you are bringing yourself\ntogether.\n\nThe center of the forebrain, also recognized as the third eye or\npsychic center, correlates to the solar plexus. Sometimes\nimpressions, images, color or thought forms appear in this area,\ngiving it the name as the third eye. In working with the light\nenergy, sometimes pressure occurs in this area of the head. It\nappears as a headache, but can be a result of sensing someone else\nwho is going through a difficult situation.\n\nPerception is registered through the five senses: touch, taste,\nfeeling, hearing and sight, as well as through the sixth sense of\nvision, intuitiveness and instinct. All of these senses encounter\ndistortion if there is confusion and lack of correct information to\nconfirm impressions. The purpose of your perceptual nature is as\nan instrument to give you the impulses and the intuitive\nimpressions guiding your actions.\n\nMany of you may have already come to recognize yourselves as\npsychic, perceptual or intuitive. As you follow these insights, even\nagainst your reasoning self, you find it guides you into surprising\nsituations. Certain reactions occur as your perceptual nature or\nsixth sense is open. Often your dream state is more vivid or you\n\nsee events through your third eye before they actually happen. At\ntimes, light-headedness or a sense of being off-balance occurs\nwhen you are having a sensitive reaction. This can happen when\nintensive light work takes place. This is a clearing process and can\nbe acute during the lesson of the radiant Orange energy.\n\nThe emotional body connects to the heart area. Like a ball of light\nencompassing an area around eighteen inches in diameter, it holds\nall emotions and feelings. When the emotional nature is exposed to\nthe light energy work, a tremendous clearing occurs. This is\napparent as you witness your emotional reactions to current\nsituations. You may find yourself in the midst of tears without any\nreason or an emotional explosion over some unusual incident that\nnormally would not cause you any trouble. You are bringing to the\nsurface hidden patterns which can erupt as physical disorders;\nremember - as within, so without.\n\nIt is the belief through esoteric teachings that our physical selves\nreflect our innermost selves; \"As a man thinketh in his heart, so he\nis.\" While we may hide long-term negative feelings or troubles\nfrom others, they may erupt in some physical disorder.\n\nWithin the emotional body, the heart organ is the most affected by\nthe inner and outer experiences. The heart holds all emotions and\nregisters its experiences in life. The light energy work brings up\nthis pain and memories and through the healing process uplifts\nyour consciousness into an elevated state. There have been\nstudents who have seen their blood pressure change for better from\nthe meditation and light work. The emotional body may contain\nemotions that cling like magnets and fight for survival causing\nphysical pain. Grudges held for years can cause poison and acidic\nreactions within the blood stream.\n\nFrom The Holy Bible, the scriptures warn against coming before\nthe altar if there is anger and unresolved situations between friends\n\nand family. Through forgiveness and release, the healing of\nfeelings of the heart can occur. Difficult relationships and\nunfulfilled desires are changed with a new perspective and\nunderstanding.\n\nIt is important you use the light to heal your resentments or pains\ntoward others and yourself. The light energy meditation helps to\nrelease feelings from your emotional body and heals wounds of\nrejection and loss.\n\nYou may have experienced relationships causing deep-seated fears,\nguilt and shame not remembered on a conscious level. Early\nchildhood memories hide in the recesses of the subconscious mind.\nThese unconscious memories create patterns of reactions to new\nsituations resulting in more pain. The light brings to the surface\nconditions that allow these patterns to show themselves. Through\nthe meditations and affirmations a new consciousness develops.\nSuch as:\n\n   “Be ye transformed by the renewing of your mind .”\n\nMany things happen causing feelings of anger, hurt, and rejection.\nTremendous amount of pressure by parental programming or other\nsources outside of yourself mold you into an image of what others\nwant you to be.\n\nAs you developed your individuality and moved away from these\nimages and expectations, you faced your own individual self.\nOften this caused feelings of separation and guilt from not\nconforming to what was expected of you.\n\nThrough the light work, you release self-denial, self-rejection, self-\nfear and self-anger of being a prisoner of the thoughts of others.\nYou are then able to establish your identity as a free spirit, as one\n\nwho creates your life experience by mind, openness and guidance\ndirected by the higher self and spirit.\n\nDo not compare yourself with others through this change in\nconsciousness, for each one learns their lessons and moves at their\nown pace. Do not try to be like someone else, but you can accept\nthe concepts and emotional aspects of another personality to guide\nyou along your path.\n\nAffirm:\n\n       What is taking place is completely under the guidance of\n       my higher self through the free will aspect of my\n       consciousness.\n\n        I have consented to allow myself to walk this journey in\n       coming together in complete wholeness.\n\n       Therefore, all experience is a part of my lessons and my\n       journey.\n\nPurpose and Essence\n\nThe purpose of this level is to come into recognition of your true\nfeelings about yourself and your relationship with others. You will\nfind that you become aware of your feelings in a much more\nintense way observing your view of life. As you move through this\nlevel of A Course in Light, energies process the negativity of\nharbored hurts and pains. Through your conscious effort in\nmeditation, you will feel the results of release and clearing.\nRemember this is a step-by-step process, who you are today is a\nresult of the many yesterdays.\n\nA few meditation sessions will not alleviate all the inner causes of\nyour pains, but each time you experience meditating and activating\nthe light, you will experience a cleansing process. This unites your\nconscious self to the inner resources of your spiritual self. Know\nyou can heal all thoughts. You are healing although it may be\ndifficult to feel and know this. However, as you experience the\nupheavals from the depths of your unconscious you are emptied of\nthe pain, hurt and rejections.\n\nThe emptying of these aspects happens before the filling up with\nthe new loveliness, light and joy. The pathway to enlightenment is\nfor the strong, the daring and the pioneering spirits. It is for those\nwho are willing to move through the karmic conditions and have\nthe faith to accept all is moving in its own perfect order.\n\nAs quoted from the scriptures, \"All good things come to those who\nlove God and obey the law.\" In other words, you draw to yourself\nreflections of your consciousness. How often do you share\nexperiences that are reflected in your friends and family? Like\nattracts like.\n\nAnother statement from scripture states, \"Do not be unequally\nyoked with unbelievers.\" That can be interpreted as; it is difficult\nto flow in harmony when there is conflict and opposition to your\nbeliefs and purpose or goals in life.\n\n                 Review of Light Frequencies\nWHITE: The Christ Light. The White Light is the combination\nof all the colors and frequencies, which include sounds that\nstimulate your consciousness into preparation for the processes of\nall centers. The White Light releases the light through your body\nand physical selves, bathing your consciousness for release. The\nWhite Essence is the purifier, cleanser and lifter of negativity.\n\nGOLD: The Cosmic Father. This frequency transmutes thoughts\nand consciousness. This frequency is used in moments of anger,\nrage or mental confusion to change the mental processes causing\nstress. It is also the energy of the dynamic or masculine self. When\nyou are in an apathetic state of being, when passivity has overcome\nthe dynamic consciousness, you can activate this frequency to\nbalance yourself and bring out your more dynamic intentions.\n\nBLUE: The Light of Wisdom. This frequency moves in and\nthrough the mental processes connecting with the cellular and\norganic systems. It uproots the fears and anxieties held within. It is\na brilliant electric blue and felt as a cool energy. It clears the fears\nand anxieties of your consciousness. The experience of this ray\nresults in an inner peace that passes all understanding.\n\nEMERALD GREEN: The Light of Creativity. This energy frees\nyou to express the deepest, most desirous aspect of your creative\nurges. It is through this frequency ray that you begin to\ncommunicate the desires and ideals of your creative consciousness.\nCommunication and creative urges are the aspects that are affected\nby this frequency.\n\nPURPLE: The Light of the Higher Will. The Radiant Purple-\nViolet Ray brings into effect the ill-will rages of your personality\nand egos, which have felt denied and suppressed from individual\nexpression. This frequency is used to free self from feelings of\n\nbeing stifled, denied, to clear up selfishness and controlling factors\nthat overshadows another's purpose and sabotage your own.\n\nRUBY RED: The Light of Divine Love. The frequency of the\nhealing ray works on all aspects of the physical body to repair the\nbroken systems of the physical, emotional and mental levels. This\nenergy is felt to be warm and intense, used to heal broken hearts\nand wounds of the spirit.\n\nORANGE: The Light of Sensitivity. This is the energy that\nworks within the perceptual nature and the area of the solar plexus.\nIt is the energy that is directed to uplift the nervous system and is a\npredominant energy of sensitivity. It can revitalize your nervous\nsystem and may create a balance within the digestion and\nelimination systems.\n\nPINK: The Light of Perfection. This frequency is that which\nbrings a sense of order and balance into your inner and outer life. It\nis located within the organizational center and aids you in clearing\nup the confusion in your life that comes from imbalances and\ninferiorities due to misappropriation of your energies connected to\nyour ideas of love and perfection.\n\nAMETHYST: The Warrior Light. This energy clears diseases,\ninfections and conditions that come about through conflict and\nwarring, both consciously and unconsciously. The warrior can be\nseen and felt as irritating or uncomfortable, but the healing aspect\nis wonderful. Think in terms of its properties as an ultra-violet ray\nthat works in and through all levels of your consciousness to clear\nthe warring factors within your thoughts, emotions and physical\ncellular system. This is activated during flu bouts.\n\nMINT GREEN: The Light of Rejuvenation. This frequency\nworks to bring new consciousness into effect and feel as a light\nenergy bringing back the feeling of youth and free-spiritedness.\n\nKnow the purging of your own consciousness takes place\npreviously to the oncoming of new life and rebirth into higher\nunderstanding. This rejuvenating vibration is most beautiful to the\nbody, mind and the total self. To be enveloped in the refreshing\nconsciousness of this frequency is accepted at all levels as a true\nbright and brilliant light.\n\nSCARLET: The Light of Passion. This frequency stems from the\ncenter of your sexuality. This activates the passions of your nature\nto motivate you into accomplishing your hidden desires. Passion\nmust be an accompanying force to bring things into greater good.\n\nTherefore, passionately be attuned to your own divine spirit and\nactualize that purpose for the greater good of self and to those with\nwhom you come into contact.\n\nBLACK POWER RAY: The Grounding Light. This is the\ncenter for grounding your consciousness into harmony with the\nearth itself, a grounding tool for your total being. This center is felt\nas a practical aspect and a balance to the Radiant Center of the\nWhite Light."}, {"id": "L2_med", "level": 2, "type": "meditation", "lesson_num": null, "title": "MEDITATION PROCEDURE", "subtitle": "", "color": "intro", "content": "Focus all of your awareness into the forebrain and call\nforth all egos: the incarnating ego, personality ego,\nphysical body ego, organic ego and cellular ego. Ask the\nhigher self to uplift and unify all egos into one vibration.\nMove with the egos through the four lower bodies: the physical\nbody, the astral etheric body, the emotional / perceptual body, and\nthe mental body upwards into the center of the Radiant White\nLight.\n\nCall upon the Jesus Christ, all your guides and teachers to be with\nyou in the silence and meditation. Perceive the Radiant White\nLight moving in and through all the bodies concentrating on areas\nof disturbance.\n\nConcentrate on each body directing the light within that body:\n\n     Mental: brain cells and thought processes.\n\n     Emotional: lungs, heart, respiratory and circulatory systems,\n   emotions and feelings.\n\n     Perceptual: digestion and elimination systems, all organs that\n   are involved with processing, nervous system.\n\n     Physical: muscles, bone structure, skin and all organs.\n\nMove into the lower physical body, the reproductive, sexual nature\nand concentrate on the spine. When you feel a clearing in these\nareas, perceive the energy moving down through the feet and into a\nsphere six feet in diameter, and proceed to the center and energy of\nthe lesson of that week.\n\nNow move into the silence and experience the flow of energy and\nthe lightness of self and the bodies' reactions to the light.\n\nAlways affirm positive thoughts as you feel releases from the\nnegatives.\n\nReplenish your consciousness with the spiritual food of positive,\naffirmative thoughts that you may walk in peace and renewed\nstrength.\n\nClose your meditation by once again focusing your awareness into\nthe forebrain and bringing your consciousness back into the\nphysical level."}, {"id": "L2_11", "level": 2, "type": "lesson", "lesson_num": 11, "title": "LESSON 11", "subtitle": "WHITE", "color": "white", "content": "COLOR RAY: WHITE\n                     The Light of Purification\n\nPurpose and Essence\n\nConcentration of this White Light energy ray within the\nemotional/perceptual bodies clears the residue of impurities\nexisting from past patterns of memory and consciousness. Be\nprepared for the reactions that occur as processing will also\ncontinue within the physical body. You are changing\nconsciousness as you open to experience the light clearing your\nemotional and perceptual selves.\n\nThrough your daily meditations, envelop your being in the radiant\nWhite light drawing yourself closer into the spirit of Christ.\n\nMeditations recorded and provided with A Course in Light aid you\nin the clearing process. They provide you with the opportunity to\nexperience the vibrations received from the masters and teachers of\nthe White Brotherhood. Each recorded meditation brings you\nthrough the levels of your physical, emotional and perceptual\nselves. This provides a connection with you and the Council of\nLight. However, you may wish to meditate in your own way.\n\nThese processes assist you in healing the emotional attachments to\nexperiences of pain, sorrow and suffering, as you heal new feelings\nof love and joy result from being in touch with your inner self and\nthe masters.\n\nPerceptions of others and yourself are distorted when your past\nhistory includes prejudice and lack of understanding of yourself\nand others. The lightwork leads you into personal review regarding\n\nyour beliefs and behavior. As a student of this path of light, review\nyour personal perception of yourself and others. You will practice\nwalking in another's shoes, so to speak, to acknowledge the\nmotives and drives that cause reactions to situations.\n\nAs you meditate and integrate the light with spiritual principles,\ntolerance and wisdom become a part of your consciousness.\nHealing uplifts the reactions to former as well as present situations.\nThrough daily meditations, you experience your vision or insight\nclearer. Understanding the dramas in your life takes on a deeper\nmeaning.\n\nThe teachings brought to you through love and wisdom of the\nascended masters are for your individual acceptance to help you\nalong the path of your evolution into higher consciousness. This\npath brings you to a place where you stand independently sure of\nyour own being and potential. It also enables you to embrace and\nencompass others with love through the consciousness of the\nChrist Spirit.\n\nGuided by the Order of Melchizedek they recognize you as a\nstudent of A Course in Light. Their energy is a presence you can\nfeel while you move through the sessions of light meditations. As\nyou surround yourself in the energy of light and see this as the\ntools of your true nature, you will find an inner guidance directing\nyou through your individual path to consciousness.\n\nSpecific Level Function\n\nThe radiant White Light works through the bodies and acts as a\ncleanser. Within the emotional/perceptual level, you will find\nconfrontation of emotional responses from old situations affecting\nyou for a long time. The key to healing is, recognizing you’re false\nto fact belief systems adopted as truth. Meditation in the radiant\nWhite Ray will help to uplift and clear false to fact belief systems.\n\nMessage #1\n\nAzreal - Greetings, this is Azreal, and we speak that you may\nunderstand the nature of change that is manifesting in and through\nyour total expression. Overall, we perceive that each of you is\nmoving into a new phase of experience. Through this particular\ncycle in the path of your initiation, you will face that which has\nbrought forth within your consciousness the heaviness of the past.\nThe light energy activates to free you from these patterns of\nnegation, bringing you into a new consciousness. The feelings\nwithin you will be less harsh as you clear. The purpose is to rise\nabove the conditioning that has created negative experiences.\nMeditation and light clears the way for recognition of your highest\nintent. You then free yourself from jealousy, envy and fear\nbringing you out of manifesting painful conditions entangled in the\nwebs of mind and thoughts of the activities of others.\n\nIt is not the purpose to create a self-centered individual unable to\ninterrelate, but bring you through all of the false-to-fact imageries\ndenying your sense of being a free spirit. As you clear the negative\nvibrations within the bodies and all levels of consciousness, there\nis a total new expression within you and about you. Perceive your\ntotal outer experience with new vision, new thought, new ideas and\na clear focus on the realities of human consciousness.\n\nTo be in states of wholeness is not to experience denial, but to\nexperience upliftment and free expression of your own conscious\nself in alignment with the higher laws. Walk with the\nunderstanding you are the co-creator, the builder, the director, the\nwriter and the expresser of all of your life activity. It is difficult to\nperceive it from this point when the human personality is in the\nvibrations of cause-effects projected from others. Yet, even that is\nan integral part of what you are creating and building.\n\nThe free will aspect comes in discernment when you have reached\npoints of being in focus with the nature of your own inner being.\nDiscernment and decisiveness based on your spiritual values\novercomes reactions from the past.\n\nChrist spoke and He came to earth to give us the keys of life so all\ncould live abundantly and not denied but experience a lifting up\ninto an immortality of consciousness. Think on these things; the\nmore people who work with light and understanding of spirit, the\nmore consciousness of love is manifested from individual beings,\nthe more the collective vibrations within the earth begin to emanate\nthe higher element, the less the intent of being in the pathway of\ndestructiveness.\n\nWe do perceive the battles of the higher and lower forces in\nextreme intensity. You can see in the world, there is a falling away\nfrom the higher experiences and more degrading human actions.\nAs you perceive communications projected to you through the\nmedia, you could become discouraged as you view the rages of\ninjustice of human consciousness.\n\nTherefore, it is extremely important that this work of light becomes\na way for each one to experience the consciousness of light and\nlove. It is important for all to move through the transmutation and\ntransformation of self into higher consciousness. The greater good\n\nmanifests according to the degree of human consciousness in\nalignment with the hierarchy and with universal thought.\n\nNow, let this vibration move in and through your bodies. Go deep\ninto the silence and may the Light of the Christ be in and through\nyou. As you meditate in silence, affirm that you are in complete\nlove and light.\n\nAffirmations\n\n        I am releasing all of my feelings that limit me.\n\n        I accept healing within all situations ready for release.\n\n        I release all resistance of mine to the light of the\n        Christ."}, {"id": "L2_12", "level": 2, "type": "lesson", "lesson_num": 12, "title": "LESSON 12", "subtitle": "GOLD", "color": "gold", "content": "COLOR RAY: GOLD\n                    The Light of Transformation\n\nPurpose and Essence\n\nAgain, the purpose of this particular ray of light is to uplift and\ntransform the vibrations of your consciousness, physical,\nperceptual and mental. However, the concentration of the lessons\nis on your emotional and perceptual selves.\n\nNo one can bring this change for you, not the master teachers or\nfriends. It is your individual quest through your own desire to be\nuplifted and bring the highest potential into your reality.\n\nThe light rays are the tools of the inner self-bringing about the\nintensity to experience what lies within your thoughts, emotions\nand perceptions. This particular energy when activated can\nproduce effects that change rage, anger, and hostilities felt when\nyou encounter opposition to your purpose and desire for right\naction. It is also a healing ray that can appear as mental pressure in\nthe head area felt as intense headaches.\n\nSince this particular level of the lessons is concentrated on the\nemotional and perceptual senses, you may experience your\nemotions becoming quite intense. Crying may occur over simple\nthings as well as anger intensified. The intellect may question the\noverall good of these experiences and doubts may arise as to the\nreal purpose of these intense activations. However, before you can\ntruly be free there is the rising of the causes to the surface. You\nmay find yourself reflecting on what is hidden and covered up.\n\nTherefore, do not become discouraged if you find your reactions\nmay seem erratic. As you practice daily meditation, experience the\nprocessing through the usage of the CDs. You feel uplifted and\nrenewed in your body, mind and spirit.\n\nThe perceptual nature may react sensitively to thoughts and\nemotions of others. Discernment comes into play with this\nparticular energy ray. Discerning and decisions come up regarding\nattitudes, perceptions of situations, conditions, and choices in your\nexperience to past reactions. You may see a new future for yourself\nas you become more interested in the internal consciousness than\nthe external. Often this shift occurs before a change in your\nconsciousness takes place.\n\nSpecific Level Function\n\nWithin the emotional nature, the Gold laser light activates to\ntransmute negative emotional experiences, such as revenge,\nanxiety and anger into acceptance and love. Your emotions\nresulting from failure and pains of disillusionment change with the\nintensity of this energy. Hold in mind all things are subject to the\nlaw of cosmic order.\n\nWithin the perceptual nature, the Gold ray of light releases patterns\nof instinct that cause repeated negative actions to uncomfortable\nsituations. The radiant Golden ray activates the negative memory\npatterns stored within the psychic/feeling nature and cuts through\nthe heaviness, tightness and perceptual distortions of experiences.\nIt can release the psychic debris and negative feelings attracted into\nyour energy field and release the blockages.\n\nAs the light moves through the perceptual nature, it moves\nsimultaneously within the physical and etheric bodies too. The\norganic and cellular systems of the body enveloped in these rays of\nlight result in healing or raising the consciousness within the\n\ndigestive, eliminative and reproductive areas. Transmutation is\nassociated with change and like a caterpillar to a butterfly you rise\nup out of your cocoon into the light of spirit and mind.\n\nWhen extreme pressure is felt in the head, relief may occur by first\nvisualizing the radiant Gold energy and focus it within the center\nof the brain, expanding it outwardly until the total head area is seen\nenveloped in this light. Headache Relief\n\nRelief occurs by a lightworker who works with the hands over the\nhead and aura of the person in need of healing.\n\n                         Headache Relief\n\nPlace your right hand at the back of the skull and your left hand at\nthe forehead on the left side. Hold this position for sometime\nactivating the light. Reverse procedure and hold. Then place your\nright hand directly over the third eye or forebrain and your left\nhand at the base of the skull directly in the middle and hold again\nfor sometime. Feel the energy concentrated from the hands to the\nhead. Slowly pull hands away from head. Clear the aura by holding\nhands about six inches from the head and slowly moving from top\nto bottom, repeating until the aura clears. Also, visualize the pain\nconsumed by the light clearing the pressure. Remember to breathe\ndeeply as this helps in the releasing of energies you may absorb as\nyou work on someone's headache.\n\nMessage #1\n\nAzreal - I, Azreal, come to you tonight to greet you in the name of\nJesus Christ and with the love of all of those who are reaching to\nlift your consciousness of this planet earth. We see you this night\nas radiant stars, lighted bodies and souls reaching out into fields\nbeyond your own human mind. As each of you consciously radiate\nthis essence from within yourself, you are literally clearing the\nfields, not only of your own being, but also many others connected\nto you. For each of you have many that you think of, that you are\ninvolved with and as you light and lift yourself, so are you working\nto help others, and for this we are very grateful.\n\nTonight as you are working in this beautiful radiant Golden\nenergy, you will find that many of your mental thoughts will seem\nto go in different directions. You will begin to look at experiences\nin your life with a new and deeper understanding. No longer will\nyou think in terms of getting even or of setting someone straight.\nFor it is only with yourself you must deal with.\n\nThis light frequency of the Gold helps not only to change your\nmental thoughts, but works directly with the reproductive and\nsexual nature. Let this not be a concern for you. This does not\nmean that you enter a level of celibacy. This means that your inner\nnature – the strong force within you – the creative force that is\nexpressed through your own divine and sexual nature will be lifted\ninto a much finer and much more beautiful experience. For you\nwill each see yourself merging and coming together in a higher\nplane in a light and in a beautiful experience of both being one. It\nwill heighten and lift you into greater sensitivity; but you also will\nbe much aware that as you express this nature within yourself, you\nare in direct oneness with your partner. You will also recognize\nyou are a part of that person’s experience, that part of a person’s\nmental thoughts, emotional thoughts and feelings.\n\nKnow each of you has much growth ahead and you are entering the\nmost beautiful and exciting experience encountered up until this\ntime. For as you move and work with these higher frequencies, you\nare acquainting the conscious mind, your physical body and all of\nyour being with your true, actualized, immortal, higher self.\n\nA question is raised whether this higher incarnating ego is your\nguide or your teacher. In actuality, the incarnating ego or higher\nself is your own teacher and it does guide you as you open the\nconscious mind to the realization of this beautiful higher self.\nBesides this higher incarnating self, you also have guides. Some\nbeings have been with you through many lives.\n\nIn many instances, these guides were relatives or people who\nwalked in the earth beside you. As they made a transition, they\ntook on the responsibility or chose to evolve through the guidance\nof their earth counterparts, their earth soul mates. For as you grow\nand evolve, they learn through your experience at the etheric\nrealm. These spiritual guides speak through your dreams and/or\nthrough impressions. Your teachers or masters are consciousnesses\nthat have not been in the earth except through one or two lives they\nchose to express for the simple purpose of bringing the teachings\nof higher spiritual truths into the planet. These master souls are\nthose who overcome all earth desires. Each of you in this path of\nlight has a teacher. Each teacher is a part of ascended ones. It is for\nthis reason you are together in this study of light.\n\nOur lessons deal with many things. We wish for each of you to feel\ncomfortable, feel relaxed that you can openly express a thought or\na question. We are here to answer those things that are on your\nconscious mind, that are mysteries to you.\n\nNo longer will it be necessary to enter the ashrams or the convents\nor mystery schools where life is spent in solitude and seclusion in\norder to become close to the Christ or reach enlightenment. It is\n\nthis time in history that humanity learns to use spiritual truths in\nthe everyday lifestyle. Each one’s evolution is on a fast pace in\norder to bring about the New Age, the age spoken of in that Holy\nBook, the Revelations. You are pioneers of the Aquarian Age, you\nare pacesetters; and from your Higher Consciousness, you will lead\nthose who walk beside you. The youth, the Indigo children, who\nare now going through so much turmoil, come with enlightened\nawareness and they need your guidance.\n\nWe wish you to see this center of Golden Light with no\nboundaries, to see it as a laser, a sun with its rays moving through\nevery level of your being, reaching upward and downward and out,\nbeside and all around. See it infiltrating the field around you as you\ncenter in its radiance of high frequency light. This light recognized\nby master souls can communicate and work with you.\n\nEach of you will go through changes. We ask that you be strong\nbut relaxed. Feel secure in the knowledge that you have come here\nfrom an inner commitment, that it is the time to be light and joyful\nand your experiences on the inner levels are such that your soul\nconsciousness comes before the Hierarchy and receives teachings\nand blessings. Many blessings are with you.\n\nVisualization\n\nA student from the classes of A Course in Light shares her vision:\nThere was a green tree with golden streamers blowing in the wind.\nGolden arrows shot over the tree, there was a blue stream by the\ntree and out of the stream blue birds were flying, and apples were\nfloating down the stream.\n\nInterpretation from Azreal: A green tree, is the symbol of the\nTree of Life, Creative Intelligence, that which gives off oxygen for\nsustaining life. The golden streamers are the Golden light energy\nrays of the mental concepts, which are a part of the creative\n\nintelligence blowing in the wind, flowing out into the ethers.\nGolden arrows are light rays directed to the Creative Intelligence.\nThe Blue stream is the water that never leaves you thirsty as it\nrepresents spiritual truth and wisdom. The Blue birds are the wise\nsoul consciousness moving into greater awareness. The apples\nrepresent the students moving into this stream of consciousness.\nThey are students flowing with new mental concepts.\n\nMessage #2\n\nAzreal - Greetings this is Azreal. Do not be disturbed over things\ntranspiring through your own personal lives or conditions arising\non a larger scale. This is all part of the activity releasing conditions\nbrought to the surface. We perceive within yourselves joy and\nupliftment as these releases occur within you.\n\nThe mental patterns raised by the light manifest from long periods\nin your experience. As you meditate and work within this Radiant\nGolden Ray, it moves in and through you, raising the vibrations of\nyour physical body along with the mental consciousness.\n\nAll the bodies within will experience different phases of change.\nWhat appears as disturbances, heaviness and dis-ease is the healing\neffect of the light frequencies. You may also experience healing\nthrough other methods and techniques, drawing you to\nopportunities, which lift you individually as well as collectively.\n\nQ: What is the purpose of raising the body frequencies? What is\nthe purpose of this upliftment?\n\nA: The purpose is to become relieved of any negative frequencies\nthat lie within and relieve you from karmic attachments to earth\nconditions. It is also to free you from repetition of patterns that\ncreate over and over the warring factions and entanglements\ninverting the consciousness of divine love.\n\nThe earth is approaching a time when it must move out of this past\nconditioning into a total new evolutionary stage. It is reaching the\npoint where it is necessary for it to shed the old and put on the\nnew, to create the heaven that was perceived in ages past.\n\nAs spoken in earlier readings, you are pioneering new seeds of\nthought implanted from cosmic understanding into the physical\nplane. You are preparing yourself to enter the Aquarian Age in\nwhich the energy and light is known, accepted, and integrated\nthrough all awareness and thought. These teachings hidden in the\nmysteries of the past will be accepted as a necessity for mind,\nthought and consciousness to develop, recreate and attain a state of\nbalance on all levels.\n\nYour bodies are preparing to experience the intensity of new\nvibrations directed into the earth plane. It is important all those\nwho come into the work of light see each other as a unified\nvibration sending signals of energy for clearing and integration of\npeaceful activity.\n\nThe crises now in action is motivated by leaders who cannot see\nthe overall view and closed to the awareness to unify all nations\nunder the consciousness of light as in Christ Consciousness.\nPerceive peace, moving throughout the earth as the rays of light are\ndirected in and through all nations of the earth. Go in peace.\n\n                      Personal Journal\nAffirmations\n\n        I affirm I am experiencing total forgiveness toward every\n        person I have anger.\n\n        I acknowledge I perceive all matters with new\n        understanding.\n\nWrite out your own affirmations.\n\n\n\n\n\n\n\n\nWrite the feelings that you wish to find release from, in\nreference to relationships."}, {"id": "L2_13", "level": 2, "type": "lesson", "lesson_num": 13, "title": "LESSON 13", "subtitle": "BLUE", "color": "blue", "content": "COLOR RAY: BLUE\n                       The Light of Wisdom\n\nPurpose and Essence\n\nThe frequency of the Blue ray is known as the wisdom ray, as you\nhave already learned from the first level. It is this frequency of\nlight that can bring a sense of inner peace and understanding into\nyour thought processes and free the fears that have long kept you\nprisoner to patterns of negativity and karmic repetition.\n\nThrough the emotional level, your feelings about how you see\nyourself and others will rise into the foremost thoughts of your\nconsciousness. Emotion is stimulated by your thoughts. You think\nand feel according to your experiences. Emotions can become very\nstrong forces in your reactions to conditions and experiences.\n\nTherefore, during this particular ray your emotions may be\nstimulated by the fears that have been a part of your belief systems\na long time.\n\nIf you fear accepting love or romance you may have created the\nmeans of defending yourself against receiving the love that could\nbe the most important healing experience of your life. If you fear\nyour abilities to relate to others or expand in your daily life\nexperience, then conditions may arise that give you means to break\nthrough these conditional fears hidden in the recesses of your\nunconscious. Many situations may come into focus to bring you\nthe opportunity to face the fears that have overwhelmed you. The\npurpose of the wisdom ray is to release hidden fears that are like\n\nshadows to your sense of well-being. Before release occurs, there\nmust be the dislodging of these ailments and disorders. Remember,\nwe often fear what we do not know. We fear conditions which are\nhidden from our knowledge and understanding. Wisdom is not\nknowledge, but knowledge is a tool that we use to discern or make\ndecisions. Knowledge or thoughts can be correct or incorrect.\nKnowledge is the means of our human experience and research,\nbut wisdom is an understanding that comes from within and\nincludes our spiritual realizations.\n\nOur perceptual selves can misinterpret the information it receives.\nHowever, correct information through perceptual consciousness is\na natural instinct of our very nature. Perception is seeing through\ninstinct and \"gut reactions,\" which can often be guiding impulses\nabout things that are unknown. Perceptions or instincts often are\ndistorted by past patterns. You may perceive a situation you\nbelieve is occurring, but in essence wrongly interpreted.\n\nPsychics can often receive impulses from your energy field and\nread these impulses, but the impressions may never really occur.\nChanges in the thought or intent may influence a different pattern\nresulting in a change of events. Keep in mind, however, that\npsychic impression may also provide a beneficial aid to your\nunderstanding.\n\nSpecific Level Function\n\nThe function of the Blue wisdom ray is to cut through the untruths\nand hidden doubts uplifting these aspects so true light is shed upon\na given situation. The light energy works within the emotional\nnature to release the patterns of rage, injustice, confusion and fears\nof being misused. It restores your emotional self into a calming sea\nof inner peace. The function within the perceptual nature is to\nrelease psychic debris and thought forms that cling to your energy\nfield and to expand your awareness into a clear vision.\n\nThe frequency of this Blue ray works on the emotional/perceptual\nlevel to clear the fears and doubts that come from the negative\npatterns of mental thinking. You may feel chills and cold feelings\narise within you as you proceed to activate this energy. The feeling\nof fear may be so strong that it overwhelms you, but it will pass as\nyou move through the conditions that brought the fear to the\nsurface. Remember, each level moves more intensely within your\nown being. The coming into higher consciousness is a step-by-step\nprocess.\n\nMessage #1\n\nAzreal - It is with pleasure that I move into the awareness and\nconsciousness of each one here in the room. We see by your\nvibrations that there have been many changes on the inner levels of\neach of you. We just ask that you be patient with self as you\nexperience the higher, finer vibrations within your physical selves.\n\nYou are today a result of all of your past thoughts and emotions.\nSo, your experiences have manifested those energies within self\nthat need to be transmuted, to be uplifted and lighted. This past\nweek as you have worked in the radiance of the Gold light, you\nhave experienced that consciousness where you met your lessons\nwith a different vibration, with a different thought, and with this\nwe are pleased. In this lesson of light, your auras are like radiant\nBlue lights. This is the energy brought into the earth through a very\nhigh Master Soul many, many ages ago, portrayed in the Holy\nBook under the name of Solomon. He was the first Master to bring\nthe radiance and consciousness of the Wisdom ray to earth.\n\nThis following week intellectually challenges arise. Situations will\ntest your mental concepts. Do not be discouraged if you find\nyourself in the midst of the days and suddenly feel that you are\nconfused or that there is no reality to what you are experiencing.\nThe intellect, conscious mind loves to play many games with you.\n\nIt only wants to accept what it sees, feels and knows at the earth\nlevel. But, this high frequency Blue energy will help lift those\nconscious thoughts to receive and accept the inner knowledge and\nthe inner truth. The physical body, when it is up against the block\nof fear, reacts in extreme cold or shivers. If this should come upon\nyou, stand firm and know that as you lift your mind and attune\nyourself with the teachers that your blocks will dissipate.\n\nWe know that there are many questions in your mind and we are\nhere to help clarify confusion activated at your thought level. We\nwish you to feel free to raise any questions and we will help you to\nsee the Higher Truth. It is incomprehensible to the human mind to\nactually understand how thoughts from a consciousness beyond the\nearth level can be channeled at the physical level. Many of you\nhave different images of how this takes place.\n\nThoughts are as radio waves and ascended masters are merged\nwith the thoughts that stem from the planet earth. Each of you has\nyour own unique vibration. You are a combination of sounds and\nvibrations moving in many different frequencies. Those entities or\npersonalities that operate out of the consciousness of heaviness\nconsidered negative, have dark, hazy, gloomy auras and are dense.\n\nTheir minds, their conscious minds, are in many instances shut off\nfrom the finer, more pure inner self. It is difficult to communicate\nwith their egos. But, as they become one with their own inner\nbeing, their vibrations change. This is happening within each of\nyou as your vibration raises becoming one with your inner self.\n\nYour own energies and auras take on a new glow and your skin is\nbecoming much finer and brighter. Now as you send out your\nthoughts of love, of brotherhood, of service, of caring, of searching\nto receive the energy that emanates a Christ likeness, the vibrations\nare sent out into the ethers and are light, harmonic and easily\naccessible to communicate with those at the higher planes.\n\nYou are embarking on a beautiful new life experience. This life\nexperience will affect all of those you love and those whom you\ncontact. They will note there are changes within the personality\nand it will be beautiful. You are pacesetters for the final step of the\nhuman consciousness into that level of Cosmic Awareness. The\nline is very fine.\n\nAs thoughts flow through your mind questioning all this, be still\nand ask that the mind of Christ be in you. The truth will set you\nfree. This ray, this beautiful radiant Blue light of wisdom will help\nyou see the Truth and release you from your doubts.\n\nVisualization\n\nSusan, a light class student shares her visualization.\n\nI saw golden apples hitting the ground and from the apples came\npurple butterflies; they started flying up toward the sky. I saw a\nwhite dove sitting within the golden sun and over the golden sun\nwas a blue rainbow. On top of the blue rainbow was a white\nbutterfly. Above the white butterfly was a red heart and above the\nred heart words are written in gold, “Love and Peace”.\n\nInterpretation from Azreal:\n\nThe channel visualizes, perceives symbols at the inner levels of\nwhat is happening within the consciousness of all students. It is a\nbeautiful gift and these symbolic visualizations help to reaffirm the\nteachings and the experiences of each of you.\n\nThe golden apples falling to the ground represent the thoughts that\nstem from the Cosmic Father. Whenever in her visualizations she\nsees an apple, it is a symbol of a student and she saw many falling\nto the ground. This would be the student bringing the golden\n\nenergy of the Cosmic Father into the earth level. Out of the apples\nflew purple butterflies and the butterflies are the symbol of\nfreedom and the free Spirit. The radiant purple is also a lesson\nconnected with the higher will of the Violet Purple ray of Higher\nPurpose. It is symbolic of your spirit moving in and upward to\nhigher levels of consciousness with the purpose of the Good Will.\n\nThe white dove is symbolic of the Master Jesus; He always is\nshown as a dove, the sun as He is the Son of man as well as the\nSon of God. The sun represents the Source of your life, the\nCreative Father, the Cosmic Father. Above the sun is the rainbow\nin the blue, which is the wisdom. These are all symbolic of moving\ninto higher levels of awareness through the different planes of\nconsciousness and the result; the ultimate purpose, is to bring total\nDivine Love and Peace not only in the earth but also through the\nuniverse.\n\nThis is your goal. Do not stand in awe or be frightened, for each\nday will be a step along the way. Do not look for phenomena; it\nmay happen, but on a much faster pace and with much more ease\nand peace within yourself as you tune in and know the beauty of\nyour own Beingness.\n\nIt is with such joy and such love that we come to share this with\nyou. Peace, I give to you through our Master, the Christ.\n\nMessage #2\n\nAzreal - The baptism referred to by the forerunner John the Baptist\nrefers to the conscious self-awakening to the spirit and to Christ.\nAs you are enveloped in these energies, perceive yourself in\nprotection, in a consciousness for upliftment. Experience the Blue\nEnergy as a light ray in a cleansing effect and see self fully\nenveloped in light. Light cannot bring into motion the principles of\nspirit. The light is energy and it is activated through thought. It is\n\nmagnified through motivation. Light energy raises the frequency\nwaves of thought, or it can add power to the negative thoughts in\nmotion.\n\nThe essence of light has no consciousness of its own, for it is\nsimply rays and beams of light and propagates according to the\nthought of your mind and consciousness. You must be the example\nof the principles of the Christed self. You must become the\npotential you desire to express and act out the role that you see as\nthe image of the higher self. This must be your individual journey.\n\nThe pathway through the discernment is very intense. The\nobjectivity of your consciousness comes into focus when you align\nwith inner purpose and motivation of purity and light. The sign of\npurity comes from the cleansing by water showering the spirit,\npurifying the physical body through cleansing. The baptism of the\nage of Aquarian consciousness is the baptism of fire. It is\npurification through the energies of the inner self. It is the\ncleansing through a conscious acceptance of responsibility for the\ncause of one's creation.\n\nThe baptism into the law of grace is a journey through many\nchanges, many releases, through the recognition of behavior\npatterns and changes to new thought. The putting on of the new\nself is a coming into the law of grace and experiencing the\nintegration of the inner self to the conscious self. Being \"born\nagain\" is a rebirth of the conscious ego to the acceptance of the\nsoul and spirit as one, rising up into new levels of understanding,\nactivity and creation.\n\nThe visions of the ancient ones for seeing the paradise are not lost\nto the battles of time, but are an image of a life experience in\nwhich the earth, refreshed and reborn, comes into a higher\nevolution in which the cosmic selves function in relation to\nprinciples of the cosmic consciousness.\n\nEvolution has come progressively and digressively through many\nages of time, through many millennia of stagnant growth and slow\nprocesses of movement and change - biological, physiological,\npsychological.\n\nAt other times, it has come through revolutionary changes,\nquickening, periods of mastery of the arts and industrial change.\n\nYou are now moving into a decade of human ego changes thus\nproducing once again a more masterful consciousness. This allows\nseeing the arts, sciences and technologies of man's creations in\nalignment with the growth of individual spirit. We cannot see this\ncoming in a short period of time. You are pioneering through\nhanging codes of consciousness and patterns of thinking within\nself as well as changing the vibrations within your own physical\nbodies. We are preparing the new generation according to what\nyou clear in this incarnation. The cosmic event will begin to come\nquickly into many industrial lives. It is painful. It can become\ndiscouraging to the physical and rational self, but the fears and\nanxieties are released. The affirmation of being one with the mind\nof the Christ is an essential acceptance of principle.\n\nThere are many lords and hierarchical aspects. The overseer is the\nChrist incarnated through many ages appearing through the\nmastership of many lives, but focused in dramatic occurrences\nthrough Jesus the Nazarene. His spirit, mind and soul lights those\nwho understand and comes through the physician/healer aspect.\nYes, it will be seen as reflected through many inner and outer lives\nin this next decade of time.\n\nAs it is stated in the Bible - Many will say He is here or there, and\nreflections of that Christ will be seen, but the faltering will come as\na sign of impurities. What you have experienced in A Course in\nLight is transpiring in all movements for new age consciousness.\n\nIt is a slow pattern of growth, optimism, hope, disintegration,\nrevolution and negation, creating new patterns and striving through\nother phases of understanding.\n\nIt is a pattern that is manifesting for the counter-forces would\novershadow and deny the forces of light. Think on these things. Be\nof peace. Accept. Walk with joy and love. Walk with exuberance.\nFail not. As the flesh becomes weak, think on the spirit and strive\nto rise up again out of those inner pains of disillusionment.\n\n                       Personal Journal\n\nAffirmations\n\n       I now release the fear that I experienced in the past.\n\n       I release any fears that I hold as truth now.\n\n       I am releasing my doubts and fears to the light.\n\n       I am surrounded by the wisdom ray, which brings me\n\n       peace and understanding.\n\nWrite your experiences when you first felt fear."}, {"id": "L2_14", "level": 2, "type": "lesson", "lesson_num": 14, "title": "LESSON 14", "subtitle": "EMERALD GREEN", "color": "emerald", "content": "COLOR RAY: EMERALD GREEN\n           The Light of Creativity & Communications\n\nPurpose and Essence\n\nAs you move into this frequency of the Emerald Green ray, you\nenter a state of introspection regarding your ideas and creative\nconsciousness. You review your life with your personal\nrelationships, objectives, creative intentions and matters of your\ncareer.\n\nThe emotional reactions within this lesson of the Emerald ray may\nresult in turmoil about money, your financial status and awareness\nof dissatisfaction with working conditions or life in general.\nStirrings long hidden as creative urges may bubble up to the\nsurface.\n\nEach person has attitudes and concepts about being a receiver in\nlife. Some feel they give much more than they receive. Others feel\nthey receive more than they give. Many have longing for\nexpressing their own talent. Some have little clue what they really\nwant to do or desire. This Emerald Green ray adds impact in your\ninner search. Sorting through this can be emotionally painful.\n\nThis energy relates to your creative self, helping to balance your\npersonal magnetic field, the yin and yang energy. When balance\noccurs you experience wonderful benefits as bursts of creative\nideas flow or monetary barriers are released. The Emerald Green\nray opens the center relating to your creative self...\n\nSpecific Level Function\n\nThe Emerald Green frequency in its highest level can free you\nfrom the bonds that bind your creativity and bring results from\nyour innermost desires. It can free you from communication\ndifficulties that became a barrier to your reason and understanding.\nThis energy brings balance in communications, creativity and\nabundance in love, supply and expression.\n\nWithin the perceptual self, you find clearer perceptions of the\nthoughts and ideas that limit you to your insight and intuitive self.\n\nWithin the emotional self, it activates anxieties from roots of\ninsecurity about your ability to relate well with others or frustration\nof your creativity.\n\nMany students discover latent talents during the magnification of\nthis particular light ray. Writing poetry, composing music or\ncreative artwork increases. Some miracles seem to happen as\nabundance from a consciousness shift brings surprises breaking\nthrough monetary fears. The Emerald Green in its purest light\nresults in an all around wonderful feeling of individuality, purpose\nand goals enacted. The struggles are also your opportunities to\nmeet challenges with new understanding, acceptance and strength.\nYou are as you have created yourself to be. Change comes through\ntenacity, will, faith and love of life.\n\nMessages #1\n\nAzreal - Greetings. This is Azreal. We speak to you with light,\nlove and blessings to all. As you focus in the vibration of the\nRadiant Emerald ray, perceive this energy bringing creative\nconsciousness for your abundance.\n\nYou are enveloped in the magnification of this higher vibration of\nlight, so perceive you are releasing any disorder or imbalance in\nyour personal life experiences. Feel self lifted up into a new level\nof being where you experience the creative urges magnifying in\nand through you. We are going to speak to you at this time in space\nwith regard to spirit and its relation to the physical body and earth\nexperience.\n\nIt is difficult for a spirit [and when we speak of spirit it\nencompasses mind, essence of light and creative thought through\nan individualized consciousness] to truly understand or touch the\nphysical plane. For the physical and matter world is elusive to\nspirit just as spirit is elusive to the physical and matter world, yet\nneither can exist nor function in its true state without unity.\n\nSpirit cannot manifest in the physical plane until it comes to a\npoint of balance with dense matter. Think in terms of your body;\nwithout spirit, it would be an empty shell, void of all existent\naction. It would not function; it would be a mass of heavy dense\nvibration without any sense of life. The mind that dwells in the\nthoughts at all levels could not exist without a being part of the\nembodiment of spirit. Therefore, mind and spirit function as a unit,\nas a whole.\n\nIn the creation of body and spirit, of course the physical expression\nhas the greater reality in the third dimension of time and space.\nYou are a trinity; a divine consciousness, Father, Son and Spirit -\nthe Father being the Mind, Spirit being the essence of Light, the\nbody as the Son. Yet, the conscious self has difficulty in grasping\nthese other aspects of your total being.\n\nThe soul is that part of your being that encompasses all systems\nand function’s in many planes, for the soul is the true joy of the\nCreator.\n\nAll souls have the potential for experiencing the sense of being an\nenlightened consciousness. However, souls are also subject to the\nforces of an opposing system to the evolutionary process.\nTherefore, they can become caught up in the negative systems of\nmind forces. The counter-forces are supported by the negative\nenergy of the physical plane and receive their own power from the\nopenness of certain souls to the antichrist systems. Each entity in\nthe earth plane is in constant exposure to the opposing forces.\n\nTherefore, put on the armor of the light and walk with thought\nexpressing the higher aspects of consciousness that you may\nmaintain your upward movement into higher consciousness. When\none feels in tune with the higher self, or with the centers of light\nexperiencing truth, love and peace, one is receiving and being\nmagnetized towards the inner growth of one's highest aspirations.\nNo life exists within the plan of earth that has not brought to itself\nwhat is needed for its own upliftment, growth, lesson experience,\ndesire, motivation, or reenactment of old patterns. What you might\nexperience is a direct result of what has been projected by the\nhigher self for the good of your own being.\n\nThere are moments in time, in the soul's path of pilgrimage or\nmovement toward a higher enfoldment, when there is separation\nfrom outer activity. One is removed from outer conditions for a\nperiod of time for purification, for the baptism by fire, water, earth,\nand air. In moments of this time, there is a facing of the fear of\nlosing hold of the desires that kept one in place within the pattern\nof the physical earth. Understand that as a soul enters the path of\nself-enfoldment, it encounters periods of time when fear and loss\nof connection to conditions seem very prevalent. There is a time of\naloneness of being in touch with the forces within one's own being.\nIt is done is faced with the images of previous past and present\nconditions - the valley of the shadow of death, so to speak.\n\nRemember as you walk in and through these stages of self-\ndevelopment, you are but encountering obstacles to your sense of\nknowing that all of this is a passing phase bringing you to a point\nof coming in touch with a higher divine consciousness. No one\nloses the entire desire being, for desire is that which motivates all\nof the activity of the physical and matter world, as well as spirit.\nWithout desire there is a void. Desire is consciousness that brings\nthings into their motivation and creation.\n\nWe also speak about the wheel of karma. Know that desire is a part\nof the essence of light that binds the wheels of karma into being. A\nsoul chooses by desire to express and enter into a physical plan to\nfulfill creative intentions. Some enter for the purpose of serving\nothers, inspiring and being a vibration for the spiritual truth. It is\ndifficult for the human mind to grasp all of the intricacies of the\nnature of its being. Through patience, you will observe and learn\nthrough your personal growth.\n\nQ. How does all of this apply to an individual life in the here and\nnow?\n\nA. You gather information from high spiritual sources.\n\nQ. How will this apply to create a better life experience for self-\nunfoldment or group unfoldment?\n\nA. Individually you may absorb in your conscious self the\nawareness of spirit and the awareness of love that governs all\nsystems of life. There is an integration of this knowledge in all of\nthe bodies of yourself. The laws are learned and applied to the\nlifestyle and experience becomes more enriched through an inner\ncalm, inner strength and security that overpowers any materiality.\n\nSecurity is believing and understanding nothing can destroy the\ntrue individual self.\n\n               Interpretation of Psalms 23 1-6\nThe Lord is my shepherd, I shall not want:\n\nThe Lord is my shepherd is the higher nature; the total\nconsciousness attuned to life's needs and Creator, the Lord being\nthe law, the word, and the action of the Higher Self. He is your\nshepherd, He is that which guides you walking through green\npastures, meaning walking through total change in consciousness.\nWhen the Emerald Green Energy is activated, it is the aspect of the\nsoul's consciousness that brings about the opening up, the\ncommunications and/ or the opening up of creativity.\n\nHe leads me beside the still waters:\n\nAs this begins to take place, there is necessity for your mind to be\nstill, for the body to be at a place of rest and restoration in order for\nthe higher aspects to make its full awareness at the physical level.\n\nHe maketh me to lie down in green pastures, he restoreth my\nsoul:\n\nThus is what is taking place. You are being brought into the Light\nof the higher nature and experiencing a rebirthing. This aspect is\nvery difficult to go through for there is a battle at the present\nconscious mind to move, to give action, to relate to experiences, to\noperate and function as previously experienced. What is taking\nplace in your situation at this present time is your higher self, is\ndesiring for you to be in a place of separation from all outer\nconsciousness and at peace at this present stage.\n\nHe leadeth me into paths of righteousness for His namesake:\n\nThis is preparing you to walk into the path of right action, the path\nof Light, -- that which will guide you to fulfillment of your soul's\npurpose.\n\nYea though I walk through the shadow of death, I will fear no\nevil, for thou art with me:\n\nThe shadow of death is the aspect of feeling you are in a void. It is\nbeing in a place where there seems no opening, a place of\nstagnation, a place of emptiness, a place where it seems regardless\nof what you know, it is difficult to tap that source. This is also the\nprocessing. It is the emptying out of the old before the new\nfeelings can be used, \"Yes, though I walk through the Valley of the\nShadow of Death, I will fear no evil, for Thou art with me.\" You\nhave feelings of being separated from the guidance and wisdom\nand teachings of the Masters and of the God Principle.\n\nIn essence, all of these things are guiding you to where you are.\nYou feel immobilized, you feel unmotivated to move out into the\nLighted stream. You feel at a place where all things are difficult.\nThis is also a part of this aspect of nature -- walking through the\nshadow of death. Much of the old is dying off. Be patient with self.\nIt is not a time to dwell on the inadequacies of the physical body or\nthe mental mind. It is a time to go within and to absorb the\nresources of the Inner Being.\n\nThy rod and thy staff, they comfort me:\n\nThese are the tools of Light, the laser Light of your own higher\nself. They will show you the way into that which you desire to\nmanifest. Each frequency of Light moves at a very fast pace,\nespecially as a strong laser Light. These act as rods and staffs\nguiding your way.\n\nThou preparest a table before me in the presence of mine\nenemies:\n\nThe table is the knowing your needs are met regardless of how you\nchart images of lack, indecision and undesirable thought\nprojections or of sources penetrating your own knowing. You must\nstand firm. Know you are in a beautiful place of rebirth and\nopening up to higher wisdom.\n\nThou anoint my head with oil, my cup runneth over:\n\nWhen you have passed through this stage of rebirth, you will find\nyourself as a vessel filling with light overflowing. You will\nexperience a total upliftment of your being. You will feel the total\nattunement to the inner nature through the meditation and through\nthat, which feeds your heart and your mind and your soul.\n\nSurely goodness and mercy shall follow me all the days of my\nlife, and I shall dwell in the house of the Lord forever:\n\nAs you become united and in oneness with the creative power\nwithin, with all aspects of your inner self, you will find that you\nare guided into the path of right action and feel totally in tune with\nthe Universal Mind under the God Principle.\n\nAffirmations\n\n        I am experiencing emotional release from unfulfilled\n        desires.\n\n        I am discovering creative desires and means to bring them\n        into action.\n\n        I am perceiving with greater clarity what is of value.\n\n        I am fulfilled within my work and relationships.\n\nWrite your intentions.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n                       Personal Journal\nWrite your own affirmations.\n\n\n\n\n\n\n\nWrite of the creative desires that you wish to fulfill.\n\n\n\n\n\n\n\n\n\nSet goals to accomplish these creative desires."}, {"id": "L2_15", "level": 2, "type": "lesson", "lesson_num": 15, "title": "LESSON 15", "subtitle": "VIOLET-PURPLE", "color": "violet", "content": "COLOR RAY: VIOLET-PURPLE\n                    The Light of the Divine Will\n\nPurpose and Essence\n\nThe purpose and essence of the Violet-Purple Energy is to bring to\nawareness at a conscious level all of the hidden rages that lie\nwithin your nature; the feelings, of being suppressed and denied, of\nyour ability to express what you believe as your personal right and\ndestiny. The rage of feeling insignificant and denied is so\nprevalent. The feelings of being abandoned and left without\nrecognition, the fears of not being able to get done what you know\nyou have set out to complete. All of this creates pain and rage in\nthe will chakra center.\n\nThe frequency of this ray can break through those difficulties and\nin the process of healing it can uplift the feelings of being\noverpowered by the wills of others and to release the emotions of\nimprisoned consciousness that can result in physical or emotional\ndifficulty.\n\nThe beauty of this energy is the spiritual sense of being attuned to\nright action and guidance that comes from within and the\nconnection with the guides and teachers. The result of being freed\nfrom the rage can open you up to great joy and love.\n\nSpecific Level Function\n\nWithin the emotional self, you may experience emotions of ill-will\nrage, revenge, and anger at impositions on your personal life and\nexpectations. A selfish attitude may rise to the surface of your\nactions.\n\nWith these emotions, see yourself cleansing out the causes that\nhave brought these feelings to the surface. Meditate within the\nenergy of this Radiant Purple light. The higher vibrations of this\nray are a wonderful feeling of joy and giving, of being a messenger\nof good will, of expansiveness, and a desire to travel or move
