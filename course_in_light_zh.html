 taking place within\nthese dimensions that it would dissipate the effect of the processes\nat the inner levels. It might also interpret the dream wrongly;\ntherefore, it becomes hidden from your understanding. When you\nare seeking to communicate with the guides and teachers at the\nhigher levels, simply be at peace with yourself. In silence seek to\nexperience what is being given to your from your own self-\nunfoldment.\n\nFalling asleep while in guided meditation is okay. It is moving into\nthe inner realms, and this, too, becomes almost a similar\nexperience to the dream state. The awareness of the physical body\nis dissipated and it seems as though there is no connection to the\nbody as the egos move into an altered state of consciousness.\n\nDo not become overly concerned if you should drift off and cannot\nhear or be alert during the taped meditation sessions. When you are\nin an altered consciousness, it is not unusual to go into an alpha\nstate. You are actually experiencing the higher frequency of energy\nthat is innately you. Several books are written for dream\ninterpretation and universal symbols. This will help you in your\nown understanding of your dream activity.\n\nBreakthroughs along the Path\n\nAt this point in your evolution, you are climbing a mountain of\nconcepts, ideas and thought patterns. You may experience trauma\nor emotional upheavals that create difficult moments in your daily\n\nexperience, but these bring you to new realizations, which break\nthrough the old concepts into new understanding. Each time you\nreach a new plateau, you look back at the past and see where you\nhave been to where you now experience yourself in a very new\nlight. It becomes a time of inner searching and overwhelming\nrealizations of the amount of knowledge and work to be attained.\nEach realization, however, brings a refreshment and inner strength\nto move you yet into greater expanded areas of thought and action.\n\nWhat does THIS mean? A concept, or idea, thought or motivation\nbecomes an overwhelming priority to the conscious personality\nself. It becomes a fixed sense, or fixed idea to move through\ncertain experiences, you find that this fixed idea is no longer a\npriority to the self or it may become a false idea that has lost its\ndesire. It may no longer apply to the now. You come to a\nrealization of this and suddenly there is a release, a lightness as\nyou let go of the fixed situation. You realize that this truth or fixed\nidea was a fixation of the personality system and, in fact, may be a\nbarrier to your free spirit to self.\n\nA breakthrough is when the idea or concept is given to the\nconscious mind and the higher self-breaking the veil that separates\nthat concept from the higher purpose. When the veil is dissipated,\nthe awareness of the conscious mind perceives a greater picture in\nwhich that concept becomes a minute aspect of the greater whole.\n\nWhen one has a breakthrough, there is an overwhelming sense of\nreceiving inner peace, a motivation into a new vibration.\nEmotional upheaval, conflict or heaviness, death of a desire,\nconcept or motivation may precede the breakthrough. When the\nbreakthrough occurs, it is like coming out of a tunnel into\nexpanded enlightenment.\n\nThere are many steps to walk before there is a total walking in the\nlighted awareness, before there is a total understanding of all\n\naspects of your nature and they are being a reflection of your own\ncircumstances. It takes time, often many ages, to truly evolve to a\npoint where you walk in the perfection of un-deviated thought\nvibration. The light energies are being recognized and directed in\norder to speed the consciousness of all to be uplifted and unified as\nwhole beings of light.\n\nThis is an exciting time of living and loving within this earth.\nWhile there are many changes that may lie ahead through stress\nand pain, there also are many joys, as you perceive yourself\nmoving into new levels of personal growth and spiritual\nawakening."}, {"id": "L3_med", "level": 3, "type": "meditation", "lesson_num": null, "title": "MEDITATION PROCEDURE", "subtitle": "", "color": "intro", "content": "Make your affirmation: We are of one Mind. We are of one\nthought. We ask that the mind be in us that was in Christ Jesus, or\na Personal Affirmation, such as: I accept now transformation of my\nthinking, actions and life. Let my guidance lead me to my ultimate\ngoal.\n\nBecome still and relax the body. Put aside all your cares, worries\nand concerns. Open up to experience the power of meditation.\nGather all your awareness into the forebrain; call forth all the egos,\nphysical body ego, personality ego, cellular and organic egos …\nask the higher self to bring all egos into one consciousness.\n\nPerceive the egos moving up through the five lower bodies,\nphysical, perceptual, emotional, mental and astral/etheric, axis into\nthe center of the radiant star center of the White light.\n\nActivate and expand this energy into a sphere six feet in diameter,\nseeing it move in a counter-clockwise motion simultaneously\nthrough all the lower bodies and carrying the debris out through\nthe bottom of the feet. Observe the Light moving down through the\naspect of your consciousness.\n\nMove with thought back into the center of the White light and\nactivate all centers within the soul body up to the light energy of\nthe week.\n\nFor each week, activate and concentrate on the centers of light\n(colors) until you come to the energy of the week. Use thought to\nrelease, clear and affirm within each center, such as:\n\n         I release all anger, rage and fear into the Golden light (or\n         the light of the week).\n\nPerceive the light entering and clearing the right side of the brain\nand then the left side of brain. See yourself letting go of situations\nkeeping you in anger and rage.\n\nThen move into the next light ray such as Blue, releasing fears and\nanxieties that cause terror because of a relationship, work related\nor monetary. Give it up to the light; ask for healing, and release.\n\nWhen all the centers are activated and enhanced, observe the light\nof the week expanding throughout all of the lower bodies, seeing\nself completely enveloped in the frequency of that light ray.\nConcentrate on the light frequency working intricately within the\nbrain-mind consciousness and the thought patterns in need of\nrelease, change or transformation. Move into the silence, asking\nthe guides and masters to work with you as you are in the stillness\nand silence of your process. Know that you will find answers.\nThey may come in subtle ways. You may not hear, see or\nexperience anything dramatic, but you are putting into motion what\nyou will develop in your healing.\n\nIn the silence, activate the light to expand and include all those in\nyour life who are in need of healing and then direct it into the\nplanet, then release the energy into the ethers. This is the most\nwonderful part of meditation, sharing with all whom you are\nconnected. See them in the light healed, cleared and uplifted.\n\nWhen you are ready to return and have completed your meditation,\nbring awareness back into the forebrain and ground by bringing\nyour thought down through the center of the Black Power Ray. See\nit anchor your consciousness."}, {"id": "L3_23", "level": 3, "type": "lesson", "lesson_num": 23, "title": "LESSON 23", "subtitle": "WHITE", "color": "white", "content": "COLOR RAY: WHITE\n                     The Light of Purification\n\nSpecific Level Function\n\nWithin the mental level, the energy of the Radiant White Light\nworks to release the consciousness of your mental aspect, which\nkeeps you repeating patterns detrimental to your well being and\nstate of wholeness. The energy is directed to clear all negative\naspects of your mental processes by breaking through the\nholograms set in your brain memory bank. It purifies, balances and\nheals the thought processes and brings simultaneous healing to the\nphysical brain and nervous system.\n\nThe light brings an awareness of increased unification of the\nspiritual nature of self with other aspects of your being. This is so\nthat all the lower natures are functioning in a more harmonious and\nbalanced condition through acceptance of self as a creation of\ndivine love. The energy can then act as a protective shield against\nthe formation of new negative thoughts and actions.\n\nCharacter building comes from responsive actions toward all that\nwould bring greater good into the whole experience of your life\nand others. Responding to challenges with integrity and joy will\nuplift the pains of past neglect and damaged relationships. Thought\nbecomes more effective as you increase in your insight and\nspiritual enfoldment.\n\nMessage #1\n\nAzreal – Greetings, dear students of the light, this is Azreal\nspeaking. Yes, we see and perceive the beauty of your inner selves\nand the radiance of the frequency of the light moving throughout\nthe room. There are many present within this moment in time.\nRecognize and perceive the presence of the masters and teachers\nwhose consciousness moves in and throughout your own being to\nlift the physical, emotional and mental selves into alignment.\n\nAt this moment, we wish to speak to each of you about two\nconcerns. The first is the idea, or mental image, brought to the\nsurface when referencing the word “CHRIST.” This word is used\nthroughout the lessons. Many have different perceptions of this\nparticular word, either by associating it completely with the\npersonality known as Jesus, or separating it from the personality\nand perceiving it as spirit.\n\nChrist is the essence of all life. It is the incarnate spirit of the\nCreator's Conscious thought -- the Creator being the Universal\nForce from which all light and energy emanates. Christ is the\nConsciousness that envelops all aspects associated with the\nspiritual natures, the virtues that bring about the perfections in life.\n\nJesus, the Master, who was one of many in the Earth plane,\nachieved his Christhood through a definite path, through a definite\nperiod of self-growth, of self-awareness, of self-discipline, of self-\nconsciousness. His birth into the earth was\n\nprepared through the spiritual hierarchy who appeared to the\nchannel of Mary. She also had to prepare her body, her mind and\nher inner spirit to be the receptor of this tremendous master soul.\nHis purpose was to bring man's awareness to the reality that all can\nwalk a path to greater and higher conceptions of their nature.\nHence, as quoted from the scriptures,”Verily, verily, I say unto\n\nyou, He that believeth on me, the works that I do he do also; and\ngreater works than these shall he do; because I go unto my Father.”\n\nBefore one attains such heights of awareness and spiritual\nwholeness, there are many processes moved through. All who have\nentered into the earth are bound by the laws of cause and effect\nworking through these causes to balance out the inner nature of the\nsoul.\n\nA Course of Light brings these teachings to incorporate the\nspiritual truths brought to man's awareness through religious ideas.\nIt is to effectively create and bring into human awareness the\nscientific aspects of the Christed Awareness, which is more than\njust a spiritual idea or ideal. It is truly expanding human awareness\nto a point where you perceive all life in its universality, in its\ncosmic sense. It is seeing planetary forces and knowing the\nenergies that influence your whole being that create a greater\nunderstanding of your total self and relation to the earth. It is\nseeing the human race as a part of the whole sphere of many\ndifferent forms and manifestations.\n\nThe Christ-Spirit-Emanuel, the Son of the Creator is thought from\nthe Mind or Source of God. It is that which brings life out of its\nlowest awakening and into its highest perception.\n\nAs you are now moving in consciousness to direct this frequency\nof light, perceive it moving into the mental bodies. If you could\nperceive what takes place within self, it would appear as such:\nLight moves into the mental body directed into the brain-mind\nconsciousness. Within your brain are many different nerves, each\nwith the millions of cells, which hold within themselves positive\nand negative ions. The negative ions are those, which are of a\nmagnetic aspect, which draws the thought vibrations that are\nactivated through the nervous system. Through stimuli of anxiety,\nfear, and doubt, or that which causes a greater stimulation to the\n\nbody forces (as White light or frequencies of energies) which move\ninto this aspect of the brain, there comes a lifting, a balancing\nbetween the negative and positive ions.\n\nThe positive ions are those which give off feelings of euphoria, of\nlightness, and which are affected by the sugars in the bloodstream.\nTherefore, it is recommended that less sugar be taken in to keep\nbalance within this cellular structure of the brain.\n\nThe light is without conscience. It is pure energy that is balancing\nthe thought vibrations within the brain. In the following week, as\nyou walk in this particular frequency and feel the emotional and\nmental thought patterns moving through states of high euphoria to\nstates of depression, activate this frequency and realize a balancing\nis being brought into manifestation.\n\nThrough all these weeks, you have experienced the effects of the\nenergies. You have perceived the emotional upheavals and you\nhave felt the increase of your sensitivities. Now your mental\nconcepts will be brought into a more balancing effect,\nincorporating an awareness of a greater unification with all life.\n\nThere is much to be given to each of you. The teachings are for\nyour individual acceptance to help you along your path of\nevolvement and to bring you to a plane where you stand\nindependently sure of your own potential. Yet, you are able to\nembrace and encompass your fellow man through pure love,\nthrough the eyes of Christ.\n\nIt is of such tremendous blessings that we come to you to give you\nthe opportunity to be awakened. Each of you, regardless of your\nstation in life, regardless of your work environment or life\nenvironment, are brought into this work to serve, to lift, to feel and\nto experience the greatest beauties of life, the love of Christ.\n\nNow, you are all beacons of light. Your energies are extremely\npowerful. Your thoughts move with great impact. Your thoughts\ntouch those you dwell on. Go in peace and may the light of the\nUniversal Christ be in and through you.\n\nGround yourself, bring awareness back into your body, and anchor\nthe energy down through the legs and out the feet.\n\nWithin this level, we are including material titled “Spiritual Laws”.\nThey are based on the Ten Commandments and translated through\nthe insights given by the Order of Melchizedek.\n\nSPIRITUAL LAW #1\n\nTen Commandments - Exodus 20 1-10\n\nI am the Lord, your God, who has brought you out of the land\nof Egypt, out of the house of bondage. You shall have no other\ngods before me.\n\nThe I AM, the father of all life, is spirit and cannot be portrayed in\nany imaginative creation. So, this law was brought to release these\npeople from paganism and the ideas, thoughts and vibrations of\nsuperstition. The I AM, God the Father Aspect, is the Holy of\nHoliest that which brings one into absolute wholeness cannot be\ndeviated.\n\nWhen you see the word LORD, you must think of it as law,\nspiritual law - the spiritual self, the higher self. God is your\nspiritual self. The higher self must be recognized as the first, the\n\\\\true self, not the physical self, putting God first, your God-self,\nthat which was created in his name.\n\nWhen you see the words THE LORD THY GOD, this is the law,\nthe absolute, the creative mind, and the highest divine intelligence\nthat moves with the spirit through all things.\n\nEGYPT is your limited thinking. This is your conscious state of\nmind, where you limit yourself by negative thinking. It is this\nthinking that keeps you bound to the physical world, the material\nworld. Only your spiritual mind, your soul mind, can release you\nand bring you OUT OF THE HOUSE OF BONDAGE.\n\nYou shall have no other gods before me.\n\nIt means that nothing must come before your spiritual self or\nspiritual desires, not money, home, job or anything, for these are\ngraven images made by hands of man, hands of clay.\n\n                        Personal Journal\nAffirmations\n\n         I am one with all that is.\n\n         I am one with the Divine Aspect of all that is.\n\n         I accept this part of me as the guiding light of my being.\n\n         I put no other power before this. The God of my being is\n         the Lord of my life.\n\nWrite your own affirmations.\n\n\n\n\n\n\n\n\nWrite about the detrimental patterns you would like to release."}, {"id": "L3_24", "level": 3, "type": "lesson", "lesson_num": 24, "title": "LESSON 24", "subtitle": "GOLD", "color": "gold", "content": "COLOR RAY: GOLD\n                    The Light of Transmutation\n\nSpecific Level Function\n\nWithin the mental nature, the Radiant Gold Light acts to transmute\nmental thought patterns blocking you from consciousness of\ncreating positive action in your life. Latent thoughts that stem from\nrage and anger toward painful experiences and attitudes from early\nstages of your life to the present may erupt to the surface to clear\nyou from conditioning thoughts that cause negative behavior\npatterns.\n\nThe light is directed into the brain, right brain and left-brain, to\nrelease feelings of anxiety, mental confusion and disorientation. It\ncan release one from states of passivity into a more dynamic\nexpression.\n\nThe light brings one into positive thought patterns and recreates\nyour life into a flowing of joy and optimism. The energy of the\nGold Ray is the dynamic aspect associated with the sun. Therefore,\nit is felt as an intense frequency that raises your vibrations into a\nmuch higher level of consciousness.\n\nWhen working with this energy, perceive yourself affirming the\npositive goals and desires you seek to express concerning your\nwork, personal relations and your life experience in general.\n\nMessage #1\n\nAzreal - Greetings, dear students of light, it is again with great joy\nthat I perceive each and every one of you as you remain centered\nin the radiance of the light of your own being. When you have\nlearned to completely center self in the silence amidst the clanging\nnoises of the outer world, you will then know the power of control\nof your thoughts and feelings. How important it is to know and\nexperience the inner calm and silence within you as you find\nyourselves amidst confusion, crisis, and chaos this week, as you\nare again flowing with this frequency of the Radiant Golden Light.\n\nYou will have opportunities to test your mental powers and mental\nthoughts regarding your ability to center in the light rather than\ndistracted by emotional and mental upheavals. Do not be dismayed\nor discouraged with self as you find yourselves moving through\nmany thoughts dealing with separation and with anger and with\nresentment. All these aspects of the emotional nature and mental\nthought patterns are infiltrated with this beautiful Golden Light.\n\nIt is difficult for you to perceive the growth that has transpired in\neach of you. Yet, I say that none are of the same vibrations or the\nsame thought concepts as when you entered into the beginning of\nthese classes. Perhaps it seems foolish to proceed through a path of\nrepetition, through a path, which seems of sameness. Yet, each\ntime you move through these cycles of centers you are changing\nthe physical and the cellular structures as well as your emotional\nand mental selves.\n\n               Yogananda - Sexual Nature of Man\n\nGreetings, in the name of my Master Jesus and the Master Babaji,\nit is indeed a great pleasure to be here this evening and to speak\nwith each of you regarding those things that concern your\nconscious thoughts. We wish very much to be able to clear up\n\nconcepts that may be puzzling to you. We hear you when you\nvoice your questions before a session begins. And so, I wish to\naddress myself to you this evening about the question of the sexual\nnature of man. We understand the seeming conflict of ideas\nconcerning the purpose of this nature of the humanness.\n\nStudent: In your book, Autobiography of a Yogi, your guru, Sri\nYukteswar, makes reference several times that “the sexual instinct\nhas been implanted solely for the propagation of the species, not\nfor kindling of insatiable desires.” However, in other master\nteachings, it has been my understanding that the physical sex act\non the earth plane is and can be high, good, beautiful and right.\nAlso, it is my understanding that the sex act or making love is a\npracticed expression on the higher planes of existence, including\nShamballa.\n\nMaster: The sexual nature of man is, of course, to recreate new\nlife, to bring in the opportunity for other souls to incarnate into the\nearth level. And this, of course, is the purpose of all nature,\nincluding the animal and vegetable kingdoms. However, the\nhuman body is housing an individualized soul aspect; “the divine\nprinciple” and the spiritual aspect of man can be expressed through\nsexuality. When souls come together in a perfect union, they\nexpress love in this manner to help rejuvenate, recreate and to\nbring balance into both entities. As long as an entity is walking a\npath to Christed Awareness, the sexual expression is very\nimportant to continue the balance. The idea of one becoming less\nattached to this (sexual) nature as one becomes more evolved and\nmore spiritual is a truth. However, these steps come about as one\ncomes into levels of Christ Consciousness where one is totally\nmanifesting the perfect divine principle within self and is whole\nand balanced within self. At that point, in evolution, one becomes\nrather detached from any one-to-one interpersonal relationship\nwith a soul mate or a counterpart at the earth level. This may be of\nsurprise to you.\n\nYou see, you are all moving towards this illuminated\nconsciousness and this consciousness will become a part of your\ntotal expression. It will be your choice as to whether there will be\nthe relating of a counterbalance with a soul mate. When you totally\noperate with the Cosmic Consciousness, the only choice of\nexpression sexually will be with one as purified in mind, body and\nsoul as yourself. This will be in order not to create a karmic tie\nwith any soul who is not at the point of awareness of your own\nselves. This will be a responsibility you come to, but it is not for\nyou to give thought to it at this point. To enforce this level of\nawareness into your expression now would cause much\ndisharmony, guilt and frustration within self.\n\nTherefore, it is because you are aware of the vibrations you send\nout and receive that you can respond in this manner. For with each\nentity that you express within a sexual manner, you become a part\nof their total vibration. You either are lifting their consciousness\nand vibrations or being infiltrated with their negativity or pollution,\ndepending upon the state of awareness and consciousness of your\npartner. Is that clear?\n\nStudent: Yes, Master, but it was my impression that at the higher\nvibrations, people or entities did express this way and that they did\nhave the Christed Awareness.\n\nMaster: It is a choice. And yes, the emergence at the soul level is\nparticipation. But it is different from what you understand and\nknow. The higher cosmic expression is at a much different level\nthan your physical concepts.\n\nSPIRITUAL LAW # 2\n\nYou shall not make for yourself a graven image or a likeness of\nanything that is in heaven above or that is in the earth beneath\nor that is in the water under the earth. You shall not bow down\n\nto them, nor serve them, for I, the Lord, am a jealous God,\nvisiting the iniquity of the fathers upon the children unto the\nthird and fourth generations of those who hate me, but\nshowing stead-fast love to thousands who love me and keep my\ncommandments.\n\nThe law was given to the Israelites because of paganism, which\nwas running rampant amongst the races of man. The idea of God\nwas still looked upon as an earthly imagery. They created many\naspects of self and put upon that aspect, the divinity. Therefore, in\nthose days, many were bowing down and superstitiously putting\ntheir thoughts, energies and vibrations into earthen creations, into\nbejeweled statues representing thunders, lightning’s and elements\nof the earth and projections of animals and calling these gods.\n\nThese also stemmed from memories of creatures created out of the\nAtlantian days. This law was brought into their awareness that they\nmight turn away from perceiving the All in All, the I AM, as\nearthly image. Part of this law seems way out of line to human\nthinking. Why should the children suffer for the iniquities of the\nfather? And what of God being a jealous God? How can this be\nwhen we know God as love?\n\nThe word JEALOUS is a misinterpretation. It is not a word to\ninstill negativity or envy. It is simply to tune man into the idea that\nthere is nothing beyond the I AM that has the power to bring\nanything into creation.\n\nThe vengeance and judgment upon the wicked is terminology used\nin those days, for the people were much like cattle and were\nbrought into awakenings through fear, through disciplines and\nthrough orders. In actuality, this is the Law of Karma and the Law\nof Correspondency - like attracts like.\n\nThoughts to heal and let go:\n\n             I can never have enough\n\n             I am not worthy to receive.\n\n             I am resistant to change.\n\n             I am afraid of love.\n\n             Love is death.\n\n             Love is pain\n\n             Love is losing my identity.\n\n             Love is for others but not me.\n\n             Work is difficult.\n\n             Work is damaging to self worth.\n\n             Work is without reward. & Work is endurance\n\n                       Personal Journal\nWrite negative mental patterns you recognize in yourself.\n\n\n\n\n\n\n\n\n\nMental patterns that reinforce your positive motivation:\n\n         I can do all things through spirit and strength and love.\n\n         I am the recipient of perfect love and joy.\n\n         I am worthy to experience all that life offers for good.\n\nWrite positive mental patterns you wish to create.\n\n\n\n\n\n\n\n\n\n\n\nYou create your own mental patterns that will alleviate your\npersonal pain, resistance and lack."}, {"id": "L3_25", "level": 3, "type": "lesson", "lesson_num": 25, "title": "LESSON 25", "subtitle": "BLUE", "color": "blue", "content": "COLOR RAY: BLUE\n                      The Light of Wisdom\n\nSpecific Level Function\n\nWithin the mental nature, this frequency acts to release fear and\nrage, stemming from hidden anxieties that lie within the\nconsciousness of your own mental patterns. Patterns that come\nfrom false ideas and beliefs cause guilt and self-inflicted shame.\nThe energy of the Wisdom Ray releases these imprints when you\nrecognize which ideas are causing the negativities in your life. As\nyou heal from the fear and rage, the frequency of the Wisdom Ray\nbrings into focus a sense of inner peace as you release the\nconditional patterns of thought that act as impostors to the truth.\n\nAs you review the lessons in the first and second levels, you will\ncome to a greater understanding of its impact on your own\npersonal mental nature. Remember you are in charge of your own\ngrowth; no one can do it for you. A master cannot change your life,\nper se, but the energy, light and new understanding will change\nyour perspective on life and present you with opportunities to meet\nchallenges that may have contributed to negative karmic patterns.\nWhen you meet with your personal lessons, reaffirm your faith and\nknow that you are in the hands of higher order and guidance will\ncome to you.\n\nConcentrate on your particular patterns of thinking that may be\njudgmental from false-to-fact sources. Think on what you accept as\nnegative truth. I may be a wrong pattern and create resistance to a\nmore positive focus in life.\n\nYOGANANDA -Truth\n\nStudent: What is truth, and what is the proper method to ascertain\ntruth? Is it through reading of voluminous materials, through the\nlight classes or through various studies? Is there a short cut to\ntruth?\n\nMaster: To read the works of other men can stimulate the\npersonality consciousness to recognize what is truth. Remember\nalthough inspired by the higher self, all works of men must stem\nfrom man's mind.\n\nOne knows truth as one puts it into practice. You can accept an\nidea, but the idea only becomes a reality through practical\napplication. If a supposed truth comes to you and yet it is an\nunknown truth, put it aside until it can reveal itself to you through\nits own application.\n\nTruth does not come through books. Books do not make one an\navatar or master of mind or thought or consciousness. They can\nonly acquaint the conscious mind to concepts, which reveal aspects\nof truth and wisdom.\n\nAt this moment, you desire to be an open vessel and to have all\nknowledge poured forth into your consciousness. Should you stand\nin a place and suddenly become aware of all the truth of the\nspiritual realms of the Universal Knowledge of the Christed\nConsciousness, it would be more than your physical body could\ncontain. It would be impossible, at this point, for you to remain in\nthe physical under such sudden awareness. However, be patient.\nAll things must come through their own evolutionary process. The\ntruth is revealed in many ways, but, The greatest truth is what\nyou come to know through your own individual experience.\n\n            Yogananda - Knowledge as Evolutionary\n\nStudent: Master, you have spoken often on the topic of truth. The\nthing that troubles me is that knowledge seems to have been given\nto civilizations, which rose to peaks and then collapsed. The\nknowledge was lost or went underground, but then rose again. The\nancients might well have known the knowledge we do not have\nnow. Why is this so?\n\nMaster: This is very difficult to comprehend, for if we proceed to\nsee man as an evolutionary consciousness, then why does it seem\nthat there have been heights of emanation of knowledge and then\nlows following the heights.\n\nFirst, spiritual truth, concepts and ideas have always stemmed from\none's realizations, contemplation, inspirations and messages from\nthe etheric realms, or from those who have perceived the workings\nof the hierarchy. As this information is sifted through consciously,\nit is recognized in language and verbiage according to that\nparticular culture and evolution based on the acceptance of mass-\nmind thinking.\n\nCivilizations in the past, such as the Roman Empire, were built\nfirst upon the idealism of man being a personage under a god or\ngods. The building of these civilizations took place step-by-step\nthrough the accumulation of riches and creative ideas and\nexpanded knowledge, be it technical, scientific, mathematical or\nphilosophical. The more the education of these ideas was given,\nthe more stimulated humanity became in manifesting these ideas.\nHowever, where there is the evolutionary process, there is always\nthat which causes splits, that which is a destructive and negative\ninfluence.\n\nThere are always those whose minds swept up in their own self-\naggrandizement proceeding to emanate a kingly aspect and enslave\n\nothers. When one becomes a power structure and accepts the\nresponsibility of growth for the masses of people, there is the\ndeviation and dissipation of the power. The more man becomes\ncentered on self and away from the consciousness of humanity, the\ngreater the karma becomes. Man's self-indulgence weakened the\nmind and weakened the spirit, and he began to distort and break\nkarmic law.\n\nCivilizations have risen to offer opportunity of high creativity for\nthose souls who desire to express, know, and create within the\nearth. Nevertheless, the heights have always reached a point where\nthe dissipation of understanding occurs. In the Aquarian Age, there\nwill again be an opportunity for the masses of people to rise out of\ntheir animalistic consciousness into higher, Christed Awareness,\nand to begin to build, at a world level, a civilization of challenge\nand creativity and abundance. For this to take place will require\nmany masterminds and master builders to dissipate negative\nconsciousness.\n\nAt this moment in the earth, there is little unification. There is\ndissension in all areas. So, it is a tremendous project both for the\nmasters and the hierarchy, as well as for awakened souls to fulfill\nthe divine purpose. Remember, technology was gained through\ntremendous awareness, but there was also involved a destructive\nconsciousness of offering up humanity as sacrifice to the gods.\nThere was always the warring, the seeing of brother as enemy.\n\nLook through mythology, through the illustrated stories of the\nwarring of the gods, such as the Iliad and the Odyssey. These were\ninsights and symbolic lessons given with regard to the many\naspects of man and his conflicts. Then look into your own life\nexperience to draw similarities of conflict within your own life.\n\nAll technology and knowledge is sifted through man's\nconsciousness, but this has not brought spiritual light or Christed\n\nAwareness. These must be brought into the earth to achieve true\nbalance.\n\nSPIRITUAL LAW #3\n\nYou shall not take the name of The Lord, thy God, in vain, for he\nwill not hold him guiltless that taketh his name in vain.\n\nAgain, the LORD is to be understood as the law. You cannot take\nthe law in vain. You cannot ignore it or pretend that it is not there.\nYou cannot escape from spiritual law.\n\nEach and every soul is subject to spiritual law, and you cannot be\nheld blameless if you break the law. Every soul in the earth and\nbeyond the earth in universes is under the same spiritual universal\nabsolutes. The Law of Cause and Effect is an absolute; what one\nputs into motion, one receives.\n\n                     Personal Journal\nWrite in your Personal Journal any dreams you remember.\n\n\n\n\n\n\n\n\n\n\n\n\nForgive, once again, all conditions imposed on you by others out\nof their ignorance.\n\nI forgive"}, {"id": "L3_26", "level": 3, "type": "lesson", "lesson_num": 26, "title": "LESSON 26", "subtitle": "EMERALD GREEN", "color": "emerald", "content": "COLOR RAY: EMERALD GREEN\n\n                    The Light of Creativity\n\nSpecific Level Function\n\nOnce again, you are working within this beautiful Emerald Green\nRay, which challenges your growth, objectivity and\ncommunication skills. Remember, this is the frequency associated\nwith Mercury, the messenger and carrier of news.\n\nReviewing the previous lessons, you once again discover their\nrelation to your throat area and your personal desires in work and\ncreative endeavors. Within the mental nature, the Emerald Green\nlight brings a clearing of low frequency vibrations that block the\ncreative nature. The light moves to break through the personality\nego's images of lack and limitation, as well as any images of\ninferiority and unworthiness.\n\nThe Emerald Green Ray works to dissipate all “limiting factors of\nmind” as to personal supply, latent talents and the ability to express\noneself. It brings forth the creative ideas for manifesting goals,\ndesires, abundance and all personal needs.\n\nThe Emerald Green light works to train the thought processes to\nflow with creativity, the pure creativity that is uniquely yours. It\nbrings the polarity and balance within mind in order to affect and\nactuate communication with the higher self, the co-creator, in order\nto manifest your creativity and abundance.\n\nMessage #1\n\nAzreal - Greetings, dear students of light, it is again with great\npleasure I greet each individual. This evening, I wish to portray to\nyou your own individual portrait of self. You have been told\nthrough previous readings that we perceive you from the inner\nrealms in a much different view than you perceive yourselves. In\nthis session, we wish to delve deeper into what is perceived as the\nhigher consciousness.\n\nAs you relate to the aspect of self-called the creative mind, the\nprinciple of thought, the divine essence, these properties are a part\nof your own incarnating self. This self is a beautiful individual\nessence of pure radiant Golden light. Its dimensions are\nimmeasurable. It is the higher self, the over soul, that part of you\nwhich has all the wisdom of the ages and the knowledge and truth\nof all your experiences through many, many life forms.\n\nThis incarnating, immortal aspect is brilliant in essence. Its\nfrequency, tone, and light are far beyond what is recorded by the\nphysical self. The immortal, the incarnating self is the source, the\nstuff you are connected to in receiving Universal Consciousness\nand the Christed Spirit. Within this individualized, immortal\nincarnating self is the creating of the consciousness of your own\nsoul.\n\nThe soul, as we perceive it, is a beautiful essence of many color\nrays and lighted sparks each centered along an axis. This is all in a\nhigh vibration. Your soul is the “receiving station” of the immortal,\nincarnating self. Each center is the power center to direct the\nfrequencies through the dimensions of the four lower bodies.\n\nIn this moment, we see beautiful points of light moving in many,\ndimensions, reaching out far beyond your thought. Before an entity\nawakens to the reality of this aspect, there is little communication\n\nbetween the personality ego and these inner dimensions. However,\nas you become aware and consent by the personality ego, to be a\ncooperative instrument for the higher self, you consciously begin\nto move into the centers to release the rays in and through the\nlower natures and bodies.\n\nAs you are concentrating within the creative center, you are\nreleasing the tremendous power of the Emerald Green Ray, which\nbegins its activation through the physical body and through the\nother dimensions bringing a clearing to all the lower frequencies\nthat would block your own creative nature. It is a remarkable sight.\nNotice students that much of what you are experiencing is still\nminute compared to what you will truly understand in later lessons.\n\nAs you move in this frequency through the following week and\nmagnify this aspect of self, train your thoughts, your conscious and\npersonality ego thoughts to flow in its pure creativity. Release all\nconcepts that appear as blockages and know that the power of life\nand love and purity is deep within you. Your creativity expresses\nindividually in many ways.\n\nYou each communicate through different dimensions of thought\nand concepts. The deepest, purest form of communication is the\nessence of light that flows through your own pure thought. You are\ntruly the transmitting and receiving stations of your own creative\nmind. What you project is deeply affecting many, who come into\nyour vibration. It is a service, not only to self, but also to all\nhumanity. The blessings of the teachers move with each of you.\n\nWe wish to bring some thought with regard to the concept of\nkarma. Know, dear beloved, karma is a word attached to\nexperience. Experience can be either an uplifting, creative process,\nor a maze in which you are swept up into energies of very low\nfrequency, causing a confused mind setting up certain incidents\nthat bring challenges to your understanding.\n\nAs you move through the evolvement of the soul into greater\nrealization, you begin to recognize the creative good karma\nbrought into your life. That is the reaping and harvest of long\nimplanted desires of beauty and of those experiences set in motion\nthrough paths of negativity. The Law of Grace sets your feet into\nthat awareness where you have the choice to become free from the\nrealizations and processes of negativity. It is correct. The path of\nGrace is truly expanded and multi-dimensional.\n\nWe leave each of you now with this thought: You are co-creators\nwith your own higher nature, attuned to the Christ Awareness.\nWalk in total assurance that your life is a beautiful expression of\ngrace. Blessings come to each of you.\n\nYogananda\n\nDesires: Creative Nature of your Human Consciousness\n\nDear students, I greet you in the name of your Master Jesus Christ,\nand my Master Babaji. Be at peace.\n\nYou are as beautiful rainbows this night as the flame of each color\nis rising throughout your system and moving out into many\ndirections. This evening I wish to speak to you of the desires, the\ncreative nature of your human consciousness and of your\npersonalities and the creative divine desires of the soul and the\nhigher nature.\n\nWe perceive at times, a battling going on between these different\npersonality egos - the soul ego and the higher self, each working\ntowards manifesting their consciousness. On the one hand, at the\npersonality level, there are many desires to fulfill the senses of the\nbody, of that which will help your personality be more acceptable\nto those you come in contact with, to your peers, to society. The\n\npersonality judges itself according to what it perceives in other\npersonalities. Do not compare yourself with other personalities.\n\nJust because one is manifesting a lifestyle of worldly possessions\nand dynamically moving in a creative and materialistic world and\nreceiving much abundance, it does not mean this personality is at a\nhigher consciousness than you. Even though your lifestyle may be\nsimple, your lessons are different.\n\nEach of you lived lives of abundance and authority with success at\nthe material level. Because of these former lifestyles, many karmic\nsituations come into play. Each of your souls as they incarnated\ninto this life committed themselves to manifesting the inner spirit,\nthe divine essence. This can come about by releasing the\npersonality egos from being caught up in awe of power, prestige,\nstatus and comparison with one's peers.\n\nNow, this does not mean that your lives are to be lived in poverty\nor in lack or in want. The higher self, slowly manifested through\nall levels of your being, draws into its experience the supplies, the\nmoney and things needed to further the work.\n\nI remember well, Master Babaji came to me one day for, at my\npersonality self; there had always been a desire to live royally, to\nhave gold and treasures and to live like a king. Before I could\nascend to the level of master, I needed to experience this in my\nlife. Therefore, it came about that I was able to move into this\nbeautiful abode of much treasure and gold. But, once within this\npalace, once the desire had been achieved, there was that which in\nme needed no more. I was released and could move on.\n\nSo, my students look upon your own individual lives as a step-by-\nstep process to bring karma into balance. Prepare the body, the\nmind and your soul to walk the path towards mastery where you\nwill create your environment, where you will draw all those desires\n\nto fulfill the needs and feel no guilt about what you may have or\nmay not have all your desires manifest in this life experience One\nof the downfalls, one of the lacks of my own people - of those\nsouls who dwelt in the Far East - was their personality egos\nbecame so ashamed of desiring any materiality, that their natures\nbecame passive. Often content to sit in silence and let the rest of\nthe world become involved, they removed themselves from the\nworld saying, “I am more spiritual. I have no attachments.”\n\nIn the western world, the pendulum has swung to the opposite.\nHere, man's drive is to only satisfy the personality with all the\nmateriality of life, forgetting the inner spirit, forgetting that the\ninner spirit is the creative source. My beloved students, there must\nbe the balance. Discern within yourselves, those who move into\nlife with joy and creative aspirations, constancy and the spirit of\nthe divine principle in all their activities and see their world is\nabundant.\n\nThis week, as you work in the radiant flame of the Emerald Green\nlight, magnify your own creativity. Accept the higher self is\ndrawing to itself all the opportunities to manifest these goals.\nKnow that each of your goals will be a source for sharing as a\nbeacon of light to those around you.\n\nSPIRITUAL LAW # 4\n\nRemember the Sabbath day, to keep it holy. Six days shalt thy\nlabor and do all thy work, but the seventh day is the Sabbath unto\nthe Lord, your God. In it, you shall not do any work, neither you\nnor your son or your daughter, your manservant, your maidservant\nor your cattle or the sojourner who is within your gates, for in six\ndays the Lord made heaven and earth and the sea and all that is\nwithin them, and rested on the seventh day. Therefore, the Lord\nblessed the Sabbath day and hallowed it.\n\nThis commandment is a symbolic one and many who have taken it\nliterally have guilt, as they are unable to fulfill it. Taken literally,\nyou will find it impossible to follow, as mankind cannot stop all\nthat needs to be done on one day of the week. Hence, there must be\na deeper meaning to it than the literal translation. Let us first\ndecide what the Sabbath means.\n\nSabbath was, in those days, a time for regrouping and reforming\nthe purpose of their goals. It was a time of releasing the cycles and\nof basking in the spiritual, ritualistic ceremonies. It was a time\nwhen the people were taught by the prophets, of the innermost\nHoly of Holies, - within self -, represented by the ark. In those\ndays, it was not impractical to put aside the struggles of their daily\nlives. They could rest and be at peace without the totality of\ncivilization shut down, so to speak.\n\nIn this day, it is impractical for man to put aside one single day in\nwhich nothing of materialized work takes place. But, the law is\ngiven. So what does it mean?\n\nSABBATH means House of the Lord, or law or your higher\nconsciousness. This is the Mind - to keep it holy, not letting impure\nthoughts reach your Higher Mind or even the conscious mind. All\nmust regroup their own forces. Move into the Sabbath, which is the\ninner sanctum of your own being. Each takes time to go within and\nmeditate.\n\nTake into consideration “meditation.” This would be the keeping\nholy of the Sabbath. You meditate and in meditation, you let go of\nthoughts that interfere with your centered consciousness.\n\nWhat of thoughts?\n\nSONS and DAUGHTERS are your ideas, your concepts that are\nborn out of the unknown.\n\nMANSERVANTS and MAIDSERVANTS are the thought images\nthat deal with the mundane consciousness, the practical thoughts\nthat work and try to accomplish your ideas and concepts.\n\nCATTLE are your animal thoughts, thoughts of your lower nature,\nsuch as lust, greed and hate.\n\nSOJOURNER is the thought image that comes from afar and\npasses through your visualization, the thought that comes and goes,\nand daydreaming type of thoughts.\n\nThe law talks about moving into meditation and being free from\nany imagery or consciousness, totally enveloped in the inner\nsanctum of the Holy of Holies. The law is: the holy of holies must\nbe free from any mundane consciousness. Let nothing interfere\nwith your communion with God or your higher self.\n\n                      Personal Journal\nAffirmations\n\n        I affirm that I am creating my goals.\n\n        I affirm that I am guided in my direction.\n\n        I affirm that I create all I need to achieve my purpose.\n\nWrite your own affirmations:\n\n\n\n\n\n\n\n\nWhat are your thoughts on money?"}, {"id": "L3_27", "level": 3, "type": "lesson", "lesson_num": 27, "title": "LESSON 27", "subtitle": "VIOLET PURPLE", "color": "violet", "content": "COLOR RAY: VIOLET PURPLE\n                      The Light of Divine Will\n\nSpecific Level Function\n\nAs you move into this energy once again, you may discover\nactivations of your ill-will rages that rise to the surface. From this,\nseek to understand the attitudes of yourself and others that cause\ndifficulties with your will.\n\nWithin the mental nature, the Violet Purple Light works to\ndissipate those thoughts and mental concepts dealing with ill-will,\nthe manipulative consciousness, self-aggrandizement and self-\ncenteredness. It is directed to release negative images that are\nharbored by the personality ego.\n\nViolet Purple brings to the surface aspects of the personality ego\nthat is determined to control its own destiny and creation\ndetermined to have its own way. It releases the thoughts that\nproduce fears relating to self-image and thoughts that bring about\nfrustration within the personality.\n\nThe Violet Purple Light Ray then moves to instill mental concepts\nof understanding, love and blessings. It brings these blessings into\nmanifestation. It brings all aspects of the personality into harmony\nwith the higher will and the true divine purpose. Be patient, it does\nnot happen overnight.\n\nMessage #1\n\nJove - Greetings, dear students of light, this is Jove. It is with\npleasure that I speak with you. Many are concerned for the\nnegative aspects of this Violet Purple frequency of light. It is a\ndifficult frequency to flow with when being activated through the\nnegative factors of life. It does manifest in the form of frustration,\nill-will, temper and anger. However, the blessings of this frequency\nfar outweigh the lower aspects.\n\nThis is the frequency ruled by the planet Jupiter, which brings\ntidings of good will into all lives. It is the gift of joy. It is the gift\nof lightness. It is the gift of many blessings. Each of you should be\naware of your individualized astrological chart to tune into the\nposition of the planetary influence, in order to discern the highest\ninfluence of these energies in your own individual life's path.\n\nBe patient with yourselves. It is unnecessary to perceive the radiant\ncolors, but it is exciting to the personality when the awakening\noccurs to truly experience the light. Many see the light and are\nunaware. As you go deep into the silence and release the\nblockages, it is certain incidents of fear that keep you from flowing\ndeep into the inner spaces. When you truly begin to flow, you will\ntruly see the movement of light in many radiant hues, especially\nwhen you are moving on one particular ray as this is the “higher\npurpose” light.\n\nAsk yourself in the following week:\n\n         What is my purpose?\n\n         What is the highest will?\n\n         What is the soul's desire to project in my life?\n\nAs you move in the silence of your meditations, listen for that\nstirring and feel the lifting, the floating feeling, and the sensitivity\nof vibrating in a very high and fine rate.\n\nThe purpose of A Course in Light is to develop good will and love\nin every aspect of your being and in every encounter with each\npersonality.\n\nThe higher will is that which perceives the inner being and\nmagnifies the depth of that being through eyes of compassion and\ngood will. Many of you encounter hatreds, resentments and\nbitterness in humanity. Many light students are in positions in\nwhich they must deal in everyday life experience with the polluted\nthoughts and the polluted consciousness of the animalistic nature.\nYou have encountered these positions to dissipate these thoughts,\nthrough the frequencies of your own consciousness. Look beyond\nthe turmoil and yet, do not condone but enforce the knowledge and\nspiritual Law of Justice in each experience.\n\nYou are co-creators with the highest divine mind and you\ncontribute and create good will or are swept up in ill will. The\nlessons before you in the following week will magnify each aspect\nof those entities that project the egoism or self-hatred or bitterness\nor anger or fear. Much of ill-will stems from fear of self, fear of\nbeing unloved, fear of rejection and fear of being unacceptable\nsocially. Many act out of pure self-preservation under the guise\nthat they must win through violence, through the enforcement of\nself-ego on lesser, weaker entities.\n\nMagnifying the frequency of this particular ray protects your\nenergy field against these vibrations. It will not be noticeable to\nyour conscious mind the effects of the frequencies you emanate\nand very often you will feel the brunt of the negativity. This is not\nfailure on your part. It is absorbing and experiencing the truly\n\nheavy violence. But, with each thought directed through the higher\nwill, you are adding power to the higher frequencies.\n\nDo not judge the outcome. Accept the reality that the seeds of good\nwill you plant in your life will bring their harvest of abundance and\ngifts of love.\n\nEach of you has your own individual needs, desires, and\nchallenges. All things will not manifest in a day or two, but you are\nbuilding solid foundations upon which you can rely that the truth\nwill set you free from those chains that have imprisoned your\nemotions and your mental concepts.\n\nMany blessings to you, let the light, the good tidings and the\nabundance of gifts of this frequency be acceptable in your life.\n\nYogananda on Higher Will\n\nStudent: Master, how does one discern between the higher forces\nand the lower forces, the Christ and the anti-Christ?\n\nMaster: The antichrist is called the deceiver. The antichrist has\nbeen called the manipulator. The antichrist is that which conceals\nits motivation and truth through cunning, through manipulation,\nthrough the appearance of order. The negative Christed forces will\nuse any means to divert a lighted one from proceeding along the\npath to higher evolution.\n\nIts tools will be through the “puffing-up” of personal ego, or\npromising wealth, abundance or power into the hands for self-\naggrandizement. The negative Christed forces will twist the\nrational nature, the spiritual ideals. The negative forces against the\nevolution and manifestation of Christed Awareness will use means\nto pull away a high soul from proceeding along the path to greater\nillumination.\n\nYou detect these forces through being overpowered and making\ndecisions against your own will. You feel the forces of these\nnegativities through a quickening within that causes disharmony, a\nsense of guilt, a sense of backing off, of moving against a wall in\nwhich you feel extreme conflict. These negative antichrist forces\nmove through many areas, through many minds and through many\nexperiences.\n\nStudent: Master, how does one discern between the higher\nconsciousness expressing itself through the personality level, or\nbeing manipulated by forces that would cause conflict with\nChristed Awareness? How does one know when the higher will is\nflowing and the self-will is blocking?\n\nMaster: The higher will is energized through the awareness of love\nand the consciousness of the masters and teachers. The higher will\nexpresses itself through humanitarian understanding, through a\nconcept of enveloping all into a lighted path. It is not concerned\nwith who is to be first or who is to be last. It is not concerned as to\nreceiving reward, recognition, or being swept up in states of\nadmiration and adoration.\n\nSelf-will is demanding, self-will is commanding, self-will is\nprojecting thoughts and curses against the flow of the masters.\nThose who delve into the mind-control without the utilization of\nspiritual law, can use their conscious mind and the power of the\nunconscious to control others into states of enslavement to perform\nacts without regard for the good of humanity.\n\nStudent: Master, how does one know whether a soul has attached\nitself to the evolutionary or the counter-evolutionary forces?\n\nMaster: One knows this through inner instincts. It knows through\nits (the soul's) actions, through its outer experiences. The\nrecognition comes very subtly. A counter-force is one who sends a\n\npersonality off into states of lust and greed and power and total\nself-aggrandizement, total self-indulgence and total self-\ncenteredness, regardless of the cost to another human being.\n\nA soul caught in the counter-evolutionary forces has no conscience\nwith regard to its brother, with regard to humanity, collectively or\nas individuals. It can only perceive itself as being the center of its\nown universe and must achieve the power to stand as a force over\nand above others.\n\nStudent: Master, how does one exposed to all the teachings of\nlight and love and the Christ become swept up into negative\nforces?\n\nMaster: You know the teachings of Christ. You know that the\npower of the Christ is only that which is concerned for projecting\nperfect love, perfect harmony, and perfect will into the highest\ngood for all peoples concerned. It is not centered on self. It is not\ncentered on power for the purpose of sweeping others into one's\nown self-will. The Christ is that which is universal, is that which\nencompasses all personalities into an aura of absolute light, love,\nhealing and perfection.\n\nThe process of becoming swept up in the negative forces comes\nabout through the images of personality ego that seek to project\nself in all aspects. They use the power and light to manifest self-\nwill, rather than releasing one's self-will and allowing the higher\nwill to express itself in and through the personality.\n\nBe aware that wherever there is the light, there also is that which\ndesires to snuff it out. Wherever there is a group of lighted\nworkers, there also is a band of counter-forces, which desires to\nseparate, deviate, and bring chaos, confusion and crises. The\ncounter-forces move through human thought, emotion. You must\ndiscern for self as to what forces you are feeding and accepting.\n\nMessage #2\n\nAzreal - Yes this is Azreal. We are most pleased to greet you.\nTruth is presented in awareness, by freeing yourself from a sense\nof being in loss. Let go. All things are in their rightful place.\n\nDifficulties are in motion on many levels, difficulties from\nplanetary vibrations, meaning that as the shift from one phase of\nlife moves to another, there are internal traumas that are\ndeveloping in the human ego system. You are all portraying that\neffect within your individual consciousness. However, you are also\nbeing prepared as leaders in the flow of the shift from one\nperspective to another. You are being prepared very precisely,\nthrough your own individual experiences. It may appear to you that\nyou have little power and are powerless, but you are in a form of\npersonal evolution that is guiding you towards an ultimate goal.\n\nYour work may heal; you may be in the process of observing how\ndisease occurs through emotional and mental disruption.\nAlternatively, your work may lead you into negotiation and acts of\nagreement, teaching and preparing others for the way to lead the\nmind in higher thought in a more perfect expression. Accept your\nare guided through many traumas of your individual life. Let it be.\nFlow with what is, recognizing your survival will be in perfect\nintent. You will not lose what you need to express. You will not be\nundermined from the power you need to create the goals you have\nset for your individual being.\n\nThe difficulty in this lesson is faith, being in focus with the divine,\nthat there truly is a power beyond the act of your own person and\nwill. The lesson is to acknowledge that your self-powerlessness\nmay attune to your daily actions, but the truth is that the power\nwithin will manifest in consciousness and bring you out of turmoil\ninto peace. The overview is that you are being empowered with\nlight; you are being empowered by consciousness of change. You\n\nare also lending power to others to help uplift and heal what is in\nresistance and pain.\n\nTonight we perceive that there is an important event in the earth.\nFocus now on the next shift of the collective consciousness of\nnations and human society, as the powers that govern the nations\nrecognized as the leaders of the planet. These particular\nnegotiations being prepared are to be focused on by you and all.\nFocus on the concept that the truth is: War has met its match, with\nall of its weapons which have brought man to the table,\nrecognizing that the power to annihilate all that is and the power to\nmove beyond annihilation is now in the hands of the new\nexpression for living and life. New changes in the society and\nsocial systems must arise from the consciousness of the inner to\nthe outer. The meeting of minds must come to a focal point of\nreleasing this trust and binding in contract with integrity and will.\n\nThis is most difficult. The old is bleeding through to the new. The\nnew is not quite the true vision it is to become. Nevertheless, the\npowers are moving and it is in rightness with the now.\n\nSo each of you focus on this activity being infused with divine\nlight, being infused with the consciousness for the greater will to\nmove forward into a more empowered state of right action. This\ntremendous issue lies in the hands of many and few and the power\nto bring these into a sensitivity and sensibility is at the forefront.\nWe are most concerned. The timing is “in right action with higher\nwill,” but planetary influences may present fear of moving forward\nwith the higher planes in consciousness. There will be certain\ndetriments in effect, but perceive the outcome bringing a\nmovement for greater good.\n\nNow perceive: you are one, you are many and multitudes of many\nwho are of one mind directed to bring peace inward and outward.\n\nLet go of your own personal struggle, let go of the fear of failing.\nFocus on wisdom, strength, love and truth.\n\nSPIRITUAL LAW # 5\n\nHonor your father and your mother that your days may be long in\nthe land, which the Lord, thy God, gives you.\n\nIt is beautiful to love one's parents, to give them love and honor,\nbut this will not guarantee long life. Besides, some parents leave\nmuch to be desired when it comes to honoring them. So, let us look\nfor a more spiritual meaning.\n\nAgain, each of these laws was given for a practical reason--to give\nlessons or guidelines for life expressions. Love was unknown in its\ntotality in those days. Each life was frequently considered an\nunimportant event. Oftentimes, the youth or parents would be\nseparated by time, place and ideas such as it is today.\n\nThis law was given to the children and to all to recognize that the\nwisdom of life come through age, through experience and through\ntime. Each one must respect the life experiences, wisdom and\nknowledge gained through their particular life expression.\n\nAs one looks into the life experience of parental heritage, one sees\nreflections of one’s own life. As you understand the basic\nprinciples from which your own hereditary consciousness stems,\nyou are able to bring greater understanding into your own life\nexpression.\n\nMOTHER and FATHER are symbols of your higher self.\n\nFATHER symbolizes the intellect, the masculine principle, and the\ndynamic aspect of your being.\n\nMOTHER symbolizes the soul, the feminine principle, and the\nmagnetic aspect of your being.\n\nTHE LAND WHICH THE LORD, THY GOD, GIVES YOU is the\nconcepts, the ideas that your soul memory takes with it as it\njourneys into the etheric land or land of spirit.\n\nYour mind, in perfect balance, must have intellect and reasoning.\nHowever, without emotion and feeling, you would be out of\nbalance. The same is true if you are all feeling and emotion, and\nhave no intellect. You cannot deny one aspect and be in balance.\nYour life cannot be whole if you are overly magnetic or overly\ndynamic, or totally dissipated of any of your inner energies. The\ncosmic father and cosmic mother are those aspects of higher self\nthat must be brought into the earth, grounded into every part of\nyour being.\n\nTo KILL, to end a life, is placing self as a god. It is the placing of\nself in judgment of that one's life expression, denying the soul its\ncreative resource.\n\n                      Personal Journal\nWrite your own affirmations:\n\n\n\n\n\n\n\n\n\n\n\n\nWrite of any mental images of ill will or rage you feel."}, {"id": "L3_28", "level": 3, "type": "lesson", "lesson_num": 28, "title": "LESSON 28", "subtitle": "RUBY RED", "color": "ruby", "content": "COLOR RAY: RUBY RED\n                  The Left Hand of the Physician\n\nSpecific Level Purpose\n\nThis Ruby Red energy, called the left hand of the physician, when\nactivated helps release the anger and rages coming from\ndisillusionment in love, inter-personal relationships and from hurts\nof the heart. A passage from the “Ancient Mystical White\nBrotherhood,” by Fraer Achad, states what happens to the\ncountenance when a man is thinking in terms of love.\n\n “The eyes sparkle and twinkle as the stars at night, the face beams\nwith the radiance of the sun, and the voice sounds as many rippling\nbrooks.” That is prayer.\n\nThoughts of Anger are but a perverted form of prayer.\n\n       Q: Had you ever thought of this? Why does someone speak\n       with contempt and viciousness?\n\n       A: Because it has been storing up all manner of thoughts\n       contrary to truth. Let the occasion present it and that which\n       has been stored up comes forth.\n\nWithin the mental nature, the Ruby Red Light is directed to release\nthe preconceived ideas and images within the brain-mind and\nmemory bank created by the personality ego causing\ndisappointment and disillusionment in interpersonal relationships.\nThis energy works on those mental concepts that result in\nmisinterpretations of love and misinterpretations of purpose in\n\nrelationships. It releases the bitterness, the resentment of all\nnegatives created within past relationships.\n\nWithin the memory bank of the brain-mind consciousness, the\nRuby Red Light releases the karmic thought vibrations that keep\none emotionally attached to past relationships, friends, loves and\nfamily that would continue a harbored pain.\n\nThe energy of the Ruby Red Light objectifies healing through\ndivine love in all the lower bodies. It brings one to an acceptance\nof all individuals with Christed Awareness, thus freeing one from\nkarmic situations.\n\nVisualization\n\nYou may have a certain area of your life you feel is still in need of\nhealing or perhaps there is a physical problem that still is not\ncleared up. It is time to do some real concentration in those areas in\nneed of healing.\n\nBegin your relaxation and deep breathing, activate all the centers\nof light and move into the center of the Radiant White Light and\nask the presence of the masters and teachers to work with you.\nBegin to visualize what is in need of clearing.\n\nExample: An interpersonal relationship is causing a great deal of\nstress as the woman's intentions are for a long, enduring, loving\nand caring relationship. However, the man of her intentions is\nreluctant and withholding his affection and loyalty.\n\nFirst, the woman must release this man to his own perfect reality.\nShe must release all anger, blame, and self-negation, seeing within\nherself the true beauty and love she is. She must release the idea\nthat he is the only intent of her life.\n\nNow the visualization must begin by affirming that love is in and\nall about her and she is receiving all that is necessary for her\nhighest intent. Visualize the love bond that exists as being in its\nabsolute perfect intent. Affirm only that there will be a perfect and\nabsolute divine manifestation to bring peace and love into her life.\n\nVisualize an absolute love relationship that is in perfect harmony\nwith her goals and spiritual intent. Perceive the Radiant Ruby Red\nLight moving in and throughout the total situation. As this\nmeditation and visualization occurs and repeated for 21 days, there\nshould be a wonderful result.\n\n         Example: There is a physical problem, such as blurring in\n         the eyes.\n\nFocus all thoughts into the forebrain. Rise up into the Radiant\nWhite Light. Activate all energy centers or vortexes and move\nback with awareness into the Radiant White Light. Ask the\npresence of the masters and teachers to be in your presence and for\na clearing in the vision of your eyes.\n\nAsk what you are afraid of seeing, what areas of your life are you\ncloudy in insight on? Focus on any area of your present\nexperiences; those causing you pain to look at. Now begin to see\nthe Radiant White Light on the situation and totally see that it is\nworking out in its own perfect way.\n\nFocus the energy of the Radiant White Light on the eyes. Hold this\nenergy, perceiving that the outer eye and inner eyes are all being\nenveloped by the Radiant White Light. Perceive all cloudiness and\nnegativities released into the White Light.\n\nNow affirm there is perfect vision within and without and you are\nseeing with clearness and perfect insight. Release the healing to the\nhigher self and accept your manifestation according to the Law of\n\nCause and Effect. Give thanks for the perfect solution that comes\nfrom the higher law. Give thanks to the Creator Father-Mother-\nGod for all that you receive and release it all to its greater outcome.\n\nMessage # 1\n\nAzreal - Greetings, dear students of light. This is Azreal speaking.\nThe radiance emanating from each of you is very brilliant and\nbeautiful. The work activated at this time, is very important in each\nof your lives. The repairing that is taking place is not only working\ntowards bringing balance into all the organic structures and cellular\nstructures of your physical bodies, but much vibration goes out to\nbring the release of bitterness, resentments and negativities created\nthrough your interpersonal relationships.\n\nEach one has had in their life certain entities that bring to mind\nmany thoughts of being put-down, of not living up to full\nexpectations, and disillusionment. All these images are created by\nthe personality egos through misinterpretations of love and\npurpose. Therefore, very often, as you were experiencing the\nbeginning stages of growth, you felt the tremendous injustices of\nparenting, for they saw in you many things, which you were not\nready to bring forth.\n\nLove is a very beautiful, beautiful vibration, but as interpreted in\nthe physical, human level, it becomes filled with many distortions.\nMy dear beloved brethren, look to your fellowman, to those who\nare close to you with new eyes, with new vision, with new\nconcepts. As you embark on new relationships, seek to see the\ninner spark, the divinity of the individual. Do not set upon that\nindividual image according to your ideals.\n\nVery often, in interpersonal relationships, there are created\nidealized images and the falling in love begins to be associated\nwith the idealized image. When the personality ego is less than the\n\nidealized concept the images of disillusionment begins to run\nrampant and the interpersonal relationship creates many\nnegativities. You are here in this work to be healers, to be light\nworkers, to be pioneers of the Aquarian Consciousness, which\nwould necessitate you perceiving all life from a very different view\nthan you perceive it at this very moment.\n\nWhen a new babe is brought into the earth and the arms of the\nmother envelop the child, there is pure love. There are no\npreconceived ideas; there is only total acceptance. The bond,\nwhich is established, is very pure and very strong. That moment\nhas such impact at the soul vibration that, regardless of how many\nyears and spaces of time and spaces of distance develop between\nthe child and the Mother, the bond is always there. The same is\ntrue of the bond with the Father.\n\nEach of you has come into this earth to fulfill the karmic bonds\nthat have brought you back into this experience. In the following\nweek, as you move into this frequency of light, think on these\nbeginning, early stages. Visualize those entities surrounding your\nchildhood totally encompassed in the radiance of this frequency of\nlight to release the heavier, gross thoughts that have developed\nover the many years.\n\nSome of you have experienced extreme negativities, injustices, and\ndifficulties beyond the average entity. Hold each of these\nmemories to the healing ray and know that as you project this\ndivine radiant frequency of light, you release the karma. You lift\nyourself out of the karmic thought vibrations and into the Law of\nGrace in which all things come into balance.\n\nTo you who have experienced the disillusionment of love in\ninterpersonal relationships with lovers, those, too, have been soul\nbonds established. If you could see it from the higher realms, you\nwould see many, many waves of thoughts moving between these\n\nlovers. You would see a cord reaching from your own heart center\ninto the centers of the hearts of those who have given themselves\nto you and you to them. Along these cords are many frustrations,\nmany aggravations, much disillusionment and bitterness.\n\nBring each memory, each consciousness of love relationships into\nyour own meditations and perceive these entities released from all\nnegative thoughts you have projected to them. Release the\nvibrations attached to your own energies, sending them back to\ntheir own beginning. This will free you from the karmic situations\ndeveloped. This particular energy ray is one of the most beautiful\nand the strongest of all energies.\n\nTo you who have an inner desire to be healers, to touch others and\nbring peace and balance into life, this ray will be the most\npredominant of energies. You will learn to be able to direct this\nfrequency into the bodies and to perform the inner surgeries.\n\nBe diligent in your meditations. Be self-centered in this ray. Let\nthis become a time to yourself when you are enveloped in the\nbeautiful divine love. Each of you deserves to have these moments\nof aloneness.\n\nEach of you needs to know thyself.\n\nAnd now, the peace that comes from understanding be with you\nand in you. Many blessings are coming into each of your lives.\nPeace I give to you.\n\nMessage #2\n\nAzreal- Man and Religion\n\nGreetings, dear students of light, this is Azreal speaking. You are\nexperiencing many ideals, which cause conflicts with the inner\nawareness of your own spiritual nature.\n\nMan has brought many concepts into the earth, which is\nunawakened to spiritual philosophies. Know that man sees God\nthrough the eyes of his own consciousness. Man perceived God as\nan image of him and began to relate to this godhead as he would\nrelate to a father figure of his own nature. Therefore, God is often\nperceived as a power for punishment as well as for good, as a\npower for reward as well as what is taken away.\n\nKnow that in essence, God is love, God is divinity, and God is\nMovement, Mind and Spirit. God is a formless power that is\nperfect in every aspect of his total inner self-hood. Nothing that is\nout of the Mind and Creative Spirit of God can be imperfect. It is\nonly the expression of human behavior that brings imperfection to\nthe creation of the godhead.\n\nReligions are the minds of man attuning themselves to insights, to\nphenomena, to superstitions, to many, many concepts reaching for\nan understanding of the innate power of God. Religions have\nbrought man into a closer association with his own inner spiritual\nbeing. However, they have often caused man to separate himself\nfrom the highest truth, for religions are that which can cause men\nto be totally under the power of minds unawakened to spirit.\n\nKnow that many things expressed as “total commandments” of a\nhigher power are simply the works of minds that have gathered as\none to enforce principles for political power, for self-hoods and for\nencasing themselves in a surrounding consciousness of\nrighteousness. We see that the religions of man have given the\nschooling to many, they have educated and brought man through\nmuch negativity into a greater light but have also put upon man the\nshackles of unresolved problems.\n\nTherefore, it is time, as man is moving into the new age, that he\nput aside the superstitions, the ideologies that have caused man to\nlook at his brother as unworthy, as the enemy, as one to be feared,\n\nas one unacceptable by the godhead. It is time for man to stop\njudging all other entities as separate from godhead. In reality, there\nis not one soul that is within the planet earth or in the whole\nuniverse that has not had its beginning stage from the Angelic\nConsciousness and through the divinity of Mind.\n\nIt is the soul's incarnation through many, many lives that has\ncaused it to become separated from the awareness of its own\nbeginning. These incarnations and earth experiences cause the soul\nto see things in distortion and to judge humanity as enemies,\nsomething to be feared. It is through the earthly, human,\nmaterialistic expression that man has become animalistic through\nall religions and through all spiritual teachings. There is one thread\nthat man must look to his own inner being and seek to know\nhimself as God, to seek to know himself as a son of a power\nbeyond his own concepts.\n\nRegardless of what fabricated thoughts have enslaved the human\nconsciousness, the inner spirit is truth. Man must go to the basic\nprinciple \"that his own divinity is related to and projected through\nthe masters of the earth,\" Accept that Jesus of Nazareth was the\nincarnation of the Godhead. He was the spirit divine manifested in\nhuman consciousness. He was given to humanity for all to follow\nthe path to higher spirit and divine love.\n\nAll religions have their own concepts of how man can grow to a\npoint of greater understanding. Yet, the religions are the reflections\nof the intelligence and consciousness of those who have proposed\nthe ideologies. Know that each man has the ability to be inspired\nby spirit, for spirit is an incarnating spark that lives within the\nhigher ego of each individual. If man can learn to release the\nconscious level of vibration and move into the inner sanctum of his\nhigher spirit, he can tap the Source of Energy and Light and find\nTruth. Each man has the ability to bring into his own nature the\n\ntruth of light, the truth of the magnitude of mind that creates the\nuniverses.\n\nWe see the sickness of humanity as the product of mind at the\nconscious level and the subconscious level. Illnesses and diseases\nof the physical body are the result of a broken spirit, of a\nseparation between the consciousnesses of their own self-hood as a\nunique part of the divine nature. Each one has the ability to bring\nthe body into balance, to bring harmony into the physical by\ntapping the source of light within the soul vibration. It is most\nimportant that man come to the awakening that, within his nature,\nis all that which can bring physical bodies into their perfection.\n\nThere is much to be spoken to our beloved earth brethren that time\nis but a passing spark of a total incarnation. You are passing\nthrough time. Time is minute in an eternality of living experiences.\nYour inner soul is moving through many stages of development\nand expression. Your incarnations, while many, are simply creative\nouter appearances of a need to express. Your soul's true goal is to\nmove back to its divine beginni
